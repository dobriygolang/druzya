<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hone — Focus cockpit</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --ink: #ffffff;
    --ink-90: rgba(255,255,255,0.90);
    --ink-60: rgba(255,255,255,0.60);
    --ink-40: rgba(255,255,255,0.40);
    --ink-20: rgba(255,255,255,0.20);
    --hair: rgba(255,255,255,0.08);
    --hair-2: rgba(255,255,255,0.12);
    --red: #FF3B30;
    --bg: #000000;
    --surface: #0a0a0a;
    --surface-2: #111111;
  }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-feature-settings: "zero", "ss01"; }
  .hair { border-color: var(--hair); }
  .hair-b { border-bottom: 1px solid var(--hair); }
  .hair-t { border-top: 1px solid var(--hair); }
  .hair-r { border-right: 1px solid var(--hair); }
  .hair-l { border-left: 1px solid var(--hair); }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: default; }
  input, textarea { font: inherit; color: inherit; background: none; border: 0; outline: 0; padding: 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); background-clip: padding-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Subtle starfield — static, very quiet */
  .starfield{
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,0.35), transparent 50%),
      radial-gradient(1px 1px at 84% 18%, rgba(255,255,255,0.20), transparent 50%),
      radial-gradient(1px 1px at 24% 78%, rgba(255,255,255,0.22), transparent 50%),
      radial-gradient(1px 1px at 67% 62%, rgba(255,255,255,0.30), transparent 50%),
      radial-gradient(1px 1px at 92% 86%, rgba(255,255,255,0.18), transparent 50%),
      radial-gradient(1px 1px at 45% 12%, rgba(255,255,255,0.25), transparent 50%),
      radial-gradient(1px 1px at 58% 48%, rgba(255,255,255,0.15), transparent 50%),
      radial-gradient(1px 1px at 8%  58%, rgba(255,255,255,0.22), transparent 50%),
      radial-gradient(1px 1px at 77% 34%, rgba(255,255,255,0.18), transparent 50%),
      radial-gradient(1px 1px at 34% 44%, rgba(255,255,255,0.14), transparent 50%);
  }

  /* Waveform — thin horizon line with subtle glow */
  .wave-horizon{
    position: absolute; left:0; right:0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  }

  @keyframes breathe { 0%,100%{ opacity:.7 } 50%{ opacity:1 } }
  .breathe { animation: breathe 2.4s ease-in-out infinite; }

  @keyframes redpulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,59,48,.55); }
    70%  { box-shadow: 0 0 0 8px rgba(255,59,48,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
  }
  .red-pulse { animation: redpulse 1.8s ease-out infinite; }

  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .caret { display:inline-block; width:.5em; height:1em; background: var(--ink); margin-left:2px; vertical-align:-0.12em; animation: blink 1s steps(1) infinite; }

  @keyframes fadein { from{opacity:0; transform: translateY(4px)} to{opacity:1; transform: translateY(0)} }
  .fadein { animation: fadein 300ms cubic-bezier(.2,.7,.2,1) both; }

  .kbd{
    display:inline-flex; align-items:center; justify-content:center;
    min-width: 18px; height: 18px; padding: 0 5px;
    border: 1px solid var(--hair-2);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-60);
    background: rgba(255,255,255,0.03);
    line-height: 1;
  }
  .kbd-lg{
    min-width: 22px; height: 22px; font-size: 11px; border-radius: 5px;
  }

  .chip{
    display:inline-flex; align-items:center; gap:6px;
    padding: 3px 8px; border-radius: 999px;
    border: 1px solid var(--hair);
    font-size: 11px; color: var(--ink-60);
    background: rgba(255,255,255,0.02);
  }

  /* Focus ring */
  .focus-ring:focus-visible { outline: 1px solid var(--ink-40); outline-offset: 2px; border-radius: 4px; }

  /* Soft glass for overlays */
  .glass {
    background: rgba(10,10,10,0.72);
    backdrop-filter: blur(28px) saturate(1.2);
    -webkit-backdrop-filter: blur(28px) saturate(1.2);
  }
  .scrim {
    background: rgba(0,0,0,0.62);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* disable text selection on chrome */
  .no-select { user-select: none; -webkit-user-select: none; }

  /* Window */
  .win{
    background: #000;
    border: 1px solid var(--hair);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 .5px 0 rgba(255,255,255,.05) inset,
      0 1px 1px rgba(0,0,0,.6),
      0 30px 80px -10px rgba(0,0,0,.7);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="hone.jsx"></script>
</body>
</html>
