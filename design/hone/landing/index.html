<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>druz9 — Sharpen your craft. Every day.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --ink:#fff; --ink-90:rgba(255,255,255,0.9); --ink-60:rgba(255,255,255,0.6);
    --ink-40:rgba(255,255,255,0.4); --hair:rgba(255,255,255,0.06);
    --hair-2:rgba(255,255,255,0.12); --red:#FF3B30;
  }
  html,body{margin:0;padding:0;background:#000;color:#fff;font-family:'Inter',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  .mono{font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;font-feature-settings:"zero","ss01";}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
  input,textarea{font:inherit;color:inherit;background:none;border:0;outline:0;padding:0;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-track{background:transparent;}
  .kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border:1px solid var(--hair-2);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-60);background:rgba(255,255,255,0.03);line-height:1;}
  @keyframes redpulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.55);}70%{box-shadow:0 0 0 8px rgba(255,59,48,0);}100%{box-shadow:0 0 0 0 rgba(255,59,48,0);}}
  .red-pulse{animation:redpulse 1.8s ease-out infinite;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fadein{animation:fadein 600ms cubic-bezier(.2,.7,.2,1) both;}
  .no-select{user-select:none;-webkit-user-select:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="landing.jsx"></script>
</body>
</html>
