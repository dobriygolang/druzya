<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBoard — druz9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* === Токены дизайн-системы druz9 === */
:root {
  --bg-bg: #06060a;
  --bg-s1: #0b0b11;
  --bg-s2: #111118;
  --bg-s3: #19191f;
  --bg-s4: #202028;
  --tx: #eaeaef;
  --tx2: #87879e;
  --tx3: #505068;
  --brd: rgba(255,255,255,0.045);
  --brd2: rgba(255,255,255,0.09);
  /* Kind colors */
  --k-algo: #a78bfa;
  --k-sys: #22d3ee;
  --k-quiz: #4ade80;
  --k-refl: #fbbf24;
  --k-read: #8896ab;
  --k-custom: #6b6b78;
  /* Status */
  --st-todo: #a78bfa;
  --st-prog: #fb923c;
  --st-rev: #38bdf8;
  --st-done: #4ade80;
  --st-dismiss: #6b6b78;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg-bg: #f8f8f6;
    --bg-s1: #ffffff;
    --bg-s2: #f1f1ef;
    --bg-s3: #e8e8e5;
    --bg-s4: #dededd;
    --tx: #1a1a2e;
    --tx2: #6b6b80;
    --tx3: #a0a0b0;
    --brd: rgba(0,0,0,0.06);
    --brd2: rgba(0,0,0,0.12);
  }
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-bg);
  color: var(--tx);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* === Утилиты === */
.flex { display:flex; }
.items-center { align-items:center; }
.gap-1 { gap:4px; } .gap-2 { gap:8px; } .gap-3 { gap:12px; } .gap-4 { gap:16px; }

/* === App Shell === */
.app {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px 32px 32px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* === Header === */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.hdr-left { display:flex; align-items:center; gap:14px; }
.hdr-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.hdr-count {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-s3);
  color: var(--tx2);
  font-variant-numeric: tabular-nums;
}
.hdr-mid { display:flex; align-items:center; gap:4px; }
.chip {
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--tx3);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  background: none;
  letter-spacing: 0.2px;
}
.chip:hover { color:var(--tx2); background:var(--bg-s2); }
.chip.on { color:var(--tx); background:var(--bg-s3); }
.hdr-right { display:flex; align-items:center; gap:10px; }
.toggle-label {
  font-size: 11px;
  color: var(--tx3);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.toggle-track {
  width: 30px; height: 16px;
  background: var(--bg-s3);
  border-radius: 8px;
  position: relative;
  transition: background 0.2s;
}
.toggle-track::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--tx3);
  top: 2px; left: 2px;
  transition: all 0.2s;
}
.toggle-track.on { background: var(--tx2); }
.toggle-track.on::after { left:16px; background:var(--tx); }
.demo-btn {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--brd);
  background: var(--bg-s2);
  color: var(--tx3);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.demo-btn:hover { border-color:var(--brd2); color:var(--tx2); }

/* === Board Empty (full board) === */
.board-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--tx3);
  padding: 80px 0;
}
.board-empty-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--bg-s2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--tx3);
}
.board-empty h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--tx2);
}
.board-empty p {
  font-size: 13px;
  max-width: 320px;
  text-align: center;
  line-height: 1.6;
}
.board-empty .load-link {
  font-size: 12px;
  color: var(--tx2);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  transition: color 0.15s;
  background: none;
  border: none;
  font-family: inherit;
}
.board-empty .load-link:hover { color:var(--tx); }

/* === Board === */
.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  flex: 1;
  min-height: 0;
}
.board.has-dismissed { grid-template-columns: repeat(5, 1fr); }

@media (max-width: 1024px) {
  .board { grid-template-columns: repeat(2, 1fr); }
  .board.has-dismissed { grid-template-columns: repeat(2, 1fr); }
}

/* Mobile tabs */
.mobile-tabs { display:none; }
@media (max-width: 640px) {
  .board { display:none !important; }
  .mobile-tabs { display:block; flex:1; }
  .hdr { gap:8px; }
  .hdr-mid { display:none; }
}
.mtab-bar {
  display: flex;
  gap: 2px;
  background: var(--bg-s1);
  border-radius: 8px;
  padding: 3px;
  margin-bottom: 12px;
}
.mtab {
  flex:1;
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--tx3);
  text-align: center;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  transition: all 0.15s;
}
.mtab.on { color:var(--tx); background:var(--bg-s3); }
.mtab-count {
  font-variant-numeric: tabular-nums;
  font-size: 10px;
  margin-left: 3px;
  opacity: 0.6;
}
.mtab-col {
  display: none;
  flex-direction: column;
  gap: 6px;
}
.mtab-col.on { display:flex; }

/* === Column === */
.col {
  background: var(--bg-s1);
  border: 1px solid var(--brd);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  min-height: 380px;
  transition: background 0.2s;
}
.col.drag-over {
  background: var(--bg-s2);
  border-color: var(--brd2);
}
.col-hdr {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.col-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-name {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--tx2);
}
.col-cnt {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--tx3);
}
.col-body {
  flex: 1;
  padding: 4px 8px 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.col-body::-webkit-scrollbar { width:3px; }
.col-body::-webkit-scrollbar-track { background:transparent; }
.col-body::-webkit-scrollbar-thumb { background:var(--brd); border-radius:3px; }

/* Column empty */
.col-empty {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  color:var(--tx3);
  font-size:11px;
  opacity:0.45;
  padding:24px 0;
}
.col-empty i { font-size:18px; }

/* === Card === */
.card {
  display: flex;
  border-radius: 7px;
  background: var(--bg-s2);
  cursor: grab;
  transition: background 0.15s, box-shadow 0.2s, transform 0.2s;
  position: relative;
  animation: cardIn 0.25s ease;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(4px); }
  to { opacity:1; transform:translateY(0); }
}
.card:hover {
  background: var(--bg-s3);
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  transform: translateY(-1px);
}
.card:active { cursor:grabbing; }
.card.dragging { opacity:0.35; transform:scale(0.97); }

.card-strip {
  width: 3px;
  border-radius: 7px 0 0 7px;
  flex-shrink: 0;
}
.card-inner {
  flex: 1;
  padding: 10px 12px;
  min-width: 0;
}

/* Card top row */
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  margin-bottom: 4px;
}
.card-title {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--tx);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-kind-icon {
  font-size: 10px;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.7;
}
.card-drag {
  font-size: 10px;
  color: var(--tx3);
  opacity: 0;
  transition: opacity 0.15s;
  cursor: grab;
  flex-shrink: 0;
  margin-top: 1px;
  padding: 2px;
}
.card:hover .card-drag { opacity:0.7; }
.card-drag:hover { color:var(--tx2); }

/* Card preview */
.card-preview {
  font-size: 11px;
  line-height: 1.5;
  color: var(--tx3);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}

/* Card footer */
.card-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.skill-tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.3px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--bg-s4);
  color: var(--tx2);
}
.pri-dots {
  display: flex;
  gap: 2px;
  align-items: center;
}
.pri-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--tx3);
}
.card-age {
  font-size: 10px;
  color: var(--tx3);
}
.src-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.4px;
  padding: 1px 5px;
  border-radius: 3px;
  line-height: 1.5;
}
.src-ai {
  background: rgba(167,139,250,0.12);
  color: var(--k-algo);
}
.src-user {
  color: var(--tx3);
  font-size: 10px;
}
.card-menu-btn {
  margin-left: auto;
  width: 20px; height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  border: none;
  background: none;
  color: var(--tx3);
  cursor: pointer;
  font-size: 10px;
  opacity: 0;
  transition: all 0.15s;
}
.card:hover .card-menu-btn { opacity:1; }
.card-menu-btn:hover { background:var(--bg-s4); color:var(--tx2); }

/* Card → link button */
.card-link {
  position: absolute;
  right: 8px;
  bottom: 8px;
  width: 22px; height: 22px;
  border-radius: 5px;
  border: none;
  background: var(--bg-s4);
  color: var(--tx3);
  font-size: 10px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card:hover .card-link { opacity:1; }
.card-link:hover { background:var(--tx); color:var(--bg-bg); }

/* AI reviewing pulse overlay */
.ai-pulse {
  position: absolute;
  inset: 0;
  border-radius: 7px;
  pointer-events: none;
  animation: aiPulse 2.5s ease-in-out infinite;
}
@keyframes aiPulse {
  0%, 100% { background:rgba(56,189,248,0); }
  50% { background:rgba(56,189,248,0.04); }
}

/* === Context Menu === */
.ctx {
  position: fixed;
  z-index: 300;
  background: var(--bg-s2);
  border: 1px solid var(--brd2);
  border-radius: 8px;
  padding: 4px;
  min-width: 180px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: none;
  animation: ctxIn 0.12s ease;
}
@keyframes ctxIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
.ctx.show { display:block; }
.ctx-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  font-size: 12px;
  color: var(--tx2);
  cursor: pointer;
  border-radius: 5px;
  border: none;
  background: none;
  width: 100%;
  font-family: inherit;
  text-align: left;
  transition: all 0.1s;
}
.ctx-item:hover { background:var(--bg-s3); color:var(--tx); }
.ctx-item i { width:14px; text-align:center; font-size:11px; }
.ctx-sep { height:1px; background:var(--brd); margin:4px 8px; }
.ctx-item.danger:hover { background:rgba(255,60,60,0.08); color:#ff5555; }

/* === Side Drawer === */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 400;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.drawer-overlay.open { opacity:1; pointer-events:auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  width: 420px;
  max-width: 100vw;
  height: 100vh;
  background: var(--bg-s1);
  border-left: 1px solid var(--brd);
  z-index: 401;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform:translateX(0); }
.drawer-hdr {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--brd);
  flex-shrink: 0;
}
.drawer-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: none;
  color: var(--tx3);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.drawer-close:hover { background:var(--bg-s2); color:var(--tx); }
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.drawer-body::-webkit-scrollbar { width:3px; }
.drawer-body::-webkit-scrollbar-thumb { background:var(--brd); border-radius:3px; }

/* Drawer content */
.dr-strip {
  width: 32px; height: 4px;
  border-radius: 2px;
  margin-bottom: 12px;
}
.dr-kind { font-size:11px; font-weight:600; color:var(--tx3); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.dr-title { font-size:17px; font-weight:700; line-height:1.35; margin-bottom:16px; letter-spacing:-0.2px; }
.dr-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.dr-meta-item {
  font-size:11px;
  color:var(--tx3);
  display:flex;
  align-items:center;
  gap:4px;
}
.dr-meta-item span { color:var(--tx2); }
.dr-divider { height:1px; background:var(--brd); margin:16px 0; }
.dr-brief {
  font-size:13px;
  line-height:1.65;
  color:var(--tx2);
  margin-bottom:4px;
}

/* Comments */
.dr-comments-hdr {
  font-size:12px;
  font-weight:600;
  color:var(--tx2);
  margin-bottom:12px;
}
.dr-comment {
  display:flex;
  gap:10px;
  margin-bottom:14px;
}
.dr-comment-avatar {
  width:24px; height:24px;
  border-radius:6px;
  background:var(--bg-s3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  color:var(--tx3);
  flex-shrink:0;
}
.dr-comment-body { flex:1; min-width:0; }
.dr-comment-author {
  font-size:11px;
  font-weight:600;
  color:var(--tx2);
  margin-bottom:2px;
}
.dr-comment-author time { font-weight:400; color:var(--tx3); margin-left:6px; }
.dr-comment-text {
  font-size:12px;
  line-height:1.5;
  color:var(--tx2);
}
.dr-comment-input {
  display:flex;
  gap:8px;
  margin-top:8px;
}
.dr-comment-input input {
  flex:1;
  padding:8px 12px;
  background:var(--bg-s2);
  border:1px solid var(--brd);
  border-radius:6px;
  color:var(--tx);
  font-family:inherit;
  font-size:12px;
  outline:none;
  transition:border-color 0.15s;
}
.dr-comment-input input:focus { border-color:var(--brd2); }
.dr-comment-input button {
  padding:8px 14px;
  background:var(--bg-s3);
  border:1px solid var(--brd);
  border-radius:6px;
  color:var(--tx2);
  font-family:inherit;
  font-size:11px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.15s;
}
.dr-comment-input button:hover { background:var(--bg-s4); color:var(--tx); }

/* === FAB === */
.fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--tx);
  color: var(--bg-bg);
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: all 0.2s;
  z-index: 100;
}
.fab:hover { transform:translateY(-2px) scale(1.04); box-shadow:0 6px 28px rgba(0,0,0,0.5); }
.fab:active { transform:translateY(0) scale(0.98); }

/* === Modal === */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.55);
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:auto; }
.modal {
  background:var(--bg-s1);
  border:1px solid var(--brd2);
  border-radius:12px;
  padding:24px;
  width:400px;
  max-width:92vw;
  transform:scale(0.96);
  transition:transform 0.2s;
}
.modal-overlay.open .modal { transform:scale(1); }
.modal h3 { font-size:15px; font-weight:600; margin-bottom:20px; }
.mfield { margin-bottom:14px; }
.mfield label {
  display:block;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.6px;
  text-transform:uppercase;
  color:var(--tx3);
  margin-bottom:6px;
}
.mfield input, .mfield select, .mfield textarea {
  width:100%;
  padding:8px 12px;
  background:var(--bg-s2);
  border:1px solid var(--brd);
  border-radius:6px;
  color:var(--tx);
  font-family:inherit;
  font-size:13px;
  outline:none;
  transition:border-color 0.15s;
}
.mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color:var(--brd2); }
.mfield select option { background:var(--bg-s2); }
.mfield textarea { resize:vertical; min-height:60px; }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.mbtn {
  padding:8px 18px;
  border-radius:6px;
  border:none;
  font-family:inherit;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.15s;
}
.mbtn-ghost { background:var(--bg-s2); color:var(--tx2); border:1px solid var(--brd); }
.mbtn-ghost:hover { border-color:var(--brd2); color:var(--tx); }
.mbtn-primary { background:var(--tx); color:var(--bg-bg); font-weight:600; }
.mbtn-primary:hover { opacity:0.88; }

/* === Footer === */
.ftr {
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid var(--brd);
  display: flex;
  align-items: center;
  gap: 16px;
}
.ftr-clock {
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  color: var(--tx3);
  min-width: 56px;
}
.ftr-track {
  flex:1; height:2px;
  background:var(--bg-s3);
  border-radius:1px;
  overflow:hidden;
}
.ftr-fill {
  height:100%;
  background:var(--tx2);
  border-radius:1px;
  width:0%;
  transition:width 0.6s ease;
}
.ftr-pct {
  font-size:11px;
  color:var(--tx3);
  font-variant-numeric:tabular-nums;
}

/* === Toast === */
.toasts {
  position:fixed;
  bottom:80px;
  right:28px;
  z-index:600;
  display:flex;
  flex-direction:column;
  gap:6px;
  pointer-events:none;
}
.toast {
  padding:8px 14px;
  background:var(--bg-s2);
  border:1px solid var(--brd2);
  border-radius:6px;
  font-size:12px;
  color:var(--tx2);
  animation:tIn 0.2s ease, tOut 0.2s ease 2s forwards;
}
@keyframes tIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes tOut { to{opacity:0;transform:translateY(-4px)} }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header class="hdr">
    <div class="hdr-left">
      <h1 class="hdr-title">Your Tasks</h1>
      <span class="hdr-count" id="activeCount">0 active</span>
    </div>
    <div class="hdr-mid" id="filterChips">
      <button class="chip on" data-f="all">All</button>
      <button class="chip" data-f="ai">AI-only</button>
      <button class="chip" data-f="my">My-only</button>
    </div>
    <div class="hdr-right">
      <label class="toggle-label" onclick="toggleDismissed()">
        <span>Show dismissed</span>
        <div class="toggle-track" id="dismissToggle"></div>
      </label>
      <button class="demo-btn" onclick="toggleEmptyState()">Empty state</button>
    </div>
  </header>

  <!-- Board (desktop/tablet) -->
  <div class="board" id="board"></div>

  <!-- Mobile tabs -->
  <div class="mobile-tabs" id="mobileTabs">
    <div class="mtab-bar" id="mtabBar"></div>
    <div id="mtabCols"></div>
  </div>

  <!-- Board empty state -->
  <div class="board-empty" id="boardEmpty" style="display:none;">
    <div class="board-empty-icon"><i class="fa-solid fa-sparkles"></i></div>
    <h2>No tasks yet</h2>
    <p>AI-coach анализирует твою активность и скоро предложит персональные задачи</p>
    <button class="load-link" onclick="loadDemo()">Load demo tasks</button>
  </div>

  <!-- Footer -->
  <div class="ftr">
    <div class="ftr-clock" id="clock">00:00</div>
    <div class="ftr-track"><div class="ftr-fill" id="ftrFill"></div></div>
    <div class="ftr-pct" id="ftrPct">0%</div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx" id="ctx"></div>

<!-- FAB -->
<button class="fab" onclick="openModal()" aria-label="Add task"><i class="fa-solid fa-plus"></i></button>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drOv" onclick="closeDrawer()"></div>
<!-- Drawer -->
<div class="drawer" id="dr">
  <div class="drawer-hdr">
    <span style="font-size:12px;font-weight:600;color:var(--tx2)" id="drColName"></span>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drBody"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="mOv" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>New task</h3>
    <div class="mfield">
      <label>Title</label>
      <input id="mTitle" type="text" placeholder="What needs to be done?">
    </div>
    <div class="mfield">
      <label>Kind</label>
      <select id="mKind">
        <option value="algo">Algorithm</option>
        <option value="sys">System Design</option>
        <option value="quiz">Quiz</option>
        <option value="refl">Reflection</option>
        <option value="read">Reading</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="mfield">
      <label>Priority</label>
      <select id="mPri">
        <option value="1">Low</option>
        <option value="2">Medium</option>
        <option value="3">High</option>
      </select>
    </div>
    <div class="mfield">
      <label>Column</label>
      <select id="mCol">
        <option value="todo">To Do</option>
        <option value="progress">In Progress</option>
        <option value="review">In Review</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="mfield">
      <label>Skill tag</label>
      <input id="mSkill" type="text" placeholder="e.g. Binary Search">
    </div>
    <div class="mfield">
      <label>Brief</label>
      <textarea id="mBrief" placeholder="Short description..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-ghost" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-primary" onclick="addFromModal()">Create</button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toasts" id="toasts"></div>

<script>
// === Конфигурация видов задач ===
const KINDS = {
  algo:   { label:'Algorithm',     color:'var(--k-algo)',   icon:'fa-code' },
  sys:    { label:'System Design', color:'var(--k-sys)',    icon:'fa-sitemap' },
  quiz:   { label:'Quiz',          color:'var(--k-quiz)',   icon:'fa-circle-question' },
  refl:   { label:'Reflection',    color:'var(--k-refl)',   icon:'fa-brain' },
  read:   { label:'Reading',       color:'var(--k-read)',   icon:'fa-book-open' },
  custom: { label:'Custom',        color:'var(--k-custom)', icon:'fa-circle-plus' },
};

// === Колонки ===
const COLS = [
  { id:'todo',     name:'To Do',       color:'var(--st-todo)',  icon:'fa-circle-dot' },
  { id:'progress', name:'In Progress', color:'var(--st-prog)',  icon:'fa-spinner' },
  { id:'review',   name:'In Review',   color:'var(--st-rev)',   icon:'fa-eye' },
  { id:'done',     name:'Done',        color:'var(--st-done)',  icon:'fa-circle-check' },
  { id:'dismissed',name:'Dismissed',   color:'var(--st-dismiss)',icon:'fa-circle-xmark' },
];

// === Данные задач ===
let tasks = [
  { id:1,  title:'Решить Merge K Sorted Lists',              kind:'algo',  src:'ai',   skill:'Linked Lists',    pri:3, age:'2d', col:'todo',
    brief:'На основе arena-матчей: ты теряешь время на merge-задачах. Практикуй двухуказательный подход.' },
  { id:2,  title:'Спроектировать URL Shortener',              kind:'sys',   src:'ai',   skill:'System Design',   pri:2, age:'1d', col:'todo',
    brief:'После mock-interview: нужно улучшить навыки проектирования распределённых систем.' },
  { id:3,  title:'Quiz: Сложность алгоритмов',                kind:'quiz',  src:'ai',   skill:'Big O',           pri:1, age:'3h', col:'todo',
    brief:'Короткий тест на оценку сложности. 10 вопросов, ~5 минут.' },
  { id:4,  title:'Практика Binary Search',                    kind:'algo',  src:'ai',   skill:'Binary Search',   pri:3, age:'4d', col:'progress',
    brief:'Повтори паттерн left <= right и вариации: search-insert, find-peak, rotated-array.' },
  { id:5,  title:'Рефлексия: последний mock-interview',       kind:'refl',  src:'ai',   skill:'Communication',   pri:2, age:'6h', col:'progress',
    brief:'Запиши 3 вещи, которые пошли хорошо, и 2 области для улучшения после сессии.' },
  { id:6,  title:'Подготовить резюме для review',             kind:'custom',src:'user', skill:null,              pri:2, age:'1d', col:'progress',
    brief:'Обновить проекты и добавить ссылки на GitHub репозитории.' },
  { id:7,  title:'Код-ревью модуля уведомлений',             kind:'algo',  src:'ai',   skill:'Code Review',     pri:1, age:'2d', col:'review',
    brief:'Проверь реализацию observer-pattern в модуле. Обрати внимание на memory leaks.' },
  { id:8,  title:'Прочитать: System Design Interview',        kind:'read',  src:'ai',   skill:'System Design',   pri:1, age:'5d', col:'review',
    brief:'Глава 4: Design a Rate Limiter. Выдели ключевые trade-offs.' },
  { id:9,  title:'Решить Two Sum',                            kind:'algo',  src:'ai',   skill:'Hash Map',        pri:2, age:'7d', col:'done',
    brief:'Базовая задача на хэш-таблицы. Решена за O(n).' },
  { id:10, title:'Спроектировать Chat System',                kind:'sys',   src:'ai',   skill:'WebSocket',       pri:3, age:'3d', col:'done',
    brief:'Полный дизайн: выбор протокола, масштабирование, хранение истории.' },
];

let nextId = 11;
let showDismissed = false;
let currentFilter = 'all';
let emptyMode = false;

// Комментарии для drawer
const comments = {
  1: [
    { author:'AI Coach', avatar:'fa-robot', time:'1d ago', text:'Попробуй сначала решить вариант с 2 списками, потом обобщай до K.' },
    { author:'Ты', avatar:'fa-user', time:'6h ago', text:'Сделал, ушло 45 мин. Надо ещё повторить.' },
  ],
  4: [
    { author:'AI Coach', avatar:'fa-robot', time:'3d ago', text:'Обрати внимание на edge case с пустым массивом.' },
  ],
  7: [
    { author:'Ты', avatar:'fa-user', time:'1d ago', text:'Нашёл 2 бага, создал issues.' },
    { author:'AI Coach', avatar:'fa-robot', time:'20h ago', text:'Отлично. Теперь подумай, как избежать подобных ошибок в будущем.' },
  ],
};

// === Рендеринг ===
function getFiltered() {
  if (currentFilter === 'ai') return tasks.filter(t => t.src === 'ai');
  if (currentFilter === 'my') return tasks.filter(t => t.src === 'user');
  return tasks;
}

function render() {
  const filtered = getFiltered();
  const active = filtered.filter(t => t.col !== 'dismissed');
  document.getElementById('activeCount').textContent = active.length + ' active';

  // Пустой режим
  const boardEl = document.getElementById('board');
  const emptyEl = document.getElementById('boardEmpty');
  const mobileEl = document.getElementById('mobileTabs');

  if (emptyMode || filtered.length === 0) {
    boardEl.style.display = 'none';
    mobileEl.style.display = 'none';
    emptyEl.style.display = 'flex';
    updateProgress(filtered);
    return;
  }
  emptyEl.style.display = 'none';

  const colsToShow = showDismissed ? COLS : COLS.filter(c => c.id !== 'dismissed');
  boardEl.className = 'board' + (showDismissed ? ' has-dismissed' : '');
  boardEl.style.display = '';

  // Desktop board
  boardEl.innerHTML = '';
  colsToShow.forEach(c => {
    const ct = filtered.filter(t => t.col === c.id);
    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.col = c.id;

    // Drag & drop
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const tid = +e.dataTransfer.getData('text/plain');
      const t = tasks.find(x => x.id === tid);
      if (t && t.col !== c.id) { t.col = c.id; render(); toast('Moved to ' + c.name); }
    });

    col.innerHTML = `
      <div class="col-hdr">
        <div class="flex items-center gap-2">
          <div class="col-dot" style="background:${c.color};box-shadow:0 0 5px ${c.color}"></div>
          <span class="col-name">${c.name}</span>
        </div>
        <span class="col-cnt">${ct.length}</span>
      </div>`;

    const body = document.createElement('div');
    body.className = 'col-body';

    if (!ct.length) {
      body.innerHTML = `<div class="col-empty"><i class="fa-solid ${c.icon}"></i><span>Drop tasks here</span></div>`;
    } else {
      ct.forEach(t => body.appendChild(makeCard(t)));
    }
    col.appendChild(body);
    boardEl.appendChild(col);
  });

  // Mobile tabs
  renderMobile(colsToShow, filtered);
  updateProgress(filtered);
}

// === Создание карточки ===
function makeCard(t) {
  const k = KINDS[t.kind];
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.dataset.id = t.id;

  card.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', t.id);
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  // Правый клик — контекстное меню
  card.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, t.id); });

  // Кликом открываем drawer
  card.addEventListener('click', e => {
    if (e.target.closest('.card-menu-btn') || e.target.closest('.card-link') || e.target.closest('.card-drag')) return;
    openDrawer(t.id);
  });

  // Priority dots
  let dots = '';
  for (let i = 0; i < t.pri; i++) dots += '<div class="pri-dot"></div>';

  // AI pulse для review + AI
  const aiPulse = (t.col === 'review' && t.src === 'ai') ? '<div class="ai-pulse"></div>' : '';

  card.innerHTML = `
    <div class="card-strip" style="background:${k.color}"></div>
    <div class="card-inner">
      <div class="card-top">
        <span class="card-title">${t.title}</span>
        <i class="fa-solid ${k.icon} card-kind-icon" style="color:${k.color}"></i>
        <i class="fa-solid fa-grip-vertical card-drag" title="Drag"></i>
      </div>
      <div class="card-preview">${t.brief}</div>
      <div class="card-foot">
        ${t.skill ? `<span class="skill-tag">${t.skill}</span>` : ''}
        <div class="pri-dots">${dots}</div>
        <span class="card-age">${t.age}</span>
        ${t.src === 'ai' ? '<span class="src-badge src-ai">AI</span>' : '<i class="fa-solid fa-user src-user"></i>'}
        <button class="card-menu-btn" onclick="event.stopPropagation();showCtxBtn(event,${t.id})"><i class="fa-solid fa-ellipsis"></i></button>
      </div>
    </div>
    <button class="card-link" onclick="event.stopPropagation();toast('Deep link → ' + ${t.id})" title="Open"><i class="fa-solid fa-arrow-right"></i></button>
    ${aiPulse}`;

  return card;
}

// === Mobile ===
let mobileActiveTab = 'todo';

function renderMobile(cols, filtered) {
  const bar = document.getElementById('mtabBar');
  const container = document.getElementById('mtabCols');
  bar.innerHTML = '';
  container.innerHTML = '';

  cols.forEach(c => {
    const ct = filtered.filter(t => t.col === c.id);
    const tab = document.createElement('button');
    tab.className = 'mtab' + (mobileActiveTab === c.id ? ' on' : '');
    tab.innerHTML = `${c.name}<span class="mtab-count">${ct.length}</span>`;
    tab.onclick = () => { mobileActiveTab = c.id; render(); };
    bar.appendChild(tab);

    const colDiv = document.createElement('div');
    colDiv.className = 'mtab-col' + (mobileActiveTab === c.id ? ' on' : '');
    if (!ct.length) {
      colDiv.innerHTML = `<div class="col-empty" style="padding:48px 0"><i class="fa-solid ${c.icon}"></i><span>Drop tasks here</span></div>`;
    } else {
      ct.forEach(t => colDiv.appendChild(makeCard(t)));
    }
    container.appendChild(colDiv);
  });
}

// === Progress ===
function updateProgress(filtered) {
  const done = filtered.filter(t => t.col === 'done').length;
  const total = filtered.filter(t => t.col !== 'dismissed').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('ftrFill').style.width = pct + '%';
  document.getElementById('ftrPct').textContent = pct + '%';
}

// === Context Menu ===
let ctxTaskId = null;

function showCtx(e, id) {
  ctxTaskId = id;
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const ctx = document.getElementById('ctx');
  ctx.innerHTML = '';
  COLS.forEach(c => {
    if (c.id === t.col) return;
    const item = document.createElement('button');
    item.className = 'ctx-item';
    item.innerHTML = `<i class="fa-solid ${c.icon}" style="color:${c.color}"></i>Move to ${c.name}`;
    item.onclick = () => { t.col = c.id; hideCtx(); render(); toast('Moved to ' + c.name); };
    ctx.appendChild(item);
  });
  ctx.innerHTML += '<div class="ctx-sep"></div>';
  const disBtn = document.createElement('button');
  disBtn.className = 'ctx-item';
  disBtn.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>Dismiss';
  disBtn.onclick = () => { t.col = 'dismissed'; hideCtx(); render(); toast('Task dismissed'); };
  ctx.appendChild(disBtn);
  const delBtn = document.createElement('button');
  delBtn.className = 'ctx-item danger';
  delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>Delete';
  delBtn.onclick = () => { tasks = tasks.filter(x => x.id !== id); hideCtx(); render(); toast('Task deleted'); };
  ctx.appendChild(delBtn);

  // Позиция
  let x = e.clientX, y = e.clientY;
  ctx.style.left = x + 'px';
  ctx.style.top = y + 'px';
  ctx.classList.add('show');

  // Корректировка если выходит за экран
  requestAnimationFrame(() => {
    const r = ctx.getBoundingClientRect();
    if (r.right > window.innerWidth) ctx.style.left = (x - r.width) + 'px';
    if (r.bottom > window.innerHeight) ctx.style.top = (y - r.height) + 'px';
  });
}

function showCtxBtn(e, id) {
  e.preventDefault();
  const rect = e.target.closest('.card-menu-btn').getBoundingClientRect();
  showCtx({ clientX: rect.left, clientY: rect.bottom + 4, preventDefault(){} }, id);
}

function hideCtx() { document.getElementById('ctx').classList.remove('show'); }
document.addEventListener('click', hideCtx);
document.addEventListener('contextmenu', e => {
  if (!e.target.closest('.card')) hideCtx();
});

// === Drawer ===
function openDrawer(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const k = KINDS[t.kind];
  const c = COLS.find(x => x.id === t.col);
  document.getElementById('drColName').textContent = c ? c.name : '';

  let dots = '';
  for (let i = 0; i < t.pri; i++) dots += '<div class="pri-dot" style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--tx3);margin-right:2px"></div>';

  let html = `
    <div class="dr-strip" style="background:${k.color}"></div>
    <div class="dr-kind">${k.label}</div>
    <div class="dr-title">${t.title}</div>
    <div class="dr-meta">
      <div class="dr-meta-item">Status: <span>${c ? c.name : ''}</span></div>
      <div class="dr-meta-item">Priority: <span>${dots}</span></div>
      <div class="dr-meta-item">Created: <span>${t.age} ago</span></div>
      <div class="dr-meta-item">Source: <span>${t.src === 'ai' ? 'AI Coach' : 'You'}</span></div>
      ${t.skill ? `<div class="dr-meta-item">Skill: <span class="skill-tag">${t.skill}</span></div>` : ''}
    </div>
    <div class="dr-divider"></div>
    <div class="dr-brief">${t.brief}</div>
    <div class="dr-divider"></div>
    <div class="dr-comments-hdr">Comments ${(comments[id] || []).length}</div>`;

  (comments[id] || []).forEach(cm => {
    html += `
      <div class="dr-comment">
        <div class="dr-comment-avatar"><i class="fa-solid ${cm.avatar}"></i></div>
        <div class="dr-comment-body">
          <div class="dr-comment-author">${cm.author}<time>${cm.time}</time></div>
          <div class="dr-comment-text">${cm.text}</div>
        </div>
      </div>`;
  });

  html += `
    <div class="dr-comment-input">
      <input type="text" placeholder="Add a comment..." id="drCommentInput" onkeydown="if(event.key==='Enter')addComment(${id})">
      <button onclick="addComment(${id})">Send</button>
    </div>`;

  document.getElementById('drBody').innerHTML = html;
  document.getElementById('drOv').classList.add('open');
  document.getElementById('dr').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drOv').classList.remove('open');
  document.getElementById('dr').classList.remove('open');
}

function addComment(id) {
  const input = document.getElementById('drCommentInput');
  const text = input.value.trim();
  if (!text) return;
  if (!comments[id]) comments[id] = [];
  comments[id].push({ author:'Ты', avatar:'fa-user', time:'now', text });
  openDrawer(id); // ре-рендер drawer
  toast('Comment added');
}

// === Modal ===
function openModal() {
  document.getElementById('mOv').classList.add('open');
  setTimeout(() => document.getElementById('mTitle').focus(), 150);
}
function closeModal() {
  document.getElementById('mOv').classList.remove('open');
}
function addFromModal() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) {
    document.getElementById('mTitle').style.borderColor = '#ff4444';
    setTimeout(() => document.getElementById('mTitle').style.borderColor = '', 1200);
    return;
  }
  tasks.push({
    id: nextId++,
    title,
    kind: document.getElementById('mKind').value,
    src: 'user',
    skill: document.getElementById('mSkill').value.trim() || null,
    pri: +document.getElementById('mPri').value,
    age: 'now',
    col: document.getElementById('mCol').value,
    brief: document.getElementById('mBrief').value.trim() || 'Custom task',
  });
  closeModal();
  render();
  toast('Task created');
  // Очистка полей
  ['mTitle','mSkill','mBrief'].forEach(id => document.getElementById(id).value = '');
}

// === Фильтры ===
document.querySelectorAll('.chip').forEach(ch => {
  ch.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
    ch.classList.add('on');
    currentFilter = ch.dataset.f;
    render();
  });
});

// === Dismissed toggle ===
function toggleDismissed() {
  showDismissed = !showDismissed;
  document.getElementById('dismissToggle').classList.toggle('on', showDismissed);
  render();
}

// === Empty state toggle ===
function toggleEmptyState() {
  emptyMode = !emptyMode;
  render();
}
function loadDemo() {
  emptyMode = false;
  render();
}

// === Часы ===
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
setInterval(tick, 1000);
tick();

// === Toast ===
function toast(msg) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// === Клавиатура ===
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeDrawer();
    closeModal();
    hideCtx();
  }
});

// === Init ===
render();
</script>
</body>
</html>
