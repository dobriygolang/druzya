name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'design/**'
      - 'design-snapshots/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'design/**'
      - 'design-snapshots/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  # Force the upstream module proxy. We disable GOSUMDB because
  # github.com/klauspost/pgzip v1.2.6 has two recorded hashes — one in
  # sum.golang.org, another in proxy.golang.org's cache — and they no
  # longer agree (upstream was retagged). Verification still happens
  # locally via the entries in go.sum (which were generated against the
  # proxy hash). GOFLAGS=-mod=mod lets `go run` populate go.sum on the
  # fly when fresh transitive deps appear.
  GOPROXY: "https://proxy.golang.org,direct"
  GOSUMDB: "off"
  GOFLAGS: "-mod=mod"
  # Shared build/module caches — reused across shards & jobs via actions/cache.
  GOCACHE: /home/runner/.cache/go-build
  GOMODCACHE: /home/runner/go/pkg/mod
  GOLANGCI_LINT_CACHE: /home/runner/.cache/golangci-lint

jobs:
  # ─── Enumerate backend modules once; matrix-split them into N shards. ───
  # Keeps the matrix definition data-driven so adding a service doesn't need
  # a workflow edit.
  plan:
    name: Plan — shard backend modules
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.shard.outputs.shards }}
    steps:
      - uses: actions/checkout@v4
      - id: shard
        run: |
          # 4 shards — empirically the sweet spot for ~28 modules: more shards
          # means more per-job setup overhead (checkout + setup-go + cache restore
          # ~30s) eats the savings.
          mods=$(find backend -name go.mod -not -path '*/tools/*' | sort)
          n=4
          i=0
          for m in $mods; do
            dir=$(dirname "$m")
            eval "s$((i % n))=\"\${s$((i % n)):-}$dir \""
            i=$((i + 1))
          done
          # Emit JSON array of {shard, mods} for matrix fan-out.
          out='['
          for k in $(seq 0 $((n - 1))); do
            val=$(eval "echo \$s$k")
            out="${out}{\"shard\":\"$k\",\"mods\":\"${val% }\"},"
          done
          out="${out%,}]"
          echo "shards=$out" >> "$GITHUB_OUTPUT"
          echo "Computed shards: $out"

  backend:
    name: Go — shard ${{ matrix.shard }}
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false # we manage our own layered cache below

      # Layered cache: mod cache + build cache + golangci-lint cache — all keyed
      # on go.sum + .golangci.yml. Shard-suffixed restore-keys so an adjacent
      # shard's warm cache can seed a cold one.
      - name: Cache Go build + module + lint
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
            /home/runner/.cache/golangci-lint
          key: go-${{ runner.os }}-${{ env.GO_VERSION }}-shard${{ matrix.shard }}-${{ hashFiles('backend/**/go.sum', 'backend/.golangci.yml') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GO_VERSION }}-shard${{ matrix.shard }}-
            go-${{ runner.os }}-${{ env.GO_VERSION }}-

      - name: Go workspace sync
        run: go work sync

      # Install golangci-lint binary once per shard. Compiled with Go 1.25
      # because the prebuilt v1.61 release fails on Go 1.25 export data.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Lint shard
        env:
          GOWORK: "off"
          GOFLAGS: ""
        run: |
          fail=0
          for dir in ${{ matrix.mods }}; do
            echo "::group::lint $dir"
            (cd "$dir" && go mod download && go build ./... && \
              golangci-lint run --config="$GITHUB_WORKSPACE/backend/.golangci.yml" --timeout=5m ./...) || fail=1
            echo "::endgroup::"
          done
          exit $fail

      - name: Test shard
        env:
          GOFLAGS: ""
        run: |
          fail=0
          for dir in ${{ matrix.mods }}; do
            echo "::group::test $dir"
            (cd "$dir" && go test -race -count=1 ./...) || fail=1
            echo "::endgroup::"
          done
          exit $fail

  frontend:
    name: Frontend — lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Additional layered cache on top of setup-node's: the action only caches
      # the npm global cache, not node_modules itself. Caching node_modules
      # directly saves ~20s of `npm ci` link resolution on warm hits.
      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            nm-${{ runner.os }}-node20-

      # The lockfile is generated on a corp-laptop that proxies npm via
      # artifactory.s.o3.ru. GitHub runners can't reach that host. Rewrite
      # to the public registry — integrity SHA-512 hashes are content-addressed
      # so they remain valid against the same package contents.
      - name: Rewrite npm registry URLs to public registry
        working-directory: frontend
        run: |
          sed -i 's|https://artifactory\.s\.o3\.ru/artifactory/api/npm/npm-all-virtual|https://registry.npmjs.org|g' package-lock.json
          echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund --prefer-offline

      # Run lint + typecheck + build in parallel via & / wait. Build doesn't
      # depend on lint passing in CI gating order — we just need all three green.
      - name: Lint + Typecheck + Build (parallel)
        working-directory: frontend
        run: |
          set -e
          npm run lint         > /tmp/lint.log 2>&1 & lint_pid=$!
          npm run typecheck    > /tmp/tc.log 2>&1   & tc_pid=$!
          npm run build        > /tmp/build.log 2>&1 & build_pid=$!
          fail=0
          wait $lint_pid  || { echo "::error::lint failed";      cat /tmp/lint.log;  fail=1; }
          wait $tc_pid    || { echo "::error::typecheck failed"; cat /tmp/tc.log;    fail=1; }
          wait $build_pid || { echo "::error::build failed";     cat /tmp/build.log; fail=1; }
          # Always surface logs so successes are still inspectable.
          echo "──── lint log ────";      cat /tmp/lint.log  || true
          echo "──── typecheck log ────"; cat /tmp/tc.log    || true
          echo "──── build log ────";     cat /tmp/build.log || true
          exit $fail

  proto:
    name: Proto — buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: true
          cache-dependency-path: backend/tools/go.sum
      # Cache the buf binary across runs — installing from source takes ~30s.
      - name: Cache buf binary
        id: buf-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/buf
          key: buf-${{ runner.os }}-v1.50.0
      - name: Install buf
        if: steps.buf-cache.outputs.cache-hit != 'true'
        run: go install github.com/bufbuild/buf/cmd/buf@v1.50.0
      - name: Lint
        working-directory: proto
        run: buf lint

  migrations:
    name: Migrations — up/down smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: druz9
          POSTGRES_PASSWORD: druz9
          POSTGRES_DB: druz9
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U druz9"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - name: Cache goose binary
        id: goose-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/goose
          key: goose-${{ runner.os }}-v3.19.2
      - name: Install goose
        if: steps.goose-cache.outputs.cache-hit != 'true'
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.19.2
      - name: Up
        run: goose -dir backend/migrations postgres "host=localhost port=5432 user=druz9 password=druz9 dbname=druz9 sslmode=disable" up
      - name: Down (reset)
        run: goose -dir backend/migrations postgres "host=localhost port=5432 user=druz9 password=druz9 dbname=druz9 sslmode=disable" reset

  codegen-drift:
    name: Codegen — gen-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/tools/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache tools binaries (buf, protoc-gen-*, sqlc, mockgen)
        uses: actions/cache@v4
        with:
          path: bin
          key: tools-${{ runner.os }}-${{ hashFiles('backend/tools/go.sum') }}
      - name: Rewrite npm registry URLs to public registry
        working-directory: frontend
        run: |
          sed -i 's|https://artifactory\.s\.o3\.ru/artifactory/api/npm/npm-all-virtual|https://registry.npmjs.org|g' package-lock.json
          echo "registry=https://registry.npmjs.org/" > .npmrc
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund --prefer-offline
      - name: Run full codegen
        run: make gen
      - name: Fail on drift
        run: |
          git diff --exit-code -- backend/shared/generated backend/services/*/infra/db backend/services/*/domain/mocks frontend/src/api/generated \
            || (echo "codegen drift — run 'make gen' locally and commit" && exit 1)

  # Build + push the api image on main only. PR builds just verify the Dockerfile.
  image:
    name: Build + push api image
    runs-on: ubuntu-latest
    needs: [backend, frontend, proto, migrations]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/druz9-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/api.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Web (nginx + built frontend). Отдельный образ — пересобирается при любом
  # изменении frontend/ или nginx-конфига; деплой пуллит обе картинки.
  image-web:
    name: Build + push web image
    runs-on: ubuntu-latest
    needs: [frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/druz9-web
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/web.Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check-stubs:
    name: STUB advisory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: List new STUBs in this PR
        if: github.event_name == 'pull_request'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- backend frontend/src | \
            grep -E "^\+.*// STUB:" || echo "no new STUBs"
