name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        default: latest

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  production:
    # Only run after a green CI on main, OR manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://druz9.online
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      # Pre-flight network probe — quickly distinguishes:
      #   - TCP unreachable (firewall / wrong port / server down) → fix infra
      #   - TCP open but SSH auth fails (wrong key) → fix secrets
      # Doesn't block job; ssh-action will still run and fail loudly if needed.
      - name: SSH preflight (TCP probe)
        if: always()
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          PORT: ${{ secrets.DEPLOY_PORT || 22 }}
        run: |
          set +e
          RUNNER_IP=$(curl -fs --max-time 5 ifconfig.me || echo "?")
          echo "Runner egress IP: ${RUNNER_IP}"
          echo "Probing TCP ${HOST}:${PORT} (5s timeout)..."
          if timeout 5 bash -c "</dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
            echo "✅ TCP reachable — connectivity OK"
          else
            echo "❌ TCP unreachable. Likely cause:"
            echo "   • Hetzner Cloud Firewall blocks runner IP for that port"
            echo "   • SSH daemon listening on a different port than secret says"
            echo "   • Server down, or domain resolves to wrong IP"
            echo "Try from your laptop: nc -vzw 5 ${HOST} ${PORT}"
          fi
          # Best-effort SSH banner read (helps differentiate from generic TCP)
          timeout 5 nc -vzw 5 "${HOST}" "${PORT}" 2>&1 | head -5 || true

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # Connect timeout 60s (default is 30) — Hetzner can be slow on first connect
          timeout: 60s
          command_timeout: 10m
          envs: IMAGE_TAG
          script: |
            export IMAGE_TAG=${{ steps.tag.outputs.tag }}
            bash /opt/druz9/infra/scripts/deploy.sh

      - name: Smoke test
        run: |
          for i in {1..6}; do
            if curl -sfo /dev/null https://druz9.online/health/ready; then
              echo "deploy healthy"
              exit 0
            fi
            sleep 10
          done
          echo "deploy smoke test FAILED"
          exit 1

      - name: Notify Telegram
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$CHAT" ]; then
            status="${{ job.status }}"
            emoji="✅"; [ "$status" != "success" ] && emoji="🔥"
            curl -s "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -d chat_id="$CHAT" \
              -d parse_mode=Markdown \
              -d text="${emoji} druz9 deploy \`${{ steps.tag.outputs.tag }}\` → ${status}%0A${{ github.event.head_commit.message }}"
          fi
