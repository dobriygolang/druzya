name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        default: latest

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  production:
    # Only run after a green CI on main, OR manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://druz9.online
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            export IMAGE_TAG=${{ steps.tag.outputs.tag }}
            bash /opt/druz9/infra/scripts/deploy.sh

      - name: Smoke test
        run: |
          for i in {1..6}; do
            if curl -sfo /dev/null https://druz9.online/health/ready; then
              echo "deploy healthy"
              exit 0
            fi
            sleep 10
          done
          echo "deploy smoke test FAILED"
          exit 1

      - name: Notify Telegram
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$CHAT" ]; then
            status="${{ job.status }}"
            emoji="✅"; [ "$status" != "success" ] && emoji="🔥"
            curl -s "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -d chat_id="$CHAT" \
              -d parse_mode=Markdown \
              -d text="${emoji} druz9 deploy \`${{ steps.tag.outputs.tag }}\` → ${status}%0A${{ github.event.head_commit.message }}"
          fi
