name: Hone Release

# Триггер:
#  - push tag'а вида `hone-vX.Y.Z` — полноценный релиз (notarize если
#    установлены Apple-secret'ы, иначе unsigned DMG).
#  - workflow_dispatch — ручной build для QA (draft release без notarize).
#
# Выход: arm64.dmg + x64.dmg + blockmap'ы + latest-mac.yml в одном Github
# Release. Hone electron-updater читает latest-mac.yml по URL из
# publish.config в electron-builder.yml, либо (в dev) из
# HONE_UPDATE_FEED_URL.
#
# Apple signing секреты (GitHub Secrets, опциональные):
#   APPLE_ID            — Apple ID email
#   APPLE_APP_PASSWORD  — app-specific password
#   APPLE_TEAM_ID       — Team ID
#   CSC_LINK            — base64-encoded .p12 developer cert
#   CSC_KEY_PASSWORD    — p12 password
# Без них electron-builder делает unsigned билд (установщик потребует от
# юзера «right-click → Open», что для beta приемлемо; для public v1
# секреты обязательны).

on:
  push:
    tags:
      - 'hone-v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        required: false
        default: 'true'

concurrency:
  group: hone-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Hone DMG (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        # arm64 — Apple Silicon (M-series). Primary target.
        # x64   — Intel Macs; market share падает, но до 2027 нужен.
        arch: [arm64, x64]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hone/package-lock.json

      - name: Install deps
        working-directory: hone
        # --ignore-scripts: native deps уже нет после удаления keytar,
        # пропускаем lifecycle-скрипты чтобы не нарваться на интеракцию
        # electron-builder'а с postinstall хуками сторонних пакетов.
        run: npm ci --ignore-scripts

      - name: Build renderer + main
        working-directory: hone
        run: npm run build

      - name: Package DMG (${{ matrix.arch }})
        working-directory: hone
        env:
          # Signing secrets — optional. Отсутствие делает unsigned build
          # (ad-hoc подпись для локального testing'а).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # GH_TOKEN нужен electron-builder'у для публикации в тот же
          # Release. Используем встроенный GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::notice::Building unsigned DMG (CSC_LINK not set)"
            npx electron-builder --mac \
              --${{ matrix.arch }} \
              --config.mac.identity=null \
              --config.mac.hardenedRuntime=false \
              --config.mac.gatekeeperAssess=false \
              --publish never
          else
            npx electron-builder --mac --${{ matrix.arch }} --publish always
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hone-${{ matrix.arch }}
          path: |
            hone/dist/*.dmg
            hone/dist/*.dmg.blockmap
            hone/dist/latest-mac.yml
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/hone-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        # Artifacts от arm64/x64 сваливаем в один dir для release upload.
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.blockmap' -o -name 'latest-mac*.yml' \) \
            -exec cp -v {} release/ \;
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          name: Hone ${{ github.ref_name }}
          body: |
            Hone ${{ github.ref_name }} — desktop focus cockpit for druz9.

            ## Install
            - **Apple Silicon (M-series)**: download `Hone-*-arm64.dmg`
            - **Intel Mac**: download `Hone-*.dmg`

            ## Auto-update
            electron-updater pulls `latest-mac.yml` from this release page.

            See [HONE-RELEASE.md](https://github.com/${{ github.repository }}/blob/main/docs/HONE-RELEASE.md) for deploy details.
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false
