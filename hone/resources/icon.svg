<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Hone app icon — минимум parity с Cue.
    Cue = single white circle. Hone = single white blade (vertical bar
    с round terminals). Semantic: «sharpening edge» в reduced form.
    Без stardust, без red dot, без horizon, без transform.
  -->

  <!-- Squircle background -->
  <rect width="512" height="512" rx="112" fill="#000"/>

  <!-- Single white vertical blade, centered. ~35% squircle height. -->
  <rect x="244" y="166" width="24" height="180" rx="12" fill="#fff"/>
</svg>
