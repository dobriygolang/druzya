<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Hone app icon. Mirror Cue's design language:
      - Чёрный squircle background
      - Большая белая буква (тут — H), толстый stroke с круглыми
        терминалами на концах
      - Синий bullseye dot в центре
      - Мягкий blue radial glow позади буквы
    Реализация:
      - Stems и crossbar — filled <rect> вместо <line stroke> чтобы
        ImageMagick / любой SVG-renderer не дропнул их при ресайзе.
      - Терминальные кружки — отдельные <circle> r=28 в углах H.
      - Все геометрические "пилюли" сходятся в одной точке диаметра
        56px (= stem width), что даёт ровные скруглённые концы.
  -->

  <!-- Squircle background -->
  <rect x="20" y="20" width="472" height="472" rx="112" ry="112"
        fill="#0A0A0A" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Soft blue radial halo позади буквы. Concentric rings (а не
       radialGradient) — детерминированный рендеринг во всех SVG
       рендерерах. Самый тёмный/широкий снаружи, прозрачнее к центру —
       обратная схема vs glow-disc'у: даёт «свечение от буквы наружу»,
       без яркого диска проступающего через crossbar. -->
  <g>
    <circle cx="256" cy="256" r="200" fill="#1E3A8A" fill-opacity="0.06"/>
    <circle cx="256" cy="256" r="180" fill="#1E3A8A" fill-opacity="0.10"/>
    <circle cx="256" cy="256" r="160" fill="#1E40AF" fill-opacity="0.14"/>
    <circle cx="256" cy="256" r="140" fill="#2563EB" fill-opacity="0.18"/>
    <circle cx="256" cy="256" r="120" fill="#2563EB" fill-opacity="0.20"/>
    <circle cx="256" cy="256" r="100" fill="#3B82F6" fill-opacity="0.22"/>
    <circle cx="256" cy="256" r="80"  fill="#3B82F6" fill-opacity="0.24"/>
  </g>

  <!-- Glow disc убран по запросу — оставляем чистый чёрный squircle
       без подсветки. Маленький blue bullseye dot ниже остаётся как
       сигнатурный элемент (отсылка к Cue). -->


  <!-- The H — three filled rects (stems + crossbar) + 4 corner circles
       для скруглённых терминалов. -->
  <g fill="#FFFFFF">
    <!-- Left stem: x=132..188 (width 56), y=128..384 -->
    <rect x="132" y="128" width="56" height="256"/>
    <!-- Right stem: x=324..380 -->
    <rect x="324" y="128" width="56" height="256"/>
    <!-- Crossbar: y=228..284 (height 56), x=160..352 -->
    <rect x="160" y="228" width="192" height="56"/>

    <!-- Round terminals — кружки r=28 (= stem half-width) на углах H. -->
    <circle cx="160" cy="128" r="28"/>
    <circle cx="352" cy="128" r="28"/>
    <circle cx="160" cy="384" r="28"/>
    <circle cx="352" cy="384" r="28"/>
  </g>

  <!-- (Bullseye-точку убрали по запросу — оставляем чистую H без
       синей метки на crossbar'е.) -->

</svg>
