<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: Hone speaks to its own backend (druz9 monolith) over Connect-RPC.
      `connect-src` whitelists local dev + the prod api host. If/when we
      start loading images from a CDN or mount external fonts, extend here
      rather than relaxing the policy globally.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https://api.druzya.tech http://localhost:8080 ws: wss:;"
    />
    <title>Hone</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
