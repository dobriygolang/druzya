appId: app.druzya.copilot
productName: Druz9 Copilot
copyright: Copyright © 2026 Druz9
asar: true
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  # Register the druz9:// URL scheme for Telegram OAuth deep-link callback.
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: Druz9 Copilot Auth
        CFBundleURLSchemes: [druz9]
    NSScreenCaptureUsageDescription: >-
      Druz9 Copilot captures the area you select so the AI can answer
      questions about what's on your screen.
    NSMicrophoneUsageDescription: >-
      Druz9 Copilot records your voice only when you explicitly start voice
      input. Audio is sent for transcription and then discarded.
