appId: app.druzya.copilot
productName: Druz9 Copilot
copyright: Copyright © 2026 Druz9
asar: true
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
# The macOS system-audio capture helper (ScreenCaptureKit binary built
# from desktop/native/audio-mac). Copied into Contents/Resources/native/
# so main/capture/audio-mac.ts can resolve it via process.resourcesPath.
# macOS-only — ignored on Windows/Linux builds.
extraResources:
  - from: resources/native
    to: native
    filter: ["**/*"]
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  # druz9:// URL scheme is no longer used for auth (telegram flow is
  # pull-based). Left registered so future non-auth deep-links (share
  # URLs, settings link, etc.) can land here without a rebuild.
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: Druz9 Copilot
        CFBundleURLSchemes: [druz9]
    NSScreenCaptureUsageDescription: >-
      Druz9 Copilot captures the area you select so the AI can answer
      questions about what's on your screen.
    NSMicrophoneUsageDescription: >-
      Druz9 Copilot records your voice only when you explicitly start voice
      input. Audio is sent for transcription and then discarded.
