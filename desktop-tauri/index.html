<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Druz9 Copilot — Tauri POC</title>
    <style>
      /* Root html + body MUST be transparent for macOS vibrancy to show
         through. Default Chromium body background (white) would cover the
         NSVisualEffectView entirely, making the window look opaque even
         though the native layer is blurring behind it.

         This is the most common "why doesn't my vibrancy work?" gotcha
         in Electron too — fixing it at the root is enough; nested
         elements can have their own solid backgrounds for readability. */
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: transparent;
        font-family: -apple-system, system-ui, sans-serif;
        color: #eee;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
