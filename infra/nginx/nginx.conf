worker_processes auto;

events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # druz9.ru -> druz9.online 301
    server {
        listen 80;
        server_name druz9.ru www.druz9.ru;
        return 301 https://druz9.online$request_uri;
    }

    server {
        listen 80;
        server_name druz9.online www.druz9.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name druz9.online www.druz9.online;

        ssl_certificate     /etc/letsencrypt/live/druz9.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/druz9.online/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # React SPA
        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
        }

        # REST API
        location /api/ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket (editor, arena, mock)
        location /ws/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # MinIO (presigned URLs)
        location /storage/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
        }

        # Health
        location = /health { proxy_pass http://api:8080/health; }
    }
}
