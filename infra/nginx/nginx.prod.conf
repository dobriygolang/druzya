worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-protobuf;

    # Rate limit zones (bible §11).
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:20m rate=100r/m;

    # HTTP-01 challenge + 301 to HTTPS.
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # druz9.ru → druz9.online 301 (bible §7).
    server {
        listen 443 ssl http2;
        server_name druz9.ru www.druz9.ru;

        ssl_certificate     /etc/letsencrypt/live/druz9.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/druz9.ru/privkey.pem;

        return 301 https://druz9.online$request_uri;
    }

    # Main site.
    server {
        listen 443 ssl http2;
        http2_push_preload on;
        server_name druz9.online www.druz9.online;

        ssl_certificate     /etc/letsencrypt/live/druz9.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/druz9.online/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ── Frontend SPA (built assets served from the same api image via
        #     /var/www/frontend, or mount a separate static volume).
        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── REST API (OpenAPI-transcoded Connect endpoints).
        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Auth endpoints: tighter rate limit on login/refresh.
        location ~ ^/api/v1/auth/(yandex|telegram|refresh)$ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Connect-RPC native paths.
        location /druz9.v1. {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;  # Connect streaming responses
            proxy_read_timeout 300s;
        }

        # ── WebSockets (arena/mock/editor/feed).
        location /ws/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── MinIO presigned URLs (replays, uploads).
        location /storage/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
        }

        # ── Health + readiness + /metrics (127.0.0.1 allowed for prometheus scrape).
        location = /health {
            proxy_pass http://api:8080/health;
        }
        location = /health/ready {
            proxy_pass http://api:8080/health/ready;
        }
        location = /metrics {
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://api:8080/metrics;
        }

        # ── Grafana (sub-path).
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Grafana WebSocket for live queries.
        location /grafana/api/live/ {
            proxy_pass http://grafana:3000/api/live/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
