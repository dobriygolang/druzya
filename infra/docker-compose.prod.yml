# Production stack for druz9 — single VPS (bible §7, "VPS Германия").
#
# Run from the repo root:
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# Key differences vs local docker-compose.yml:
#   • api image pulled from GHCR (built in CI), not built locally
#   • nginx fronts everything (TLS via certbot); nothing else exposes ports on the host
#   • postgres bound to 127.0.0.1 only (no public 5432)
#   • minio console only reachable via SSH tunnel
#   • prometheus + grafana + loki for observability
#   • postgres backups to MinIO via cron sidecar

networks:
  app-net:
    driver: bridge
  judge-net:
    driver: bridge
  obs-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  clickhouse_data:
  prometheus_data:    # маленький буфер 6h на случай обрыва связи с Grafana Cloud
  certbot_www:
  certbot_conf:

services:
  # ── Edge
  nginx:
    # Кастомный web-образ: nginx + встроенный билд фронта + наш конфиг.
    # Собирается infra/web.Dockerfile в CI (job image-web) → ghcr.io/.../druz9-web.
    image: ${WEB_IMAGE:-ghcr.io/dobriygolang/druz9-web:latest}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Конфиг и snippets теперь УЖЕ внутри образа; маунтим только LE-сертификаты.
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks: [app-net]
    restart: always
    healthcheck:
      # /nginx-health всегда 200, доступен только из 127.0.0.1 — определён в
      # nginx.prod.conf. /health не подходит: nginx редиректит его на https,
      # wget --spider с 301 возвращает exit 8 → ложный unhealthy.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew every 12h; first issuance is done by infra/scripts/bootstrap.sh.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done'
    restart: always
    networks: [app-net]

  # ── Core
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-druz9}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-druz9}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Bind to loopback only — access via SSH tunnel.
    ports:
      - "127.0.0.1:5432:5432"
    networks: [app-net, obs-net]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druz9 -d druz9"]
      interval: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--requirepass", "${REDIS_PASSWORD:?missing REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks: [app-net, obs-net]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # Public S3 API proxied through nginx at /storage/; console only via SSH tunnel.
    ports:
      - "127.0.0.1:9001:9001"
    networks: [app-net]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: druz9
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks: [app-net, obs-net]
    restart: always
    ulimits:
      nofile: { soft: 262144, hard: 262144 }

  # ── Application
  api:
    image: ${API_IMAGE:-ghcr.io/dobriygolang/druz9-api:latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../.env.prod
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-druz9} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB:-druz9} sslmode=disable"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_ADDR: clickhouse:9000
      JUDGE0_URL: http://judge0-server:2358
      # ── Grafana Cloud Tempo (OTLP/HTTP). Если переменных нет — отключаем
      # экспорт трейсов (см. backend/cmd/monolith/bootstrap/observability.go).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${GRAFANA_CLOUD_OTLP_HEADERS:-}
    networks: [app-net, judge-net, obs-net]
    restart: always
    healthcheck:
      test: ["CMD", "/app/monolith", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-shot migration runner; applies pending migrations on deploy.
  migrate:
    image: ${API_IMAGE:-ghcr.io/dobriygolang/druz9-api:latest}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/monolith", "migrate", "up"]
    env_file:
      - ../.env.prod
    environment:
      POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-druz9} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB:-druz9} sslmode=disable"
    networks: [app-net]
    restart: "no"

  # ── Judge0 (isolated, privileged — do NOT expose)
  judge0-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    networks: [judge-net]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s

  judge0-redis:
    image: redis:7-alpine
    networks: [judge-net]
    restart: always

  judge0-server:
    image: judge0/judge0:1.13.1
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    depends_on:
      judge0-db:
        condition: service_healthy
    networks: [judge-net]
    privileged: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    depends_on:
      - judge0-server
    networks: [judge-net]
    privileged: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Observability (bible §12). Долгое хранение и UI вынесены в Grafana Cloud
  # (free tier: 50GB логов / 50GB трейсов / 10k метрик в мес, 14d retention).
  # Локально остаются только сборщики:
  #   • prometheus — скрейпит /metrics и шлёт remote_write в Grafana Cloud Mimir
  #   • promtail   — собирает stdout контейнеров и пушит в Grafana Cloud Loki
  # Трейсы отправляются прямо из api через OTLP (см. OTEL_EXPORTER_OTLP_*).
  prometheus:
    image: prom/prometheus:v2.55.0
    env_file:
      - ../.env.prod
    volumes:
      # Шаблон, в котором ${VAR} → подставится через sed на старте.
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml.tpl:ro
      - prometheus_data:/prometheus
    # Prometheus НЕ умеет ${ENV_VAR} в remote_write.url / basic_auth.password
    # (--enable-feature=expand-external-labels работает только для external_labels).
    # Поэтому делаем sed-подстановку перед стартом самого binary'я.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed \
          -e "s|\${GRAFANA_CLOUD_PROM_URL}|$$GRAFANA_CLOUD_PROM_URL|g" \
          -e "s|\${GRAFANA_CLOUD_PROM_USER}|$$GRAFANA_CLOUD_PROM_USER|g" \
          -e "s|\${GRAFANA_CLOUD_API_KEY}|$$GRAFANA_CLOUD_API_KEY|g" \
          /etc/prometheus/prometheus.yml.tpl > /etc/prometheus/prometheus.yml
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=6h \
          --web.enable-lifecycle
    networks: [obs-net, app-net]
    restart: always

  promtail:
    image: grafana/promtail:2.9.10
    env_file:
      - ../.env.prod
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command: ["-config.file=/etc/promtail/config.yml", "-config.expand-env=true"]
    networks: [obs-net]
    restart: always

  # ── Backups
  pgbackup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.prod
    environment:
      PGUSER: ${POSTGRES_USER:-druz9}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-druz9}
      PGHOST: postgres
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks: [app-net]
    restart: always
