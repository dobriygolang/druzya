# Production stack for druz9 — single VPS (bible §7, "VPS Германия").
#
# Run from the repo root:
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d
#
# Key differences vs local docker-compose.yml:
#   • api image pulled from GHCR (built in CI), not built locally
#   • nginx fronts everything (TLS via certbot); nothing else exposes ports on the host
#   • postgres bound to 127.0.0.1 only (no public 5432)
#   • minio console only reachable via SSH tunnel
#   • prometheus + grafana + loki for observability
#   • postgres backups to MinIO via cron sidecar

networks:
  app-net:
    driver: bridge
  judge-net:
    driver: bridge
  obs-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  clickhouse_data:
  prometheus_data:    # маленький буфер 6h на случай обрыва связи с Grafana Cloud
  certbot_www:
  certbot_conf:
  ollama_data:        # кеш моделей Ollama (Qwen 2.5 3B ≈ 2.3GB + bge-small ≈ 130MB)

services:
  # ── Edge
  nginx:
    # Кастомный web-образ: nginx + встроенный билд фронта + наш конфиг.
    # Собирается infra/web.Dockerfile в CI (job image-web) → ghcr.io/.../druz9-web.
    image: ${WEB_IMAGE:-ghcr.io/dobriygolang/druz9-web:latest}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Конфиг и snippets теперь УЖЕ внутри образа; маунтим только LE-сертификаты.
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks: [app-net]
    restart: always
    healthcheck:
      # /nginx-health всегда 200, доступен только из 127.0.0.1 — определён в
      # nginx.prod.conf. /health не подходит: nginx редиректит его на https,
      # wget --spider с 301 возвращает exit 8 → ложный unhealthy.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew every 12h; first issuance is done by infra/scripts/bootstrap.sh.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done'
    restart: always
    networks: [app-net]

  # ── Core
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-druz9}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-druz9}
    # Урезанный RAM-профиль (2026-04): ~2.2GB вместо дефолтных ~4GB, чтобы
    # освободить 1.8GB под Ollama 7B модель. На нашей нагрузке (≤100 rps,
    # хот-вёркинг-сет в пределах 1-1.5GB) не ощутимо.
    # shared_buffers 512MB — ~25% от effective memory (рекомендация PG).
    # work_mem 4MB × max_connections — предохранитель от OOM при JOIN'ах.
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=100
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Bind to loopback only — access via SSH tunnel.
    ports:
      - "127.0.0.1:5432:5432"
    networks: [app-net, obs-net]
    restart: always
    mem_limit: 2200m
    healthcheck:
      # ${POSTGRES_USER:-druz9} — берём из env, дефолт оставляем как было.
      # Хардкод 'druz9' ломал healthcheck при кастомных POSTGRES_USER (typo
      # ранее: 'role druz9 does not exist' каждые 10s в логах прода).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-druz9} -d ${POSTGRES_DB:-druz9}"]
      interval: 10s

  redis:
    image: redis:7-alpine
    # maxmemory 1gb + allkeys-lru (2026-04): вместо дефолта, чтобы гарантированно
    # удерживать работу в рамках 1GB RAM. Сессии + кеши + очереди + llmcache
    # (40MB) легко влезают в 1GB по прогнозу из bible §10.5.
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --requirepass
      - ${REDIS_PASSWORD:?missing REDIS_PASSWORD}
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks: [app-net, obs-net]
    restart: always
    mem_limit: 1200m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?missing MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?missing MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # Public S3 API proxied through nginx at /storage/; console only via SSH tunnel.
    ports:
      - "127.0.0.1:9001:9001"
    networks: [app-net]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: druz9
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks: [app-net, obs-net]
    restart: always
    ulimits:
      nofile: { soft: 262144, hard: 262144 }

  # ── Ollama self-hosted LLM sidecar (floor-fallback для llmchain).
  # Активируется выставлением OLLAMA_HOST=http://ollama:11434 в .env.prod
  # и добавлением "ollama" в LLM_CHAIN_ORDER (напр. "groq,cerebras,
  # openrouter,ollama"). Сервис сам по себе стартует всегда (чтобы успел
  # прогреть модель к моменту когда cloud-квоты закончатся), но API его
  # НЕ видит пока OLLAMA_HOST не задан в env.
  #
  # RAM budget: Qwen 2.5 3B Q4_K_M ≈ 2.5GB + bge-small ≈ 130MB + overhead
  # ≤ 3.5GB. Плюс к PG 4GB + Redis 2GB + API 0.5GB + nginx + minio → ~10GB
  # из 12GB VPS. CPU 2.0 cores (из 8) — Qwen 3B выдаёт 20-30 tok/s на CPU,
  # параллельных стримов на VPS мы не ждём.
  #
  # Port 11434 НЕ exposed наружу — только внутри app-net. Security: LLM
  # без rate-limit на публичном интернете — tarpit magnet.
  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks: [app-net]
    # RAM budget (2026-04): 5500m для Qwen 2.5 7B Q4_K_M (~4.5GB модель +
    # overhead runtime + bge-small 130MB для semantic cache embeddings).
    # VPS 12GB:  PG 2.2 + Redis 1.2 + Ollama 5.5 + API 0.5 + nginx/minio 0.8
    # + OS 1.5 = 11.7 из 12GB. Тонко, но после урезания PG/Redis хватает.
    # Qwen 7B на 8 ядрах CPU выдаёт 10-15 tok/s — приемлемо для fallback-path'а.
    mem_limit: 5500m
    cpus: 2.0
    healthcheck:
      # `ollama list` коннектится к локальному сокету :11434 — гарантированно
      # существует в образе (сам ollama-бинарь), не зависит от wget/curl.
      # start_period 120s — при первом старте модель грузится в память ~30-60s
      # (Qwen 3B Q4 = 2.3GB через mmap). retries 5 × interval 15s = ~75s
      # tolerance на transient lag (компакция moonlite при `ollama pull`).
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Одноразовый pull моделей. restart=no: контейнер завершится после
  # того как обе модели скачаны. Повторный запуск безопасен — pull
  # инкрементальный. Запуск: `docker compose -f infra/docker-compose.prod.yml
  # --env-file .env.prod run --rm ollama-init` либо просто `up -d` если
  # depends_on отработает. Параллельный llmcache агент отдельно использует
  # bge-small-en-v1.5 для semantic cache embeddings — отсюда второй pull.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:7b-instruct-q4_K_M &&
        OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:3b-instruct-q4_K_M &&
        OLLAMA_HOST=http://ollama:11434 ollama pull bge-m3
      "
    networks: [app-net]
    restart: "no"

  # ── Application
  api:
    image: ${API_IMAGE:-ghcr.io/dobriygolang/druz9-api:latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../.env.prod
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-druz9} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB:-druz9} sslmode=disable"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      CLICKHOUSE_ADDR: clickhouse:9000
      JUDGE0_URL: http://judge0-server:2358
      # OTEL_EXPORTER_OTLP_ENDPOINT/HEADERS подсасываются через env_file
      # (../.env.prod) — здесь не дублируем, чтобы избежать двойной
      # compose-интерполяции (которая в прошлый раз молча съедала значение).
    networks: [app-net, judge-net, obs-net]
    restart: always
    healthcheck:
      test: ["CMD", "/app/monolith", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-shot migration runner; applies pending migrations on deploy.
  migrate:
    image: ${API_IMAGE:-ghcr.io/dobriygolang/druz9-api:latest}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/monolith", "migrate", "up"]
    env_file:
      - ../.env.prod
    environment:
      POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-druz9} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB:-druz9} sslmode=disable"
    networks: [app-net]
    restart: "no"

  # ── Judge0 (isolated, privileged — do NOT expose)
  judge0-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    networks: [judge-net]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 10s

  judge0-redis:
    image: redis:7-alpine
    networks: [judge-net]
    restart: always

  # ⚠️  Judge0 1.13.1 ТРЕБУЕТ cgroup v1 на хосте. На современных Linux
  # (Ubuntu 22.04+ / Debian 12+) default = cgroup v2 → Judge0 возвращает
  # `status: "Internal Error"` на КАЖДОМ submission'е (sandbox isolate
  # не инициализируется). Healthcheck `/system_info` при этом отдаёт 200 —
  # Rails жив, но workers не могут спавнить isolate-боксы. Симптом:
  # `POST /editor/.../run → 200 {status:"Internal Error",stdout:"",stderr:""}`.
  #
  # ФИКС НА ХОСТЕ:
  #   sudo sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT="\(.*\)"$/GRUB_CMDLINE_LINUX_DEFAULT="\1 systemd.unified_cgroup_hierarchy=0"/' /etc/default/grub
  #   sudo update-grub && sudo reboot
  # После reboot'а: mount | grep cgroup → должны быть `cgroup` (v1) mounts,
  # не только `cgroup2`.
  #
  # Альтернатива (без reboot'а): обновить Judge0 до v6+ когда у нас будет
  # время на migration. v1.13 vs v6 имеют разные API/schema → не drop-in.
  judge0-server:
    image: judge0/judge0:1.13.1
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started
    networks: [judge-net]
    privileged: true
    restart: always
    healthcheck:
      # /system_info — лёгкий публичный endpoint judge0, отдаёт 200 как только
      # rails-приложение поднялось. wget есть в базовом образе, curl — нет.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2358/system_info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0
    depends_on:
      - judge0-server
    networks: [judge-net]
    privileged: true
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Observability (bible §12). Долгое хранение и UI вынесены в Grafana Cloud
  # (free tier: 50GB логов / 50GB трейсов / 10k метрик в мес, 14d retention).
  # Локально остаются только сборщики:
  #   • prometheus — скрейпит /metrics и шлёт remote_write в Grafana Cloud Mimir
  #   • promtail   — собирает stdout контейнеров и пушит в Grafana Cloud Loki
  # Трейсы отправляются прямо из api через OTLP (см. OTEL_EXPORTER_OTLP_*).
  prometheus:
    image: prom/prometheus:v2.55.0
    env_file:
      - ../.env.prod
    volumes:
      # Шаблон, в котором ${VAR} → подставится через sed на старте.
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml.tpl:ro
      - prometheus_data:/prometheus
    # Prometheus НЕ умеет ${ENV_VAR} в remote_write.url / basic_auth.password
    # (--enable-feature=expand-external-labels работает только для external_labels).
    # Делаем sed-подстановку перед стартом. Placeholder'ы в шаблоне — __GC_*__,
    # а не ${VAR}, потому что compose сам интерполирует ${VAR} в YAML и съедает
    # обе части sed-паттерна.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sed
        -e "s|__GC_PROM_URL__|$$GRAFANA_CLOUD_PROM_URL|g"
        -e "s|__GC_PROM_USER__|$$GRAFANA_CLOUD_PROM_USER|g"
        -e "s|__GC_API_KEY__|$$GRAFANA_CLOUD_API_KEY|g"
        /etc/prometheus/prometheus.yml.tpl > /etc/prometheus/prometheus.yml
        && exec /bin/prometheus
        --config.file=/etc/prometheus/prometheus.yml
        --storage.tsdb.path=/prometheus
        --storage.tsdb.retention.time=6h
        --web.enable-lifecycle
    networks: [obs-net, app-net]
    restart: always

  promtail:
    image: grafana/promtail:2.9.10
    env_file:
      - ../.env.prod
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command: ["-config.file=/etc/promtail/config.yml", "-config.expand-env=true"]
    networks: [obs-net]
    restart: always

  # ── Backups
  pgbackup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.prod
    environment:
      PGUSER: ${POSTGRES_USER:-druz9}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-druz9}
      PGHOST: postgres
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks: [app-net]
    restart: always
