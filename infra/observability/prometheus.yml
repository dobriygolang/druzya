global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: druz9-local

scrape_configs:
  - job_name: druz9-monolith
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: druz9-monolith
          env: local

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
