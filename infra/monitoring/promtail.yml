server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

# ── Push в Grafana Cloud Loki.
# Креды:
#   1. https://grafana.com → My Account → Stack → Loki → Send Logs
#   2. URL → GRAFANA_CLOUD_LOKI_URL (например https://logs-prod-XXX.grafana.net/loki/api/v1/push)
#   3. User → GRAFANA_CLOUD_LOKI_USER (instance ID)
#   4. Тот же API token из Access Policies (scope: logs:write) → GRAFANA_CLOUD_API_KEY
clients:
  - url: ${GRAFANA_CLOUD_LOKI_URL}
    basic_auth:
      username: ${GRAFANA_CLOUD_LOKI_USER}
      password: ${GRAFANA_CLOUD_API_KEY}
    # Бэтчинг — экономим квоту 50GB/мес.
    batchwait: 5s
    batchsize: 1048576   # 1 MiB
    external_labels:
      environment: production
      service: druz9
      cluster: vps-de-1

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Не отправляем шум от самого promtail/prometheus — экономим квоту.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(promtail|prometheus|grafana|loki)'
        action: drop
