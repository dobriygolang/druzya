global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: druz9
    cluster: vps-de-1   # отличает наш инстанс в общем Grafana Cloud аккаунте

# Локальный TSDB больше не используется как long-term store — ретеншн 6h ровно
# чтобы пережить временный обрыв сети до Grafana Cloud. Всё, что старше, есть
# в Mimir (Grafana Cloud Metrics).
rule_files: []

# Alertmanager сейчас отключён — алерты переехали в Grafana Cloud (Alerts &
# IRM). Оставляем заглушку, чтобы при желании быстро вернуть локальный.
alerting:
  alertmanagers: []

# ── Remote write в Grafana Cloud Mimir.
# URL и креды берём из ENV (см. infra/docker-compose.prod.yml: prometheus env_file).
# Чтобы получить:
#   1. https://grafana.com → My Account → Stack → Prometheus → Send Metrics
#   2. Скопировать "Remote Write Endpoint" в GRAFANA_CLOUD_PROM_URL
#   3. Создать API token (Access Policies → New token, scope: metrics:write)
#      → положить в GRAFANA_CLOUD_PROM_USER (это instance ID, число)
#      и GRAFANA_CLOUD_API_KEY (сам токен).
remote_write:
  - url: ${GRAFANA_CLOUD_PROM_URL}
    basic_auth:
      username: ${GRAFANA_CLOUD_PROM_USER}
      password: ${GRAFANA_CLOUD_API_KEY}
    queue_config:
      capacity: 10000
      max_shards: 5
      min_shards: 1
      max_samples_per_send: 2000

scrape_configs:
  - job_name: druz9-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx:80"]

  # Опциональные exporter'ы — раскомментировать когда добавим sidecar'ы:
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
