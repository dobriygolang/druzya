// profile.proto — Connect-RPC contract for the `profile` bounded context.
//
// Covers the five /profile/* endpoints: me, atlas, weekly report, settings
// (PUT), and the public username lookup. The /profile/{username} endpoint
// is public (bypasses bearer auth via publicPaths-style exemption — see
// main.go). For proto3 the public carve-out is applied in the REST gate and
// the native Connect mount.
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "druz9/v1/notify.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// Attributes mirrors OpenAPI Attributes.
message Attributes {
  int32 intellect = 1;
  int32 strength = 2;
  int32 dexterity = 3;
  int32 will = 4;
}

// ProfileSubscription mirrors the inline `subscription` object on ProfileFull.
message ProfileSubscription {
  SubscriptionPlan plan = 1;
  // current_period_end is optional — zero Timestamp when no paid plan.
  google.protobuf.Timestamp current_period_end = 2;
}

// ProfileFull mirrors OpenAPI ProfileFull.
message ProfileFull {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_frame = 4;
  string title = 5;
  int32 level = 6;
  int32 xp = 7;
  int32 xp_to_next = 8;
  CharClass char_class = 9;
  Attributes attributes = 10;
  int32 global_power_score = 11;
  // career_stage is "junior" | "middle" | ... | "principal" in OpenAPI. Kept
  // as a string to avoid another tiny enum; server guarantees validity.
  string career_stage = 12;
  ProfileSubscription subscription = 13;
  int32 ai_credits = 14;
  google.protobuf.Timestamp created_at = 15;
  // avatar_url берётся из users.avatar_url (заполняется при OAuth-логине,
  // см. миграцию 00010_users_avatar.sql и login_yandex/login_telegram).
  string avatar_url = 16;
  // email из users.email — нужен на /settings (карточка аккаунта). Может быть
  // пустым у Telegram-логина без подтверждённого email.
  string email = 17;
  // role зеркалирует users.role. Используется фронтом для RBAC-гейтов
  // (например, кнопка «Создать слот» доступна только interviewer/admin).
  UserRole role = 18;
  // tutor_mode_enabled — self-toggle flag (Stream D, 2026-05-12). When ON
  // the AppShell shows tutor nav items + /tutor sub-surfaces. Independent
  // from `role` (which stays user|interviewer|admin|ai_tutor) so any user
  // can opt into tutor mode without an admin approval gate. Free per
  // identity.md — paywall lives on Pro-tier evaluation, not on this toggle.
  bool tutor_mode_enabled = 19;
}

// SectionRating mirrors the top-level OpenAPI SectionRating (rating.proto
// has its own nested SectionRating which predates this file; the two are
// structurally identical but the proto package rules keep them separate).
message ProfileSectionRating {
  Section section = 1;
  int32 elo = 2;
  int32 matches_count = 3;
  int32 percentile = 4;
  bool decaying = 5;
}

// SkillNode mirrors OpenAPI SkillNode.
message SkillNode {
  string key = 1;
  string title = 2;
  string description = 3;
  Section section = 4;
  // kind is "normal" | "keystone" | "ascendant" in OpenAPI; string preserves
  // wire compat without declaring another enum.
  string kind = 5;
  int32 progress = 6;
  bool unlocked = 7;
  google.protobuf.Timestamp unlocked_at = 8;
  bool decaying = 9;

  // Total/solved counts for the progress bar in the Atlas drawer. progress
  // (field 6) — это уже процент 0–100, оставляем для wire-compat; новые поля
  // нужны для красивого «Решено 8 из 23 задач» без пересчёта на фронте.
  int32 solved_count = 10;
  int32 total_count = 11;

  // last_solved_at — последняя решённая задача в этой теме. Используется на
  // фронте, чтобы посчитать «дней без практики» и подсветить decaying-узел
  // тоже здесь, не только через bool decaying. Может быть unset (zero ts).
  google.protobuf.Timestamp last_solved_at = 12;

  // recommended_kata — топ-N (5) непрешённых ката из этой темы, отсортированных
  // по сложности. Фронт показывает их в drawer'е как кликабельные ссылки.
  // Источник — daily-каталог, см. profile/app/atlas.go.
  repeated KataRef recommended_kata = 13;

  // ── Wave-10 (migration 00034) — PoE-passive-tree fields ──
  //
  // kind (field 5) is now ∈ {"hub","keystone","notable","small"} — drives
  // SVG visual grammar (hub = big circle, keystone = diamond, notable =
  // sigil-framed, small = simple disk).
  //
  // cluster groups designer-laid dense blobs of related skills. Used by
  // <AtlasClusterAura> to draw the soft glow behind the cluster.
  string cluster = 14;
  // pos_x / pos_y are designer-pinned coordinates in the canvas viewBox
  // (typically 0..1400). Optional — when absent the frontend places the
  // node via a simple ring-fallback so the page never breaks.
  int32 pos_x = 15;
  int32 pos_y = 16;
  // pos_set — true when pos_x/pos_y carry meaningful coordinates. Avoids
  // the proto3-int32-zero-default ambiguity (0,0 is a valid corner).
  bool pos_set = 17;
  // reachable — PoE allocation: there exists a path of mastered nodes from
  // the hub to this node. Frontend uses this to dim/lock unreachable
  // branches during planning. Computed server-side per-user.
  bool reachable = 18;

  // is_user_owned — true для узлов из user_atlas_nodes (Phase 3.1
  // classify-flow). Frontend рендерит "your TODO" badge.
  bool is_user_owned = 19;

  // Phase 3 — per-user overlay (table user_atlas_node_prefs, мig 00064).
  // Mutually exclusive — DB CHECK гарантирует.
  bool pinned = 20;
  bool hidden = 21;
}

// KataRef — лёгкий референс на ката для UI рекомендаций. Title/difficulty
// денормализованы, чтобы не делать второй round-trip на /daily/kata/{id}.
message KataRef {
  string id = 1;
  string title = 2;
  // difficulty: "easy" | "medium" | "hard". Строка, чтобы не плодить enum.
  string difficulty = 3;
  // estimated_minutes — приблизительная оценка времени решения, для UX «у тебя
  // есть 15 мин — вот ката на 10».
  int32 estimated_minutes = 4;
}

// SkillEdge mirrors OpenAPI SkillEdge.
message SkillEdge {
  string from = 1;
  string to = 2;
  // Wave-10: kind ∈ {"prereq","suggested","crosslink"} drives edge
  // visual grammar — solid-thick-arrow / solid-thin / dashed-faded.
  string kind = 3;
}

// SkillAtlas mirrors OpenAPI SkillAtlas — carries the nodes/edges graph.
message SkillAtlas {
  string center_node = 1;
  repeated SkillNode nodes = 2;
  repeated SkillEdge edges = 3;
}

// ProfilePublic mirrors OpenAPI ProfilePublic.
message ProfilePublic {
  string username = 1;
  string display_name = 2;
  string title = 3;
  int32 level = 4;
  CharClass char_class = 5;
  string career_stage = 6;
  int32 global_power_score = 7;
  repeated ProfileSectionRating ratings = 8;
  reserved 9;
  reserved "achievements";
  SkillAtlas atlas_preview = 10;
  // avatar_url из users.avatar_url. См. comment в ProfileFull.
  string avatar_url = 11;
}

// ReportMetrics mirrors the inline `metrics` block of OpenAPI WeeklyReport.
message ReportMetrics {
  int32 tasks_solved = 1;
  int32 matches_won = 2;
  int32 rating_change = 3;
  int32 xp_earned = 4;
  int32 time_minutes = 5;
}

// ReportWeakness mirrors the inline weakness object in OpenAPI WeeklyReport.
message ReportWeakness {
  string atlas_node_key = 1;
  string reason = 2;
}

// RecommendationAction mirrors the inline action block in OpenAPI Recommendation.
message RecommendationAction {
  // kind is one of: start_mock, solve_task, listen_podcast, open_atlas,
  // open_arena. Preserved as string to avoid another tiny enum.
  string kind = 1;
  // params is a free-form map<string,string> — OpenAPI allows any JSON value
  // via additionalProperties: true; we collapse to string values because
  // Connect clients round-trip scalars losslessly.
  map<string, string> params = 2;
}

// Recommendation mirrors OpenAPI Recommendation.
message Recommendation {
  string title = 1;
  string description = 2;
  RecommendationAction action = 3;
}

// SectionBreakdown — агрегат XP / wins / losses по одной секции за период.
// Используется в WeeklyReport для блоков «Сильные/Слабые секции» — frontend
// раньше держал захардкоженный массив, теперь читает реальные данные.
message SectionBreakdown {
  Section section = 1;
  int32 matches = 2;
  int32 wins = 3;
  int32 losses = 4;
  int32 xp_delta = 5;
  // win_rate — целое число процентов (0..100); считается на бэке, чтобы
  // фронт не дублировал арифметику.
  int32 win_rate_pct = 6;
}

// WeekComparison — XP за конкретную неделю в прошлом. label = "Эта" |
// "-1" | "-2" | "-3" (порядок сохраняется на бэке).
message WeekComparison {
  string label = 1;
  int32 xp = 2;
  // pct — относительная высота для гистограммы (0..100). Считается так,
  // чтобы максимум среди 4 строк → 100%.
  int32 pct = 3;
}

// EloPoint — одна дневная snapshot-точка ELO для линейного графика
// /report. date — ISO YYYY-MM-DD; section — строкой, чтобы не плодить enum
// в protowire (значения совпадают с pb.Section, но без префиксов).
message EloPoint {
  string date = 1;
  int32 elo = 2;
  string section = 3;
}

// PercentileView — три перцентиля пользователя на дату конца недели:
// внутри своего тира, среди друзей и глобально. Целое 0..100.
message PercentileView {
  int32 in_tier = 1;
  int32 in_friends = 2;
  int32 in_global = 3;
}

// WeeklyReport mirrors OpenAPI WeeklyReport.
message WeeklyReport {
  // week_start / week_end are ISO-8601 calendar dates (YYYY-MM-DD). OpenAPI
  // types them as `format: date`; proto3 has no date, so we use strings.
  string week_start = 1;
  string week_end = 2;
  ReportMetrics metrics = 3;
  // heatmap is 7 cells with intensity 0..4.
  repeated int32 heatmap = 4;
  repeated string strengths = 5;
  repeated ReportWeakness weaknesses = 6;
  string stress_analysis = 7;
  repeated Recommendation recommendations = 8;
  // Агрегаты для фронта /report (WeeklyReportPage). Раньше были захардкожены
  // в JSX; теперь приходят с бэка готовыми к рендеру.
  int32 actions_count = 9;
  int32 streak_days = 10;
  int32 best_streak = 11;
  int32 prev_xp_earned = 12;
  // Сильные / слабые секции на фронте, отсортированные по xp_delta DESC/ASC.
  // Бэк гарантирует, что одна и та же секция не попадёт в оба списка.
  repeated SectionBreakdown strong_sections = 13;
  repeated SectionBreakdown weak_sections = 14;
  // Сравнение XP за последние 4 недели (включая текущую). Длина = 4.
  repeated WeekComparison weekly_xp = 15;

  // Phase A killer-stats расширения. Старые клиенты безопасно
  // игнорируют (proto3 default values).
  // hourly_heatmap — 168 ячеек (7 дней × 24 часа), индекс = dow*24+hour.
  repeated int32 hourly_heatmap = 16;
  // elo_series — дневные snapshot-точки ELO за окно.
  repeated EloPoint elo_series = 17;
  // percentiles — три перцентиля на конец недели.
  PercentileView percentiles = 18;
  // ai_insight — текст от LLM-инсайта; пустая строка, если OpenRouter недоступен.
  string ai_insight = 19;
  reserved 20;
  reserved "achievements_this_week";
  // share_token — токен публичной ссылки; пустая строка, если ещё не выпускался.
  string share_token = 21;
  // featured_metric — server-picked headline metric for the share card.
  // Values: "xp" | "streak" | "" (empty ⇒ client picks default).
  // Server selects: "streak" if streak_days >= 7, else "xp".
  string featured_metric = 22;
}

// ProfileSettings mirrors OpenAPI ProfileSettings.
message ProfileSettings {
  string display_name = 1;
  Language default_language = 2;
  // locale is "ru" | "en" — string keeps wire compat with REST.
  string locale = 3;
  NotificationPreferences notifications = 4;
  bool voice_mode_enabled = 5;
  // ai_insight_model — OpenRouter model id chosen by the user for their
  // weekly AI Coach insight ("openai/gpt-4o-mini", "anthropic/claude-sonnet-4", …).
  // Empty string ⇒ server-default (tier-aware free model). Premium-locked
  // ids are validated server-side against the llm_models registry at update
  // time; free-tier users updating to a premium id get InvalidArgument.
  string ai_insight_model = 6;

  // onboarding_completed — read-write. Read: derived from
  // users.onboarding_completed_at IS NOT NULL. Write: true ⇒ server stamps
  // onboarding_completed_at = NOW(); false ⇒ server clears the column.
  // Marked `optional` so proto3 carries field presence — partial updates
  // that omit this field do NOT clobber the stored timestamp.
  optional bool onboarding_completed = 7;
  // focus_class — declared career-focus slug. Allowed:
  //   "" | "algo" | "backend" | "system" | "concurrency" | "ds".
  // Validated server-side against the same set as the DB CHECK. Invalid
  // value ⇒ InvalidArgument (anti-fallback: no silent default). `optional`
  // so empty string is distinguishable from "field omitted".
  optional string focus_class = 8;
  // tutor_mode_enabled — write-side counterpart of ProfileFull.tutor_mode_enabled
  // (Stream D, 2026-05-12). `optional` so partial updates do not clobber.
  optional bool tutor_mode_enabled = 9;
}

// UpdateProfileSettingsRequest wraps the ProfileSettings payload. OpenAPI
// uses the settings object directly as the request body; Connect prefers a
// named request type.
message UpdateProfileSettingsRequest {
  ProfileSettings settings = 1;
}

message GetMyProfileRequest {}
message GetMyAtlasRequest {}
message GetMyReportRequest {
  // include_share_token — если true, бэк дополнительно вызывает
  // IssueShareToken и кладёт свежий токен в WeeklyReport.share_token.
  // Используется кнопкой «Поделиться» на /weekly: фронт делает
  // повторный запрос с этим флагом и получает токен для clipboard'а.
  bool include_share_token = 1;
}
message GetPublicProfileRequest {
  string username = 1;
}
message GetWeeklyShareRequest {
  // token — публичный 64-hex токен из weekly_share_tokens. Resolved через
  // ProfileRepo.ResolveShareToken. 404 если просрочен / отсутствует.
  string token = 1;
}

service ProfileService {
  // GetMyProfile returns the rich profile for the authenticated caller.
  rpc GetMyProfile(GetMyProfileRequest) returns (ProfileFull) {
    option (google.api.http) = {get: "/api/v1/profile/me"};
  }

  // GetMyAtlas returns the skill atlas (nodes + edges).
  rpc GetMyAtlas(GetMyAtlasRequest) returns (SkillAtlas) {
    option (google.api.http) = {get: "/api/v1/profile/me/atlas"};
  }

  // GetMyReport returns the weekly AI report.
  rpc GetMyReport(GetMyReportRequest) returns (WeeklyReport) {
    option (google.api.http) = {get: "/api/v1/profile/me/report"};
  }

  // UpdateSettings persists the settings block.
  rpc UpdateSettings(UpdateProfileSettingsRequest) returns (ProfileSettings) {
    option (google.api.http) = {
      put: "/api/v1/profile/me/settings"
      body: "settings"
    };
  }

  // GetPublicProfile returns the public /u/{username} view.
  rpc GetPublicProfile(GetPublicProfileRequest) returns (ProfilePublic) {
    option (google.api.http) = {get: "/api/v1/profile/{username}"};
  }

  // GetWeeklyShare returns a weekly report by share token. Public — no
  // bearer auth required. Route is added to publicPaths in router.go.
  rpc GetWeeklyShare(GetWeeklyShareRequest) returns (WeeklyReport) {
    option (google.api.http) = {get: "/api/v1/profile/weekly/share/{token}"};
  }

  // BecomeInterviewer creates a pending application in the
  // `interviewer_applications` queue. Admins moderate via
  // ListInterviewerApplications + ApproveInterviewerApplication /
  // RejectInterviewerApplication. The role on users.role only flips
  // after approval — see backend/services/profile/app/become_interviewer.go.
  //
  // Returns the freshly-created application (with status=pending). When
  // the caller already has an open pending app, the existing row is
  // returned instead of erroring (idempotent).
  rpc BecomeInterviewer(BecomeInterviewerRequest) returns (InterviewerApplication) {
    option (google.api.http) = {
      post: "/api/v1/profile/me/become-interviewer"
      body: "*"
    };
  }

  // GetMyInterviewerApplication returns the current caller's application
  // status (any of pending/approved/rejected, or NOT_FOUND when the user
  // has never applied). Used by the /slots PromoCard to render the right
  // CTA (apply / pending / rejected with retry).
  rpc GetMyInterviewerApplication(GetMyInterviewerApplicationRequest) returns (InterviewerApplication) {
    option (google.api.http) = {get: "/api/v1/profile/me/interviewer-application"};
  }

  // ListInterviewerApplications — admin-only. Returns the queue filtered
  // by status (default: pending). Auth + role check inside the handler.
  rpc ListInterviewerApplications(ListInterviewerApplicationsRequest) returns (InterviewerApplicationList) {
    option (google.api.http) = {get: "/api/v1/admin/interviewer-applications"};
  }

  // ApproveInterviewerApplication — admin flips users.role to interviewer
  // and marks the application approved.
  rpc ApproveInterviewerApplication(ApproveInterviewerApplicationRequest) returns (InterviewerApplication) {
    option (google.api.http) = {
      post: "/api/v1/admin/interviewer-applications/{application_id}/approve"
      body: "*"
    };
  }

  // RejectInterviewerApplication — admin marks application rejected
  // (with optional note). Does NOT touch users.role.
  rpc RejectInterviewerApplication(RejectInterviewerApplicationRequest) returns (InterviewerApplication) {
    option (google.api.http) = {
      post: "/api/v1/admin/interviewer-applications/{application_id}/reject"
      body: "*"
    };
  }

  // AllocateAtlasSkill grants the caller +N progress on the given atlas
  // skill node. Used by the Atlas page's "claim 1 free point" button.
  rpc AllocateAtlasSkill(AllocateAtlasSkillRequest) returns (AllocateAtlasSkillResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/me/atlas/allocate"
      body: "*"
    };
  }

  // GetUserTracks returns the caller's active tracks (multi-track Atlas,
  // см docs/feature/tracks.md). New users get an empty list and must
  // pass through onboarding-fork; existing users were backfilled in
  // migration 00006_user_tracks.sql with a primary `dev` track.
  rpc GetUserTracks(GetUserTracksRequest) returns (UserTracks) {
    option (google.api.http) = {get: "/api/v1/profile/me/tracks"};
  }

  // SetUserTracks replaces the caller's track list atomically. Exactly
  // one item must have primary=true. Empty list is rejected — to leave
  // a track, send the new full list without it.
  rpc SetUserTracks(SetUserTracksRequest) returns (UserTracks) {
    option (google.api.http) = {
      put: "/api/v1/profile/me/tracks"
      body: "*"
    };
  }

  // ClassifyAtlasTodo (Phase 3.1) — юзер пишет TODO в свободной форме
  // («изучить транзакции в Postgres»); LLM либо матчит в существующий
  // curated узел атласа, либо создаёт новый user_atlas_nodes row.
  // Возвращает либо matched_key (узел уже был), либо new_node (новый).
  rpc ClassifyAtlasTodo(ClassifyAtlasTodoRequest) returns (ClassifyAtlasTodoResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/me/atlas/todo"
      body: "*"
    };
  }

  // SetAtlasNodePref — Phase 3 pin/hide actions per atlas node.
  rpc SetAtlasNodePref(SetAtlasNodePrefRequest) returns (SetAtlasNodePrefResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/me/atlas/pref"
      body: "*"
    };
  }

  // RecordAppInstall — Phase J / X1 (P0). Fired by web/hone/cue on launch
  // (idempotent heartbeat). Server uses ON CONFLICT (user_id, app) DO UPDATE
  // SET last_seen_at = now(). First row across all three apps flips a
  // free-tier user into a 7d Pro trial via subscription.grant_trial_pro.
  rpc RecordAppInstall(RecordAppInstallRequest) returns (RecordAppInstallResponse) {
    option (google.api.http) = {
      post: "/api/v1/profile/me/installs"
      body: "*"
    };
  }

  // GetInstalledApps — Phase J / X1 (P0). Reads the user's install matrix.
  // Hone uses this to decide whether to show «install Cue» suggestion after
  // a completed focus session; web reads it to surface cross-app CTAs in
  // /all-set and Settings.
  rpc GetInstalledApps(GetInstalledAppsRequest) returns (GetInstalledAppsResponse) {
    option (google.api.http) = {get: "/api/v1/profile/me/installs"};
  }
}

message AllocateAtlasSkillRequest {
  string skill_id = 1;
}

// ClassifyAtlasTodoRequest — free-form TODO от юзера.
message ClassifyAtlasTodoRequest {
  string todo = 1;
}

// UserAtlasNode — один user_atlas_nodes row, возвращаемый когда LLM
// решил создать новую тему (а не матчить в curated).
message UserAtlasNode {
  string node_key    = 1;
  string title       = 2;
  string description = 3;
  string section     = 4;
  string kind        = 5; // hub | keystone | notable | small
  string cluster     = 6;
  string source_text = 7; // оригинальный TODO для аудита
  string created_at  = 8; // RFC3339
}

// ClassifyAtlasTodoResponse — ровно одно из полей не-пусто:
//   matched_key — TODO замэтчился в curated узел атласа.
//   new_node    — был создан новый user_atlas_nodes row.
message ClassifyAtlasTodoResponse {
  string matched_key       = 1;
  UserAtlasNode new_node   = 2;
}

// SetAtlasNodePrefRequest — Phase 3 pin/hide overlay над atlas (table
// user_atlas_node_prefs, миграция 00064).
message SetAtlasNodePrefRequest {
  string node_key = 1;
  bool   pinned   = 2;
  bool   hidden   = 3;
}

message SetAtlasNodePrefResponse {
  bool ok = 1;
}

// AppSurface — wire-closed set of install surfaces. Strings would tempt
// the client into typos; an enum lets the server reject unknown values
// at protowire decode time.
enum AppSurface {
  APP_SURFACE_UNSPECIFIED = 0;
  APP_SURFACE_WEB  = 1;
  APP_SURFACE_HONE = 2;
  APP_SURFACE_CUE  = 3;
}

// RecordAppInstallRequest — sent on app launch as an idempotent heartbeat.
// app_version is informational (e.g. "0.9.3"); server stores latest seen.
message RecordAppInstallRequest {
  AppSurface app = 1;
  string app_version = 2;
}

// RecordAppInstallResponse — returns the resulting row + a flag indicating
// whether THIS call triggered a trial Pro grant (first install across all
// three surfaces). Client can use it to celebrate without an extra RPC.
message RecordAppInstallResponse {
  InstalledApp install = 1;
  bool trial_pro_granted = 2;
  // trial_pro_until — RFC3339; empty when trial was not granted (already
  // had Pro / already redeemed trial / not-first-install).
  string trial_pro_until = 3;
}

message GetInstalledAppsRequest {}

message GetInstalledAppsResponse {
  repeated InstalledApp installs = 1;
}

// InstalledApp mirrors a row in user_app_installs.
message InstalledApp {
  AppSurface app = 1;
  google.protobuf.Timestamp first_seen_at = 2;
  google.protobuf.Timestamp last_seen_at = 3;
  string app_version = 4;
}

message AllocateAtlasSkillResponse {
  string key = 1;
  int32 progress = 2;
  bool unlocked = 3;
  string unlocked_at = 4;        // RFC3339, empty when not unlocked
  string updated_at = 5;         // RFC3339
}

// BecomeInterviewerRequest carries an optional motivation paragraph the
// applicant ships to admins to nudge approval.
message BecomeInterviewerRequest {
  string motivation = 1;
}

message GetMyInterviewerApplicationRequest {}

// InterviewerApplicationStatus — wire-закрытый набор статусов заявки.
// NOT_SUBMITTED — synthetic из GetMyInterviewerApplication когда юзер
// никогда не подавал; в DB row не хранится (DB CHECK = pending|approved|
// rejected). Wire JSON эмитит NAME (INTERVIEWER_APPLICATION_STATUS_PENDING).
enum InterviewerApplicationStatus {
  INTERVIEWER_APPLICATION_STATUS_UNSPECIFIED = 0;
  INTERVIEWER_APPLICATION_STATUS_NOT_SUBMITTED = 1;
  INTERVIEWER_APPLICATION_STATUS_PENDING = 2;
  INTERVIEWER_APPLICATION_STATUS_APPROVED = 3;
  INTERVIEWER_APPLICATION_STATUS_REJECTED = 4;
}

// InterviewerApplication mirrors a row in `interviewer_applications`.
// status: см. InterviewerApplicationStatus.
message InterviewerApplication {
  string id = 1;
  string user_id = 2;
  string motivation = 3;
  InterviewerApplicationStatus status = 4;
  string reviewed_by = 5;
  google.protobuf.Timestamp reviewed_at = 6;
  string decision_note = 7;
  google.protobuf.Timestamp created_at = 8;
  // Hydrated for the admin queue (denormalised from users).
  string user_username = 9;
  string user_display_name = 10;
}

message InterviewerApplicationList {
  repeated InterviewerApplication items = 1;
}

message ListInterviewerApplicationsRequest {
  // status filter; UNSPECIFIED defaults to PENDING.
  InterviewerApplicationStatus status = 1;
}

message ApproveInterviewerApplicationRequest {
  string application_id = 1;
  string note = 2;
}

message RejectInterviewerApplicationRequest {
  string application_id = 1;
  string note = 2;
}

// Track mirrors the `track_kind` Postgres enum from migration 00006. Wire
// names use the TRACK_ prefix; the server maps to/from lowercase DB values.
// Adding a new value: extend the DB enum + this message + per-track wiring
// (Atlas seed, mock persona, Insights — see docs/feature/tracks.md).
enum Track {
  TRACK_UNSPECIFIED = 0;
  TRACK_DEV = 1;
  TRACK_DEV_SENIOR = 2;
  TRACK_SYSANALYST = 3;
  TRACK_PRODUCT_ANALYST = 4;
  TRACK_QA = 5;
  TRACK_ENGLISH = 6;
}

// UserTrack mirrors a row in `user_tracks`. seniority is "junior"|"middle"|
// "senior"|"lead" for engineering/analyst tracks; empty for english (the
// only cross-cutting track without level distinction in MVP).
message UserTrack {
  Track track = 1;
  string seniority = 2;
  bool primary = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp last_active_at = 5;
}

message UserTracks {
  repeated UserTrack items = 1;
}

message GetUserTracksRequest {}

message SetUserTracksRequest {
  // The full new list. Replaces existing rows atomically. Must contain
  // at least one item; exactly one item must have primary=true.
  repeated UserTrack items = 1;
}
