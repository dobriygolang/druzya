// profile.proto — Connect-RPC contract for the `profile` bounded context.
//
// Covers the five /profile/* endpoints: me, atlas, weekly report, settings
// (PUT), and the public username lookup. The /profile/{username} endpoint
// is public (bypasses bearer auth via publicPaths-style exemption — see
// main.go). For proto3 the public carve-out is applied in the REST gate and
// the native Connect mount.
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "druz9/v1/notify.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// Attributes mirrors OpenAPI Attributes.
message Attributes {
  int32 intellect = 1;
  int32 strength = 2;
  int32 dexterity = 3;
  int32 will = 4;
}

// ProfileSubscription mirrors the inline `subscription` object on ProfileFull.
message ProfileSubscription {
  SubscriptionPlan plan = 1;
  // current_period_end is optional — zero Timestamp when no paid plan.
  google.protobuf.Timestamp current_period_end = 2;
}

// ProfileFull mirrors OpenAPI ProfileFull.
message ProfileFull {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_frame = 4;
  string title = 5;
  int32 level = 6;
  int32 xp = 7;
  int32 xp_to_next = 8;
  CharClass char_class = 9;
  Attributes attributes = 10;
  int32 global_power_score = 11;
  // career_stage is "junior" | "middle" | ... | "principal" in OpenAPI. Kept
  // as a string to avoid another tiny enum; server guarantees validity.
  string career_stage = 12;
  ProfileSubscription subscription = 13;
  int32 ai_credits = 14;
  google.protobuf.Timestamp created_at = 15;
  // avatar_url берётся из users.avatar_url (заполняется при OAuth-логине,
  // см. миграцию 00010_users_avatar.sql и login_yandex/login_telegram).
  string avatar_url = 16;
  // email из users.email — нужен на /settings (карточка аккаунта). Может быть
  // пустым у Telegram-логина без подтверждённого email.
  string email = 17;
  // role зеркалирует users.role. Используется фронтом для RBAC-гейтов
  // (например, кнопка «Создать слот» доступна только interviewer/admin).
  UserRole role = 18;
}

// SectionRating mirrors the top-level OpenAPI SectionRating (rating.proto
// has its own nested SectionRating which predates this file; the two are
// structurally identical but the proto package rules keep them separate).
message ProfileSectionRating {
  Section section = 1;
  int32 elo = 2;
  int32 matches_count = 3;
  int32 percentile = 4;
  bool decaying = 5;
}

// Achievement mirrors OpenAPI Achievement.
message Achievement {
  string key = 1;
  string title = 2;
  string description = 3;
  google.protobuf.Timestamp earned_at = 4;
}

// SkillNode mirrors OpenAPI SkillNode.
message SkillNode {
  string key = 1;
  string title = 2;
  string description = 3;
  Section section = 4;
  // kind is "normal" | "keystone" | "ascendant" in OpenAPI; string preserves
  // wire compat without declaring another enum.
  string kind = 5;
  int32 progress = 6;
  bool unlocked = 7;
  google.protobuf.Timestamp unlocked_at = 8;
  bool decaying = 9;

  // Total/solved counts for the progress bar in the Atlas drawer. progress
  // (field 6) — это уже процент 0–100, оставляем для wire-compat; новые поля
  // нужны для красивого «Решено 8 из 23 задач» без пересчёта на фронте.
  int32 solved_count = 10;
  int32 total_count = 11;

  // last_solved_at — последняя решённая задача в этой теме. Используется на
  // фронте, чтобы посчитать «дней без практики» и подсветить decaying-узел
  // тоже здесь, не только через bool decaying. Может быть unset (zero ts).
  google.protobuf.Timestamp last_solved_at = 12;

  // recommended_kata — топ-N (5) непрешённых ката из этой темы, отсортированных
  // по сложности. Фронт показывает их в drawer'е как кликабельные ссылки.
  // Источник — daily-каталог, см. profile/app/atlas.go.
  repeated KataRef recommended_kata = 13;

  // ── Wave-10 (migration 00034) — PoE-passive-tree fields ──
  //
  // kind (field 5) is now ∈ {"hub","keystone","notable","small"} — drives
  // SVG visual grammar (hub = big circle, keystone = diamond, notable =
  // sigil-framed, small = simple disk).
  //
  // cluster groups designer-laid dense blobs of related skills. Used by
  // <AtlasClusterAura> to draw the soft glow behind the cluster.
  string cluster = 14;
  // pos_x / pos_y are designer-pinned coordinates in the canvas viewBox
  // (typically 0..1400). Optional — when absent the frontend places the
  // node via a simple ring-fallback so the page never breaks.
  int32 pos_x = 15;
  int32 pos_y = 16;
  // pos_set — true when pos_x/pos_y carry meaningful coordinates. Avoids
  // the proto3-int32-zero-default ambiguity (0,0 is a valid corner).
  bool pos_set = 17;
  // reachable — PoE allocation: there exists a path of mastered nodes from
  // the hub to this node. Frontend uses this to dim/lock unreachable
  // branches during planning. Computed server-side per-user.
  bool reachable = 18;
}

// KataRef — лёгкий референс на ката для UI рекомендаций. Title/difficulty
// денормализованы, чтобы не делать второй round-trip на /daily/kata/{id}.
message KataRef {
  string id = 1;
  string title = 2;
  // difficulty: "easy" | "medium" | "hard". Строка, чтобы не плодить enum.
  string difficulty = 3;
  // estimated_minutes — приблизительная оценка времени решения, для UX «у тебя
  // есть 15 мин — вот ката на 10».
  int32 estimated_minutes = 4;
}

// SkillEdge mirrors OpenAPI SkillEdge.
message SkillEdge {
  string from = 1;
  string to = 2;
  // Wave-10: kind ∈ {"prereq","suggested","crosslink"} drives edge
  // visual grammar — solid-thick-arrow / solid-thin / dashed-faded.
  string kind = 3;
}

// SkillAtlas mirrors OpenAPI SkillAtlas — carries the nodes/edges graph.
message SkillAtlas {
  string center_node = 1;
  repeated SkillNode nodes = 2;
  repeated SkillEdge edges = 3;
}

// ProfilePublic mirrors OpenAPI ProfilePublic.
message ProfilePublic {
  string username = 1;
  string display_name = 2;
  string title = 3;
  int32 level = 4;
  CharClass char_class = 5;
  string career_stage = 6;
  int32 global_power_score = 7;
  repeated ProfileSectionRating ratings = 8;
  repeated Achievement achievements = 9;
  SkillAtlas atlas_preview = 10;
  // avatar_url из users.avatar_url. См. comment в ProfileFull.
  string avatar_url = 11;
}

// ReportMetrics mirrors the inline `metrics` block of OpenAPI WeeklyReport.
message ReportMetrics {
  int32 tasks_solved = 1;
  int32 matches_won = 2;
  int32 rating_change = 3;
  int32 xp_earned = 4;
  int32 time_minutes = 5;
}

// ReportWeakness mirrors the inline weakness object in OpenAPI WeeklyReport.
message ReportWeakness {
  string atlas_node_key = 1;
  string reason = 2;
}

// RecommendationAction mirrors the inline action block in OpenAPI Recommendation.
message RecommendationAction {
  // kind is one of: start_mock, solve_task, listen_podcast, open_atlas,
  // open_arena. Preserved as string to avoid another tiny enum.
  string kind = 1;
  // params is a free-form map<string,string> — OpenAPI allows any JSON value
  // via additionalProperties: true; we collapse to string values because
  // Connect clients round-trip scalars losslessly.
  map<string, string> params = 2;
}

// Recommendation mirrors OpenAPI Recommendation.
message Recommendation {
  string title = 1;
  string description = 2;
  RecommendationAction action = 3;
}

// SectionBreakdown — агрегат XP / wins / losses по одной секции за период.
// Используется в WeeklyReport для блоков «Сильные/Слабые секции» — frontend
// раньше держал захардкоженный массив, теперь читает реальные данные.
message SectionBreakdown {
  Section section = 1;
  int32 matches = 2;
  int32 wins = 3;
  int32 losses = 4;
  int32 xp_delta = 5;
  // win_rate — целое число процентов (0..100); считается на бэке, чтобы
  // фронт не дублировал арифметику.
  int32 win_rate_pct = 6;
}

// WeekComparison — XP за конкретную неделю в прошлом. label = "Эта" |
// "-1" | "-2" | "-3" (порядок сохраняется на бэке).
message WeekComparison {
  string label = 1;
  int32 xp = 2;
  // pct — относительная высота для гистограммы (0..100). Считается так,
  // чтобы максимум среди 4 строк → 100%.
  int32 pct = 3;
}

// EloPoint — одна дневная snapshot-точка ELO для линейного графика
// /report. date — ISO YYYY-MM-DD; section — строкой, чтобы не плодить enum
// в protowire (значения совпадают с pb.Section, но без префиксов).
message EloPoint {
  string date = 1;
  int32 elo = 2;
  string section = 3;
}

// PercentileView — три перцентиля пользователя на дату конца недели:
// внутри своего тира, среди друзей и глобально. Целое 0..100.
message PercentileView {
  int32 in_tier = 1;
  int32 in_friends = 2;
  int32 in_global = 3;
}

// AchievementBrief — лёгкое представление ачивки, заработанной за неделю,
// для блока «Что разблокировано». Полный объект Achievement не нужен —
// фронт дотягивает описание из каталога по code, если потребуется.
message AchievementBrief {
  string code = 1;
  string title = 2;
  string unlocked_at = 3; // ISO-8601
  string tier = 4;        // bronze|silver|gold|... — строка, без enum
}

// WeeklyReport mirrors OpenAPI WeeklyReport.
message WeeklyReport {
  // week_start / week_end are ISO-8601 calendar dates (YYYY-MM-DD). OpenAPI
  // types them as `format: date`; proto3 has no date, so we use strings.
  string week_start = 1;
  string week_end = 2;
  ReportMetrics metrics = 3;
  // heatmap is 7 cells with intensity 0..4.
  repeated int32 heatmap = 4;
  repeated string strengths = 5;
  repeated ReportWeakness weaknesses = 6;
  string stress_analysis = 7;
  repeated Recommendation recommendations = 8;
  // Агрегаты для фронта /report (WeeklyReportPage). Раньше были захардкожены
  // в JSX; теперь приходят с бэка готовыми к рендеру.
  int32 actions_count = 9;
  int32 streak_days = 10;
  int32 best_streak = 11;
  int32 prev_xp_earned = 12;
  // Сильные / слабые секции на фронте, отсортированные по xp_delta DESC/ASC.
  // Бэк гарантирует, что одна и та же секция не попадёт в оба списка.
  repeated SectionBreakdown strong_sections = 13;
  repeated SectionBreakdown weak_sections = 14;
  // Сравнение XP за последние 4 недели (включая текущую). Длина = 4.
  repeated WeekComparison weekly_xp = 15;

  // Phase A killer-stats расширения. Старые клиенты безопасно
  // игнорируют (proto3 default values).
  // hourly_heatmap — 168 ячеек (7 дней × 24 часа), индекс = dow*24+hour.
  repeated int32 hourly_heatmap = 16;
  // elo_series — дневные snapshot-точки ELO за окно.
  repeated EloPoint elo_series = 17;
  // percentiles — три перцентиля на конец недели.
  PercentileView percentiles = 18;
  // ai_insight — текст от LLM-инсайта; пустая строка, если OpenRouter недоступен.
  string ai_insight = 19;
  // achievements_this_week — ачивки, разблокированные в окне недели.
  repeated AchievementBrief achievements_this_week = 20;
  // share_token — токен публичной ссылки; пустая строка, если ещё не выпускался.
  string share_token = 21;
  // featured_metric — server-picked headline metric for the share card.
  // Values: "xp" | "streak" | "achievement" | "" (empty ⇒ client picks default).
  // Server selects: "achievement" if any new achievement unlocked this week,
  // else "streak" if streak_days >= 7, else "xp".
  string featured_metric = 22;
}

// ProfileSettings mirrors OpenAPI ProfileSettings.
message ProfileSettings {
  string display_name = 1;
  Language default_language = 2;
  // locale is "ru" | "en" — string keeps wire compat with REST.
  string locale = 3;
  NotificationPreferences notifications = 4;
  bool voice_mode_enabled = 5;
  // ai_insight_model — OpenRouter model id chosen by the user for their
  // weekly AI Coach insight ("openai/gpt-4o-mini", "anthropic/claude-sonnet-4", …).
  // Empty string ⇒ server-default (tier-aware free model). Premium-locked
  // ids are validated server-side against the llm_models registry at update
  // time; free-tier users updating to a premium id get InvalidArgument.
  string ai_insight_model = 6;

  // onboarding_completed — read-write. Read: derived from
  // users.onboarding_completed_at IS NOT NULL. Write: true ⇒ server stamps
  // onboarding_completed_at = NOW(); false ⇒ server clears the column.
  // Marked `optional` so proto3 carries field presence — partial updates
  // that omit this field do NOT clobber the stored timestamp.
  optional bool onboarding_completed = 7;
  // focus_class — declared career-focus slug. Allowed:
  //   "" | "algo" | "backend" | "system" | "concurrency" | "ds".
  // Validated server-side against the same set as the DB CHECK. Invalid
  // value ⇒ InvalidArgument (anti-fallback: no silent default). `optional`
  // so empty string is distinguishable from "field omitted".
  optional string focus_class = 8;
}

// UpdateProfileSettingsRequest wraps the ProfileSettings payload. OpenAPI
// uses the settings object directly as the request body; Connect prefers a
// named request type.
message UpdateProfileSettingsRequest {
  ProfileSettings settings = 1;
}

message GetMyProfileRequest {}
message GetMyAtlasRequest {}
message GetMyReportRequest {
  // include_share_token — если true, бэк дополнительно вызывает
  // IssueShareToken и кладёт свежий токен в WeeklyReport.share_token.
  // Используется кнопкой «Поделиться» на /weekly: фронт делает
  // повторный запрос с этим флагом и получает токен для clipboard'а.
  bool include_share_token = 1;
}
message GetPublicProfileRequest {
  string username = 1;
}
message GetWeeklyShareRequest {
  // token — публичный 64-hex токен из weekly_share_tokens. Resolved через
  // ProfileRepo.ResolveShareToken. 404 если просрочен / отсутствует.
  string token = 1;
}

service ProfileService {
  // GetMyProfile returns the rich profile for the authenticated caller.
  rpc GetMyProfile(GetMyProfileRequest) returns (ProfileFull) {
    option (google.api.http) = {get: "/api/v1/profile/me"};
  }

  // GetMyAtlas returns the skill atlas (nodes + edges).
  rpc GetMyAtlas(GetMyAtlasRequest) returns (SkillAtlas) {
    option (google.api.http) = {get: "/api/v1/profile/me/atlas"};
  }

  // GetMyReport returns the weekly AI report.
  rpc GetMyReport(GetMyReportRequest) returns (WeeklyReport) {
    option (google.api.http) = {get: "/api/v1/profile/me/report"};
  }

  // UpdateSettings persists the settings block.
  rpc UpdateSettings(UpdateProfileSettingsRequest) returns (ProfileSettings) {
    option (google.api.http) = {
      put: "/api/v1/profile/me/settings"
      body: "settings"
    };
  }

  // GetPublicProfile returns the public /u/{username} view.
  rpc GetPublicProfile(GetPublicProfileRequest) returns (ProfilePublic) {
    option (google.api.http) = {get: "/api/v1/profile/{username}"};
  }

  // GetWeeklyShare returns a weekly report by share token. Public — no
  // bearer auth required. Route is added to publicPaths in router.go.
  rpc GetWeeklyShare(GetWeeklyShareRequest) returns (WeeklyReport) {
    option (google.api.http) = {get: "/api/v1/profile/weekly/share/{token}"};
  }
}
