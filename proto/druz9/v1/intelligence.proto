// ── X5 Atlas struggle marks messages (Phase J 2026-05-12) ────────────────
//
// Compact contract. Single row per (user, atlas_node_id) — latest write
// wins (idempotent ON CONFLICT). Confidence ∈ [0,1] lets multiple sources
// of evidence aggregate via max() in the UI («cue rated low + reflection
// flagged → strong»). Empty source defaults to "manual" в repo.

message MarkAtlasStruggleRequest {
  // atlas_node_id — stable key (`tracks/system-design/dist-sharding` or
  // user-cluster id). Frontend sends whatever atlas_nodes.id it has.
  string atlas_node_id = 1;
  // source ∈ 'cue_session' | 'hone_reflection' | 'mock_stage' | 'manual'.
  // Server validates closed set; empty → 'manual'.
  string source = 2;
  // confidence ∈ [0,1]. Caller's strength signal: low Cue rating (1/5) →
  // 0.9, low reflection grade (2/5) → 0.7, etc. UI may pick highest among
  // duplicate sources.
  double confidence = 3;
  // note — optional one-line context that surfaces in tooltip («grade 2
  // — stuck on joins»). Max 280 chars; truncated server-side.
  string note = 4;
}

message MarkAtlasStruggleResponse {
  bool ok = 1;
}

message ListAtlasStrugglesRequest {
  // window_days — only return marks newer than now()-N days. Default 30,
  // hard cap 365. 0 → server default.
  int32 window_days = 1;
}

// AtlasStruggleMark — projection over user_atlas_struggle_marks.
message AtlasStruggleMark {
  string atlas_node_id = 1;
  string source = 2;
  double confidence = 3;
  string note = 4;
  google.protobuf.Timestamp marked_at = 5;
}

message ListAtlasStrugglesResponse {
  repeated AtlasStruggleMark items = 1;
}

// ClearAtlasStruggle — explicit user gesture («I'm not stuck anymore»),
// removes the row. Idempotent — clearing a non-existent mark returns ok.
message ClearAtlasStruggleRequest {
  string atlas_node_id = 1;
}

message ClearAtlasStruggleResponse {
  bool ok = 1;
}
