// intelligence.proto — Connect-RPC contract for the AI-coach layer that
// turns Hone into a personal coach. Two RPCs:
//
//   GetDailyBrief — synthesised "morning brief" derived from focus stats,
//                   skipped/completed plan items, recent reflections and
//                   recently-touched notes. Cached 6h per (user, date);
//                   force=true bypasses cache (rate-limited 1/h).
//
//   AskNotes      — RAG over the user's notes corpus. Embed question →
//                   cosine top-8 → LLM answer with [N] citations parsed
//                   into structured payload.
//
// Bounded context: this service READS from hone_* tables via reader
// adapters (focus, plan, notes) and WRITES only to its own
// hone_daily_briefs table. It must never mutate hone domain tables.
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// BriefRecommendationKind classifies what a recommendation chip does on click.
//   TINY_TASK    — a small, concrete action; client typically pins as
//                  Focus session title.
//   SCHEDULE     — advice about timing; client shows tooltip only.
//   REVIEW_NOTE  — opens Notes with target_id = note_id.
//   UNBLOCK      — opens Today with target_id = plan_item_id highlighted.
enum BriefRecommendationKind {
  BRIEF_RECOMMENDATION_KIND_UNSPECIFIED = 0;
  BRIEF_RECOMMENDATION_KIND_TINY_TASK = 1;
  BRIEF_RECOMMENDATION_KIND_SCHEDULE = 2;
  BRIEF_RECOMMENDATION_KIND_REVIEW_NOTE = 3;
  BRIEF_RECOMMENDATION_KIND_UNBLOCK = 4;
}

// BriefRecommendation — one actionable suggestion in DailyBrief.
message BriefRecommendation {
  BriefRecommendationKind kind = 1;
  string title = 2;
  string rationale = 3;
  // target_id is optional; carries note_id for REVIEW_NOTE,
  // plan_item_id for UNBLOCK, empty for SCHEDULE / TINY_TASK.
  string target_id = 4;
}

// DailyBrief — the synthesised morning brief.
message DailyBrief {
  string headline = 1;        // 1 sentence
  string narrative = 2;       // 2-3 sentences про шаблон последних 7 дней
  repeated BriefRecommendation recommendations = 3; // ровно 3
  google.protobuf.Timestamp generated_at = 4;
  // brief_id — UUID для AckRecommendation. Phase A briefs (без memory)
  // отдают пустую строку.
  string brief_id = 5;
  // Phase 4.4 — severity drives the colour-strip on the brief panel:
  //   cruise   → muted
  //   nudge    → blue
  //   warn     → amber
  //   critical → red
  // Reason — short English fragment used in tooltips ("interview Friday
  // in 2 days"). Computed deterministically server-side, не от LLM.
  InsightSeverity severity        = 6;
  string          severity_reason = 7;
}

// AckRecommendation — юзер кликнул 👍 (followed=true) или 👎 (followed=false)
// на recommendation index'е в brief'е. Backend пишет brief_followed /
// brief_dismissed episode для будущих recall'ов.
message AckRecommendationRequest {
  string brief_id = 1;
  int32 index = 2;
  bool followed = 3;
}
message AckRecommendationResponse { bool ok = 1; }

// MemoryStats — лёгкий счётчик для DailyBriefPanel trust indicator
// («COACH KNOWS [N] EVENTS»). by_kind ключи — domain.EpisodeKind значения.
message MemoryStats {
  int32 total_30d = 1;
  map<string, int32> by_kind = 2;
}
message GetMemoryStatsRequest {}

message GetDailyBriefRequest {
  // force=true bypasses the 6h cache. Rate-limited 1/h per user.
  bool force = 1;
}

// Citation — one note referenced by [N] in AskAnswer.answer_md.
message Citation {
  string note_id = 1;
  string title = 2;
  string snippet = 3;  // first ~140 chars of body, for hover preview
}

// AskAnswer — the LLM response + structured citations.
message AskAnswer {
  string answer_md = 1;
  repeated Citation citations = 2;
}

message AskNotesRequest {
  string question = 1;
}

// ── Insight stream (Phase 1.5) ───────────────────────────────────────
//
// Atomic coach cards. Each Insight is one fact + lever. Surfaces
// (web /today, Hone Today, /arena, /mock, /codex) read the same stream
// with a surface filter — no per-surface duplicate logic on backend.
//
// Severity drives card colour and ranking. Anchor identifies "what
// this is about" so dismiss-state survives re-generation.

enum InsightSeverity {
  INSIGHT_SEVERITY_UNSPECIFIED = 0;
  INSIGHT_SEVERITY_CRUISE      = 1;
  INSIGHT_SEVERITY_NUDGE       = 2;
  INSIGHT_SEVERITY_WARN        = 3;
  INSIGHT_SEVERITY_CRITICAL    = 4;
}

message Insight {
  string id            = 1;
  string surface       = 2;     // 'today'|'arena'|'mock'|'codex'
  InsightSeverity severity = 3;
  string anchor        = 4;     // stable "what about" id

  string headline      = 5;     // ≤80 char glanceable fact
  string evidence      = 6;     // 1 sentence with numbers
  string interpret     = 7;     // 1 sentence pattern claim
  string lever         = 8;     // 1 sentence today's action
  string deep_link     = 9;     // in-app route, optional

  string event_id      = 10;    // forward-FK to personal_events
  string skill_key     = 11;
  string codex_slug    = 12;
  string track_id      = 13;

  google.protobuf.Timestamp generated_at = 14;
  google.protobuf.Timestamp expires_at   = 15;
}

message ListInsightsRequest {
  // surface MUST be one of the closed set; empty defaults to 'today'.
  string surface = 1;
  int32  limit   = 2;  // 0 → server default (10), max 50
  // offset — для severity-ranked feed это лучше cursor'а, поскольку
  // severity-CASE-сорт не имеет монотонного якоря. По умолчанию 0.
  int32  offset  = 3;
}

message ListInsightsResponse {
  repeated Insight items = 1;
  // total — full row count (after surface/dismissed/expired filter), для
  // UI «Page X of Y». Дешёво, потому что counter использует тот же
  // primary index, что и основной SELECT.
  int32 total = 2;
}

// AckInsightRequest — user feedback. action 'follow' marks acted_at,
// 'dismiss' marks dismissed_at. Both idempotent on the server.
message AckInsightRequest {
  string id     = 1;
  string action = 2;   // 'follow' | 'dismiss'
}
message AckInsightResponse { bool ok = 1; }

// ── Phase 2 learning-companion (2026-05-04) ─────────────────────────────

// GetNextActionRequest — empty за исключением user-context, который
// middleware распаковывает из сессии. Поля для будущих фильтров.
message GetNextActionRequest {
  // Если true — bypass'нуть daily cache (limited 1/h client-side).
  bool force = 1;
}

// NextAction — single concrete next action, formatted из LLM JSON.
message NextAction {
  // action_kind ∈ focus_block | start_mock | review_resource | reflection |
  //              checkpoint | graduation_mock
  string action_kind        = 1;
  // target — atlas_node_id / track_step_slug / resource_url, semantics
  // зависит от action_kind.
  string target             = 2;
  string rationale          = 3;
  int32  estimated_minutes  = 4;
}

// GetForkSnapshotRequest — empty.
message GetForkSnapshotRequest {}

// ForkBranchView — per-branch projection.
message ForkBranchView {
  string branch                = 1; // 'mle' | 'de'
  int32  mock_count            = 2;
  double avg_score             = 3;
  int32  voluntary_deep_dives  = 4;
  double composite_score       = 5;
}

// ForkSnapshot — Coach fork view (active when mode=='explore').
message ForkSnapshot {
  string mode                 = 1; // 'explore' | 'commit' | 'deep'
  int32  explore_week_index   = 2; // 0 если mode != explore
  string current_branch       = 3; // user's declared lean ('' если none)
  repeated ForkBranchView branches = 4;
  string lean_branch          = 5; // derived best-scoring branch
  double confidence           = 6; // [0..1]
}

// SetLearningModeRequest — пользователь выбрал mode в Coach (explore/commit/deep).
// track_id обязателен для commit/deep, игнорируется для explore.
message SetLearningModeRequest {
  string mode      = 1; // 'explore' | 'commit' | 'deep'
  string track_id  = 2; // optional, required for commit/deep
}

// LearningStateView — текущее состояние юзера.
message LearningStateView {
  string mode                = 1;
  string fork_branch         = 2; // '' if not chosen
  int32  explore_week_index  = 3;
  string committed_track_id  = 4; // '' if explore
}

// SetForkBranchRequest — пользователь явно выбрал ветку (de/mle/none).
message SetForkBranchRequest {
  string branch = 1; // 'de' | 'mle' | 'none' | '' to clear
}

// GetResourceTrailRequest — окно для activity stream.
message GetResourceTrailRequest {
  int32 days         = 1; // default 7
  int32 keep_recent  = 2; // default 5 — limit per-bucket
}

// ResourceTouch — single event from user_resource_log.
message ResourceTouch {
  string                    url             = 1;
  string                    atlas_node_id   = 2;
  string                    kind            = 3; // clicked|finished|skipped|unhelpful|reflection_submitted
  google.protobuf.Timestamp occurred_at     = 4;
  int32                     hours_ago       = 5;
  string                    reflection_text = 6;
}

// ResourceTrail — engagement summary за окно.
message ResourceTrail {
  repeated ResourceTouch finished_recent     = 1;
  int32                  unfinished_count    = 2;
  repeated ResourceTouch marked_unhelpful    = 3;
  repeated ResourceTouch recent_reflections  = 4;
}

// GetSkillRadarRequest — какой rubric (de | dev_senior | mle | english).
message GetSkillRadarRequest {
  string rubric = 1; // optional override; empty = derive из learning_state
}

// SkillRadarAxis — single axis с score 0..1.
message SkillRadarAxis {
  string key       = 1;
  string label     = 2;
  double score     = 3; // 0..1, normalized из ai_report
  int32  mock_count = 4; // сколько mocks внесли вклад в этот axis
  // confidence — qualitative reliability marker derived from mock_count:
  //   "empty" (0 mocks) | "low" (1) | "medium" (2-3) | "high" (4+)
  // UI uses this to render low-confidence axes with dashed outline / pill.
  string confidence = 5;
}

// SkillRadar — 5-axis snapshot.
message SkillRadar {
  string                  rubric = 1;
  repeated SkillRadarAxis axes   = 2;
}

// GetCoachStatsRequest — header snapshot panel.
message GetCoachStatsRequest {}

// CoachStats — KPI cards для snapshot panel.
//
// Pivot 2026-05-04 (calendar) + Arena/Lobby final purge 2026-05-06: dropped
// next_mock_in_days / next_mock_company along with the calendar context, and
// streak_days alongside the kata stream. Only mock + focus signals remain.
message CoachStats {
  reserved 1, 5, 6;
  reserved "streak_days", "next_mock_in_days", "next_mock_company";
  int32  focus_today_min    = 2; // sum focus minutes today (UTC day)
  int32  last_mock_score    = 3; // 0..100, 0 if no mocks
  string last_mock_section  = 4; // 'de' | 'algorithms' | etc — '' if none
}

// LogResourceRequest — событие user_resource_log.
message LogResourceRequest {
  string resource_url    = 1;
  string atlas_node_id   = 2; // optional
  // kind ∈ clicked | finished | skipped | unhelpful | reflection_submitted
  string kind            = 3;
  // reflection_text required только если kind=reflection_submitted.
  string reflection_text = 4;
}

message LogResourceResponse {
  string id                    = 1;
  string reflection_note_id    = 2; // empty если note не создана
  bool   note_create_failed    = 3;
}

// ── F2 Goal CRUD (2026-05-12) ────────────────────────────────────────────
//
// Single-active "primary goal" per user — mirrors frontend localStorage MVP
// (frontend/src/lib/goal.ts). Backed by user_primary_goals table (migration
// 00086). 5 kinds — top_tier_co / any_senior / ml_offer / english_target /
// custom. Conceptually distinct from the existing /api/v1/goals chi-direct
// CRUD (job_target/skill_target/track_target workflow goals с status).

enum GoalKind {
  GOAL_KIND_UNSPECIFIED    = 0;
  GOAL_KIND_TOP_TIER_CO    = 1;  // Senior at specific top-tier company
  GOAL_KIND_ANY_SENIOR     = 2;  // Senior at any company
  GOAL_KIND_ML_OFFER       = 3;  // ML Engineer offer
  GOAL_KIND_ENGLISH_TARGET = 4;  // TOEFL 100+ / IELTS 7+ / CEFR-B2+
  GOAL_KIND_CUSTOM         = 5;  // free-text, AI parses
}

message Goal {
  string                    id              = 1;
  GoalKind                  kind            = 2;
  string                    target_company  = 3;
  string                    target_level    = 4;
  string                    target_text     = 5;
  // target_date — ISO yyyy-mm-dd; "" если не задано.
  string                    target_date     = 6;
  bool                      active          = 7;
  google.protobuf.Timestamp created_at      = 8;
  google.protobuf.Timestamp updated_at      = 9;
}

message CreateGoalRequest {
  GoalKind kind           = 1;
  string   target_company = 2;
  string   target_level   = 3;
  string   target_text    = 4;
  string   target_date    = 5; // ISO yyyy-mm-dd; "" allowed
}

message UpdateGoalRequest {
  // id MUST refer to a goal owned by the caller; otherwise NotFound.
  string   id             = 1;
  GoalKind kind           = 2;
  string   target_company = 3;
  string   target_level   = 4;
  string   target_text    = 5;
  string   target_date    = 6;
}

message DeactivateGoalRequest {
  string id = 1;
}

// ── F10 Interview-session ingestion (2026-05-12) ─────────────────────────
//
// Cue end-of-session POSTs transcript + per-stage log. Backend stores the
// session row + ALSO writes a coach_episodes row (kind=cue_session) so the
// existing memory layer surfaces it in DailyBrief / Recall.
//
// NB: messages prefixed `Interview*` чтобы развести с hone.proto.CueSession
// (file-based imported transcript). Здесь — live ingestion из Cue desktop'а.

message InterviewStage {
  string stage        = 1; // 'hr' | 'algo' | 'sysdesign' | 'coding' | 'behavioral' | 'other'
  int32  self_rating  = 2; // 1..5, 0 = unrated
  string notes        = 3;
}

message InterviewSession {
  string                    id              = 1;
  string                    company         = 2;
  string                    persona         = 3;
  repeated InterviewStage   stages          = 4;
  string                    ai_summary      = 5;
  string                    raw_transcript  = 6;
  google.protobuf.Timestamp completed_at    = 7;
}

message IngestInterviewSessionRequest {
  string                  company        = 1;
  string                  persona        = 2;
  repeated InterviewStage stages         = 3;
  string                  ai_summary     = 4;
  string                  raw_transcript = 5;
  // completed_at — RFC3339; empty → server time.
  google.protobuf.Timestamp completed_at = 6;
}

message ListInterviewSessionsRequest {
  int32 limit  = 1; // 0 → server default (20), max 100
  int32 offset = 2;
}

message ListInterviewSessionsResponse {
  repeated InterviewSession items = 1;
  int32                     total = 2;
}

// ── F2 LLM-driven milestones (2026-05-12) ────────────────────────────────
//
// 10-12 weekly checkpoints decomposed from the active PrimaryGoal by the
// free LLM cascade. Cache 30d per (user, goal) — milestones are roadmap,
// not daily action. GenerateMilestones forces regeneration; GetMilestones
// returns the cached set (empty array if no generation yet).

message Milestone {
  string id          = 1;
  int32  week_index  = 2;
  // week_start — ISO yyyy-mm-dd Monday of the milestone's week.
  string week_start  = 3;
  string title       = 4;
  string detail      = 5;
  // category ∈ foundation | practice | mock | reflection | final.
  string category    = 6;
  bool                      done    = 7;
  google.protobuf.Timestamp done_at = 8;
}

message MilestonesResponse {
  repeated Milestone items = 1;
  // generated_at — newest milestone's GeneratedAt timestamp. Zero when empty.
  google.protobuf.Timestamp generated_at = 2;
}

message MarkMilestoneDoneRequest {
  string id   = 1;
  bool   done = 2;
}

// ── R3 Per-node coverage (2026-05-12) ────────────────────────────────────
//
// Backend mirror of frontend lib/atlasCoverage.ts heuristic. Aggregates
// user_resource_log по atlas_node_id за 30d window; state derivation matches
// the heuristic (3+ → covered, 1-2 recent → partial, 1-2 cold → struggling,
// 0 → not_yet).

message NodeCoverage {
  string node_key         = 1;
  // state ∈ covered | partial | struggling | not_yet.
  string state            = 2;
  int32  match_count_30d  = 3;
  int32  match_count_7d   = 4;
  google.protobuf.Timestamp last_match_at = 5;
}

message GetNodeCoverageRequest {
  repeated string node_keys = 1;
}

message GetNodeCoverageResponse {
  repeated NodeCoverage items = 1;
}

// ── F1 Memory expansion Phase 2 (2026-05-12) ─────────────────────────────
//
// /profile transparency surface — user sees what the AI remembers and can
// soft-delete individual entries.

message MemoryEntry {
  string id      = 1;
  // kind mirrors domain.EpisodeKind (brief_emitted/cue_session/etc.).
  string kind    = 2;
  // content — single-line summary stored in coach_episodes.summary.
  string content = 3;
  // source — short label ('hone', 'cue', 'mock', 'coach') derived server-side
  // from kind для UI grouping. May be empty.
  string source = 4;
  // importance — float in [0..1] reserved для будущей weighting; 0 = unscored.
  double importance = 5;
  google.protobuf.Timestamp occurred_at = 6;
  google.protobuf.Timestamp expires_at  = 7;
  // edited_at — non-nil если юзер уточнял formulation через EditMemoryEntry.
  // UI рисует subtle «edited» индикатор когда set.
  google.protobuf.Timestamp edited_at  = 8;
}

message ListMemoryEntriesRequest {
  // kind — optional filter; empty string = all kinds.
  string kind = 1;
  // since — optional lower bound on occurred_at. Empty → unrestricted.
  google.protobuf.Timestamp since = 2;
  int32  limit  = 3;  // 0 → server default (50), max 200
  int32  offset = 4;
}

message ListMemoryEntriesResponse {
  repeated MemoryEntry items = 1;
  int32                total = 2;
}

message DeleteMemoryEntryRequest {
  string id = 1;
}

// EditMemoryEntryRequest — юзер уточняет formulation entry'и. Content
// валидируется backend'ом: trim + length [1..2000] runes.
message EditMemoryEntryRequest {
  string id      = 1;
  string content = 2;
}

// ── C3 Cross-product context injection (Phase J 2026-05-12) ─────────────
//
// Compact bundle the Cue copilot fetches before building an interview /
// meeting suggestion prompt. The unique moat vs Cluely: Cue knows the
// user's primary goal + recent Coach memory + activity_log + skill radar
// → suggestion is personalised ("remember last week Coach said start
// with bottleneck analysis"), not generic.
//
// Token budget: caller MUST keep the formatted prompt block under
// ~500 tokens. Reader truncates aggressively when fields exceed sane
// thresholds.

// CoachMemoryEntry — one episode from coach_episodes the suggestion
// prompt may reference. Minimal projection (id+kind+summary+occurred_at) —
// payload is intentionally NOT exposed (security: don't leak full
// reflection bodies into a transcript-tail context).
message CoachMemoryEntry {
  string kind        = 1;   // 'brief_emitted' | 'reflection_added' | 'mock_pipeline_finished' | …
  string summary     = 2;   // single-line gist
  google.protobuf.Timestamp occurred_at = 3;
  // hours_ago pre-computed server-side ("2 days ago" framing).
  int32 hours_ago    = 4;
}

// ActivitySummary — rolled-up user_resource_log counts (last 7d / 30d).
message ActivitySummary {
  int32  last_7d_count   = 1;
  int32  last_30d_count  = 2;
  // top_kinds — distinct atlas_node_id prefixes / resource kinds, most-
  // frequent first. Server caps at 5 entries.
  repeated string top_kinds = 3;
}

// SkillRadarSnapshot — compact 5-axis projection. Same shape as
// SkillRadar but flattened для context block.
message SkillRadarSnapshot {
  string rubric = 1;
  // axes is paired with axis_scores 1:1 — server emits both in same order.
  repeated string  axes         = 2;
  repeated double  axis_scores  = 3;   // 0..1
  // weakest / strongest highlight axis_key labels for quick prompt phrasing.
  string weakest_axis   = 4;
  string strongest_axis = 5;
}

// AtlasResourceRef — top-N relevant resources for the user's active goal +
// recent activity. Stub: empty until atlas-retrieval API lands. Kept in
// the schema so clients render the section once data flows.
message AtlasResourceRef {
  string id    = 1;
  string title = 2;
  string url   = 3;
  // kind ∈ 'book' | 'course' | 'article' | 'paper'.
  string kind  = 4;
}

// UserContext — the full bundle Cue uses to personalise a suggestion. All
// fields are optional — missing data ≠ error. Reader degrades to "no
// context" silently if every sub-field is empty.
message UserContext {
  // active_goal — null when the user has no active primary goal.
  // Reuses Goal message (same definition above).
  Goal active_goal = 1;
  // recent_memory — last 10-15 coach episodes (newest first).
  repeated CoachMemoryEntry recent_memory = 2;
  // activity — last 7d / 30d activity_log summary.
  ActivitySummary activity = 3;
  // radar — skill-radar snapshot (default 'dev_senior' rubric).
  SkillRadarSnapshot radar = 4;
  // relevant_resources — top-5 atlas hits. Empty until atlas retrieval
  // hook wired (see TODO in intelligence.app.GetUserContext).
  repeated AtlasResourceRef relevant_resources = 5;
}

message GetUserContextRequest {
  // user_id is taken from auth context — no body fields. Persona-tuning
  // happens in the caller (Cue copilot trims sections per persona).
}

message GetUserContextResponse {
  UserContext context = 1;
}

// ── H2 Focus reflection persistence (Phase J 2026-05-12) ─────────────────
//
// Hone end-of-pomodoro reflection prompt раньше собирал grade + notes,
// но они не сохранялись («// future RPC» comment в App.tsx). Эта пара RPC
// закрывает loop: SaveFocusReflection пишет в focus_reflections (idempotent
// через session_id), ListFocusReflections даёт /stats grade-trend chart.
// Coach next-action prompt также читает recent reflections — context-aware
// recommendations («previously stuck on X with grade 2 — try Y today»).
//
// focus_mode mirrors hone domain enum: pomodoro|stopwatch|free|plan|pinned|countdown.
// grade ∈ [1,5], 0 = no rating (only notes submitted).

message SaveFocusReflectionRequest {
  // session_id — client-generated UUID, должно совпадать с hone_focus_sessions.id.
  // Idempotency: backend UNIQUE(user_id, session_id) → replay safe.
  string session_id        = 1;
  string focus_mode        = 2;
  int32  duration_seconds  = 3;
  // grade ∈ [1,5]; 0 = no rating (only notes).
  int32  grade             = 4;
  string notes             = 5;
  string task_pinned       = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp ended_at   = 8;
}

message SaveFocusReflectionResponse {
  string reflection_id = 1;
}

// FocusReflectionEntry — projection для /stats grade-trend chart.
message FocusReflectionEntry {
  string                    reflection_id    = 1;
  google.protobuf.Timestamp ended_at         = 2;
  int32                     grade            = 3;  // 0 если NULL
  string                    focus_mode       = 4;
  int32                     duration_seconds = 5;
}

message ListFocusReflectionsRequest {
  // window_days — окно (default 30, hard cap 365).
  int32 window_days = 1;
}

message ListFocusReflectionsResponse {
  repeated FocusReflectionEntry items = 1;
}

service IntelligenceService {
  rpc GetDailyBrief(GetDailyBriefRequest) returns (DailyBrief) {
    option (google.api.http) = {
      post: "/api/v1/intelligence/daily-brief"
      body: "*"
    };
  }
  // AskNotes — RAG над корпусом нот пользователя. Используется AskNotesModal
  // в Hone Notes (frontend-аудит этот caller пропустил).
  rpc AskNotes(AskNotesRequest) returns (AskAnswer) {
    option (google.api.http) = {
      post: "/api/v1/intelligence/ask-notes"
      body: "*"
    };
  }
  // AckRecommendation / GetMemoryStats — feedback и trust indicator для
  // DailyBriefPanel в Hone.
  rpc AckRecommendation(AckRecommendationRequest) returns (AckRecommendationResponse) {
    option (google.api.http) = {
      post: "/api/v1/intelligence/brief/ack"
      body: "*"
    };
  }
  rpc GetMemoryStats(GetMemoryStatsRequest) returns (MemoryStats) {
    option (google.api.http) = { get: "/api/v1/intelligence/memory/stats" };
  }

  rpc ListInsights(ListInsightsRequest) returns (ListInsightsResponse) {
    option (google.api.http) = {get: "/api/v1/intelligence/insights"};
  }
  rpc AckInsight(AckInsightRequest) returns (AckInsightResponse) {
    option (google.api.http) = {
      post: "/api/v1/intelligence/insights/{id}/ack"
      body: "*"
