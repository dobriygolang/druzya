// common.proto — shared enums used across every druz9.v1 service.
//
// Consolidates cross-domain enumerations so individual service protos stop
// duplicating them. Keep values in lock-step with backend/shared/enums and the
// OpenAPI components/schemas enums until every domain migrates to Connect-RPC.
syntax = "proto3";
package druz9.v1;

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// Section mirrors shared/enums.Section and the OpenAPI Section enum.
// English HR (value=6) is the first non-engineering section — Wave 1 of
// docs/feature/english.md. It sits in the same enum because
// mock_sessions.section is the natural lookup key and creating a parallel
// taxonomy for English would force every consumer (Insights, mock-pipeline,
// history) to carry a tagged-union switch. Tables that gate on engineering
// sections via CHECK constraints (ratings, elo_snapshots, tasks, slots)
// do NOT accept english_hr — see migrations/00001_baseline.sql.
enum Section {
  SECTION_UNSPECIFIED = 0;
  SECTION_ALGORITHMS = 1;
  SECTION_SQL = 2;
  SECTION_GO = 3;
  SECTION_SYSTEM_DESIGN = 4;
  SECTION_BEHAVIORAL = 5;
  SECTION_ENGLISH_HR = 6;
  // System Design senior (Wave 3.2 of docs/feature/plan.md). Free-form
  // discussion of distributed systems / real-time / ML / observability —
  // no algorithmic task. Differs from SECTION_SYSTEM_DESIGN: that one
  // pairs with a designed-prompt task ("design URL shortener with these
  // constraints"), this one is interview-style architectural pushback.
  SECTION_SYSTEM_DESIGN_SENIOR = 7;
  // Tech Lead / EM mock (Wave 3.4 of docs/feature/plan.md). Free-form
  // STAR-style behavioral round at TL/EM level — people scenarios
  // (1:1s, conflict, hiring, tech-debt defense). Differs from
  // SECTION_BEHAVIORAL: that one pairs with concrete behavioral tasks;
  // this one is open conversation with the AI as a hiring panel.
  SECTION_TECH_LEAD_EM = 8;
  // Sysanalyst (системный аналитик) — Wave 7. Free-form interview round
  // covering requirements engineering, UML/BPMN modeling, integration
  // patterns (REST/SOAP/Kafka/sagas/idempotency), SQL data design and
  // process basics (Agile/BABOK). No algorithmic task; rubric scores
  // requirements/modeling/integration/data/process axes.
  SECTION_SYSANALYST = 9;
  // Product analyst — Wave 8. Free-form interview round covering
  // product metrics (DAU/retention/funnel/NSM), SQL for analytics,
  // A/B testing fundamentals (sample size / MDE / CUPED), prioritisation
  // frameworks (RICE/JTBD), and insight communication. No algorithmic
  // task; rubric scores metrics/SQL/experimentation/frameworks/communication.
  SECTION_PRODUCT_ANALYST = 10;
  // QA / тестировщик — Wave 9.2. Free-form interview round covering
  // test design (boundary / equivalence / decision tables), API testing
  // (REST schemas, contract tests), automation (Selenium/Playwright/
  // pytest), bug analysis (root-cause + reproduction steps), and process
  // (test plans, coverage strategy, exploratory vs scripted balance).
  SECTION_QA = 11;
  // DevOps / SRE — Wave 9.3. Free-form interview round on infrastructure
  // (containers, k8s, IaC), observability (metrics/tracing/logs/SLO),
  // CI/CD (pipelines, blue-green, canary), incident response (runbooks,
  // post-mortems, error budgets), and security (secrets, auth, network
  // policy).
  SECTION_DEVOPS = 12;
  // ML engineering — pivot 2026-05-01. Free-form interview round для
  // middle/senior ML позиций. Classical ML, deep learning, LLM/GenAI,
  // MLOps, evaluation + production awareness.
  SECTION_ML_ENG = 13;
}

