// common.proto — shared enums used across every druz9.v1 service.
//
// Consolidates cross-domain enumerations so individual service protos stop
// duplicating them. Keep values in lock-step with backend/shared/enums and the
// OpenAPI components/schemas enums until every domain migrates to Connect-RPC.
syntax = "proto3";
package druz9.v1;

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// Section mirrors shared/enums.Section and the OpenAPI Section enum.
enum Section {
  SECTION_UNSPECIFIED = 0;
  SECTION_ALGORITHMS = 1;
  SECTION_SQL = 2;
  SECTION_GO = 3;
  SECTION_SYSTEM_DESIGN = 4;
  SECTION_BEHAVIORAL = 5;
}

// Difficulty mirrors shared/enums.Difficulty.
enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  DIFFICULTY_EASY = 1;
  DIFFICULTY_MEDIUM = 2;
  DIFFICULTY_HARD = 3;
}

// Language mirrors shared/enums.Language (editor / task runner language).
enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  LANGUAGE_GO = 1;
  LANGUAGE_PYTHON = 2;
  LANGUAGE_JAVASCRIPT = 3;
  LANGUAGE_TYPESCRIPT = 4;
  LANGUAGE_SQL = 5;
}

// NotificationChannel mirrors shared/enums.NotificationChannel.
enum NotificationChannel {
  NOTIFICATION_CHANNEL_UNSPECIFIED = 0;
  NOTIFICATION_CHANNEL_TELEGRAM = 1;
  NOTIFICATION_CHANNEL_EMAIL = 2;
  NOTIFICATION_CHANNEL_PUSH = 3;
}

// UserRole mirrors shared/enums.UserRole.
enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_USER = 1;
  USER_ROLE_INTERVIEWER = 2;
  USER_ROLE_ADMIN = 3;
}

// AuthProvider mirrors shared/enums.AuthProvider.
enum AuthProvider {
  AUTH_PROVIDER_UNSPECIFIED = 0;
  AUTH_PROVIDER_YANDEX = 1;
  AUTH_PROVIDER_TELEGRAM = 2;
}

// CharClass mirrors shared/enums.CharClass (derived class from section %).
enum CharClass {
  CHAR_CLASS_UNSPECIFIED = 0;
  CHAR_CLASS_NOVICE = 1;
  CHAR_CLASS_ALGORITHMIST = 2;
  CHAR_CLASS_DBA = 3;
  CHAR_CLASS_BACKEND_DEV = 4;
  CHAR_CLASS_ARCHITECT = 5;
  CHAR_CLASS_COMMUNICATOR = 6;
  CHAR_CLASS_ASCENDANT = 7;
}

// SubscriptionPlan mirrors shared/enums.SubscriptionPlan.
enum SubscriptionPlan {
  SUBSCRIPTION_PLAN_UNSPECIFIED = 0;
  SUBSCRIPTION_PLAN_FREE = 1;
  SUBSCRIPTION_PLAN_SEEKER = 2;
  SUBSCRIPTION_PLAN_ASCENDANT = 3;
}

// MatchStatus mirrors shared/enums.MatchStatus (arena match lifecycle).
enum MatchStatus {
  MATCH_STATUS_UNSPECIFIED = 0;
  MATCH_STATUS_SEARCHING = 1;
  MATCH_STATUS_CONFIRMING = 2;
  MATCH_STATUS_ACTIVE = 3;
  MATCH_STATUS_FINISHED = 4;
  MATCH_STATUS_CANCELLED = 5;
}

// ArenaMode mirrors shared/enums.ArenaMode.
enum ArenaMode {
  ARENA_MODE_UNSPECIFIED = 0;
  ARENA_MODE_SOLO_1V1 = 1;
  ARENA_MODE_DUO_2V2 = 2;
  ARENA_MODE_RANKED = 3;
  ARENA_MODE_HARDCORE = 4;
  ARENA_MODE_CURSED = 5;
}

// MockStatus mirrors shared/enums.MockStatus (ai_mock session lifecycle).
enum MockStatus {
  MOCK_STATUS_UNSPECIFIED = 0;
  MOCK_STATUS_CREATED = 1;
  MOCK_STATUS_IN_PROGRESS = 2;
  MOCK_STATUS_FINISHED = 3;
  MOCK_STATUS_ABANDONED = 4;
}

