enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_SYSTEM = 1;
  MESSAGE_ROLE_USER = 2;
  MESSAGE_ROLE_ASSISTANT = 3;
}

// LLMModel mirrors shared/enums.LLMModel. The string form used on the wire
// matches the OpenRouter/OpenAI identifiers (`openai/gpt-4o`, etc.) for
// backwards compatibility with existing REST clients.
enum LLMModel {
  LLM_MODEL_UNSPECIFIED = 0;
  LLM_MODEL_GPT_4O_MINI = 1;
  LLM_MODEL_GPT_4O = 2;
  LLM_MODEL_CLAUDE_SONNET_4 = 3;
  LLM_MODEL_GEMINI_PRO = 4;
  LLM_MODEL_MISTRAL_7B = 5;
}

// ProvenanceKind mirrors shared/enums.ProvenanceKind (ai_native code origin).
enum ProvenanceKind {
  PROVENANCE_KIND_UNSPECIFIED = 0;
  PROVENANCE_KIND_AI_GENERATED = 1;
  PROVENANCE_KIND_HUMAN_WRITTEN = 2;
  PROVENANCE_KIND_AI_REVISED_BY_HUMAN = 3;
  PROVENANCE_KIND_AI_REJECTED = 4;
