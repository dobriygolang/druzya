// arena.proto — Connect-RPC contract for the `arena` bounded context.
//
// Covers the five /arena/match/* REST endpoints. The /ws/arena/{matchId}
// WebSocket is NOT modelled here — it stays as a raw chi route wired to
// arenaHub.WSHandler in main.go (streaming match events is out of scope
// for Connect transcoding).
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// ArenaTaskPublic mirrors OpenAPI TaskPublic. It's also used by AI mock / native
// so the name is prefixed to avoid collisions across per-domain generators. The
// fields mirror the OpenAPI schema — starter_code is a map<string,string> (key
// = language, value = template).
message ArenaTaskPublic {
  string id = 1;
  string slug = 2;
  string title = 3;
  string description = 4;
  Difficulty difficulty = 5;
  Section section = 6;
  int32 time_limit_sec = 7;
  int32 memory_limit_mb = 8;
  map<string, string> starter_code = 9;
}

// XPBreakdownItem — одна строка разбивки XP за матч (label + delta).
// Используется на /match/:id/end в карточке «+ N XP».
message XPBreakdownItem {
  string label = 1;
  int32 amount = 2;
}

// ArenaParticipant mirrors OpenAPI ArenaParticipant.
message ArenaParticipant {
  string user_id = 1;
  string username = 2;
  int32 team = 3;
  int32 elo_before = 4;
  // elo_after / solve_time_ms / suspicion_score are optional in OpenAPI; the
  // server emits zero values when missing. Typed Connect clients that need
  // tri-state can detect presence on the parent message.
  int32 elo_after = 5;
  int64 solve_time_ms = 6;
  float suspicion_score = 7;
  // final_xp — суммарный XP, начисленный участнику за этот матч (заполняется
  // после finished_at). 0, пока матч не завершён.
  int32 final_xp = 8;
  // xp_breakdown — детализация final_xp по причинам начисления. Пуст, если
  // участник проиграл или матч ещё не завершён.
  repeated XPBreakdownItem xp_breakdown = 9;
  // tier_label — текстовый тариф ELO (например, "Diamond III"). Считается на
  // бэке, чтобы фронт не дублировал маппинг рейтинг→тиры.
  string tier_label = 10;
  // next_tier_label — следующая ступень + сколько LP осталось ("Diamond II ·
  // 482 LP"). Пусто на максимальном тире.
  string next_tier_label = 11;
}

// ArenaMatch mirrors OpenAPI ArenaMatch.
//
// 2v2 NOTE (Phase 5): for duo matches, winner_user_id is left empty and the
// frontend infers the winning team by reading the per-participant
// submitted_at + team. The next proto bump will add a dedicated
// winning_team_id field; we postpone the proto edit to keep the wire format
// stable for in-flight clients during the rollout.
message ArenaMatch {
  string id = 1;
  MatchStatus status = 2;
  // mode is a string in OpenAPI, kept as ArenaMode enum internally.
  ArenaMode mode = 3;
  Section section = 4;
  ArenaTaskPublic task = 5;
  repeated ArenaParticipant participants = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp finished_at = 8;
  string winner_user_id = 9;
}

// FindMatchRequest mirrors OpenAPI FindMatchRequest.
message FindMatchRequest {
  Section section = 1;
  ArenaMode mode = 2;
  Language language = 3;
}

// MatchQueueResponse mirrors OpenAPI MatchQueueResponse. The original OpenAPI
// enum is {queued, matched} — kept as a string to match the wire literal.
message MatchQueueResponse {
  string status = 1; // "queued" | "matched"
  int32 queue_position = 2;
  int32 estimated_wait_sec = 3;
  string match_id = 4;
}

// SubmitCodeRequest mirrors OpenAPI SubmitCodeRequest.
message SubmitCodeRequest {
  string match_id = 1; // path param
  string code = 2;
  Language language = 3;
}

// SubmitResult mirrors OpenAPI SubmitResult.
message SubmitResult {
  bool passed = 1;
  int32 tests_total = 2;
  int32 tests_passed = 3;
  int32 runtime_ms = 4;
  int32 memory_kb = 5;
}

// Empty request shapes for the path-only endpoints.
message CancelMatchRequest {}
message GetMatchRequest {
  string match_id = 1;
}
message ConfirmMatchRequest {
  string match_id = 1;
}

// MatchResult — терминальное состояние матча с точки зрения юзера.
// Wire-закрытый набор; раньше был свободным string'ом — это позволяло
// тихие typo'ы в backend mapper'е (e.g. "won" вместо "win" → frontend
// рендерит ничего). Wire JSON эмитит NAME (MATCH_RESULT_WIN) — frontend
// должен сравнивать через enum или helper.
enum MatchResult {
  MATCH_RESULT_UNSPECIFIED = 0;
  MATCH_RESULT_WIN = 1;
  MATCH_RESULT_LOSS = 2;
  MATCH_RESULT_DRAW = 3;
  MATCH_RESULT_ABANDONED = 4;
}

// MatchHistoryEntry — одна строка истории матчей пользователя
// (используется в GetMyMatches, заменяет хардкод в /match-history).
message MatchHistoryEntry {
  string match_id = 1;
  google.protobuf.Timestamp finished_at = 2;
  ArenaMode mode = 3;
  Section section = 4;
  string opponent_username = 5;
  string opponent_avatar_url = 6;
  MatchResult result = 7;
  int32 lp_change = 8;
  int32 duration_seconds = 9;
}

message GetMyMatchesRequest {
  // limit: 1..100, default 20.
  int32 limit = 1;
  int32 offset = 2;
  // Optional фильтры (UNSPECIFIED = no-filter).
  ArenaMode mode = 3;
  Section section = 4;
}

message GetMyMatchesResponse {
  repeated MatchHistoryEntry items = 1;
  int32 total = 2;
}

service ArenaService {
  // FindMatch enqueues the caller in the matchmaking queue.
  rpc FindMatch(FindMatchRequest) returns (MatchQueueResponse) {
    option (google.api.http) = {
      post: "/api/v1/arena/match/find"
      body: "*"
    };
  }

  // CancelSearch removes the caller from the matchmaking queue.
  rpc CancelSearch(CancelMatchRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/arena/match/cancel"};
  }

  // GetMatch returns the current state of a match.
  rpc GetMatch(GetMatchRequest) returns (ArenaMatch) {
    option (google.api.http) = {get: "/api/v1/arena/match/{match_id}"};
  }

  // ConfirmReady acknowledges the 10s ready-check window. Returns the
  // updated match state so the client can react to in_progress/abandoned
  // without a follow-up GetMatch round-trip.
  rpc ConfirmReady(ConfirmMatchRequest) returns (ArenaMatch) {
    option (google.api.http) = {
      post: "/api/v1/arena/match/{match_id}/confirm"
      body: "*"
    };
  }

  // SubmitCode runs the submission against Judge0 and returns the result.
  rpc SubmitCode(SubmitCodeRequest) returns (SubmitResult) {
    option (google.api.http) = {
      post: "/api/v1/arena/match/{match_id}/submit"
      body: "*"
    };
  }

  // GetMyMatches возвращает историю матчей текущего пользователя
  // (страница /match-history). Раньше был chi-route, теперь Connect-RPC.
  rpc GetMyMatches(GetMyMatchesRequest) returns (GetMyMatchesResponse) {
    option (google.api.http) = {get: "/api/v1/arena/matches/my"};
  }

  // GetCurrentMatch — polled by /arena to detect when matchmaker pairs the
  // user. Returns NotFound while in queue, 200 once a match exists.
  rpc GetCurrentMatch(GetCurrentMatchRequest) returns (CurrentMatch) {
    option (google.api.http) = {get: "/api/v1/arena/match/current"};
  }

  // GetArenaQueueStats returns live per-(mode, section) waiting counts plus a
  // per-mode aggregate. 10s cache header is layered above the transcoder.
  rpc GetArenaQueueStats(GetArenaQueueStatsRequest) returns (ArenaQueueStats) {
    option (google.api.http) = {get: "/api/v1/arena/queue-stats"};
  }
}

message GetCurrentMatchRequest {}

message CurrentMatch {
  string match_id = 1;
  string status = 2;
  string mode = 3;
  string section = 4;
}

message GetArenaQueueStatsRequest {}

message QueueStatRow {
  string mode = 1;
  string section = 2;
  int32 waiting = 3;
}

message ArenaQueueStats {
  repeated QueueStatRow items = 1;
  map<string, int32> by_mode = 2;
  int64 generated_at = 3;
}
