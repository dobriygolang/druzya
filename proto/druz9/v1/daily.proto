// daily.proto — Connect-RPC contract for the `daily` bounded context.
//
// Covers the kata + streak endpoints. The calendar history entry uses a bool
// for each day — OpenAPI allows null to mean "freeze used"; proto3 uses a
// separate `history_entry` message that carries the `freeze_used` flag to
// recover the tri-state.
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// TaskPublic mirrors OpenAPI TaskPublic. solution_hint is intentionally absent.
message TaskPublic {
  string id = 1;
  string slug = 2;
  string title = 3;
  string description = 4;
  Difficulty difficulty = 5;
  Section section = 6;
  int32 time_limit_sec = 7;
  int32 memory_limit_mb = 8;
  map<string, string> starter_code = 9;
}

// DailyKata mirrors OpenAPI DailyKata.
message DailyKata {
  // date is an ISO-8601 calendar date (YYYY-MM-DD).
  string date = 1;
  TaskPublic task = 2;
  bool is_cursed = 3;
  bool is_weekly_boss = 4;
  bool already_submitted = 5;
}

// StreakHistoryEntry tri-states a single day in the 30-day window:
//   passed = true  → solved that day
//   passed = false → missed that day
//   freeze_used    → a freeze token covered the miss (null in the REST JSON)
// This shape is richer than the OpenAPI `bool|null` array because proto3
// cannot express "null" directly; the REST transcoder flattens it back into
// the original tri-state at the wire.
message StreakHistoryEntry {
  bool passed = 1;
  bool freeze_used = 2;
}

// StreakInfo mirrors OpenAPI StreakInfo.
message StreakInfo {
  int32 current = 1;
  int32 longest = 2;
  int32 freeze_tokens = 3;
  repeated StreakHistoryEntry history = 4;
}

// KataResult mirrors OpenAPI KataResult.
message KataResult {
  bool passed = 1;
  int32 tests_passed = 2;
  int32 tests_total = 3;
  int32 xp_earned = 4;
  StreakInfo streak = 5;
}

message GetDailyKataRequest {}

// GetKataBySlugRequest — deep-link GET /api/v1/daily/kata/:slug. Unknown slug
// returns NotFound (HTTP 404); handler must NOT silently fall back to today's
// kata (anti-fallback policy: a 404 is honest, a redirect is a lie).
message GetKataBySlugRequest {
  string slug = 1;
}

// GetKataBySlugResponse mirrors DailyKata but without the `already_submitted`
// flag — slug deep-links are for browsing and don't carry per-user submission
// state.
message GetKataBySlugResponse {
  TaskPublic task = 1;
}

message SubmitKataRequest {
  string code = 1;
  Language language = 2;
}
message GetStreakRequest {}

service DailyService {
  // GetKata returns today's kata.
  rpc GetKata(GetDailyKataRequest) returns (DailyKata) {
    option (google.api.http) = {get: "/api/v1/daily/kata"};
  }

  // GetKataBySlug returns a kata by its public slug. 404 on unknown slug —
  // the UI uses this for deep-links like /daily/kata/two-sum.
  rpc GetKataBySlug(GetKataBySlugRequest) returns (GetKataBySlugResponse) {
    option (google.api.http) = {get: "/api/v1/daily/kata/{slug}"};
  }

  // SubmitKata grades and returns the result + streak update.
  rpc SubmitKata(SubmitKataRequest) returns (KataResult) {
    option (google.api.http) = {
      post: "/api/v1/daily/kata/submit"
      body: "*"
    };
  }

  // GetStreak returns the current streak + 30-day history.
  rpc GetStreak(GetStreakRequest) returns (StreakInfo) {
    option (google.api.http) = {get: "/api/v1/daily/streak"};
  }
}
