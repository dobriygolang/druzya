  google.protobuf.Timestamp created_at  = 7;
  google.protobuf.Timestamp updated_at  = 8;
}

message AddListeningMaterialRequest {
  string title         = 1;
  string audio_url     = 2;
  string transcript_md = 3;
}

message ListListeningMaterialsRequest {
