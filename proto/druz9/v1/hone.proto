// ─── TaskBoard messages ─────────────────────────────────────────────────────

// TaskStatus — kanban-колонка карточки.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_TODO = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_IN_REVIEW = 3;
  TASK_STATUS_DONE = 4;
  TASK_STATUS_DISMISSED = 5;
}

// TaskKind — тип задачи; маршрутизирует deep_link / иконку на FE.
enum TaskKind {
  TASK_KIND_UNSPECIFIED = 0;
  TASK_KIND_ALGO = 1;
  TASK_KIND_SYSDESIGN = 2;
  TASK_KIND_QUIZ = 3;
  TASK_KIND_REFLECTION = 4;
  TASK_KIND_READING = 5;
  TASK_KIND_CUSTOM = 6;
}

// TaskSource — кто создал задачу. AI задаётся coach_generator'ом, USER —
// явная manual create через UI.
enum TaskSource {
  TASK_SOURCE_UNSPECIFIED = 0;
  TASK_SOURCE_AI = 1;
  TASK_SOURCE_USER = 2;
}

// TaskCommentAuthor — кто оставил комментарий (AI или сам юзер).
enum TaskCommentAuthor {
  TASK_COMMENT_AUTHOR_UNSPECIFIED = 0;
  TASK_COMMENT_AUTHOR_AI = 1;
  TASK_COMMENT_AUTHOR_USER = 2;
}

// Task — one Notion-style kanban card.
message Task {
  string id = 1;
  TaskStatus status = 2;
  TaskKind kind = 3;
  TaskSource source = 4;
  string title = 5;
  string brief_md = 6;
  string skill_key = 7;
  string deep_link = 8;
  repeated string recommended_reading = 9;
  int32 priority = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp completed_at = 13;
}

message TaskComment {
  string id = 1;
  TaskCommentAuthor author_kind = 2;
  string body_md = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ListTasksRequest {}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  TaskKind kind = 1;
  string title = 2;
  string brief_md = 3;
  string skill_key = 4;
  string deep_link = 5;
}

message MoveTaskStatusRequest {
  string id = 1;
  TaskStatus status = 2;
}

message DeleteTaskRequest {
  string id = 1;
}

message DeleteTaskResponse {
  bool ok = 1;
}

message ListTaskCommentsRequest {
  string id = 1;
}

message ListTaskCommentsResponse {
  repeated TaskComment comments = 1;
}

message AddTaskCommentRequest {
  string id = 1;
  string body_md = 2;
}

// ─── Cue Sessions ──────────────────────────────────────────────────────────

// CueSession — одна импортированная встреча из Cue desktop'а.
message CueSession {
  string id = 1;
  string file_path = 2;             // абсолютный путь файла в Cue
  string title = 3;
  string body_md = 4;               // юзерский слой поверх raw_analysis
  string raw_analysis_json = 5;     // оригинальный JSON-экспорт от Cue
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp imported_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ImportCueSessionRequest {
  string file_path = 1;
  string title = 2;
  // raw_analysis_json — JSON-сериализованный CueSessionAnalysis объект.
  // Backend не парсит его сам, просто хранит как есть.
  string raw_analysis_json = 3;
  string body_md = 4;               // первичный markdown render для seed
  google.protobuf.Timestamp started_at = 5;
}

message ListCueSessionsRequest {}

message ListCueSessionsResponse {
  repeated CueSession sessions = 1;
}

message GetCueSessionRequest {
  string id = 1;
}

message UpdateCueSessionRequest {
  string id = 1;
  string body_md = 2;
}

message DeleteCueSessionRequest {
  string id = 1;
}

message DeleteCueSessionResponse {}

message SendCueSessionToTelegramRequest {
  string id = 1;
}

message SendCueSessionToTelegramResponse {
  // Информативный flag — если у юзера не linked TG, бэкенд возвращает ok=false
  // и UI показывает «Link TG to receive».
  bool ok = 1;
  string message = 2;               // human-readable status
}

// ─── Standup ───────────────────────────────────────────────────────────────

// Три вопроса классического dev standup'а. Бекенд:
//   1. Создаёт заметку с заголовком «Standup YYYY-MM-DD» и body в формате
//      «## Yesterday / ## Today / ## Blockers».
//   2. Если «today» непустой, добавляет свежий PlanItem kind=custom с
//      title=«today»[:60] в сегодняшний Plan (не перегенеряя AI-план).
//   3. Возвращает созданную заметку + обновлённый Plan для мгновенного
//      рендера.
message RecordStandupRequest {
  string yesterday = 1;
  string today = 2;
  string blockers = 3;
}

message RecordStandupResponse {
  Note note = 1;
  Plan plan = 2;                    // обновлённый сегодняшний план
}

// GetTodayStandup — снапшот для морнинг-баннера в Today page.
//   - recorded: уже сохранён ли standup на сегодня (frontend скрывает баннер).
//   - yesterday_done: title'ы DONE-items из Focus Queue за вчера —
//     auto-prefill для секции «Yesterday you finished».
message GetTodayStandupRequest {}

message GetTodayStandupResponse {
  bool recorded = 1;
  repeated string yesterday_done = 2;
}

// ─── Reading-модуль messages (Wave 4 of docs/feature/english.md) ────────────
//
// Three top-level entities: ReadingMaterial / ReadingSession /
// VocabEntry — mirror domain.* in services/hone/domain/reading.go.
// source_kind is a string (proto3 doesn't help us with a tiny
// closed-set; the backend validates via domain.ReadingSourceKind).

message ReadingMaterial {
  string id           = 1;
  string user_id      = 2;
  string source_kind  = 3; // "paste" | "url" | "pdf" | "epub"
  string source_url   = 4; // empty for paste
  string title        = 5;
  string body_md      = 6; // omitted from list responses to save bandwidth
  int32  total_chars  = 7;
  google.protobuf.Timestamp archived_at = 8; // zero when active
  google.protobuf.Timestamp created_at  = 9;
  google.protobuf.Timestamp updated_at  = 10;
}

message ReadingSession {
  string id          = 1;
  string user_id     = 2;
  string material_id = 3;
  int32  chars_read  = 4;
  int32  chars_total = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp ended_at   = 7; // zero when active
  // ai_summary_score is optional (NULL until AI summary check fires);
  // wire as 0 with a separate has_score flag rather than a wrapper —
  // proto3 wrapper types add codegen weight for one nullable int.
  int32  ai_summary_score = 8;
  bool   has_score        = 9;
  string summary_md       = 10;
}

message VocabEntry {
  string user_id          = 1;
  string word             = 2;
  string translation      = 3;
  string context_md       = 4;
  string source_material  = 5; // empty when not linked to a material
  int32  box              = 6; // 0..5; 5 = graduated
  google.protobuf.Timestamp next_review_at = 7;
  int32  reviewed_count   = 8;
  google.protobuf.Timestamp learned_at = 9; // zero when not graduated
  google.protobuf.Timestamp created_at = 10;
}

message AddReadingMaterialRequest {
  string source_kind = 1;
  string source_url  = 2;
  string title       = 3;
  string body_md     = 4;
}

message ListReadingMaterialsRequest {
  int32 limit = 1; // 0 → server default (50)
}

message ListReadingMaterialsResponse {
  // body_md omitted from list items by the handler — clients fetch it
  // via GetReadingMaterial when they actually open a material.
  repeated ReadingMaterial items = 1;
}

message GetReadingMaterialRequest {
  string id = 1;
}

message ArchiveReadingMaterialRequest {
  string id = 1;
}
message ArchiveReadingMaterialResponse {}

message StartReadingSessionRequest {
  string material_id = 1;
}

message EndReadingSessionRequest {
  string session_id = 1;
  int32  chars_read = 2;
  string summary_md = 3;
}
// Returns the closed session — including ai_summary_score / has_score if
// the LLM grader was available and finished within the request budget.
// If the grader is offline or times out, has_score is false and the score
// can still arrive later via a background re-grading task (Wave 4.3+).
message EndReadingSessionResponse {
  ReadingSession session = 1;
}

message AddVocabRequest {
  string word            = 1;
  string translation     = 2;
  string context_md      = 3;
  string source_material = 4; // optional
}

message ReviewVocabRequest {
  string word    = 1;
  bool   correct = 2;
}

message ListVocabDueRequest {
  int32 limit = 1; // 0 → server default (20)
}

message ListVocabDueResponse {
  repeated VocabEntry items = 1;
}

message ListVocabBySourceMaterialRequest {
  string material_id = 1;
  int32  limit       = 2; // 0 → server default (50)
}

// ─── Listening-модуль messages (Wave 6.1) ─────────────────────────

message ListeningMaterial {
  string id            = 1;
  string user_id       = 2;
  string title         = 3;
  string audio_url     = 4;
  // omitted from list responses to save bandwidth (transcripts can
  // run 50KB+); clients call GetListeningMaterial when they open the
