// ─── TaskBoard messages ─────────────────────────────────────────────────────

// TaskStatus — kanban-колонка карточки.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_TODO = 1;
  TASK_STATUS_IN_PROGRESS = 2;
  TASK_STATUS_IN_REVIEW = 3;
  TASK_STATUS_DONE = 4;
  TASK_STATUS_DISMISSED = 5;
}

// TaskKind — тип задачи; маршрутизирует deep_link / иконку на FE.
//
// Phase K M7 (2026-05-13): TASK_KIND_ML добавлен для ML/MLE work items
// (model design / training pipeline / MLOps / paper read с implementation /
// fine-tuning LoRA / RAG). Auto-categoriser routes по keywords
// (см. backend/services/hone/app/categorise_task.go); coach listener
// settles через mock_interview.MockPipelineFinished с ML section.
enum TaskKind {
  TASK_KIND_UNSPECIFIED = 0;
  TASK_KIND_ALGO = 1;
  TASK_KIND_SYSDESIGN = 2;
  TASK_KIND_QUIZ = 3;
  TASK_KIND_REFLECTION = 4;
  TASK_KIND_READING = 5;
  TASK_KIND_CUSTOM = 6;
  TASK_KIND_ML = 7;
}

// TaskSource — кто создал задачу. AI задаётся coach_generator'ом, USER —
// явная manual create через UI.
enum TaskSource {
  TASK_SOURCE_UNSPECIFIED = 0;
  TASK_SOURCE_AI = 1;
  TASK_SOURCE_USER = 2;
}

// TaskCommentAuthor — кто оставил комментарий (AI или сам юзер).
enum TaskCommentAuthor {
  TASK_COMMENT_AUTHOR_UNSPECIFIED = 0;
  TASK_COMMENT_AUTHOR_AI = 1;
  TASK_COMMENT_AUTHOR_USER = 2;
}

// Task — one Notion-style kanban card.
message Task {
  string id = 1;
  TaskStatus status = 2;
  TaskKind kind = 3;
  TaskSource source = 4;
  string title = 5;
  string brief_md = 6;
  string skill_key = 7;
  string deep_link = 8;
  repeated string recommended_reading = 9;
  int32 priority = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  // Phase J / H3 (2026-05-12): manual_kind_override marks tasks where
  // the user explicitly chose a kind via the chip picker. Background
  // auto-categorisers (BulkAutoCategorise / coach_listener) skip rows
  // with this flag set. Resets only on explicit user request.
  bool manual_kind_override = 14;
}

// TaskAutoCategoryHint — emitted by the categoriser when it auto-assigns
// a kind. Surfaced by the client as a transient toast «Auto-tagged as
// <Kind>» with a chevron «Why?» that expands the reasoning. Not persisted
// — frontend keeps it in-memory for the toast lifetime (5s).
message TaskAutoCategoryHint {
  string task_id   = 1;
  TaskKind kind    = 2;
  // 1-2 sentence LLM explanation, e.g. «Mentioned 'binary search' + 'O(log n)' → algorithmic question».
  string reasoning = 3;
  // 0..1 — LLM self-confidence; client suppresses toast below ~0.4.
  float confidence = 4;
}

message TaskComment {
  string id = 1;
  TaskCommentAuthor author_kind = 2;
  string body_md = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ListTasksRequest {}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  TaskKind kind = 1;
  string title = 2;
  string brief_md = 3;
  string skill_key = 4;
  string deep_link = 5;
}

// CreateTaskResponse — Phase J / H3 (2026-05-12) wraps Task + optional
// auto-categorise hint when the LLM ran inline и chose a kind different
// from the one in the request. Frontend uses hint.confidence to decide
// whether to surface the toast.
//
// Note: existing client code expects CreateTask to return Task directly.
// We keep CreateTask → Task wire-compatible by mounting CreateTaskV2 on a
// distinct path / RPC (CreateTask kept for backward compat: legacy clients
// still get a Task, no toast). New clients call CreateTask which returns
// Task — and poll ListTasks или subscribe to cursor-bus for the hint
// emitted asynchronously after categoriser finishes.
//
// Simpler design (chosen): keep CreateTask returning Task; categoriser
// fires the hint via the cursor-bus SSE stream («card.categorise» event)
// которое frontend уже subscribe'ит. Это offline-friendly и не блокирует
// CreateTask на LLM-latency (8s timeout currently).

// UpdateTaskKindRequest — manual override path. When user picks a different
// kind via the chip picker, frontend calls this. Backend sets kind and
// flips manual_kind_override = true so background re-categorisers skip
// the row going forward.
message UpdateTaskKindRequest {
  string id = 1;
  TaskKind kind = 2;
  // When true (default for user-driven override), backend persists
  // manual_kind_override=true so auto-categorisers leave the row alone.
  // When false (used internally by re-categoriser path), preserves
  // existing flag value.
  bool manual_override = 3;
}

// BulkAutoCategoriseRequest — kick off auto-categorise for a set of
// user-owned tasks. When task_ids is empty, server picks all eligible
// open tasks (kind=custom OR manual_kind_override=false).
message BulkAutoCategoriseRequest {
  repeated string task_ids = 1;
}

// BulkAutoCategoriseEvent — one streaming progress packet. Frontend
// shows toasts as events arrive and renders «X / N» progress chip.
message BulkAutoCategoriseEvent {
  string task_id  = 1;
  TaskKind kind   = 2;
  string reasoning = 3;
  float confidence = 4;
  // true when this is the terminal packet (server done iterating).
  // Frontend can use to close the «categorising…» chip and stop spinner.
  bool done = 5;
  // total / processed help client surface a «12 of 27 categorised» pill.
  int32 processed = 6;
  int32 total     = 7;
}

message MoveTaskStatusRequest {
  string id = 1;
  TaskStatus status = 2;
}

message DeleteTaskRequest {
  string id = 1;
}

message DeleteTaskResponse {
  bool ok = 1;
}

message ListTaskCommentsRequest {
  string id = 1;
}

message ListTaskCommentsResponse {
  repeated TaskComment comments = 1;
}

message AddTaskCommentRequest {
  string id = 1;
  string body_md = 2;
}

