// ─── Standup ───────────────────────────────────────────────────────────────

// Три вопроса классического dev standup'а. Бекенд:
//   1. Создаёт заметку с заголовком «Standup YYYY-MM-DD» и body в формате
//      «## Yesterday / ## Today / ## Blockers».
//   2. Если «today» непустой, добавляет свежий PlanItem kind=custom с
//      title=«today»[:60] в сегодняшний Plan (не перегенеряя AI-план).
//   3. Возвращает созданную заметку + обновлённый Plan для мгновенного
//      рендера.
message RecordStandupRequest {
  string yesterday = 1;
  string today = 2;
  string blockers = 3;
}

message RecordStandupResponse {
  Note note = 1;
  Plan plan = 2;                    // обновлённый сегодняшний план
}

// GetTodayStandup — снапшот для морнинг-баннера в Today page.
//   - recorded: уже сохранён ли standup на сегодня (frontend скрывает баннер).
//   - yesterday_done: title'ы DONE-items из Focus Queue за вчера —
//     auto-prefill для секции «Yesterday you finished».
message GetTodayStandupRequest {}

message GetTodayStandupResponse {
  bool recorded = 1;
  repeated string yesterday_done = 2;
}

// ─── Reading-модуль messages (Wave 4 of docs/feature/english.md) ────────────
//
// Three top-level entities: ReadingMaterial / ReadingSession /
// VocabEntry — mirror domain.* in services/hone/domain/reading.go.
// source_kind is a string (proto3 doesn't help us with a tiny
// closed-set; the backend validates via domain.ReadingSourceKind).

message ReadingMaterial {
  string id           = 1;
  string user_id      = 2;
  string source_kind  = 3; // "paste" | "url" | "pdf" | "epub" | "book"
  string source_url   = 4; // empty for paste
  string title        = 5;
  string body_md      = 6; // omitted from list responses to save bandwidth
  int32  total_chars  = 7;
  google.protobuf.Timestamp archived_at = 8; // zero when active
  google.protobuf.Timestamp created_at  = 9;
  google.protobuf.Timestamp updated_at  = 10;
  // Book-only progress (Wave 2026-05-03). 0 when not set / not a book.
  // has_book_chapter / has_book_total signal whether the value is meaningful
  // (proto3 zero-int нельзя отличить от «не задано»).
  int32 book_chapter        = 11;
  bool  has_book_chapter    = 12;
  int32 book_total_chapters = 13;
  bool  has_book_total      = 14;
}

message ReadingSession {
  string id          = 1;
  string user_id     = 2;
  string material_id = 3;
  int32  chars_read  = 4;
  int32  chars_total = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp ended_at   = 7; // zero when active
  // ai_summary_score is optional (NULL until AI summary check fires);
  // wire as 0 with a separate has_score flag rather than a wrapper —
  // proto3 wrapper types add codegen weight for one nullable int.
  int32  ai_summary_score = 8;
  bool   has_score        = 9;
  string summary_md       = 10;
}

message VocabEntry {
  string user_id          = 1;
  string word             = 2;
  string translation      = 3;
  string context_md       = 4;
  string source_material  = 5; // empty when not linked to a material
  int32  box              = 6; // 0..5; 5 = graduated
  google.protobuf.Timestamp next_review_at = 7;
  int32  reviewed_count   = 8;
  google.protobuf.Timestamp learned_at = 9; // zero when not graduated
  google.protobuf.Timestamp created_at = 10;
}

message AddReadingMaterialRequest {
  string source_kind = 1;
  string source_url  = 2;
  string title       = 3;
  string body_md     = 4;
  // Book-only fields. 0 + has_*=false means «not set».
  int32 book_chapter        = 5;
  bool  has_book_chapter    = 6;
  int32 book_total_chapters = 7;
  bool  has_book_total      = 8;
}

message UpdateBookProgressRequest {
  string id                 = 1;
  int32  book_chapter       = 2;
  bool   has_book_chapter   = 3;
  int32  book_total_chapters = 4;
  bool   has_book_total     = 5;
}

message ListReadingMaterialsRequest {
  int32 limit = 1; // 0 → server default (50), max 200
  string cursor = 2; // opaque keyset cursor (created_at DESC, id DESC)
}

message ListReadingMaterialsResponse {
  // body_md omitted from list items by the handler — clients fetch it
  // via GetReadingMaterial when they actually open a material.
  repeated ReadingMaterial items = 1;
  string next_cursor = 2; // empty when no more pages
}

message GetReadingMaterialRequest {
  string id = 1;
}

message ArchiveReadingMaterialRequest {
  string id = 1;
}
message ArchiveReadingMaterialResponse {}

message StartReadingSessionRequest {
  string material_id = 1;
}

message EndReadingSessionRequest {
  string session_id = 1;
  int32  chars_read = 2;
  string summary_md = 3;
}
// Returns the closed session — including ai_summary_score / has_score if
// the LLM grader was available and finished within the request budget.
// If the grader is offline or times out, has_score is false and the score
// can still arrive later via a background re-grading task (Wave 4.3+).
message EndReadingSessionResponse {
  ReadingSession session = 1;
}

message AddVocabRequest {
  string word            = 1;
  string translation     = 2;
  string context_md      = 3;
  string source_material = 4; // optional
}

message ReviewVocabRequest {
  string word    = 1;
  bool   correct = 2;
}

message ListVocabDueRequest {
  int32 limit = 1; // 0 → server default (20)
}

message ListVocabDueResponse {
  repeated VocabEntry items = 1;
}

message ListVocabBySourceMaterialRequest {
  string material_id = 1;
  int32  limit       = 2; // 0 → server default (50)
}

// ─── Listening-модуль messages (Wave 6.1) ─────────────────────────

message ListeningMaterial {
  string id            = 1;
  string user_id       = 2;
  string title         = 3;
  string audio_url     = 4;
  // omitted from list responses to save bandwidth (transcripts can
  // run 50KB+); clients call GetListeningMaterial when they open the
  // player to fetch the full text.
  string transcript_md = 5;
  google.protobuf.Timestamp archived_at = 6;
  google.protobuf.Timestamp created_at  = 7;
  google.protobuf.Timestamp updated_at  = 8;
}

message AddListeningMaterialRequest {
  string title         = 1;
  string audio_url     = 2;
  string transcript_md = 3;
}

message IngestYouTubeListeningRequest {
  string url = 1;
  // language_hint — preferred caption language ('en', 'ru'). Если пусто →
  // backend пробует en, потом ru, потом любой available.
  string language_hint = 2;
}

message ListListeningMaterialsRequest {
  int32 limit = 1; // 0 → server default (50), max 200
  string cursor = 2; // opaque keyset cursor (created_at DESC, id DESC)
}

message ListListeningMaterialsResponse {
  repeated ListeningMaterial items = 1;
  string next_cursor = 2; // empty when no more pages
}

message GetListeningMaterialRequest  { string id = 1; }
message ArchiveListeningMaterialRequest  { string id = 1; }
message ArchiveListeningMaterialResponse {}

// ─── Writing-as-Focus messages (Wave 4.4) ───────────────────────────────────
//
// One round-trip: draft text in, structured feedback out. The frontend
// renders issues in a list and (optionally) highlights matching slices
// of the draft via excerpt-as-needle search.

message GradeEnglishWritingRequest {
  // Optional. Lets the grader scope its judgement (off-topic becomes
  // a clarity issue when title is set; otherwise grader stays neutral).
  string title = 1;
  string text  = 2;
}

message WritingIssue {
  // Verbatim slice of the user's text the issue applies to. Frontend
  // can highlight by searching for this in the original; we don't
  // ship char-offsets because they don't survive client-side text
  // editing between request + render.
  string excerpt    = 1;
  // "grammar" | "vocab" | "style" | "clarity". Unknown categories
  // from the LLM are coerced to "style" server-side.
  string category   = 2;
  string suggestion = 3;
  string explanation = 4;
}

message GradeEnglishWritingResponse {
  // 0..100. Mirrors the summary-grader's scale so the UI can reuse
  // the same strong / mid / weak chip.
  int32 overall_score = 1;
  repeated WritingIssue issues = 2;
}

// ─── Code-review-coaching messages (Wave 3.6) ──────────────────────────

message GradeCodeReviewRequest {
  // Optional. Lets the grader scope its judgement on whether the review
  // is on-topic for what the PR claims to do.
  string pr_title  = 1;
  // Unified diff. Plain text (NOT base64). Frontend caps at ~100KB.
  string diff_md   = 2;
  // The user's review write-up.
  string review_md = 3;
}

message CodeReviewIssue {
  // Verbatim slice of the user's review the issue applies to. Empty
  // is allowed only when category == "completeness" (the reviewer
  // didn't write anything for that gap; suggestion holds the comment
  // they SHOULD have written).
  string excerpt     = 1;
  // "correctness" | "completeness" | "clarity" | "tone". Unknown
  // categories from the LLM are coerced to "clarity" server-side.
  string category    = 2;
  string suggestion  = 3;
  string explanation = 4;
}

message GradeCodeReviewResponse {
  int32 overall_score = 1;
  repeated CodeReviewIssue issues = 2;
}

// ─── Speaking messages (H4 / Phase J 2026-05-12) ──────────────────────

// SpeakingExercise — one canned shadowing prompt. Audio (reference TTS)
// deliberately optional in MVP: client can `say` через native TTS or read
// text. `level` ∈ B1/B2/C1; client filters dropdown server-side cheap так
// что keep all in single list response.
message SpeakingExercise {
  string id        = 1; // stable slug, e.g. "algo-1" / "greet-2"
  string level     = 2; // "B1" | "B2" | "C1"
  string topic     = 3; // free-form category label (interview / daily / sysdesign)
  string prompt    = 4; // text the user must shadow (1-2 sentences)
  // audio_url — reference TTS asset. Empty in MVP (TTS deferred); client
  // falls back to read-text + native speechSynthesis.
  string audio_url = 5;
}

message ListSpeakingExercisesRequest {
  // level — optional filter; empty = all levels.
  string level = 1;
}

message ListSpeakingExercisesResponse {
  repeated SpeakingExercise items = 1;
}

// WordDiff — per-token comparison between reference prompt and user
// transcript. status ∈ "match" | "miss" | "extra" | "substitute".
// expected/actual carry the corresponding word; "" for miss/extra slots.
message WordDiff {
  string status   = 1;
  string expected = 2;
  string actual   = 3;
}

message GradeSpeakingRequest {
  // exercise_id picks which prompt the user shadowed. Server fetches the
  // reference text + level from speaking_exercises (LIKE seed_resources
  // pattern — fixed JSON table, no per-user content).
  string exercise_id        = 1;
  // client_session_id — UUIDv4 from Hone; idempotency-key for replay safety.
  string client_session_id  = 2;
  // audio_base64 — raw audio bytes, base64-encoded. webm/opus expected
  // (Hone MediaRecorder default); backend re-uses transcription service.
  // Max 5MB pre-base64 (~6.7MB encoded) → enforced server-side; longer
  // shadowing clips don't make sense.
  string audio_base64       = 3;
  // mime_type — passed verbatim to Whisper provider for format detection.
  // Defaults to "audio/webm" when empty.
  string mime_type          = 4;
  // duration_ms — measured client-side; used for fluency timing variance
  // (target = len(prompt_words) * 380ms). 0 = unknown → server estimates.
  int32  duration_ms        = 5;
}

message GradeSpeakingResponse {
  string id                  = 1; // server-assigned speaking_sessions.id (UUID)
  string user_transcript     = 2;
  int32  pronunciation_score = 3; // 0..100
  int32  fluency_score       = 4; // 0..100
  string coach_feedback      = 5; // ≤140 chars one-liner
  repeated WordDiff word_diffs = 6;
  google.protobuf.Timestamp created_at = 7;
}

// SpeakingSession — one history row.
message SpeakingSession {
  string id                  = 1;
  string exercise_id         = 2;
  string prompt              = 3;
  string user_transcript     = 4;
  int32  pronunciation_score = 5;
  int32  fluency_score       = 6;
  string coach_feedback      = 7;
  google.protobuf.Timestamp created_at = 8;
}

message ListSpeakingHistoryRequest {
  int32 limit = 1; // 0 → server default (14), max 100
}

message ListSpeakingHistoryResponse {
  repeated SpeakingSession items = 1;
}
