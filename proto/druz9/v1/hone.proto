// hone.proto — Connect-RPC contract for the `hone` bounded context.
//
// Hone is the desktop focus cockpit (Electron, macOS-first) in the druz9
// ecosystem. Backend responsibility is narrow:
//
//   - Daily Plan  — AI-synthesised list of what the user should hone today,
//                   seeded from Skill Atlas gaps + calendar + recent GitHub.
//   - Focus       — pomodoro session lifecycle + streak/stat aggregation.
//   - Notes       — private markdown store with AI-generated connections
//                   (embeddings via bge-small, cosine over note corpus +
//                   cross-domain artefacts like PRs / tasks / sessions).
//   - Whiteboard  — persisted tldraw state + on-demand AI critique
//                   (reuses TaskSysDesignCritique from llmchain).
//
// What hone is NOT: task authoring, arena, mock interviews, rating. Those
// live on druz9.ru and are deep-linked from the client via druz9://… URIs.
// See ../../../hone-bible.md + ../../../ecosystem.md for the hard boundary.
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// ─── Daily Plan ────────────────────────────────────────────────────────────

// PlanItemKind classifies a row in the AI-generated plan. The client renders
// each kind differently (icon, deep-link shape). Kept as a string for wire
// simplicity — the set is small and stable.
//
//   solve    — open a task on druz9.ru (carries target_ref like "dsa/p-102")
//   mock     — scheduled mock interview (target_ref is a slot_id)
//   review   — review PR / feedback waiting (target_ref is a URL)
//   read     — reading / book continuation (target_ref optional)
//   custom   — free-form item user added manually

// PlanItem is one row in a day's plan.
message PlanItem {
  string id = 1;
  string kind = 2;                   // solve | mock | review | read | custom
  string title = 3;
  string subtitle = 4;               // one-liner reason ("Targets your weak spot — BFS on trees")
  string target_ref = 5;             // deep-link payload (task slug, slot id, URL)
  string deep_link = 6;              // fully-formed druz9:// or https:// link
  int32 estimated_min = 7;
  bool dismissed = 8;
  bool completed = 9;
  // Мотивирующий контекст — почему этот пункт полезен ИМЕННО этому юзеру
  // («это закрывает твой gap в System Design: progress=28»). Строится
  // синтезайзером из Skill Atlas. Пустой = отображается только subtitle.
  string rationale = 10;
  // Ключ скилла, с которым item связан (NodeKey из WeakNode). Используется
  // resistance-tracker'ом чтобы считать, сколько раз юзер dismiss'ил задачи
  // одного и того же скилла подряд.
  string skill_key = 11;
}

// Plan is one day's plan for one user.
message Plan {
  string id = 1;
  string date = 2;                   // ISO-8601 YYYY-MM-DD
  google.protobuf.Timestamp regenerated_at = 3;
  repeated PlanItem items = 4;
}

message GenerateDailyPlanRequest {
  // If true, replace today's plan even if one exists. Default false: return
  // the cached one to keep the UI stable across app restarts.
  bool force = 1;
}

message GetDailyPlanRequest {}

message DismissPlanItemRequest {
  string item_id = 1;
}

message CompletePlanItemRequest {
  string item_id = 1;
}

// ─── Focus Sessions ────────────────────────────────────────────────────────

// FocusSession is one pomodoro-run or stopwatch-run, logged for stats.
message FocusSession {
  string id = 1;
  string plan_item_id = 2;           // optional — links back to Today's plan
  string pinned_title = 3;           // free-form when plan_item_id is empty
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp ended_at = 5;
  int32 pomodoros_completed = 6;
  int32 seconds_focused = 7;
  // mode is "pomodoro" | "stopwatch". String preserves wire compat.
  string mode = 8;
}

message StartFocusSessionRequest {
  string plan_item_id = 1;           // optional
  string pinned_title = 2;
  string mode = 3;                   // pomodoro | stopwatch
}

message EndFocusSessionRequest {
  string session_id = 1;
  int32 pomodoros_completed = 2;
  int32 seconds_focused = 3;
  // Необязательный «reflection» — одна строка «что сделал за эту сессию».
  // Если непустой, бекенд создаёт отдельную заметку с title = pinned/plan
  // item, body_md = reflection, и прикрепляет session id + дату. Stats
  // агрегирует эти заметки в «хронологию прогресса».
  string reflection = 4;
}

message GetStatsRequest {
  // ISO-8601 date, defaults to today when empty. Used for anchoring the
  // heatmap / 7-day bars in the client.
  string up_to_date = 1;
}

message FocusHeatmapDay {
  string date = 1;                   // YYYY-MM-DD
  int32 seconds = 2;
  int32 sessions = 3;
}

message Stats {
  int32 current_streak_days = 1;
  int32 longest_streak_days = 2;
  int32 total_focused_seconds = 3;
  // Last 26 weeks (7×26 = 182 days) for the Winter-style heatmap.
  repeated FocusHeatmapDay heatmap = 4;
  // Last 7 days for the bar-chart on stats page.
  repeated FocusHeatmapDay last_seven_days = 5;
  // Focus Queue rollup — today counter + 7d AI/user share.
  QueueStats queue = 6;
}

// ─── Focus Queue ───────────────────────────────────────────────────────────

message QueueItem {
  string id = 1;
  string title = 2;
  // 'ai' | 'user'.
  string source = 3;
  // 'todo' | 'in_progress' | 'done'.
  string status = 4;
  // Skill key копируется из PlanItem для AI items, пустой для user items.
  string skill_key = 5;
  // YYYY-MM-DD.
  string date = 6;
}

message QueueStats {
  int32 today_total = 1;
  int32 today_done = 2;
  // 7d done items распределение по source (0..1, сумма == 1 если есть данные).
  float ai_share = 3;
  float user_share = 4;
}

message ListQueueRequest {
  // ISO-8601 date, пустой = today.
  string date = 1;
}

message ListQueueResponse {
  repeated QueueItem items = 1;
}

message AddQueueItemRequest {
  string title = 1;
}

message UpdateQueueItemStatusRequest {
  string id = 1;
  string status = 2;
}

message DeleteQueueItemRequest {
  string id = 1;
}

message DeleteQueueItemResponse {}

// ─── Notes ─────────────────────────────────────────────────────────────────

// Folder is a named container for notes. Supports nesting via optional
// parent_id — client renders as a tree; server stores flat with parent_id FK.
message Folder {
  string id = 1;
  string name = 2;
  optional string parent_id = 3;     // nil = root folder
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message Note {
  string id = 1;
  string title = 2;
  string body_md = 3;                // raw markdown — rendered client-side
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  int32 size_bytes = 6;
  optional string folder_id = 7;     // nil = unfiled (root)
}

message NoteSummary {
  // Lightweight row for the left-hand list (no body, no embedding).
  string id = 1;
  string title = 2;
  google.protobuf.Timestamp updated_at = 3;
  int32 size_bytes = 4;
  optional string folder_id = 5;
}

message CreateNoteRequest {
  string title = 1;
  string body_md = 2;
  optional string folder_id = 3;
}

message UpdateNoteRequest {
  string id = 1;
  string title = 2;
  string body_md = 3;
}

message GetNoteRequest {
  string id = 1;
}

message ListNotesRequest {
  int32 limit = 1;                   // default 100
  string cursor = 2;                 // opaque pagination token
  optional string folder_id = 3;     // filter by folder; nil = all notes
}

message ListNotesResponse {
  repeated NoteSummary notes = 1;
  string next_cursor = 2;
}

message DeleteNoteRequest {
  string id = 1;
}

message DeleteNoteResponse {}

message MoveNoteRequest {
  string note_id = 1;
  optional string folder_id = 2;     // nil = move to root (unfiled)
}

// ─── Folders ────────────────────────────────────────────────────────────────

message CreateFolderRequest {
  string name = 1;
  optional string parent_id = 2;
}

message ListFoldersRequest {}

message ListFoldersResponse {
  repeated Folder folders = 1;
}

message DeleteFolderRequest {
  string id = 1;
  // When true, move all notes in this folder to root before deleting.
  // When false (default), fail if folder contains notes.
  bool move_notes_to_root = 2;
}

message DeleteFolderResponse {}

// Connection is one AI-discovered edge from a note to another artefact.
//
//   kind = "note"      → target is another Note.id
//   kind = "pr"        → target is a GitHub PR URL / druz9 backend ref
//   kind = "task"      → target is a solved/attempted task slug
//   kind = "session"   → target is a FocusSession.id or ai_mock session id
//   kind = "book"      → free-form reading pointer
message Connection {
  string kind = 1;
  string target_id = 2;              // opaque id within the kind's namespace
  string display_title = 3;          // human label ("druz9/backend#421")
  string snippet = 4;                // one-line context ("add redis lock …")
  float similarity = 5;              // cosine 0..1
}

message GetNoteConnectionsRequest {
  string note_id = 1;
}

// Server-streaming because the pipeline fans out across multiple sources
// (notes corpus, tasks, PR metadata) — first packet should arrive while the
// slower source is still searching.

// ─── AI link suggestions (Phase 5) ────────────────────────────────────────
//
// SuggestNoteLinks — embed-based candidate retrieval reranked by an LLM
// (TaskNotesLinkSuggest). Returns a small list (≤5) of suggested edges
// with a per-edge `reason` string used by the Notes UI to surface "why".
//
// Distinction vs GetNoteConnections:
//   GetNoteConnections — fast streaming cosine-only fan-out (similarity
//                        score, no reasoning). Cheap, runs on every open.
//   SuggestNoteLinks   — slower (LLM-rerank), called on demand from the
//                        Connections panel "AI suggestions" section.
//
// Rate-limit / cache: handler caches per (note_id + candidate-set hash)
// in Redis with 6h TTL — second call on unchanged corpus returns instantly.

message NoteLinkSuggestion {
  string target_note_id = 1;
  string target_title   = 2;
  string snippet        = 3;          // first 200 chars of target body
  float  score          = 4;          // 0..1 — LLM-assigned relevance
  string reason         = 5;          // 1 sentence, used in toast + tooltip
}

message SuggestNoteLinksRequest {
  string note_id = 1;
  int32  max     = 2;                 // default 5, max 10
}

message SuggestNoteLinksResponse {
  repeated NoteLinkSuggestion suggestions = 1;
}

// ─── Whiteboard ────────────────────────────────────────────────────────────

message Whiteboard {
  string id = 1;
  string title = 2;
  // state_json is the opaque tldraw document blob. Server-side this is a
  // jsonb column — we treat it as a string on the wire to avoid decoding
  // bloat in the hot path (load / save).
  string state_json = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  int32 version = 6;
}

message WhiteboardSummary {
  string id = 1;
  string title = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message CreateWhiteboardRequest {
  string title = 1;
  string state_json = 2;
}

message UpdateWhiteboardRequest {
  string id = 1;
  string title = 2;
  string state_json = 3;
  // If provided, server rejects the update when current version != expected
  // (optimistic concurrency). 0 = skip the check.
  int32 expected_version = 4;
}

message GetWhiteboardRequest {
  string id = 1;
}

message ListWhiteboardsRequest {}

message ListWhiteboardsResponse {
  repeated WhiteboardSummary whiteboards = 1;
}

message DeleteWhiteboardRequest {
  string id = 1;
}

message DeleteWhiteboardResponse {}

message CritiqueWhiteboardRequest {
  string id = 1;
}

// SaveCritiqueAsNote превращает последнюю AI-критику доски в приватную
// заметку. Клиент передаёт уже собранный markdown (стримлённые пакеты
// склеены по секциям) — сервер создаёт Note с title=title, body=body_md.
// Серверный re-run критики ради сохранения был бы дорог и не гарантирует
// идентичный результат (temperature>0). Клиент — источник истины того,
// что пользователь увидел.
message SaveCritiqueAsNoteRequest {
  string whiteboard_id = 1;
  string title = 2;                  // если empty → "Critique: <whiteboard title>"
  string body_md = 3;
}

// CritiquePacket is one streaming chunk of the AI architect's feedback.
// Shape mirrors the SysDesignCritique task output: sectioned prose streamed
// token-by-token. The client accumulates into a panel that fades in.
message CritiquePacket {
  // role is "strengths" | "concerns" | "missing" | "closing".
  string section = 1;
  string delta = 2;                  // token / chunk of text for this section
  bool done = 3;                     // true on the final packet
}

// ─── Service ───────────────────────────────────────────────────────────────

service HoneService {
  // ─── Plan ───────────────────────────────────────────────────────────
  rpc GenerateDailyPlan(GenerateDailyPlanRequest) returns (Plan) {
    option (google.api.http) = {
      post: "/api/v1/hone/plan/generate"
      body: "*"
    };
  }
  rpc GetDailyPlan(GetDailyPlanRequest) returns (Plan) {
    option (google.api.http) = {get: "/api/v1/hone/plan"};
  }
  rpc DismissPlanItem(DismissPlanItemRequest) returns (Plan) {
    option (google.api.http) = {
      post: "/api/v1/hone/plan/dismiss"
      body: "*"
    };
  }
  rpc CompletePlanItem(CompletePlanItemRequest) returns (Plan) {
    option (google.api.http) = {
      post: "/api/v1/hone/plan/complete"
      body: "*"
    };
  }

  // ─── Focus ──────────────────────────────────────────────────────────
  rpc StartFocusSession(StartFocusSessionRequest) returns (FocusSession) {
    option (google.api.http) = {
      post: "/api/v1/hone/focus/start"
      body: "*"
    };
  }
  rpc EndFocusSession(EndFocusSessionRequest) returns (FocusSession) {
    option (google.api.http) = {
      post: "/api/v1/hone/focus/end"
      body: "*"
    };
  }
  rpc GetStats(GetStatsRequest) returns (Stats) {
    option (google.api.http) = {get: "/api/v1/hone/stats"};
  }

  // ─── Focus Queue ────────────────────────────────────────────────────
  rpc ListQueue(ListQueueRequest) returns (ListQueueResponse) {
    option (google.api.http) = {get: "/api/v1/hone/queue"};
  }
  rpc AddQueueItem(AddQueueItemRequest) returns (QueueItem) {
    option (google.api.http) = {
      post: "/api/v1/hone/queue/add"
      body: "*"
    };
  }
  rpc UpdateQueueItemStatus(UpdateQueueItemStatusRequest) returns (QueueItem) {
    option (google.api.http) = {
      post: "/api/v1/hone/queue/status"
      body: "*"
    };
  }
  rpc DeleteQueueItem(DeleteQueueItemRequest) returns (DeleteQueueItemResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/queue/delete"
      body: "*"
    };
  }

  // ─── Notes ──────────────────────────────────────────────────────────
  rpc CreateNote(CreateNoteRequest) returns (Note) {
    option (google.api.http) = {
      post: "/api/v1/hone/notes"
      body: "*"
    };
  }
  rpc UpdateNote(UpdateNoteRequest) returns (Note) {
    option (google.api.http) = {
      post: "/api/v1/hone/notes/update"
      body: "*"
    };
  }
  rpc GetNote(GetNoteRequest) returns (Note) {
    option (google.api.http) = {get: "/api/v1/hone/notes/{id}"};
  }
  rpc ListNotes(ListNotesRequest) returns (ListNotesResponse) {
    option (google.api.http) = {get: "/api/v1/hone/notes"};
  }
  rpc DeleteNote(DeleteNoteRequest) returns (DeleteNoteResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/notes/delete"
      body: "*"
    };
  }
  rpc MoveNote(MoveNoteRequest) returns (Note) {
    option (google.api.http) = {
      post: "/api/v1/hone/notes/move"
      body: "*"
    };
  }
  // Server-streaming: first results (in-corpus notes) arrive fast, while
  // cross-domain edges (PRs, tasks) trail by a few hundred ms.
  rpc GetNoteConnections(GetNoteConnectionsRequest) returns (stream Connection);
  rpc SuggestNoteLinks(SuggestNoteLinksRequest) returns (SuggestNoteLinksResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/notes/suggest-links"
      body: "*"
    };
  }

  // ─── Folders ────────────────────────────────────────────────────────
  rpc CreateFolder(CreateFolderRequest) returns (Folder) {
    option (google.api.http) = {
      post: "/api/v1/hone/folders"
      body: "*"
    };
  }
  rpc ListFolders(ListFoldersRequest) returns (ListFoldersResponse) {
    option (google.api.http) = {get: "/api/v1/hone/folders"};
  }
  rpc DeleteFolder(DeleteFolderRequest) returns (DeleteFolderResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/folders/delete"
      body: "*"
    };
  }

  // ─── Whiteboard ─────────────────────────────────────────────────────
  rpc CreateWhiteboard(CreateWhiteboardRequest) returns (Whiteboard) {
    option (google.api.http) = {
      post: "/api/v1/hone/whiteboards"
      body: "*"
    };
  }
  rpc UpdateWhiteboard(UpdateWhiteboardRequest) returns (Whiteboard) {
    option (google.api.http) = {
      post: "/api/v1/hone/whiteboards/update"
      body: "*"
    };
  }
  rpc GetWhiteboard(GetWhiteboardRequest) returns (Whiteboard) {
    option (google.api.http) = {get: "/api/v1/hone/whiteboards/{id}"};
  }
  rpc ListWhiteboards(ListWhiteboardsRequest) returns (ListWhiteboardsResponse) {
    option (google.api.http) = {get: "/api/v1/hone/whiteboards"};
  }
  rpc DeleteWhiteboard(DeleteWhiteboardRequest) returns (DeleteWhiteboardResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/whiteboards/delete"
      body: "*"
    };
  }
  // Server-streaming AI critique — mirrors the SysDesignCritique task.
  rpc CritiqueWhiteboard(CritiqueWhiteboardRequest) returns (stream CritiquePacket);
  rpc SaveCritiqueAsNote(SaveCritiqueAsNoteRequest) returns (Note) {
    option (google.api.http) = {
      post: "/api/v1/hone/whiteboards/critique/save"
      body: "*"
    };
  }

  // ─── Standup ────────────────────────────────────────────────────────
  rpc RecordStandup(RecordStandupRequest) returns (RecordStandupResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/standup"
      body: "*"
    };
  }
  rpc GetTodayStandup(GetTodayStandupRequest) returns (GetTodayStandupResponse) {
    option (google.api.http) = {get: "/api/v1/hone/standup/today"};
  }

  // ─── Cue Sessions ───────────────────────────────────────────────────
  // Pseudo-folder для импортов из Cue desktop. Не пересекается с обычными
  // notes/folders. Idempotent по file_path: повторный ImportCueSession не
  // дублирует сессию, и НЕ перезаписывает body_md если юзер его правил.
  rpc ImportCueSession(ImportCueSessionRequest) returns (CueSession) {
    option (google.api.http) = {
      post: "/api/v1/hone/cue/import"
      body: "*"
    };
  }
  rpc ListCueSessions(ListCueSessionsRequest) returns (ListCueSessionsResponse) {
    option (google.api.http) = {get: "/api/v1/hone/cue"};
  }
  rpc GetCueSession(GetCueSessionRequest) returns (CueSession) {
    option (google.api.http) = {get: "/api/v1/hone/cue/{id}"};
  }
  rpc UpdateCueSession(UpdateCueSessionRequest) returns (CueSession) {
    option (google.api.http) = {
      post: "/api/v1/hone/cue/update"
      body: "*"
    };
  }
  rpc DeleteCueSession(DeleteCueSessionRequest) returns (DeleteCueSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/cue/delete"
      body: "*"
    };
  }
  rpc SendCueSessionToTelegram(SendCueSessionToTelegramRequest) returns (SendCueSessionToTelegramResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/cue/{id}/telegram"
      body: "*"
    };
  }

  // ─── TaskBoard (Notion-style kanban) ───────────────────────────────
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {get: "/api/v1/hone/tasks"};
  }
  rpc CreateTask(CreateTaskRequest) returns (Task) {
    option (google.api.http) = {
      post: "/api/v1/hone/tasks"
      body: "*"
    };
  }
  rpc MoveTaskStatus(MoveTaskStatusRequest) returns (Task) {
    option (google.api.http) = {
      post: "/api/v1/hone/tasks/{id}/status"
      body: "*"
    };
  }
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse) {
    option (google.api.http) = {delete: "/api/v1/hone/tasks/{id}"};
  }
  rpc ListTaskComments(ListTaskCommentsRequest) returns (ListTaskCommentsResponse) {
    option (google.api.http) = {get: "/api/v1/hone/tasks/{id}/comments"};
  }
  rpc AddTaskComment(AddTaskCommentRequest) returns (TaskComment) {
    option (google.api.http) = {
      post: "/api/v1/hone/tasks/{id}/comments"
      body: "*"
    };
  }
  // Phase J / H3 (P1, 2026-05-12) — manual kind override + bulk re-categorise.
  rpc UpdateTaskKind(UpdateTaskKindRequest) returns (Task) {
    option (google.api.http) = {
      post: "/api/v1/hone/tasks/{id}/kind"
      body: "*"
    };
  }
  // Server-streams categorise events as each task is processed. Frontend
  // consumes via Connect stream client (the existing SSE cursor path stays
  // for cursor.move / card.move; this is a one-shot scoped stream).
  rpc BulkAutoCategorise(BulkAutoCategoriseRequest) returns (stream BulkAutoCategoriseEvent);

  // ─── Publish-to-web ────────────────────────────────────────────────
  // The HTML viewer at /p/{slug} stays chi-direct (renders Markdown into
  // sandboxed HTML with strict CSP headers — vanguard's JSON-only codec
  // can't shape that response). All JSON endpoints below go through the
  // transcoder.
  rpc PublishNote(PublishNoteRequest) returns (PublishNoteResponse) {
    option (google.api.http) = {
      post: "/api/v1/notes/{id}/publish"
      body: "*"
    };
  }
  rpc UnpublishNote(UnpublishNoteRequest) returns (UnpublishNoteResponse) {
    option (google.api.http) = {
      post: "/api/v1/notes/{id}/unpublish"
      body: "*"
    };
  }
  rpc PublishStatus(PublishStatusRequest) returns (PublishStatusResponse) {
    option (google.api.http) = {get: "/api/v1/notes/{id}/publish-status"};
  }
  rpc ShareToWeb(ShareToWebRequest) returns (ShareToWebResponse) {
    option (google.api.http) = {
      post: "/api/v1/notes/{id}/share-to-web"
      body: "*"
    };
  }
  rpc MakePrivate(MakePrivateRequest) returns (MakePrivateResponse) {
    option (google.api.http) = {
      post: "/api/v1/notes/{id}/make-private"
      body: "*"
    };
  }
  rpc BulkNotesMeta(BulkNotesMetaRequest) returns (BulkNotesMetaResponse) {
    option (google.api.http) = {get: "/api/v1/notes/meta"};
  }

  // ─── Reading-модуль (Wave 4 of docs/feature/english.md) ──────────────
  //
  // Library + reader + SRS vocab queue. Free-form English content
  // (no algorithmic task), all rows scoped to user_id at the SQL gate.

  rpc AddReadingMaterial(AddReadingMaterialRequest) returns (ReadingMaterial) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/materials"
      body: "*"
    };
  }
  rpc UpdateBookProgress(UpdateBookProgressRequest) returns (ReadingMaterial) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/materials/{id}/book-progress"
      body: "*"
    };
  }
  rpc ListReadingMaterials(ListReadingMaterialsRequest) returns (ListReadingMaterialsResponse) {
    option (google.api.http) = {get: "/api/v1/hone/reading/materials"};
  }
  rpc GetReadingMaterial(GetReadingMaterialRequest) returns (ReadingMaterial) {
    option (google.api.http) = {get: "/api/v1/hone/reading/materials/{id}"};
  }
  rpc ArchiveReadingMaterial(ArchiveReadingMaterialRequest) returns (ArchiveReadingMaterialResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/materials/{id}/archive"
      body: "*"
    };
  }
  rpc StartReadingSession(StartReadingSessionRequest) returns (ReadingSession) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/sessions"
      body: "*"
    };
  }
  rpc EndReadingSession(EndReadingSessionRequest) returns (EndReadingSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/sessions/{session_id}/end"
      body: "*"
    };
  }
  rpc AddVocab(AddVocabRequest) returns (VocabEntry) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/vocab"
      body: "*"
    };
  }
  rpc ReviewVocab(ReviewVocabRequest) returns (VocabEntry) {
    option (google.api.http) = {
      post: "/api/v1/hone/reading/vocab/review"
      body: "*"
    };
  }
  rpc ListVocabDue(ListVocabDueRequest) returns (ListVocabDueResponse) {
    option (google.api.http) = {get: "/api/v1/hone/reading/vocab/due"};
  }
  // Wave 4.2 reverse cross-link — list vocab entries the user saved
  // while reading a specific material. Powers the reader sidebar
  // «words you've saved here».
  rpc ListVocabBySourceMaterial(ListVocabBySourceMaterialRequest) returns (ListVocabDueResponse) {
    option (google.api.http) = {get: "/api/v1/hone/reading/materials/{material_id}/vocab"};
  }

  // ─── Listening-модуль (Wave 6.1) ─────────────────────────────────
  // User-owned library of audio + transcript materials. Click-on-word
  // reuses the AddVocab RPC (vocab queue is shared with Reading).
  rpc AddListeningMaterial(AddListeningMaterialRequest) returns (ListeningMaterial) {
    option (google.api.http) = {
      post: "/api/v1/hone/listening/materials"
      body: "*"
    };
  }
  // IngestYouTubeListening — paste YouTube URL, backend extract'ит auto-
  // captions через yt-dlp + создаёт ListeningMaterial. Sergey 2026-05-03:
  // «listening странный, надо самому искать транскрибацию хотя видео из
  // тюба». Если captions нет — возвращает ErrInvalidInput с подсказкой.
  rpc IngestYouTubeListening(IngestYouTubeListeningRequest) returns (ListeningMaterial) {
    option (google.api.http) = {
      post: "/api/v1/hone/listening/youtube"
      body: "*"
    };
  }
  rpc ListListeningMaterials(ListListeningMaterialsRequest) returns (ListListeningMaterialsResponse) {
    option (google.api.http) = {get: "/api/v1/hone/listening/materials"};
  }
  rpc GetListeningMaterial(GetListeningMaterialRequest) returns (ListeningMaterial) {
    option (google.api.http) = {get: "/api/v1/hone/listening/materials/{id}"};
  }
  rpc ArchiveListeningMaterial(ArchiveListeningMaterialRequest) returns (ArchiveListeningMaterialResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/listening/materials/{id}/archive"
      body: "*"
    };
  }

  // ─── Writing-as-Focus (Wave 4.4) ─────────────────────────────────
  // GradeEnglishWriting — request-scoped: take a draft, return a
  // structured list of grammar / vocab / style issues + an overall
  // 0..100 score. No persistence layer; if the user wants to keep the
  // text they save it via CreateNote.
  rpc GradeEnglishWriting(GradeEnglishWritingRequest) returns (GradeEnglishWritingResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/writing/grade"
      body: "*"
    };
  }

  // ─── External activity log (structured form, Hone Stats) ────────
  // Юзер логирует обучение вне druz9 (LeetCode / Coursera / YouTube /
  // книги). Без чата — structured form, source dropdown + topic
  // autocomplete по atlas-узлам. Intelligence-service подтягивает
  // эти записи в snapshot для AI-tutor recall.
  rpc AddExternalActivity(AddExternalActivityRequest) returns (ExternalActivity) {
    option (google.api.http) = {
      post: "/api/v1/hone/external-activity"
      body: "*"
    };
  }
  rpc ListExternalActivity(ListExternalActivityRequest) returns (ListExternalActivityResponse) {
    option (google.api.http) = {get: "/api/v1/hone/external-activity"};
  }
  rpc DeleteExternalActivity(DeleteExternalActivityRequest) returns (DeleteExternalActivityResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/external-activity/delete"
      body: "*"
    };
  }
  // Atlas-node autocomplete для topic-поля. Возвращает top-N узлов по
  // similarity к prefix'у. Нет ML — fast trigram / LIKE на title.
  rpc SearchAtlasTopics(SearchAtlasTopicsRequest) returns (SearchAtlasTopicsResponse) {
    option (google.api.http) = {get: "/api/v1/hone/external-activity/atlas-topics"};
  }
  // Lookup table {atlas_node_id → track_kind} для client-side фильтра
  // Plan / Tasks / Queue по active_track. Маленький payload (~50-100
  // узлов), кешируется на 5 мин.
  rpc ListAtlasNodeTracks(ListAtlasNodeTracksRequest) returns (ListAtlasNodeTracksResponse) {
    option (google.api.http) = {get: "/api/v1/hone/atlas-node-tracks"};
  }

  // ─── User settings (active study mode) ───────────────────────────
  // Active track gates content surfaces (Plan / Tasks / Reading / AI-tutor
  // thread) per-user. Values: general | dev | ml | english | go.
  rpc GetUserSettings(GetUserSettingsRequest) returns (UserSettings) {
    option (google.api.http) = {get: "/api/v1/hone/settings"};
  }
  rpc SetActiveTrack(SetActiveTrackRequest) returns (UserSettings) {
    option (google.api.http) = {
      post: "/api/v1/hone/settings/active-track"
      body: "*"
    };
  }
  rpc SetEnglishActive(SetEnglishActiveRequest) returns (UserSettings) {
    option (google.api.http) = {
      post: "/api/v1/hone/settings/english-active"
      body: "*"
    };
  }

  // ─── Code-review-coaching (Wave 3.6) ─────────────────────────────
  // GradeCodeReview — user pastes a unified diff + their PR-style
  // review; we grade the review across correctness/completeness/
  // clarity/tone. Same one-shot, no-persistence pattern as the
  // writing grader.
  rpc GradeCodeReview(GradeCodeReviewRequest) returns (GradeCodeReviewResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/code-review/grade"
      body: "*"
    };
  }

  // ─── Speaking modality (H4 / Phase J 2026-05-12) ──────────────────
  // Shadowing exercise loop: list canned prompts → record mic audio →
  // STT-grade against reference text → persist session for drift trend.
  // Без Speaking Hone English ≈ Reader; H4 закрывает 4-modality hub.
  rpc ListSpeakingExercises(ListSpeakingExercisesRequest) returns (ListSpeakingExercisesResponse) {
    option (google.api.http) = {get: "/api/v1/hone/speaking/exercises"};
  }
  // GradeSpeaking — base64-encoded webm/opus audio + reference text.
  // STT (Groq Whisper) → LLM compare transcript vs reference → pronunciation
  // & fluency scores + word-level diff + 1-line coach feedback. Persists
  // a speaking_sessions row idempotent via client_session_id.
  rpc GradeSpeaking(GradeSpeakingRequest) returns (GradeSpeakingResponse) {
    option (google.api.http) = {
      post: "/api/v1/hone/speaking/grade"
      body: "*"
    };
  }
  rpc ListSpeakingHistory(ListSpeakingHistoryRequest) returns (ListSpeakingHistoryResponse) {
    option (google.api.http) = {get: "/api/v1/hone/speaking/history"};
  }
}

