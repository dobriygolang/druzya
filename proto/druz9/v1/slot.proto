// slot.proto — Connect-RPC contract for the `slot` (Human Mock Interview)
// bounded context.
//
// Covers the four slot endpoints: list, create, book, cancel. Only
// interviewers/admins may create slots — the role check lives in the port
// layer (same pattern as Phase A/B).
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// SlotInterviewer is the inline `interviewer` object of OpenAPI Slot.
message SlotInterviewer {
  string user_id = 1;
  string username = 2;
  // avg_rating / reviews_count are optional — absent until at least one
  // review exists for the interviewer.
  float avg_rating = 3;
  int32 reviews_count = 4;
}

// Slot mirrors OpenAPI Slot.
message Slot {
  string id = 1;
  SlotInterviewer interviewer = 2;
  google.protobuf.Timestamp starts_at = 3;
  int32 duration_min = 4;
  Section section = 5;
  Difficulty difficulty = 6;
  // language mirrors OpenAPI Slot.language ("ru" | "en"). Kept as string —
  // not the Language enum (that one is code languages: go/python/…).
  string language = 7;
  int32 price_rub = 8;
  SlotStatus status = 9;
  // meet_url is the interviewer-supplied video room URL (typically a
  // Google Meet link they create themselves). When non-empty, BookSlot
  // surfaces it on the resulting Booking; otherwise BookSlot falls back
  // to MeetRoomProvider.GenerateMeetURL.
  //
  // Optional on the wire: empty when the interviewer hasn't pasted one yet.
  string meet_url = 10;
}

// SlotList is the vanguard-friendly wrapper — OpenAPI returns a JSON array
// at the top level, and vanguard flattens repeated-only wrappers on the
// REST wire.
message SlotList {
  repeated Slot items = 1;
}

// Booking mirrors OpenAPI Booking.
message Booking {
  string id = 1;
  Slot slot = 2;
  string meet_url = 3;
  google.protobuf.Timestamp created_at = 4;
}

// ListSlotsRequest mirrors the OpenAPI query filters on GET /slot.
message ListSlotsRequest {
  Section section = 1;
  Difficulty difficulty = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;
  // price_max — upper-bound filter on price_rub. 0 means "no limit"; pass
  // any positive int to cap.
  int32 price_max = 5;
}

// CreateSlotRequest mirrors OpenAPI CreateSlotRequest.
message CreateSlotRequest {
  google.protobuf.Timestamp starts_at = 1;
  int32 duration_min = 2;
  Section section = 3;
  Difficulty difficulty = 4;
  // language is "ru" | "en" per OpenAPI enum. Preserved as string.
  string language = 5;
  int32 price_rub = 6;
  // meet_url — optional video-room URL the interviewer creates themselves
  // (typically https://meet.google.com/...). When provided, BookSlot uses
  // this exact URL on the resulting Booking instead of generating a mock.
  string meet_url = 7;
}

// BookSlotRequest wraps the path param.
message BookSlotRequest {
  string slot_id = 1;
}

// CancelSlotRequest wraps the path param.
message CancelSlotRequest {
  string slot_id = 1;
}

// CancelSlotResponse is empty — REST returns 204 No Content.
message CancelSlotResponse {}

// ListMyBookingsRequest is empty — caller is identified by the bearer token.
message ListMyBookingsRequest {}

// MyBookingItem mirrors the chi-direct DTO that previously served
// GET /api/v1/slot/my/bookings (cmd/monolith/services/slot.go). Combines
// booking + denormalized slot fields so the client can render its
// "Мои бронирования" panel without a second round-trip.
message MyBookingItem {
  string id = 1;
  string slot_id = 2;
  string meet_url = 3;
  // booking lifecycle status (active | cancelled | completed) — separate
  // from slot_status which is the slot-side state.
  string status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp starts_at = 6;
  int32 duration_min = 7;
  Section section = 8;
  Difficulty difficulty = 9;
  string language = 10;
  int32 price_rub = 11;
  SlotStatus slot_status = 12;
  // has_review — true when the candidate already left a CANDIDATE→
  // INTERVIEWER review for this booking. Lets the UI hide the
  // "Оставить отзыв" CTA without a second round-trip to the review
  // service. Set on the candidate-side drawer (My bookings).
  bool has_review = 13;
}

// HostedBookingItem mirrors MyBookingItem but for the interviewer-side
// drawer ("Мои проведённые слоты"). candidate_username + has_review
// (interviewer→candidate) hydrated server-side.
message HostedBookingItem {
  string id = 1;
  string slot_id = 2;
  string candidate_id = 3;
  string candidate_username = 4;
  string meet_url = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp starts_at = 8;
  int32 duration_min = 9;
  Section section = 10;
  Difficulty difficulty = 11;
  string language = 12;
  int32 price_rub = 13;
  SlotStatus slot_status = 14;
  // has_review — true when the *interviewer* already submitted an
  // INTERVIEWER→CANDIDATE review for this booking.
  bool has_review = 15;
}

message HostedBookingList {
  repeated HostedBookingItem items = 1;
}

message ListHostedBookingsRequest {}

// MyBookingList wraps the repeated items so vanguard's REST transcoder
// emits {"items":[...]} (consistent with SlotList).
message MyBookingList {
  repeated MyBookingItem items = 1;
}

service SlotService {
  // ListSlots returns the filtered catalog of available slots.
  rpc ListSlots(ListSlotsRequest) returns (SlotList) {
    option (google.api.http) = {get: "/api/v1/slot"};
  }

  // CreateSlot creates a new slot (interviewer-only — enforced in ports).
  rpc CreateSlot(CreateSlotRequest) returns (Slot) {
    option (google.api.http) = {
      post: "/api/v1/slot"
      body: "*"
    };
  }

  // BookSlot books a slot for the authenticated caller.
  rpc BookSlot(BookSlotRequest) returns (Booking) {
    option (google.api.http) = {
      post: "/api/v1/slot/{slot_id}/book"
      body: "*"
    };
  }

  // CancelSlot cancels the slot (owner-only) and any attached booking.
  rpc CancelSlot(CancelSlotRequest) returns (CancelSlotResponse) {
    option (google.api.http) = {delete: "/api/v1/slot/{slot_id}/cancel"};
  }

  // ListMyBookings returns every booking owned by the authenticated caller,
  // ordered by slot starts_at DESC. Replaces the chi-direct handler that
  // lived in cmd/monolith/services/slot.go.
  rpc ListMyBookings(ListMyBookingsRequest) returns (MyBookingList) {
    option (google.api.http) = {get: "/api/v1/slot/my/bookings"};
  }

  // ListHostedBookings — interviewer's view of bookings on their own slots
  // (candidate side surfaced via candidate_username). Used by the «Я как
  // интервьюер» tab in the My bookings drawer to render the
  // INTERVIEWER→CANDIDATE review CTA.
  rpc ListHostedBookings(ListHostedBookingsRequest) returns (HostedBookingList) {
    option (google.api.http) = {get: "/api/v1/slot/my/hosted"};
  }
}
