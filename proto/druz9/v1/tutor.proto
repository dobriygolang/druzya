// tutor.proto — Connect-RPC contract for the tutor bounded context.
// Wave 2 of docs/feature/tutor.md (tutor as distribution channel).
//
// Tier 1 surface — invitations and active relationships. Per-student
// snapshot aggregator, pre-session brief LLM-job and Tier 2/3 are
// deliberately deferred — see plan.md.
//
// PeekInvite is intentionally public (bypasses bearer auth via
// publicPaths-style exemption — see main.go); every other method is
// authenticated and the role is enforced at the use-case layer
// (tutor mutating his own invite vs student accepting).
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// InviteStatus mirrors domain.InviteStatus. Computed server-side
// from accepted_at / revoked_at / expires_at — no stored column on
// tutor_invites.
enum InviteStatus {
  INVITE_STATUS_UNSPECIFIED = 0;
  INVITE_STATUS_ACTIVE      = 1;
  INVITE_STATUS_ACCEPTED    = 2;
  INVITE_STATUS_REVOKED     = 3;
  INVITE_STATUS_EXPIRED     = 4;
}

// TutorEventStatus mirrors domain.EventStatus + CHECK on tutor_events.status.
enum TutorEventStatus {
  TUTOR_EVENT_STATUS_UNSPECIFIED = 0;
  TUTOR_EVENT_STATUS_SCHEDULED   = 1;
  TUTOR_EVENT_STATUS_CANCELLED   = 2;
  TUTOR_EVENT_STATUS_COMPLETED   = 3;
}

// TutorEventVisibility mirrors domain.EventVisibility for the session-note
// share toggle. Used by TutorEvent.visibility and the SetSessionNoteVisibility
// RPC payload.
enum TutorEventVisibility {
  TUTOR_EVENT_VISIBILITY_UNSPECIFIED = 0;
  TUTOR_EVENT_VISIBILITY_PRIVATE     = 1;
  TUTOR_EVENT_VISIBILITY_SHARED      = 2;
}

// TutorApplicationStatus mirrors domain.ApplicationStatus on directory
// application rows.
enum TutorApplicationStatus {
  TUTOR_APPLICATION_STATUS_UNSPECIFIED = 0;
  TUTOR_APPLICATION_STATUS_PENDING     = 1;
  TUTOR_APPLICATION_STATUS_ACCEPTED    = 2;
  TUTOR_APPLICATION_STATUS_DECLINED    = 3;
}

message TutorInvite {
  string id           = 1;
  string tutor_id     = 2;
  string code         = 3;
  string note         = 4;
  google.protobuf.Timestamp created_at  = 5;
  google.protobuf.Timestamp expires_at  = 6;
  google.protobuf.Timestamp accepted_at = 7; // zero when not accepted
  string accepted_by  = 8;                   // empty when not accepted
  google.protobuf.Timestamp revoked_at  = 9; // zero when not revoked
  InviteStatus status = 10;                  // server-computed convenience field
}

message TutorRelationship {
  string id          = 1;
  string tutor_id    = 2;
  string student_id  = 3;
  string invite_id   = 4;                    // empty when admin-created without invite
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp ended_at   = 6;  // zero when active
  string note        = 7;
  // ── Display info (server-filled) ─────────────────────────────────
  // ListMyTutors заполняет полями ТЬЮТОРА (это ученик смотрит на тьютора).
  // ListStudents заполняет полями СТУДЕНТА (тьютор смотрит на студентов).
  // Без active wiring — пустые строки.
  string display_username     = 8;
  string display_name         = 9;
  string display_avatar_url   = 10;
}

// ── Requests / responses ─────────────────────────────────────────────

message TutorCreateInviteRequest  { string note = 1; }

message TutorInviteByUsernameRequest {
  string username = 1;
  string note     = 2;
}

message TutorListPendingInvitesForMeRequest {}
message TutorListPendingInvitesForMeResponse {
  repeated TutorPendingInvite items = 1;
}

// TutorPendingInvite — invite + display-info тьютора (student-side
// surface на /profile). Code оставляем как есть — accept-button
// шлёт его в существующий AcceptInvite RPC.
message TutorPendingInvite {
  string id    = 1;
  string code  = 2;
  string note  = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp expires_at = 5;
  string tutor_id              = 6;
  string tutor_username        = 7;
  string tutor_display_name    = 8;
  string tutor_display_avatar  = 9;
}
message TutorRevokeInviteRequest  { string invite_id = 1; }
message TutorPeekInviteRequest    { string code = 1; }
message TutorAcceptInviteRequest  { string code = 1; }
message TutorListInvitesRequest   {
  int32  limit  = 1; // 0 → server default (50), max 200
  string cursor = 2; // opaque keyset cursor (created_at DESC, id DESC)
}
message TutorListInvitesResponse  {
  repeated TutorInvite items = 1;
  string next_cursor = 2; // empty when no more pages
}
message TutorListStudentsRequest  {}
message TutorListStudentsResponse { repeated TutorRelationship items = 1; }
message TutorListMyTutorsRequest  {}

// ─── Tutor activity (Wave 9.5) ──────────────────────────────────────

message TutorGetActivityRequest {
  int32 window_days = 1; // 0 → server default (30)
}

message TutorActivityResponse {
  int32  window_days           = 1;
  int32  active_student_count  = 2;
  int32  events_completed      = 3;
  int32  events_cancelled      = 4;
  int32  events_scheduled      = 5;
  int32  minutes_taught        = 6;
  // 0..1; 0 when no events in window.
  double cancellation_rate     = 7;
  // Phase 8 — rolling daily series for sparkline UI. Length == window_days,
  // oldest → newest. daily_completed = completed-event count per day;
  // daily_minutes = SUM(duration_min) per day.
  repeated int32 daily_completed = 8;
  repeated int32 daily_minutes   = 9;
}

// ─── Student-facing tutor activity (Phase K T6, 2026-05-12) ─────────
//
// «Тебя сегодня учат: N tutors recently active» — subtle social-proof
// surface на /today + Hone Home. Privacy contract:
//   - exposes:   count of OTHER students (excluding caller),
//                aggregate recent-events count (no titles / no content),
//                last_active_at (server-derived MAX of event times)
//   - hides:     names / ids of other students,
//                event titles / body / session notes,
//                per-student breakdowns
// 5-minute server-side cache TTL — keeps the read path cheap and avoids
// hot-path fanout when many students share popular tutors.

message TutorMyTutorsActivityRequest {
  // Recent-events window. 0 → server default (7 days). Capped at 30.
  int32 recent_window_days = 1;
}

// One row per active tutor of the caller. Order — most-recently-active
// first (matches the «who's around today» UX intent).
message TutorMyTutorActivitySummary {
  string tutor_user_id      = 1;
  string tutor_display_name = 2; // public profile field
  string tutor_username     = 3;
  string tutor_avatar_url   = 4;
  // Zero Timestamp = «no activity ever recorded». Maximum across
  // (tutor_events.created_at | scheduled_at | completed_at) restricted
  // to events authored by this tutor — no student-side data exposed.
  google.protobuf.Timestamp last_active_at = 5;
  // Active students of this tutor MINUS the caller. Floor 0.
  int32 active_student_count_other = 6;
  // Count of events (any status) authored by this tutor inside the
  // recent window. Aggregate-only — no per-student or per-title detail.
  int32 recent_events_count = 7;
}

message TutorMyTutorsActivityResponse {
  repeated TutorMyTutorActivitySummary items = 1;
}

// ─── Group events (Wave 5.2) ───────────────────────────────────────

message TutorCreateGroupEventRequest {
  string circle_id    = 1;
  string title        = 2;
  string body_md      = 3;
  google.protobuf.Timestamp scheduled_at = 4;
  int32  duration_min = 5;
  string meet_url     = 6;
  int32  capacity     = 7; // 1..200
}

message TutorJoinEventRequest   { string event_id = 1; }
message TutorJoinEventResponse  {}
message TutorLeaveEventRequest  { string event_id = 1; }
message TutorLeaveEventResponse {}

message TutorListUpcomingGroupEventsRequest {
  int32 limit = 1; // 0 → server default (25)
}

message TutorGetEventRSVPCountRequest {
  string event_id = 1;
}

message TutorGetEventRSVPCountResponse {
  int32 count = 1;
}
message TutorEndRelationshipRequest { string student_id = 1; }
message TutorEndRelationshipResponse {}

// ── Snapshot (Wave 2.4b) ────────────────────────────────────────────

message TutorWeakSpot {
  string node_key = 1;
  string title    = 2;
  int32  progress = 3; // 0..100
}

// StudentSnapshot — aggregated student view rendered on the tutor
// dashboard. window_days defaults to 7 (server-side). Empty fields
// (zero counts, zero last_active_at) mean «no activity in the window».
message TutorStudentSnapshot {
  string student_id      = 1;
  int32  window_days     = 2;
  google.protobuf.Timestamp last_active_at = 3;
  int32  focus_minutes_window  = 4;
  int32  focus_sessions_count  = 5;
  int32  english_mocks_count       = 6;
  int32  english_mocks_avg_score   = 7; // 0..100; 0 when count == 0
  int32  english_mocks_last_score  = 8; // 0..100
  repeated TutorWeakSpot weak_spots = 9;
  int32  notes_count = 10;

  // English-track activity from Hone (Wave 4 + 6.1). Counts in `_window`
  // honour `window_days`; library/vocab numbers are point-in-time.
  int32 reading_sessions_count    = 11;
  int32 reading_minutes_window    = 12;
  int32 reading_materials_total   = 13;
  int32 writing_grades_count      = 14;
  int32 listening_materials_total = 15;
  int32 vocab_queue_total         = 16; // active rows (learned_at IS NULL)
  int32 vocab_due_today           = 17; // active rows with next_review_at <= now
}

message TutorGetStudentSnapshotRequest {
  string student_id  = 1;
  int32  window_days = 2; // 0 → server default (7)
}

message TutorPreSessionBrief {
  TutorStudentSnapshot snapshot = 1;
  string brief = 2; // markdown narrative; empty when LLMChain unavailable
}

message TutorGenerateBriefRequest {
  string student_id  = 1;
  int32  window_days = 2;
}

// ─── Assignments (Wave 5.1) ────────────────────────────────────────

message TutorAssignment {
  string id           = 1;
  string tutor_id     = 2;
  string student_id   = 3;
  string title        = 4;
  string body_md      = 5;
  // Optional. Zero-Timestamp = «open-ended» — frontend renders «no
  // due» chip rather than a countdown.
  google.protobuf.Timestamp due_at       = 6;
  google.protobuf.Timestamp created_at   = 7;
  // Zero when not yet completed; non-zero shows ✓ + delta-from-due
  // on the tutor's view.
  google.protobuf.Timestamp completed_at = 8;
  // Zero when not archived. Archived rows are excluded from the
  // student's pending feed and from the active partial index.
  google.protobuf.Timestamp archived_at  = 9;
}

message TutorPushAssignmentRequest {
  string student_id = 1;
  string title      = 2;
  string body_md    = 3;
  // Optional. Set to a future TZ-aware timestamp; past timestamps are
  // rejected by the use case (ErrInvalidInput → 400).
  google.protobuf.Timestamp due_at = 4;
}

message TutorListAssignmentsRequest {
  string student_id = 1;
  int32  limit      = 2; // 0 → server default (50), max 200
  string cursor     = 3; // opaque keyset cursor (created_at DESC, id DESC)
}

message TutorListPendingAssignmentsRequest {
  int32 limit   = 1; // 0 → server default (25), max 200
  string cursor = 2; // opaque keyset cursor (created_at DESC, id DESC)
}

message TutorListAssignmentsResponse {
  repeated TutorAssignment items = 1;
  string next_cursor = 2; // empty when no more pages
}

message TutorCompleteAssignmentRequest  { string assignment_id = 1; }
message TutorCompleteAssignmentResponse {}

message TutorArchiveAssignmentRequest  { string assignment_id = 1; }
message TutorArchiveAssignmentResponse {}

message TutorBroadcastAssignmentRequest {
  string title   = 1;
  string body_md = 2;
  // Optional. Past timestamps rejected by the use case.
  google.protobuf.Timestamp due_at = 3;
}

// One per failed student. The use case never aborts the whole batch
// on partial failure — successful pushes still land, failures are
// collected here for a per-student retry UI.
message TutorBroadcastFailure {
  string student_id = 1;
  string error      = 2;
}

message TutorSharedMaterial {
  string id = 1;
  string tutor_id = 2;
  string title = 3;
  string source_url = 4;
  string body_md = 5;
  int32 student_count = 6;
  google.protobuf.Timestamp created_at = 7;
}

message TutorPushSharedReadingRequest {
  string title = 1;
  string source_url = 2;
  string note = 3;
}

message TutorPushSharedReadingResponse {
  TutorSharedMaterial material = 1;
  int32 pushed_count = 2;
  int32 failed_count = 3;
}

message TutorListSharedReadingRequest {
  int32 limit   = 1; // default 50, max 200
  string cursor = 2; // opaque keyset cursor (created_at DESC, id DESC)
}

message TutorListSharedReadingResponse {
  repeated TutorSharedMaterial items = 1;
  string next_cursor = 2; // empty when no more pages
}

message TutorBroadcastAssignmentResponse {
  repeated TutorAssignment      pushed = 1;
  repeated TutorBroadcastFailure failed = 2;
}

// ─── Events (Wave 5.2b) ─────────────────────────────────────────────

// TutorEvent mirrors a row in tutor_events. Exactly one of (student_id,
// circle_id) is set — V1 always uses student_id; V2 group classes use
// circle_id with capacity > 0.
message TutorEvent {
  string id        = 1;
  string tutor_id  = 2;
  // For 1-on-1 events. Empty when this is a circle event (V2).
  string student_id = 3;
  // For group events bound to a circle. Empty in V1.
  string circle_id  = 4;
  string title      = 5;
  string body_md    = 6;
  google.protobuf.Timestamp scheduled_at = 7;
  int32  duration_min = 8;
  string meet_url     = 9;
  // Optional. Only set for circle (group) events. Zero = unlimited /
  // not applicable.
  int32  capacity     = 10;
  TutorEventStatus status    = 11;
  string cancellation_reason = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  // Wave 5.2d — tutor's post-session write-up. Non-empty iff
  // status==COMPLETED. Tutor-visible always; student-visible only when
  // visibility==SHARED (see field 16).
  string session_note = 15;
  // Phase K T4 (2026-05-13) — session-note share toggle. PRIVATE (default)
  // means student never sees the note; SHARED surfaces it via
  // ListSharedSessionNotesForStudent.
  TutorEventVisibility visibility = 16;
  // Optional curated copy for student-facing audience. Empty string with
  // visibility='shared' means «share the full private note as-is».
  string shared_content_md = 17;
  // Stamp of first transition private→shared. Zero when never shared.
  google.protobuf.Timestamp shared_at = 18;
}

message TutorCreateEventRequest {
  string student_id = 1; // V1: required
  string title      = 2;
  string body_md    = 3;
  // Future-only. Past timestamps (>5 min ago) rejected by the use case.
  google.protobuf.Timestamp scheduled_at = 4;
  int32  duration_min = 5;
  string meet_url     = 6;
}

message TutorCancelEventRequest {
  string event_id = 1;
  string reason   = 2;
}

message TutorCancelEventResponse {}

message TutorCompleteEventRequest {
  string event_id     = 1;
  string session_note = 2;
}

message TutorCompleteEventResponse {}

message TutorListEventsRequest {
  int32 limit   = 1; // 0 → server default (50), max 200
  string cursor = 2; // opaque keyset cursor (scheduled_at DESC, id DESC)
}

message TutorListUpcomingEventsRequest {
  int32 limit   = 1; // 0 → server default (25), max 200
  string cursor = 2; // opaque keyset cursor (scheduled_at ASC, id ASC) — upcoming
}

message TutorListEventsResponse {
  repeated TutorEvent items = 1;
  string next_cursor = 2; // empty when no more pages
}

// TutorPeekInviteResponse mirrors domain.PeekInviteResult — the invite
// itself plus the derived status, so the landing page renders the
// right CTA without recomputing the timestamps.
message TutorPeekInviteResponse {
  TutorInvite invite = 1;
  // tutor_display is populated by the handler from the users table
  // (display_name fallback to username) — student needs to see «Maria
  // приглашает тебя» on the landing without exposing tutor's UUID.
  string tutor_display = 2;
}

// ─── Reading paths (Stream D, 2026-05-12) ────────────────────────────
//
// A reading path = ordered sequence of atlas-node-keys + resource-ids the
// tutor curates for a student/cohort to walk through. Complements
// TutorSharedMaterial (one-off broadcast) — paths are reusable curricula.
//
// V1 surface: tutor CRUD only. Assigning a path to a student is handled
// out-of-band via assignments (future iteration may add a dedicated
// TutorAssignPath RPC bumping assigned_count).

message TutorReadingPath {
  string id              = 1;
  string tutor_id        = 2;
  string name            = 3;
  string description     = 4;
  // Ordered atlas_node_keys to walk through. Max 200 (CHECK constraint).
  repeated string atlas_node_keys = 5;
  // Ordered resource_ids (external_resources.id). Max 200.
  repeated string resource_ids    = 6;
  // Denormalised counter, kept in sync by future assignment UC.
  int32  assigned_count  = 7;
  google.protobuf.Timestamp archived_at = 8;
  google.protobuf.Timestamp created_at  = 9;
  google.protobuf.Timestamp updated_at  = 10;
}

message TutorListReadingPathsRequest {
  int32 limit   = 1; // 0 → server default (50), max 200
  string cursor = 2; // opaque keyset cursor (created_at DESC, id DESC)
}

message TutorListReadingPathsResponse {
  repeated TutorReadingPath items = 1;
  string next_cursor = 2;
}

message TutorCreateReadingPathRequest {
  string name        = 1;
  string description = 2;
  repeated string atlas_node_keys = 3;
  repeated string resource_ids    = 4;
}

message TutorUpdateReadingPathRequest {
  string path_id     = 1;
  string name        = 2;
  string description = 3;
  repeated string atlas_node_keys = 4;
  repeated string resource_ids    = 5;
}

message TutorArchiveReadingPathRequest  { string path_id = 1; }
message TutorArchiveReadingPathResponse {}

// ─── Path assignments (Phase K T2+T3, 2026-05-12) ────────────────────
//
// AssignReadingPath = single-click «push this curated path to this
// student». Server snapshots path contents at the moment of assign
// (so subsequent tutor edits don't mutate in-flight assignments) and
// emits one per-step TutorAssignment row so the student's existing
// pending-feed picks the path up без новых surfaces.

message TutorPathAssignment {
  string id            = 1;
  string path_id       = 2;
  string tutor_id      = 3;
  string student_id    = 4;
  int32  current_step  = 5;
  int32  total_steps   = 6;
  google.protobuf.Timestamp assigned_at  = 7;
  google.protobuf.Timestamp completed_at = 8; // zero when not yet completed
  google.protobuf.Timestamp archived_at  = 9;
  // Snapshot of path contents at assign time. Edits to the source path
  // after this point don't affect this assignment.
  repeated string snapshot_atlas_node_keys = 10;
  repeated string snapshot_resource_ids    = 11;
  // Denormalised display fields for student-side UI (path name + tutor
  // display name). Server-filled on List; empty in raw rows.
  string path_name           = 12;
  string tutor_display_name  = 13;
}

message TutorAssignReadingPathRequest {
  string path_id       = 1;
  string student_id    = 2;
  // Optional. 0 (or absent) → start at step 0. If set must be
  // 0 <= starting_step < len(atlas_node_keys); else InvalidArgument.
  int32  starting_step = 3;
}

message TutorAssignReadingPathResponse {
  TutorPathAssignment assignment = 1;
  // Number of per-step TutorAssignment rows the server created. Equals
  // len(snapshot_atlas_node_keys) - starting_step (or +len(resources)
  // if the path is resource-only).
  int32 assignments_created = 2;
}

message TutorListMyActivePathAssignmentsRequest {}

message TutorListMyActivePathAssignmentsResponse {
  repeated TutorPathAssignment items = 1;
}

message TutorAdvancePathStepRequest {
  string assignment_id = 1;
}

message TutorAdvancePathStepResponse {
  TutorPathAssignment assignment = 1;
  // True when this advance completed the path (current_step == total_steps).
  bool completed = 2;
}

service TutorService {
  // CreateInvite — tutor-authenticated. tutor_id taken from bearer.
  rpc CreateInvite(TutorCreateInviteRequest) returns (TutorInvite) {
    option (google.api.http) = {
      post: "/api/v1/tutor/invites"
      body: "*"
    };
  }

  // InviteByUsername — pre-binds invite к конкретному юзеру (вместо
  // out-of-band отправки кода). Студент видит pending invite на /profile
  // через ListPendingInvitesForMe + accept одним кликом.
  rpc InviteByUsername(TutorInviteByUsernameRequest) returns (TutorInvite) {
    option (google.api.http) = {
      post: "/api/v1/tutor/invites/by-username"
      body: "*"
    };
  }

  // ListPendingInvitesForMe — student-side. Возвращает invites
  // адресованные мне (target_user_id == me).
  rpc ListPendingInvitesForMe(TutorListPendingInvitesForMeRequest) returns (TutorListPendingInvitesForMeResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/invites/pending-for-me"};
  }

  // RevokeInvite — tutor-only; verifies tutor owns the invite.
  rpc RevokeInvite(TutorRevokeInviteRequest) returns (TutorInvite) {
    option (google.api.http) = {
      post: "/api/v1/tutor/invites/{invite_id}/revoke"
      body: "*"
    };
  }

  // ListInvites — tutor's own invites, recent first.
  rpc ListInvites(TutorListInvitesRequest) returns (TutorListInvitesResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/invites"};
  }

  // PeekInvite — PUBLIC. Used by the /invite/{code} landing before
  // the student has authed. Returns enough metadata to decide the
  // CTA (Active → «Accept»; Expired/Revoked → message; Accepted →
  // «You already accepted» if accepted_by matches the viewer once
  // they auth, but that join is a frontend concern).
  rpc PeekInvite(TutorPeekInviteRequest) returns (TutorPeekInviteResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/invites/peek/{code}"};
  }

  // AcceptInvite — student-authenticated. student_id taken from bearer.
  rpc AcceptInvite(TutorAcceptInviteRequest) returns (TutorRelationship) {
    option (google.api.http) = {
      post: "/api/v1/tutor/invites/accept"
      body: "*"
    };
  }

  // ListStudents — tutor's active students.
  rpc ListStudents(TutorListStudentsRequest) returns (TutorListStudentsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/students"};
  }

  // ListMyTutors — Wave 9.4 multi-tutor support. Student-side endpoint
  // that returns all active tutors of the caller. Schema already allows
  // a student to have multiple tutors concurrently (e.g. English-tutor +
  // Math-tutor); this RPC is what the student-facing UI calls to surface
  // them. Reuses the TutorListStudents response shape (relationships).
  rpc ListMyTutors(TutorListMyTutorsRequest) returns (TutorListStudentsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/my-tutors"};
  }

  // EndRelationship — tutor soft-ends a relationship.
  rpc EndRelationship(TutorEndRelationshipRequest) returns (TutorEndRelationshipResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/students/{student_id}/end"
      body: "*"
    };
  }

  // GetStudentSnapshot — Wave 2.4b. Per-student aggregate (focus
  // minutes / English HR mocks / Atlas weak-spots / notes count).
  // Tutor must own the relationship; foreign-id probes return
  // NotFound, not PermissionDenied (cross-user leak protection).
  rpc GetStudentSnapshot(TutorGetStudentSnapshotRequest) returns (TutorStudentSnapshot) {
    option (google.api.http) = {get: "/api/v1/tutor/students/{student_id}/snapshot"};
  }

  // GeneratePreSessionBrief — Wave 2.5. Snapshot + LLM-rendered
  // 1-page Russian narrative. Brief field empty when LLMChain
  // unavailable; the snapshot fallback is always populated.
  rpc GeneratePreSessionBrief(TutorGenerateBriefRequest) returns (TutorPreSessionBrief) {
    option (google.api.http) = {get: "/api/v1/tutor/students/{student_id}/brief"};
  }

  // ── Wave 5.1 — assignments ───────────────────────────────────────
  // PushAssignment — tutor authors a piece of work for one student.
  rpc PushAssignment(TutorPushAssignmentRequest) returns (TutorAssignment) {
    option (google.api.http) = {
      post: "/api/v1/tutor/students/{student_id}/assignments"
      body: "*"
    };
  }

  // ListAssignmentsForTutor — full backlog for one student (active +
  // completed + archived). Tutor-side dashboard view.
  rpc ListAssignmentsForTutor(TutorListAssignmentsRequest) returns (TutorListAssignmentsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/students/{student_id}/assignments"};
  }

  // ListPendingAssignments — student-side feed: «what tutors pushed
  // me that I haven't done yet». Excludes completed + archived.
  rpc ListPendingAssignments(TutorListPendingAssignmentsRequest) returns (TutorListAssignmentsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/assignments/pending"};
  }

  // CompleteAssignment — student stamps completed_at. Idempotent;
  // re-call returns FailedPrecondition (ErrAlreadyCompleted).
  rpc CompleteAssignment(TutorCompleteAssignmentRequest) returns (TutorCompleteAssignmentResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/assignments/{assignment_id}/complete"
      body: "*"
    };
  }

  // ArchiveAssignment — tutor withdraws a stale assignment.
  rpc ArchiveAssignment(TutorArchiveAssignmentRequest) returns (TutorArchiveAssignmentResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/assignments/{assignment_id}/archive"
      body: "*"
    };
  }

  // BroadcastAssignment — Wave 5.2a (slice of Tier 3). Sends the same
  // assignment body to ALL of the tutor's active students in one call.
  // Partial-failure semantics: response carries `pushed` + `failed`
  // arrays so the UI can show «Pushed to 5 / 6 students» and let the
  // tutor retry the one that failed.
  rpc BroadcastAssignment(TutorBroadcastAssignmentRequest) returns (TutorBroadcastAssignmentResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/assignments/broadcast"
      body: "*"
    };
  }

  // ── Reading library (Wave pivot 2026-05-02) ──────────────────────
  // Tutor отправляет recommended-reading сразу всем студентам И persist'ит
  // запись в history. Под капотом — BroadcastAssignment + INSERT в
  // tutor_shared_materials. UI: SharedReadingPane на TutorDashboard.
  rpc PushSharedReading(TutorPushSharedReadingRequest) returns (TutorPushSharedReadingResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/shared-reading"
      body: "*"
    };
  }
  rpc ListSharedReading(TutorListSharedReadingRequest) returns (TutorListSharedReadingResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/shared-reading"};
  }

  // ── Wave 5.2b — scheduled events ─────────────────────────────────
  // CreateEvent — tutor schedules a calendar event for one student.
  // V1 supports the 1-on-1 (student_id) flow; circle (group) events
  // are wired into the schema (migration 00016) for V2.
  rpc CreateEvent(TutorCreateEventRequest) returns (TutorEvent) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events"
      body: "*"
    };
  }

  // CancelEvent — tutor cancels a scheduled event with a reason.
  // Already-terminal events return FailedPrecondition.
  rpc CancelEvent(TutorCancelEventRequest) returns (TutorCancelEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events/{event_id}/cancel"
      body: "*"
    };
  }

  // CompleteEvent — tutor stamps status=completed with a session note.
  // Already-terminal events return FailedPrecondition. Session note is
  // required (mirrors SQL CHECK).
  rpc CompleteEvent(TutorCompleteEventRequest) returns (TutorCompleteEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events/{event_id}/complete"
      body: "*"
    };
  }

  // ListEventsForTutor — tutor's calendar list, all statuses included.
  rpc ListEventsForTutor(TutorListEventsRequest) returns (TutorListEventsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/events"};
  }

  // ListUpcomingEventsForStudent — student-side feed: scheduled events
  // whose end time hasn't passed yet, earliest-first.
  rpc ListUpcomingEventsForStudent(TutorListUpcomingEventsRequest) returns (TutorListEventsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/events/upcoming"};
  }

  // GetTutorActivity — Wave 9.5 dashboard analytics. Active student
  // count + event counters + minutes taught + cancellation rate over
  // the trailing window (default 30 days).
  rpc GetTutorActivity(TutorGetActivityRequest) returns (TutorActivityResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/activity"};
  }

  // ListMyTutorsActivity — Phase K T6 (2026-05-12). Student-side
  // social-proof surface: «Тебя сегодня учат: Alice (2 other students),
  // Bob (1 student) recently active». Returns one row per active tutor.
  // Privacy: NO other-student names / ids / event titles — only
  // aggregate counts + tutor's own public display fields. 5-min cache.
  rpc ListMyTutorsActivity(TutorMyTutorsActivityRequest) returns (TutorMyTutorsActivityResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/my-tutors/activity"};
  }

  // ── Wave 5.2 group events on circles ──────────────────────────────
  // CreateGroupEvent — tutor schedules a calendar event bound to a
  // circle (group class). Tutor must own / admin the circle.
  rpc CreateGroupEvent(TutorCreateGroupEventRequest) returns (TutorEvent) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events/group"
      body: "*"
    };
  }
  // JoinEvent — student RSVPs to a group event. Capacity-respecting;
  // returns FailedPrecondition (CapacityFull) when at limit.
  rpc JoinEvent(TutorJoinEventRequest) returns (TutorJoinEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events/{event_id}/join"
      body: "*"
    };
  }
  // LeaveEvent — student withdraws RSVP. Idempotent.
  rpc LeaveEvent(TutorLeaveEventRequest) returns (TutorLeaveEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events/{event_id}/leave"
      body: "*"
    };
  }
  // ListUpcomingGroupEvents — student-side feed of group events on
  // circles they're a member of. Excludes 1-on-1 (those flow through
  // ListUpcomingEventsForStudent).
  rpc ListUpcomingGroupEventsForStudent(TutorListUpcomingGroupEventsRequest) returns (TutorListEventsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/events/upcoming/group"};
  }
  // GetEventRSVPCount — current RSVP tally for a group event. Both
  // tutor (their own) and student (events they can see) read this.
  rpc GetEventRSVPCount(TutorGetEventRSVPCountRequest) returns (TutorGetEventRSVPCountResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/events/{event_id}/rsvp-count"};
  }

  // GetSessionNotes (Phase 3.3) — tutor reads его собственные заметки
  // про студента. body — empty string если notes ещё не создавались.
  // Студент свои notes не видит (доступ tutor-only).
  rpc GetSessionNotes(TutorGetSessionNotesRequest) returns (TutorSessionNotes) {
    option (google.api.http) = {get: "/api/v1/tutor/students/{student_id}/notes"};
  }

  // SaveSessionNotes — upsert markdown-блока. Empty body разрешён
  // («очистил блок»). Auto-save из UI по дебаунсу 1.5s.
  rpc SaveSessionNotes(TutorSaveSessionNotesRequest) returns (TutorSessionNotes) {
    option (google.api.http) = {
      put: "/api/v1/tutor/students/{student_id}/notes"
      body: "*"
    };
  }

  // ── Reading paths (Stream D, 2026-05-12) ──────────────────────────
  //
  // Tutor-side CRUD for curated atlas-node sequences. Backend enforces
  // tutor_id from bearer; per-row auth via `WHERE tutor_id = $caller`.

  rpc ListReadingPaths(TutorListReadingPathsRequest) returns (TutorListReadingPathsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/paths"};
  }

  rpc CreateReadingPath(TutorCreateReadingPathRequest) returns (TutorReadingPath) {
    option (google.api.http) = {
      post: "/api/v1/tutor/paths"
      body: "*"
    };
  }

  rpc UpdateReadingPath(TutorUpdateReadingPathRequest) returns (TutorReadingPath) {
    option (google.api.http) = {
      put: "/api/v1/tutor/paths/{path_id}"
      body: "*"
    };
  }

  rpc ArchiveReadingPath(TutorArchiveReadingPathRequest) returns (TutorArchiveReadingPathResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/paths/{path_id}/archive"
      body: "*"
    };
  }

  // ── Path assignments (Phase K T2+T3, 2026-05-12) ─────────────────────

  // AssignReadingPath — single click: tutor выбирает path + student →
  // server creates assignment record + emits per-step TutorAssignment
  // entries through PushAssignment mechanism. Snapshot of path content
  // is pinned at assign time. Re-assign после archive — OK (unique
  // constraint relaxes when archived_at IS NOT NULL).
  rpc AssignReadingPath(TutorAssignReadingPathRequest) returns (TutorAssignReadingPathResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/paths/{path_id}/assign"
      body: "*"
    };
  }

  // ListMyActivePathAssignments — student-side. Returns paths assigned
  // to me that aren't completed/archived, with denormalised path_name +
  // tutor_display_name so Hone «Active Paths» pane не делает N+1.
  rpc ListMyActivePathAssignments(TutorListMyActivePathAssignmentsRequest) returns (TutorListMyActivePathAssignmentsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/paths/active"};
  }

  // AdvancePathStep — student or server bumps current_step by 1. When
  // current_step reaches total_steps, completed_at is stamped и
  // assignment перестаёт показываться в active list. Idempotent on the
  // boundary: calling once-already-complete returns the row + completed=true.
  rpc AdvancePathStep(TutorAdvancePathStepRequest) returns (TutorAdvancePathStepResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/path-assignments/{assignment_id}/advance"
      body: "*"
    };
  }

  // ── Directory (Phase K T1, 2026-05-12) ────────────────────────────
  //
  // Student-discovery surface. Until now tutors could only acquire
  // students via invite_code или InviteByUsername — both assume the
  // tutor knows the student. The directory inverts the flow: tutors
  // opt-in by publishing a profile, students browse + apply.
  //
  // Identity rule: free per identity, не marketplace. Schema has NO
  // rates / payment fields. Verification badge is admin-only анти-spam.

  rpc GetMyDirectoryProfile(TutorGetMyDirectoryProfileRequest) returns (TutorGetMyDirectoryProfileResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/directory/me"};
  }

  rpc UpsertDirectoryProfile(TutorUpsertDirectoryProfileRequest) returns (TutorUpsertDirectoryProfileResponse) {
    option (google.api.http) = {
      put: "/api/v1/tutor/directory/me"
      body: "*"
    };
  }

  rpc ListDirectoryTutors(TutorListDirectoryTutorsRequest) returns (TutorListDirectoryTutorsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/directory"};
  }

  rpc ApplyToTutor(TutorApplyToTutorRequest) returns (TutorApplyToTutorResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/directory/apply"
      body: "*"
    };
  }

  rpc ListPendingApplications(TutorListPendingApplicationsRequest) returns (TutorListPendingApplicationsResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/directory/applications"};
  }

  rpc AcceptApplication(TutorAcceptApplicationRequest) returns (TutorAcceptApplicationResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/directory/applications/{application_id}/accept"
      body: "*"
    };
  }

  rpc DeclineApplication(TutorDeclineApplicationRequest) returns (TutorDeclineApplicationResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/directory/applications/{application_id}/decline"
      body: "*"
    };
  }

  // ── Session-note visibility (Phase K T4, 2026-05-13) ─────────────────
  //
  // Tutor's per-event session_note (recorded на CompleteEvent) is PRIVATE
  // by default. T4 lets the tutor opt in to share the note with the
  // student — either as-is (full private note) или curated (separate
  // shared_content_md crafted для student-facing audience).

  // SetSessionNoteVisibility — tutor toggles share + optionally edits
  // curated student-facing copy. Visibility ∈ {'private','shared'}.
  // shared_content_md empty when sharing the raw private note as-is.
  // Tutor must own the event; non-completed events return FailedPrecondition.
  rpc SetSessionNoteVisibility(TutorSetSessionNoteVisibilityRequest) returns (TutorSetSessionNoteVisibilityResponse) {
    option (google.api.http) = {
      post: "/api/v1/tutor/events/{event_id}/note-visibility"
      body: "*"
    };
  }

  // ListSharedSessionNotesForStudent — student-side feed. Returns
  // completed events whose tutors opted to share the session note,
  // most-recently-shared first. Server fills tutor display_name +
  // event title так что student UI не делает N+1.
  rpc ListSharedSessionNotesForStudent(TutorListSharedSessionNotesForStudentRequest) returns (TutorListSharedSessionNotesForStudentResponse) {
    option (google.api.http) = {get: "/api/v1/tutor/session-notes/shared"};
  }
}

// TutorGetSessionNotesRequest — tutor читает свои заметки про студента.
message TutorGetSessionNotesRequest {
  string student_id = 1;
}

// TutorSaveSessionNotesRequest — upsert. body может быть пустой строкой.
message TutorSaveSessionNotesRequest {
  string student_id = 1;
  string body_md    = 2;
}

// TutorSessionNotes — текущее состояние notepad'а.
message TutorSessionNotes {
  string student_id = 1;
  string body_md    = 2;
  string updated_at = 3; // RFC3339, empty если row ещё нет
}

// ── Directory messages (Phase K T1, 2026-05-12) ───────────────────────

// TutorDirectoryProfile — full profile state. UserID = caller's id when
// returned via GetMyDirectoryProfile; never exposed via list view (use
// TutorDirectoryEntry for that).
message TutorDirectoryProfile {
  string user_id              = 1;
  bool   visible              = 2;
  string bio_md               = 3;
  repeated string expertise_tags = 4;
  repeated string languages   = 5;
  string timezone             = 6;
  string availability_md      = 7;
  string linkedin_url         = 8;
  string github_url           = 9;
  // Empty string when not verified; RFC3339 timestamp when admin
  // flipped verified_at. Frontend uses presence-check для badge.
  string verified_at          = 10;
  string application_message  = 11;
  string created_at           = 12; // RFC3339
  string updated_at           = 13; // RFC3339
}

// TutorDirectoryEntry — public-ish list projection. Excludes private
// fields (linkedin_url, github_url, availability_md, application_message).
// Joined с users для display fields.
message TutorDirectoryEntry {
  string user_id        = 1;
  string display_name   = 2;
  string username       = 3;
  string avatar_url     = 4;
  string bio_md         = 5;
  repeated string expertise_tags = 6;
  repeated string languages = 7;
  string timezone       = 8;
  bool   verified       = 9;
}

// TutorDirectoryApplication — pending application row для tutor's queue.
message TutorDirectoryApplication {
  string id            = 1;
  string tutor_id      = 2;
  string student_id    = 3;
  string message       = 4;
  TutorApplicationStatus status = 5;
  string created_at    = 6; // RFC3339
  // Student display info (server-filled from users JOIN). Empty when
  // student row is unavailable (extremely rare — ON DELETE CASCADE).
  string student_display_name = 7;
  string student_username     = 8;
  string student_avatar_url   = 9;
}

message TutorGetMyDirectoryProfileRequest {}
message TutorGetMyDirectoryProfileResponse {
  TutorDirectoryProfile profile = 1;
}

message TutorUpsertDirectoryProfileRequest {
  bool   visible              = 1;
  string bio_md               = 2;
  repeated string expertise_tags = 3;
  repeated string languages   = 4;
  string timezone             = 5;
  string availability_md      = 6;
  string linkedin_url         = 7;
  string github_url           = 8;
  string application_message  = 9;
}
message TutorUpsertDirectoryProfileResponse {
  TutorDirectoryProfile profile = 1;
}

message TutorListDirectoryTutorsRequest {
  repeated string expertise_tags = 1; // OR semantics across tags
  repeated string languages      = 2; // OR semantics across languages
  int32  page_size               = 3; // 0 → server default (25), max 100
  string page_token              = 4; // opaque cursor
}
message TutorListDirectoryTutorsResponse {
  repeated TutorDirectoryEntry items = 1;
  string next_page_token             = 2; // empty when no more pages
}

message TutorApplyToTutorRequest {
  string tutor_user_id = 1;
  string message       = 2; // max 500 chars
}
message TutorApplyToTutorResponse {
  TutorDirectoryApplication application = 1;
}

message TutorListPendingApplicationsRequest {}
message TutorListPendingApplicationsResponse {
  repeated TutorDirectoryApplication items = 1;
}

message TutorAcceptApplicationRequest  { string application_id = 1; }
message TutorAcceptApplicationResponse {
  TutorRelationship relationship = 1;
}

message TutorDeclineApplicationRequest  { string application_id = 1; }
message TutorDeclineApplicationResponse {}

// ── Session-note visibility messages (Phase K T4, 2026-05-13) ────────

message TutorSetSessionNoteVisibilityRequest {
  string event_id          = 1;
  TutorEventVisibility visibility = 2;
  // Optional. Empty string + visibility==SHARED = share raw private note.
  string shared_content_md = 3;
}

message TutorSetSessionNoteVisibilityResponse {
  // Refreshed event row (visibility / shared_content_md / shared_at).
  TutorEvent event = 1;
}

// TutorSharedSessionNote — student-side projection of a shared note.
// Combines event metadata + tutor display info so the UI doesn't N+1.
message TutorSharedSessionNote {
  string event_id              = 1;
  string event_title           = 2;
  string tutor_id              = 3;
  string tutor_display_name    = 4;
  string tutor_avatar_url      = 5;
  google.protobuf.Timestamp scheduled_at = 6;
  google.protobuf.Timestamp shared_at    = 7;
  // The content the student should see: server resolves shared_content_md
  // if non-empty, else falls back to session_note. Always non-empty for
  // rows returned here (only shared+completed events qualify).
  string shared_content_md     = 8;
}

message TutorListSharedSessionNotesForStudentRequest {
  int32  limit  = 1; // 0 → server default (25), max 200
  string cursor = 2; // opaque keyset cursor (shared_at DESC, id DESC)
}

message TutorListSharedSessionNotesForStudentResponse {
  repeated TutorSharedSessionNote items = 1;
  string next_cursor = 2; // empty when no more pages
}

