// quiz.proto — Connect-RPC contract for the `quiz` bounded context.
//
// One implementation, two wire formats:
//   - Native Connect at /druz9.v1.QuizService/<Method>
//   - REST aliases at /api/v1/quiz/* via google.api.http annotations,
//     transcoded by vanguard at the cmd/monolith mount point.
//
// Use cases live in services/quiz/app; the ports/server.go file is a thin
// adapter from Connect requests to those use cases.
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// QuizQuestion — one item shown to the user during the session.
//
// `source` is a string ("codex" | "mock_interview" | "mixed") rather than a
// proto enum so the existing REST clients (frontend QuizPage) can stay on
// lowercase wire values without needing UPPERCASE_SNAKE proto3-JSON names.
// Validation happens server-side via domain.QuestionSource.IsValid().
message QuizQuestion {
  string id = 1;
  string source = 2;
  string topic = 3;        // optional
  string question_md = 4;
  string answer_hint = 5;  // optional
  string reading_link = 6; // optional, codex deep-link
}

// QuizJudgement — grader verdict for one answer.
message QuizJudgement {
  string question_id = 1;
  bool correct = 2;
  string explanation = 3; // optional
}

// ── RPCs ──────────────────────────────────────────────────────────────────

message StartQuizSessionRequest {
  string source = 1;
  string topic = 2; // optional filter
  int32 count = 3;  // 0 ⇒ server default (5)
}

message StartQuizSessionResponse {
  string session_id = 1;
  string source = 2;
  repeated QuizQuestion questions = 3;
  int64 expires_at = 4; // unix seconds
}

message SubmitQuizSessionRequest {
  string session_id = 1;
  // answer text per question_id.
  map<string, string> answers = 2;
}

message SubmitQuizSessionResponse {
  string session_id = 1;
  string source = 2;
  int32 total = 3;
  int32 correct = 4;
  repeated QuizJudgement judgements = 5;
}

service QuizService {
  // StartSession draws N questions from the requested source/topic and
  // persists a server-side session in Redis.
  rpc StartSession(StartQuizSessionRequest) returns (StartQuizSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/quiz/start"
      body: "*"
    };
  }

  // SubmitSession grades all answers, publishes shared.QuizSessionCompleted
  // on the bus, and deletes the session.
  rpc SubmitSession(SubmitQuizSessionRequest) returns (SubmitQuizSessionResponse) {
    option (google.api.http) = {
      post: "/api/v1/quiz/{session_id}/submit"
      body: "*"
    };
  }
}
