// ai_mock.proto — Connect-RPC contract for the `ai_mock` bounded context.
//
// Covers the six /mock/session/* REST endpoints. The /ws/mock/{sessionId}
// WebSocket is NOT modelled here — it stays as a raw chi route wired to
// mockWS.Handle in main.go (token streaming + stress pushes are out of scope
// for Connect transcoding).
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// MockTaskPublic mirrors OpenAPI TaskPublic used by ai_mock. Kept separate from
// ArenaTaskPublic to avoid cross-service coupling, though the wire shape is
// identical.
message MockTaskPublic {
  string id = 1;
  string slug = 2;
  string title = 3;
  string description = 4;
  Difficulty difficulty = 5;
  Section section = 6;
}

// MockStressProfile mirrors OpenAPI StressProfile.
message MockStressProfile {
  int32 pauses_score = 1;
  int32 backspace_score = 2;
  int32 chaos_score = 3;
  int32 paste_attempts = 4;
}

// MockMessage mirrors OpenAPI MockMessage.
message MockMessage {
  string id = 1;
  MessageRole role = 2;
  string content = 3;
  int32 tokens_used = 4;
  google.protobuf.Timestamp created_at = 5;
}

// MockSession mirrors OpenAPI MockSession.
message MockSession {
  string id = 1;
  MockStatus status = 2;
  string company_id = 3;
  Section section = 4;
  Difficulty difficulty = 5;
  int32 duration_min = 6;
  MockTaskPublic task = 7;
  google.protobuf.Timestamp started_at = 8;
  google.protobuf.Timestamp finished_at = 9;
  repeated MockMessage last_messages = 10;
  MockStressProfile stress_profile = 11;
  // ai_assist — true if the candidate opted into Cue copilot help for this
  // session. When false, copilot.CheckBlock returns blocked=true while the
  // session is live. Phase-4 ADR-001 (Wave 3) — migration 00040.
  bool ai_assist = 12;
}

// CreateMockRequest mirrors OpenAPI CreateMockRequest.
message CreateMockRequest {
  string company_id = 1;
  Section section = 2;
  Difficulty difficulty = 3;
  int32 duration_min = 4;
  bool voice_mode = 5;
  string paired_user_id = 6;
  bool devils_advocate = 7;
  LLMModel llm_model = 8;
  // ai_assist — caller opts into Cue copilot help for this mock. Default
  // (false) is strict / "fair" mode and the desktop client must refuse to
  // consult the LLM until the session ends.
  bool ai_assist = 9;
}

// MockMessageRequest mirrors OpenAPI MockMessageRequest.
message MockMessageRequest {
  string session_id = 1; // path param
  string content = 2;
  string code_snapshot = 3;
  string voice_transcript = 4;
}

// StressEvent mirrors OpenAPI StressEvent. Metadata is free-form JSON in
// OpenAPI; proto collapses it to map<string,string> (scalar values round-trip
// safely; complex values should be JSON-encoded as strings at the edge).
message StressEvent {
  EditorEventType type = 1;
  int64 at_ms = 2;
  int64 duration_ms = 3;
  map<string, string> metadata = 4;
}

// StressEventsBatch mirrors OpenAPI StressEventsBatch.
message StressEventsBatch {
  string session_id = 1; // path param
  repeated StressEvent events = 2;
}

// MockScoredSection mirrors OpenAPI ScoredSection.
message MockScoredSection {
  int32 score = 1;
  string comment = 2;
}

// MockReportSections mirrors the inline `sections` object on OpenAPI MockReport.
message MockReportSections {
  MockScoredSection problem_solving = 1;
  MockScoredSection code_quality = 2;
  MockScoredSection communication = 3;
  MockScoredSection stress_handling = 4;
}

// MockRecommendationAction mirrors the OpenAPI Recommendation.action struct.
message MockRecommendationAction {
  string kind = 1;
  map<string, string> params = 2;
}

// MockRecommendation mirrors OpenAPI Recommendation (re-declared here to avoid
// a cross-service import from profile.proto).
message MockRecommendation {
  string title = 1;
  string description = 2;
  MockRecommendationAction action = 3;
}

// MockReportStatus — wire-закрытый набор статусов отчёта.
// PROCESSING — отчёт в очереди / генерится. READY — сформирован, можно
// читать sections/score/etc. Wire JSON эмитит NAME (MOCK_REPORT_STATUS_READY).
enum MockReportStatus {
  MOCK_REPORT_STATUS_UNSPECIFIED = 0;
  MOCK_REPORT_STATUS_PROCESSING = 1;
  MOCK_REPORT_STATUS_READY = 2;
}

// MockReport mirrors OpenAPI MockReport.
message MockReport {
  string session_id = 1;
  MockReportStatus status = 2;
  int32 overall_score = 3;
  MockReportSections sections = 4;
  repeated string strengths = 5;
  repeated string weaknesses = 6;
  repeated MockRecommendation recommendations = 7;
  string stress_analysis = 8;
  string replay_url = 9;
}

// Empty request shapes.
message GetMockSessionRequest {
  string session_id = 1;
}
message FinishMockSessionRequest {
  string session_id = 1;
}
message GetMockReportRequest {
  string session_id = 1;
}

service MockService {
  // CreateSession starts a new AI mock interview.
  rpc CreateSession(CreateMockRequest) returns (MockSession) {
    option (google.api.http) = {
      post: "/api/v1/mock/session"
      body: "*"
    };
  }

  // GetSession loads a mock session + its last messages.
  rpc GetSession(GetMockSessionRequest) returns (MockSession) {
    option (google.api.http) = {get: "/api/v1/mock/session/{session_id}"};
  }

  // SendMessage appends a user message and returns the assistant reply.
  rpc SendMessage(MockMessageRequest) returns (MockMessage) {
    option (google.api.http) = {
      post: "/api/v1/mock/session/{session_id}/message"
      body: "*"
    };
  }

  // IngestStress folds a batch of editor events into the session's stress
  // profile.
  rpc IngestStress(StressEventsBatch) returns (StressEventsBatch) {
    option (google.api.http) = {
      post: "/api/v1/mock/session/{session_id}/stress"
      body: "*"
    };
  }

  // FinishSession closes the session and enqueues the report job.
  rpc FinishSession(FinishMockSessionRequest) returns (MockSession) {
    option (google.api.http) = {
      post: "/api/v1/mock/session/{session_id}/finish"
      body: "*"
    };
  }

  // GetReport returns the final AI report for a finished session.
  rpc GetReport(GetMockReportRequest) returns (MockReport) {
    option (google.api.http) = {get: "/api/v1/mock/session/{session_id}/report"};
  }

  // GetInsightsOverview powers the /insights page's three live cards.
  rpc GetInsightsOverview(GetInsightsOverviewRequest) returns (InsightsOverview) {
    option (google.api.http) = {get: "/api/v1/mock/insights/overview"};
  }
}

message GetInsightsOverviewRequest {}

message StagePerformance {
  string stage_kind = 1;
  int32 total = 2;
  int32 passed = 3;
  int32 pass_rate = 4;
}

message RecurringPattern {
  string point = 1;
  int32 count = 2;
}

message ScoreTrajectoryPoint {
  string pipeline_id = 1;
  string finished_at = 2;
  double score = 3;
  string verdict = 4;
}

// EnglishHRTrendPoint — Wave 1 of docs/feature/english.md. One finished
// English HR mock as a sparkline datapoint. SessionID enables deep-link
// from the Insights card back to the per-round result page.
message EnglishHRTrendPoint {
  string session_id = 1;
  string finished_at = 2; // RFC3339 UTC
  int32 score = 3;
}

// EnglishHRTrend — aggregated stats for the user's English HR mocks
// over the trailing window. total_sessions == 0 is the empty state
// (frontend hides the widget rather than rendering a zero-card).
message EnglishHRTrend {
  int32 total_sessions = 1;
  int32 avg_score = 2;
  int32 last_score = 3;
  string last_finished_at = 4; // RFC3339 UTC, empty when total_sessions==0
  repeated EnglishHRTrendPoint trajectory = 5;
}

message InsightsOverview {
  int32 window_days = 1;
  repeated StagePerformance stage_performance = 2;
  repeated RecurringPattern recurring_patterns = 3;
  repeated ScoreTrajectoryPoint score_trajectory = 4;
  int32 total_sessions_30d = 5;
  int32 pipeline_pass_rate_30d = 6;
  string summary = 7;
  // English HR-specific aggregation. Optional in the wire — old clients
  // that ignore the field still render the engineering panel correctly.
  EnglishHRTrend english_hr = 8;
}
