// subscription.proto — Connect-RPC контракт централизованного subscription-
// сервиса. Хранит tier пользователя (free/pro/max) + его lifecycle
// (active/cancelled/expired) + привязку к провайдеру оплаты. Источник правды
// для доступа к платным LLM-моделям (см. llmchain.candidates tier-gate) и
// для фронта (paywall / upgrade-банер). Используется и druz9, и Hone, и
// будущими проектами через shared/pkg/subclient.
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

service SubscriptionService {
  // GetMyTier — эндпоинт для авторизованного пользователя. user_id
  // резолвится из JWT, поэтому в запросе пусто.
  rpc GetMyTier(GetMyTierRequest) returns (GetMyTierResponse) {
    option (google.api.http) = { get: "/api/v1/subscription/tier" };
  }

  // GetTierByUserID — internal RPC для service-to-service вызовов
  // (druz9 llmchain-gate, Hone, будущие). REST не expose'им, только
  // Connect-path /druz9.v1.SubscriptionService/GetTierByUserID.
  rpc GetTierByUserID(GetTierByUserIDRequest) returns (GetTierByUserIDResponse);

  // AdminSetTier — выставление tier'а вручную. Требует role=admin.
  rpc AdminSetTier(AdminSetTierRequest) returns (AdminSetTierResponse) {
    option (google.api.http) = { post: "/api/v1/admin/subscriptions/set-tier" body: "*" };
  }

  // GetQuota — current usage + policy snapshot for the calling user. The
  // chi handler returned a "degraded" zero snapshot on errors; the proto
  // RPC keeps that contract.
  rpc GetQuota(GetQuotaRequest) returns (QuotaSnapshot) {
    option (google.api.http) = {get: "/api/v1/subscription/quota"};
  }

  // GetTier — Stream-C MVP: возвращает эффективный tier + источник
  // (free/pro/byok/tutor) + expiry. Это «правильная» проекция для UI:
  // отличает paid Pro от BYOK-unlocked Pro, тогда как GetMyTier даёт
  // только запись из subscriptions table.
  rpc GetTier(google.protobuf.Empty) returns (TierInfo) {
    option (google.api.http) = {get: "/api/v1/subscription/tier-info"};
  }

  // SetBYOKKey — юзер приносит свой LLM API key. Сервер валидирует ключ
  // против test-endpoint'а провайдера (1 token min request) и сохраняет
  // в зашифрованном виде (AES-256-GCM, env BYOK_ENCRYPTION_KEY).
  // Возвращает обновлённый TierInfo (source='byok' on success).
  rpc SetBYOKKey(SetBYOKKeyRequest) returns (TierInfo) {
    option (google.api.http) = {post: "/api/v1/subscription/byok" body: "*"};
  }

  // RemoveBYOKKey — снять BYOK-ключ. После этого юзер откатывается к
  // прежнему source (free или paid Pro).
  rpc RemoveBYOKKey(google.protobuf.Empty) returns (TierInfo) {
    option (google.api.http) = {delete: "/api/v1/subscription/byok"};
  }

  // CreateCheckoutSession — Stream-C Stripe MVP. Запускает Checkout flow:
  // backend создаёт Session, фронт редиректит на checkout_url. После оплаты
  // webhook checkout.session.completed выставляет tier=Pro.
  rpc CreateCheckoutSession(CreateCheckoutSessionRequest) returns (CheckoutSessionResponse) {
    option (google.api.http) = {post: "/api/v1/subscription/checkout" body: "*"};
  }

  // CancelSubscription — отмена автопродления. Stripe выставляет
  // cancel_at_period_end=true; до period_end юзер сохраняет Pro доступ.
  // После period_end webhook customer.subscription.deleted откатит tier
  // в Free.
  rpc CancelSubscription(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {post: "/api/v1/subscription/cancel" body: "*"};
  }
}

message QuotaPolicy {
  int32 synced_notes = 1;
  int32 active_shared_boards = 2;
  int32 active_shared_rooms = 3;
  int64 shared_ttl_seconds = 4;
  int32 ai_monthly = 5;
}

message QuotaUsage {
  int32 synced_notes = 1;
  int32 active_shared_boards = 2;
  int32 active_shared_rooms = 3;
  int32 ai_this_month = 4;
}

message GetQuotaRequest {}

message QuotaSnapshot {
  string tier = 1;
  QuotaPolicy policy = 2;
  QuotaUsage usage = 3;
}

message GetMyTierRequest {}

message GetMyTierResponse {
  string tier = 1;                                // "free"|"pro"|"max"
  string status = 2;                              // "active"|"cancelled"|"expired"
  google.protobuf.Timestamp current_period_end = 3; // null для admin-выдачи без expiry
  google.protobuf.Timestamp grace_until = 4;      // effective expiry (CPE + 24h)
  string provider = 5;                            // "boosty"|"admin"|... — для UI подписи
}

message GetTierByUserIDRequest { string user_id = 1; }
message GetTierByUserIDResponse { string tier = 1; }

message AdminSetTierRequest {
  string user_id = 1;
  string tier = 2;
  google.protobuf.Timestamp current_period_end = 3; // null = бессрочно (admin grant)
  string reason = 4;                                 // в audit log
}

message AdminSetTierResponse { bool ok = 1; }

// TierInfo — Stream-C tier projection. Отличает источник tier'а:
//   "free"  → нет ни paid Pro, ни BYOK
//   "pro"   → paid через Stripe/Boosty
//   "byok"  → юзер привязал свой LLM API key
//   "tutor" → user играет роль tutor'а (≥1 student). NOT a paywall —
//             информационный флаг для UI («ты в tutor-режиме»).
message TierInfo {
  // canonical Tier value ("free"|"pro"|"max")
  string tier = 1;
  // источник tier'а (см. message-комментарий)
  string source = 2;
  // expiry для paid Pro; nil для free / bessrochny admin / byok
  google.protobuf.Timestamp expires_at = 3;
  // для UI: какой провайдер ключа подключён в byok (openrouter/groq/...).
  // Пусто для не-byok source.
  string byok_provider = 4;
}

message SetBYOKKeyRequest {
  string provider = 1; // 'openrouter'|'groq'|'cerebras'|'anthropic'|'openai'
  string api_key  = 2; // plain, передаётся по TLS; шифруется на сервере
}

// CreateCheckoutSessionRequest — Stripe Checkout payload. Server lazy-create'ит
// stripe_customer_id для юзера если ещё нет.
message CreateCheckoutSessionRequest {
  // Куда Stripe редиректит после успешной оплаты (absolute URL).
  string success_url = 1;
  // Куда после cancel / back (absolute URL).
  string cancel_url = 2;
  // Optional price_id override. Пусто = server use STRIPE_PRICE_ID_PRO_MONTHLY.
  // Зарезервировано для будущего Max tier.
  string price_id = 3;
  // trial_days — explicit trial period override. 0 = server applies default
  // (7 дней first-time subscribers, иначе 0). >0 = принудительный trial этой
  // длины. <0 не сериализуется (proto uint32); чтобы отключить trial для
  // паид-юзера используется существующая paid-subscription detection.
  uint32 trial_days = 4;
}

// CheckoutSessionResponse — то, что фронт получает из CreateCheckoutSession.
// Фронт делает window.location = checkout_url; session_id логируется на
// случай support-ticket'а («не открылась оплата» — id для дебага).
message CheckoutSessionResponse {
  string session_id   = 1;
  string checkout_url = 2;
}
