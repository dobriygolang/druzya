// notify.proto — Connect-RPC contract for the `notify` bounded context.
//
// Covers the two user-facing preference endpoints. The Telegram bot webhook
// at /api/v1/notify/telegram/webhook is NOT modelled here — it's a raw
// chi-registered handler that verifies its own X-Telegram-Bot-Api-Secret-Token
// header and stays outside Connect.
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// QuietHours mirrors the optional OpenAPI `quiet_hours` object — both fields
// are "HH:MM" strings. When both are empty the server treats quiet hours as
// disabled. (proto3 lacks nullable wrappers; clients that need tri-state can
// check for an empty message via presence on the parent.)
message QuietHours {
  string from = 1; // "HH:MM"
  string to = 2;   // "HH:MM"
}

// NotificationPreferences mirrors the OpenAPI NotificationPreferences schema.
message NotificationPreferences {
  repeated NotificationChannel channels = 1;
  string telegram_chat_id = 2;
  // quiet_hours is optional in OpenAPI; proto3 message presence distinguishes
  // "set but empty" from "unset" at the wire level for typed Connect clients.
  QuietHours quiet_hours = 3;
  bool weekly_report_enabled = 4;
  bool skill_decay_warnings_enabled = 5;
}

message GetNotifyPreferencesRequest {}
message UpdateNotifyPreferencesRequest {
  NotificationPreferences preferences = 1;
}

service NotifyService {
  // GetPreferences returns the caller's notification preferences row.
  rpc GetPreferences(GetNotifyPreferencesRequest) returns (NotificationPreferences) {
    option (google.api.http) = {get: "/api/v1/notify/preferences"};
  }

  // UpdatePreferences upserts the caller's notification preferences.
  rpc UpdatePreferences(UpdateNotifyPreferencesRequest) returns (NotificationPreferences) {
    option (google.api.http) = {
      put: "/api/v1/notify/preferences"
      body: "preferences"
    };
  }

  // ─── In-app notifications feed ────────────────────────────────────────
  rpc ListNotifications(ListNotificationsRequest) returns (NotificationList) {
    option (google.api.http) = {get: "/api/v1/notifications"};
  }
  rpc CountUnread(CountUnreadRequest) returns (UnreadCount) {
    option (google.api.http) = {get: "/api/v1/notifications/unread_count"};
  }
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse) {
    option (google.api.http) = {
      post: "/api/v1/notifications/{id}/read"
      body: "*"
    };
  }
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse) {
    option (google.api.http) = {
      post: "/api/v1/notifications/read_all"
      body: "*"
    };
  }

  // ─── Support ticket (anonymous-readable POST) ─────────────────────────
  // schema_v2 forces contact_kind = "telegram"; clients that omit it get
  // the same default. Validation lives server-side — server returns
  // InvalidArgument on bad input.
  rpc CreateSupportTicket(CreateSupportTicketRequest) returns (CreateSupportTicketResponse) {
    option (google.api.http) = {
      post: "/api/v1/support/ticket"
      body: "*"
    };
  }
}

// ─── In-app feed payloads ───────────────────────────────────────────────────

message UserNotification {
  int64 id = 1;
  string channel = 2;
  string type = 3;
  string title = 4;
  string body = 5;
  // Payload is encoded as a JSON string on the wire so we don't need to
  // model every event variant in proto. Frontend parses it as needed.
  string payload_json = 6;
  int32 priority = 7;
  string read_at = 8;     // RFC3339, empty when unread
  string created_at = 9;  // RFC3339
}

message NotificationList {
  repeated UserNotification items = 1;
}

message ListNotificationsRequest {
  string channel = 1;          // optional filter
  bool only_unread = 2;
  string before = 3;           // RFC3339 cursor, optional
  int32 limit = 4;             // 0 ⇒ server default
}

message CountUnreadRequest {}

message UnreadCount {
  int64 count = 1;
}

message MarkReadRequest {
  int64 id = 1;
}

message MarkReadResponse {
  bool ok = 1;
}

message MarkAllReadRequest {}

message MarkAllReadResponse {
  int64 updated = 1;
}

// ─── Support ticket ─────────────────────────────────────────────────────────

message CreateSupportTicketRequest {
  string contact_kind = 1;     // "telegram" (only allowed value, schema_v2)
  string contact_value = 2;
  string subject = 3;
  string message = 4;
}

message CreateSupportTicketResponse {
  string ticket_id = 1;
  string created_at = 2;       // RFC3339
}
