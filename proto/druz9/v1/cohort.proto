// cohort.proto — Connect-RPC contract for the `cohort` bounded context.
//
// Covers cohort lookup, war state, and contribute endpoint. Contributors are
// modelled via a flat list on each WarLine (matches OpenAPI).
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// CohortMember mirrors OpenAPI CohortMember.
message CohortMember {
  string user_id = 1;
  string username = 2;
  // role is "captain" | "member" in OpenAPI; kept as string so we don't need
  // yet another tiny enum for 2 values.
  string role = 3;
  google.protobuf.Timestamp joined_at = 4;
  // assigned_section is optional — uses SECTION_UNSPECIFIED for "unassigned".
  Section assigned_section = 5;
}

// Cohort mirrors OpenAPI Cohort.
message Cohort {
  string id = 1;
  string name = 2;
  string emblem = 3;
  int32 cohort_elo = 4;
  repeated CohortMember members = 5;
  // current_war_id is optional — empty string when no active war.
  string current_war_id = 6;
}

// CohortSummary is the small { id, name, emblem } shape used inside CohortWar.
message CohortSummary {
  string id = 1;
  string name = 2;
  string emblem = 3;
}

// WarLineContributor mirrors the inline contributor shape inside OpenAPI WarLine.
message WarLineContributor {
  string user_id = 1;
  string username = 2;
  // side is "a" | "b" in OpenAPI — string preserves wire compatibility with
  // REST transcoding (vanguard). An enum would also work; we match the OpenAPI
  // literal.
  string side = 3;
  int32 score = 4;
}

// WarLine mirrors OpenAPI WarLine.
message WarLine {
  Section section = 1;
  int32 score_a = 2;
  int32 score_b = 3;
  repeated WarLineContributor contributors = 4;
}

// CohortWar mirrors OpenAPI CohortWar. Uses ISO-8601 date strings for week
// boundaries; proto3 has no native Date type.
message CohortWar {
  string id = 1;
  // week_start is an ISO-8601 date (YYYY-MM-DD) per the OpenAPI contract.
  string week_start = 2;
  string week_end = 3;
  CohortSummary cohort_a = 4;
  CohortSummary cohort_b = 5;
  repeated WarLine lines = 6;
  // winner_cohort_id is optional — empty string when the war is still active.
  string winner_cohort_id = 7;
}

message GetMyCohortRequest {}
message GetCohortRequest {
  string cohort_id = 1;
}
message GetCohortWarRequest {
  string cohort_id = 1;
}
message ContributeRequest {
  string cohort_id = 1;
  Section section = 2;
  string code = 3;
  Language language = 4;
}

// TopCohortSummary — одна строка топ-листа когорт.
// Используется в ListTopCohorts (страница /cohort без cohort_id, для не-членов).
message TopCohortSummary {
  string cohort_id = 1;
  string name = 2;
  string emblem = 3;
  int32 members_count = 4;
  int32 elo_total = 5;
  int32 wars_won = 6;
  int32 rank = 7;
}

message ListTopCohortsRequest {
  // limit: 1..100, default 20.
  int32 limit = 1;
}

message ListTopCohortsResponse {
  repeated TopCohortSummary items = 1;
}

service CohortService {
  // GetMyCohort returns the cohort the caller belongs to.
  rpc GetMyCohort(GetMyCohortRequest) returns (Cohort) {
    option (google.api.http) = {get: "/api/v1/cohort/my"};
  }

  // GetCohort returns public info about any cohort.
  rpc GetCohort(GetCohortRequest) returns (Cohort) {
    option (google.api.http) = {get: "/api/v1/cohort/{cohort_id}"};
  }

  // GetWar returns the current war for a cohort.
  rpc GetWar(GetCohortWarRequest) returns (CohortWar) {
    option (google.api.http) = {get: "/api/v1/cohort/{cohort_id}/war"};
  }

  // Contribute grades the submission and updates the war line.
  rpc Contribute(ContributeRequest) returns (CohortWar) {
    option (google.api.http) = {
      post: "/api/v1/cohort/{cohort_id}/war/contribute"
      body: "*"
    };
  }

  // ListTopCohorts — топ-N когорт по elo_total. Public (без auth).
  // Раньше был chi-route, теперь Connect-RPC.
  rpc ListTopCohorts(ListTopCohortsRequest) returns (ListTopCohortsResponse) {
    option (google.api.http) = {get: "/api/v1/cohorts/top"};
  }
}
