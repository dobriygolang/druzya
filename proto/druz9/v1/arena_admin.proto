// arena_admin.proto — Connect-RPC contract for the admin Arena task CMS.
//
// Separate from arena.proto because the user-facing arena flow (find match,
// submit) and the admin task CMS are different audiences and should evolve
// independently. Hooks into the same `tasks` table (00003_content.sql)
// used by Arena 1v1/2v2 + Daily Kata.
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

message ArenaAdminTask {
  string id = 1;
  string slug = 2;
  string title_ru = 3;
  string title_en = 4;
  string description_ru = 5;
  string description_en = 6;
  string difficulty = 7;
  string section = 8;
  int32 time_limit_sec = 9;
  int32 memory_limit_mb = 10;
  string solution_hint = 11;
  int32 version = 12;
  bool is_active = 13;
  double avg_rating = 14;
}

message ArenaAdminTaskList {
  repeated ArenaAdminTask items = 1;
}

message ArenaAdminTaskUpsert {
  string slug = 1;
  string title_ru = 2;
  string title_en = 3;
  string description_ru = 4;
  string description_en = 5;
  string difficulty = 6;
  string section = 7;
  int32 time_limit_sec = 8;
  int32 memory_limit_mb = 9;
  string solution_hint = 10;
  bool is_active = 11;
}

message ListArenaAdminTasksRequest {
  string section = 1;
  string difficulty = 2;
  bool only_active = 3;
  int32 limit = 4;
}

message GetArenaAdminTaskRequest {
  string id = 1;
}

message CreateArenaAdminTaskRequest {
  ArenaAdminTaskUpsert task = 1;
}

message UpdateArenaAdminTaskRequest {
  string id = 1;
  ArenaAdminTaskUpsert task = 2;
}

message ToggleArenaAdminTaskRequest {
  string id = 1;
  bool active = 2;
}

message ToggleArenaAdminTaskResponse {
  bool ok = 1;
}

message DeleteArenaAdminTaskRequest {
  string id = 1;
}

message DeleteArenaAdminTaskResponse {
  bool ok = 1;
}

service ArenaAdminTaskService {
  rpc ListAdminTasks(ListArenaAdminTasksRequest) returns (ArenaAdminTaskList) {
    option (google.api.http) = {get: "/api/v1/admin/arena/tasks"};
  }
  rpc GetAdminTask(GetArenaAdminTaskRequest) returns (ArenaAdminTask) {
    option (google.api.http) = {get: "/api/v1/admin/arena/tasks/{id}"};
  }
  rpc CreateAdminTask(CreateArenaAdminTaskRequest) returns (ArenaAdminTask) {
    option (google.api.http) = {
      post: "/api/v1/admin/arena/tasks"
      body: "task"
    };
  }
  rpc UpdateAdminTask(UpdateArenaAdminTaskRequest) returns (ArenaAdminTask) {
    option (google.api.http) = {
      patch: "/api/v1/admin/arena/tasks/{id}"
      body: "task"
    };
  }
  rpc ToggleAdminTask(ToggleArenaAdminTaskRequest) returns (ToggleArenaAdminTaskResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/arena/tasks/{id}/active"
      body: "*"
    };
  }
  rpc DeleteAdminTask(DeleteArenaAdminTaskRequest) returns (DeleteArenaAdminTaskResponse) {
    option (google.api.http) = {delete: "/api/v1/admin/arena/tasks/{id}"};
  }
}
