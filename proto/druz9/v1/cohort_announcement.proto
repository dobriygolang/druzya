// cohort_announcement.proto — Connect-RPC contract for the cohort
// announcement feed (lente на /c/{slug}).
//
// Owns the `cohort_announcements` + `cohort_announcement_reactions` tables.
// Cross-service guard: read requires cohort membership, write requires
// owner/coach role — enforced by the bridge in
// /Users/sedorofeevd/Desktop/druzya/backend/cmd/monolith/services/cohort_announcement.go
// (mirrors slot↔review pattern).
syntax = "proto3";
package druz9.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

message CohortAnnouncement {
  string id = 1;
  string cohort_id = 2;
  string author_id = 3;
  string author_username = 4;     // hydrated server-side via JOIN with users
  string author_display_name = 5; // ditto
  string body = 6;
  bool pinned = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  // Aggregated reactions: emoji → count + my-reactions for this user.
  repeated AnnouncementReactionGroup reactions = 10;
  // viewer_reacted lists the emoji the current viewer has on this row;
  // makes the toggle UI a one-pass render.
  repeated string viewer_reacted = 11;
}

message AnnouncementReactionGroup {
  string emoji = 1;
  int32 count = 2;
}

message CohortAnnouncementList {
  repeated CohortAnnouncement items = 1;
}

message CreateAnnouncementRequest {
  string cohort_id = 1;
  string body = 2;
  bool pinned = 3;
}

message ListAnnouncementsRequest {
  string cohort_id = 1;
  int32 limit = 2;
}

message DeleteAnnouncementRequest {
  string announcement_id = 1;
}

message DeleteAnnouncementResponse {}

message AddReactionRequest {
  string announcement_id = 1;
  string emoji = 2;
}

message RemoveReactionRequest {
  string announcement_id = 1;
  string emoji = 2;
}

message ReactionResponse {
  string announcement_id = 1;
  string emoji = 2;
  int32 count = 3;
}

service CohortAnnouncementService {
  // CreateAnnouncement — owner/coach only. Returns the freshly-inserted
  // row hydrated for immediate render.
  rpc CreateAnnouncement(CreateAnnouncementRequest) returns (CohortAnnouncement) {
    option (google.api.http) = {
      post: "/api/v1/cohort/{cohort_id}/announcement"
      body: "*"
    };
  }

  // ListByCohort — member+ only. Returns latest N pinned-first.
  rpc ListByCohort(ListAnnouncementsRequest) returns (CohortAnnouncementList) {
    option (google.api.http) = {get: "/api/v1/cohort/{cohort_id}/announcement"};
  }

  // DeleteAnnouncement — author OR owner.
  rpc DeleteAnnouncement(DeleteAnnouncementRequest) returns (DeleteAnnouncementResponse) {
    option (google.api.http) = {delete: "/api/v1/cohort/announcement/{announcement_id}"};
  }

  // AddReaction — member+ only. Idempotent on (announcement, user, emoji).
  rpc AddReaction(AddReactionRequest) returns (ReactionResponse) {
    option (google.api.http) = {
      post: "/api/v1/cohort/announcement/{announcement_id}/react"
      body: "*"
    };
  }

  // RemoveReaction — same scope as Add.
  rpc RemoveReaction(RemoveReactionRequest) returns (ReactionResponse) {
    option (google.api.http) = {delete: "/api/v1/cohort/announcement/{announcement_id}/react/{emoji}"};
  }
}
