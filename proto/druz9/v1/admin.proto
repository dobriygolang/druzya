// admin.proto — Connect-RPC contract for the `admin` bounded context.
//
// Admin is a CMS/ops surface (bible §3.14). Every RPC requires role=admin;
// the role gate lives in ports/server.go — apigen had its requireAdmin
// inside the port and this proto preserves that split. main.go still wraps
// the handler in requireAuth (same as every other domain) — the extra
// admin role check happens inside the port method bodies.
//
// ── solution_hint EXCEPTION ──────────────────────────────────────────────
// AdminTask INTENTIONALLY exposes `solution_hint`. Every OTHER proto in
// this repo (profile's atlas, daily's kata, arena's task, mock's task,
// native's task) MUST NOT. The role gate on this service is the sole
// guardrail. Do not create a public Task alias of AdminTask — they are
// kept as separate messages by design.
syntax = "proto3";
package druz9.v1;

import "druz9/v1/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "druz9/shared/generated/pb/druz9/v1;druz9v1";

// ─────────────────────────────────────────────────────────────────────────
// Tasks (admin projection — carries solution_hint)
//
// Pivot 2026-05: AdminTask*/Company*/ListCompanies* messages удалены —
// curator UI ушёл на mock_interview сервис, а /companies проксируется
// chi-direct'ом мимо proto. См commit history admin.proto.
// ─────────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────
// Dynamic config
// ─────────────────────────────────────────────────────────────────────────

// ConfigEntryType mirrors the `type` discriminator on ConfigEntry.
enum ConfigEntryType {
  CONFIG_ENTRY_TYPE_UNSPECIFIED = 0;
  CONFIG_ENTRY_TYPE_INT = 1;
  CONFIG_ENTRY_TYPE_FLOAT = 2;
  CONFIG_ENTRY_TYPE_STRING = 3;
  CONFIG_ENTRY_TYPE_BOOL = 4;
  CONFIG_ENTRY_TYPE_JSON = 5;
}

// ConfigEntry mirrors OpenAPI ConfigEntry. The OpenAPI `value` field is a
// oneOf<number|string|bool|object>; we use google.protobuf.Value to keep the
// JSON shape opaque on the wire. The app layer still round-trips the raw
// bytes through the ConfigType discriminator (see ports/server.go).
message ConfigEntry {
  string key = 1;
  google.protobuf.Value value = 2;
  ConfigEntryType type = 3;
  string description = 4;
  google.protobuf.Timestamp updated_at = 5;
  // updated_by is optional — empty when no writer recorded.
  string updated_by = 6;
}

message ConfigEntryList {
  repeated ConfigEntry items = 1;
}

// ConfigUpdate mirrors OpenAPI ConfigUpdate (PUT body). `value` is the same
// opaque JSON as ConfigEntry.value.
message UpdateConfigRequest {
  string key = 1;
  google.protobuf.Value value = 2;
}

message ListConfigRequest {}

// ─────────────────────────────────────────────────────────────────────────
// Dashboard — live counters for /admin landing tab.
// ─────────────────────────────────────────────────────────────────────────

// AdminDashboard mirrors the JSON shape served by GET /api/v1/admin/dashboard.
// Counters are live aggregates with a 60s server-side Redis cache. Every
// "active_*" timeframe is computed off users.updated_at (see stats.go for
// the same proxy used by /stats/public).
message AdminDashboard {
  int64 users_total            = 1;
  int64 users_active_today     = 2;
  int64 users_active_week      = 3;
  int64 users_active_month     = 4;
  int64 users_banned           = 5;
  reserved 6, 7;               // matches_today / matches_week (arena dropped 2026-05-01)
  reserved 8, 9;               // katas_today / katas_week (daily_kata_history dropped 2026-05)
  int64 active_mock_sessions   = 10;
  reserved 11;                 // active_arena_matches (pivot 2026-05-01: arena dropped)
  int64 reports_pending        = 12;
  int64 anticheat_signals_24h  = 13;
  // generated_at — when the snapshot was assembled (cache miss timestamp).
  google.protobuf.Timestamp generated_at = 14;
}

message GetAdminDashboardRequest {}

// ─────────────────────────────────────────────────────────────────────────
// User management — list / ban / unban.
// ─────────────────────────────────────────────────────────────────────────

// AdminUserRow is the row shape returned by GET /api/v1/admin/users.
// Mirrors users + (optional) currently-active user_bans row.
message AdminUserRow {
  string id            = 1;
  string username      = 2;
  string email         = 3;
  string display_name  = 4;
  string role          = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  bool is_banned       = 8;
  // ban_reason / ban_expires_at populated when is_banned=true.
  string ban_reason    = 9;
  google.protobuf.Timestamp ban_expires_at = 10;
}

message AdminUserList {
  repeated AdminUserRow items = 1;
  int32 total = 2;
  int32 page  = 3;
}

message ListAdminUsersRequest {
  // Free-form query — case-insensitive prefix match on username + email.
  string query  = 1;
  // Filter by status: "" / "all" / "banned" / "active".
  string status = 2;
  int32  page   = 3;
  int32  limit  = 4;
}

message BanUserRequest {
  string user_id    = 1;
  string reason     = 2;
  // expires_at optional — empty means permanent.
  google.protobuf.Timestamp expires_at = 3;
}

message UnbanUserRequest {
  string user_id = 1;
}

message BanUserResponse {
  AdminUserRow user = 1;
}

// ─────────────────────────────────────────────────────────────────────────
// Reports — moderation queue.
// ─────────────────────────────────────────────────────────────────────────

// AdminReportStatus — wire-закрытый набор статусов жалобы.
enum AdminReportStatus {
  ADMIN_REPORT_STATUS_UNSPECIFIED = 0;
  ADMIN_REPORT_STATUS_PENDING = 1;
  ADMIN_REPORT_STATUS_RESOLVED = 2;
  ADMIN_REPORT_STATUS_DISMISSED = 3;
}

message AdminReport {
  string id             = 1;
  string reporter_id    = 2;
  string reporter_name  = 3;
  string reported_id    = 4;
  string reported_name  = 5;
  string reason         = 6;
  string description    = 7;
  AdminReportStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
}

message AdminReportList {
  repeated AdminReport items = 1;
  int32 total = 2;
}

message ListAdminReportsRequest {
  // status filter — UNSPECIFIED means PENDING only.
  AdminReportStatus status = 1;
  int32  limit  = 2;
}

// ─────────────────────────────────────────────────────────────────────────
// Status page — PUBLIC (no admin role gate, no bearer auth).
// ─────────────────────────────────────────────────────────────────────────

// StatusServiceState reports the current health of one infra component.
message StatusServiceState {
  string name        = 1; // human label e.g. "PostgreSQL"
  string slug        = 2; // machine slug e.g. "postgres"
  string status      = 3; // operational / degraded / down
  string uptime_30d  = 4; // formatted percentage (e.g. "99.97%")
  int64  latency_ms  = 5; // last probe latency
}

// StatusIncident mirrors an incidents row.
message StatusIncident {
  string id                          = 1;
  string title                       = 2;
  string description                 = 3;
  string severity                    = 4; // minor / major / critical
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp ended_at   = 6;
  repeated string affected_services  = 7;
}

message StatusPage {
  string overall_status              = 1; // operational / degraded / down
  string uptime_90d                  = 2;
  repeated StatusServiceState services = 3;
  repeated StatusIncident incidents  = 4;
  google.protobuf.Timestamp generated_at = 5;
}

message GetStatusPageRequest {}

// ─────────────────────────────────────────────────────────────────────────
// Service
// ─────────────────────────────────────────────────────────────────────────

service AdminService {
  // Pivot 2026-05-04: orphan RPCs (ListTasks/CreateTask/UpdateTask,
  // ListCompanies/CreateCompany, ListAnticheat) удалены — нулевые
  // frontend-вызовы. /companies (chi-direct) продолжает работать через
  // ListCompanies UC напрямую (см. cmd/monolith/services/admin/admin.go).
  // /admin/mock/companies + /admin/mock/tasks остаются в mock_interview.

  // ── Dynamic config ──────────────────────────────────────────────────
  rpc ListConfig(ListConfigRequest) returns (ConfigEntryList) {
    option (google.api.http) = {get: "/api/v1/admin/config"};
  }
  rpc UpdateConfig(UpdateConfigRequest) returns (ConfigEntry) {
    option (google.api.http) = {
      put: "/api/v1/admin/config/{key}"
      body: "*"
    };
  }

  // ── Dashboard ───────────────────────────────────────────────────────
  rpc GetAdminDashboard(GetAdminDashboardRequest) returns (AdminDashboard) {
    option (google.api.http) = {get: "/api/v1/admin/dashboard"};
  }

  // ── User management ─────────────────────────────────────────────────
  rpc ListUsers(ListAdminUsersRequest) returns (AdminUserList) {
    option (google.api.http) = {get: "/api/v1/admin/users"};
  }
  rpc BanUser(BanUserRequest) returns (BanUserResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/users/{user_id}/ban"
      body: "*"
    };
  }
  rpc UnbanUser(UnbanUserRequest) returns (BanUserResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/users/{user_id}/unban"
      body: "*"
    };
  }

  // ── Reports / moderation queue ──────────────────────────────────────
  rpc ListReports(ListAdminReportsRequest) returns (AdminReportList) {
    option (google.api.http) = {get: "/api/v1/admin/reports"};
  }

  // ── Public status page (NO auth, NO admin role) ─────────────────────
  // WARNING: this endpoint is mounted PUBLIC in router.go — it serves the
  // /status uptime page which must remain accessible to anonymous visitors
  // for transparency. The handler implementation MUST NOT leak any private
  // data.
  rpc GetStatusPage(GetStatusPageRequest) returns (StatusPage) {
    option (google.api.http) = {get: "/api/v1/status"};
  }
}
