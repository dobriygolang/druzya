# buf.yaml — module config for the druz9 contract layer.
#
# We vendor a tiny subset of googleapis under proto/google/api (annotations.proto
# + http.proto) so we do NOT need an authenticated Buf Schema Registry pull.
# Swap to `deps: [buf.build/googleapis/googleapis]` once BSR auth is provisioned.
version: v2
modules:
  - path: .
    name: buf.build/druz9/druz9
lint:
  use:
    - STANDARD
  ignore:
    - google
  # Strict naming would force every RPC to have a Method-prefixed
  # Request/Response type. We name response types after the resource they
  # return (Cohort, MockSession, ProfileFull) which is intentional — wrapping
  # them in CreateMockSessionResponse{ session MockSession; } adds a layer
  # the clients have to unwrap. Same call-site shape on every language;
  # the rule is style, not correctness.
  except:
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
  ignore:
    - google
