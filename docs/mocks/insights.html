<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>druz9 · Insights</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3);
      --accent:#FF3B30; --t-fast:150ms; --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{background:var(--bg);color:var(--ink-92);font-family:'Inter',sans-serif;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased}
    .mono{font-family:'JetBrains Mono',monospace;letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)} .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.02),transparent 55%),var(--bg)}
    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}.stagger>*:nth-child(2){animation-delay:130ms}.stagger>*:nth-child(3){animation-delay:200ms}.stagger>*:nth-child(4){animation-delay:270ms}.stagger>*:nth-child(5){animation-delay:340ms}.stagger>*:nth-child(6){animation-delay:410ms}.stagger>*:nth-child(7){animation-delay:480ms}
    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)} .lift:hover{transform:translateY(-1px);border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease)} .btn-primary:hover{transform:translateY(-1px);background:rgba(255,255,255,0.92)}
    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;border:1px solid var(--hair);background:var(--surface-2);font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-50);font-family:'JetBrains Mono',monospace}
    .chip.live{color:var(--ink-70)} .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .chip.solid{background:#fff;color:#000;border-color:#fff}
    .kbd{display:inline-flex;padding:1px 6px;border-radius:4px;border:1px solid var(--hair-2);background:var(--surface-3);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-70)}
    button:focus-visible{outline:1px solid var(--ink-70);outline-offset:2px}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--hair-2);border-radius:3px}
    .no-select{-webkit-user-select:none;user-select:none}
    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}
    .severity-stripe{position:absolute;left:0;top:0;bottom:0;width:2px}
    .severity-critical{background:var(--accent)}
    .severity-warn{background:var(--ink-70)}
    .severity-nudge{background:var(--ink-50)}
    .severity-cruise{background:var(--ink-30)}
    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;background:var(--surface-2);border:1px solid var(--hair-2);border-radius:10px;padding:14px;z-index:50;font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "period": "week",
      "showWeeklyDigest": true
    }/*EDITMODE-END*/;

    const PERIODS = [
      { k:'today', label:'today', count:3 },
      { k:'week', label:'7 days', count:11 },
      { k:'month', label:'30 days', count:34 },
      { k:'all', label:'all', count:128 },
    ];

    const WEEKLY_DIGEST = {
      headline:'Strong week on production-ML, slip on stat-correctness',
      summary:'5 focus blocks (148 min) · 2 mocks · 12 atlas-nodes touched. data_intuition axis dropped from 60 → 56 — needs 1 dedicated session. Track ahead of schedule by 3 days.',
      severity:'cruise',
      stats: [
        { l:'focus', v:'148', u:'min · +12 vs avg' },
        { l:'mocks', v:'2', u:'1 PASS · 1 FAIL' },
        { l:'reflections', v:'14', u:'3-5 takeaways avg' },
        { l:'streak', v:'12', u:'days' },
      ],
    };

    const INSIGHTS = [
      {
        id:1, severity:'critical', kind:'urgent_event', producer:'urgent_event', emitted:'2h ago',
        headline:'Yandex round 3 in 8 days — final',
        body:'Behavioral + culture fit + sysdesign sketch. Your last 2 sysdesign mocks averaged 71/100 — needs one more polish round.',
        followups:[ {a:'practice sysdesign mock · 60 min', kind:'mock'}, {a:'review STAR stories notes', kind:'codex'} ],
      },
      {
        id:2, severity:'warn', kind:'mock_topic_weakness', producer:'mock-topic', emitted:'5h ago',
        headline:'data_intuition axis dropped 60 → 56',
        body:'Bonferroni / FDR / power calc — repeated weak signal across 2 mocks. Closing this in next 48h prevents permanent gap on stat-heavy interviews.',
        followups:[ {a:'codex · multiple comparisons (25 min)', kind:'codex'}, {a:'kata · power calc drill (30 min)', kind:'kata'} ],
      },
      {
        id:3, severity:'warn', kind:'fork_progress', producer:'fork-progress', emitted:'yesterday',
        headline:'Lean DE · confidence 0.68 → 0.74',
        body:'4 voluntary DE deep-dives this week, 1 MLE. DE mocks averaging 71, MLE 62. Recommendation: commit to DE branch in next 2 weeks if pattern holds.',
        followups:[ {a:'view fork analysis details', kind:'view'}, {a:'commit to DE manually', kind:'action'} ],
      },
      {
        id:4, severity:'nudge', kind:'resource_engagement', producer:'resource-engagement', emitted:'yesterday',
        headline:'5 resources unfinished · last 14d',
        body:'Andrew Ng W2 (30%), DDIA ch.7 (40%), 3 codex articles started. Pattern: starting many, finishing few. Try finishing one before starting next.',
        followups:[ {a:'show me unfinished list', kind:'view'} ],
      },
      {
        id:5, severity:'nudge', kind:'kata_streak', producer:'kata-streak', emitted:'2d ago',
        headline:'12-day streak · longest this quarter',
        body:'You\'ve hit daily goal 12 days running. Streak before this was 7. Don\'t over-invest tomorrow — sustainable pace > sprints.',
        followups:[],
      },
      {
        id:6, severity:'cruise', kind:'long_absence', producer:'long-absence', emitted:'3d ago',
        headline:'No English session in 9 days',
        body:'Maria (english coach) idle. Either pause English goal officially or schedule 30 min this week.',
        followups:[ {a:'pause goal', kind:'action'}, {a:'schedule session', kind:'action'} ],
      },
    ];

    const Chip = ({children,live=false,solid=false}) => <span className={`chip ${live?'live':''} ${solid?'solid':''}`}>{children}</span>;
    const Kbd = ({children}) => <span className="kbd">{children}</span>;

    function Header(){
      return <header className="flex items-center justify-between pt-7 pb-5 no-select">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-md flex items-center justify-center mono text-[12px] font-semibold hair2-b" style={{background:'var(--surface-3)',color:'var(--ink-92)'}}>d9</div>
          <span className="text-[15px] font-semibold tracking-tight">druz9</span>
          <span className="dim-2 text-[13px]">/</span>
          <span className="text-[15px] dim">insights</span>
          <Chip live>auto-generated · llm</Chip>
        </div>
        <div className="flex items-center gap-2 text-[10px] mono uppercase tracking-wider dim">
          <span>palette</span><Kbd>⌘K</Kbd>
        </div>
      </header>;
    }

    function PeriodFilter({active,setActive}){
      const idx = PERIODS.findIndex(p=>p.k===active);
      return <div className="flex items-center justify-between mb-5">
        <div className="relative flex items-center p-1 rounded-lg hair-b surface-2 self-start">
          <div className="absolute top-1 bottom-1 rounded-md" style={{background:'var(--surface-3)',border:'1px solid var(--hair-2)',width:`calc(25% - 2px)`,transform:`translateX(${idx*100}%)`,transition:'transform 220ms var(--ease)'}}/>
          {PERIODS.map(p=><button key={p.k} onClick={()=>setActive(p.k)} className="relative z-10 px-4 py-1.5 mono text-[11px] uppercase tracking-wider rounded-md min-w-[88px] flex items-center gap-2 justify-center" style={{color:active===p.k?'var(--ink-92)':'var(--ink-50)',transition:'color var(--t-fast) var(--ease)'}}>
            {p.label}<span className="dim-2 text-[10px]">{p.count}</span>
          </button>)}
        </div>
        <span className="text-[10px] mono dim-2 uppercase tracking-wider">last sync · 2 min ago</span>
      </div>;
    }

    function WeeklyDigest(){
      return <section className="surface hair-b rounded-xl p-7 mb-5 relative overflow-hidden">
        <div className="hero-stripe"/>
        <div className="flex items-center gap-2 mb-3">
          <Chip>weekly digest</Chip>
          <Chip>cruise</Chip>
          <Chip>llmchain · groq 70b · cache hit</Chip>
        </div>
        <h2 className="text-[22px] font-semibold tracking-tight mb-2 leading-snug">{WEEKLY_DIGEST.headline}</h2>
        <p className="text-[13px] dim leading-relaxed mb-5 max-w-[640px]" style={{color:'var(--ink-70)'}}>{WEEKLY_DIGEST.summary}</p>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
          {WEEKLY_DIGEST.stats.map(s=><div key={s.l}>
            <div className="text-[10px] mono dim-2 uppercase tracking-wider mb-1">{s.l}</div>
            <div className="flex items-baseline gap-1.5"><span className="mono text-[20px] font-semibold tracking-tight">{s.v}</span><span className="text-[10px] mono dim-2">{s.u}</span></div>
          </div>)}
        </div>
        <div className="hairline mb-4"/>
        <div className="flex items-center gap-2">
          <button className="hair-b px-3 py-1.5 rounded-md text-[11px] mono dim uppercase tracking-wider surface-2">previous week</button>
          <button className="hair-b px-3 py-1.5 rounded-md text-[11px] mono dim uppercase tracking-wider surface-2">read transcript</button>
          <span className="ml-auto text-[10px] mono dim-2 uppercase tracking-wider">next digest sun · 21:00</span>
        </div>
      </section>;
    }

    function InsightCard({insight}){
      const sevLabel = { critical:'critical', warn:'warn', nudge:'nudge', cruise:'cruise' }[insight.severity];
      return <article className="surface hair-b rounded-xl p-6 lift cursor-pointer relative overflow-hidden">
        <div className={`severity-stripe severity-${insight.severity}`}/>
        <div className="pl-1">
          <div className="flex items-center gap-2 mb-2">
            <Chip live={insight.severity==='critical'}>{sevLabel}</Chip>
            <Chip>{insight.kind.replace(/_/g,' ')}</Chip>
            <span className="ml-auto text-[10px] mono dim-2 uppercase tracking-wider">{insight.producer} · {insight.emitted}</span>
          </div>
          <h3 className="text-[16px] font-semibold tracking-tight mb-1.5 leading-snug" style={{color:'var(--ink-100)'}}>{insight.headline}</h3>
          <p className="text-[13px] dim leading-relaxed mb-4 max-w-[700px]" style={{color:'var(--ink-70)'}}>{insight.body}</p>
          {insight.followups.length>0 && <div className="flex items-center gap-2 flex-wrap mb-3">
            {insight.followups.map((f,i)=><button key={i} className="lift hair-b px-3 py-1.5 rounded-md text-[11px] mono dim uppercase tracking-wider surface-2 flex items-center gap-1.5">
              <span className="text-[12px]" style={{color:'var(--ink-100)'}}>
                {f.kind==='mock'?'⌘':f.kind==='codex'?'◇':f.kind==='kata'?'∞':f.kind==='action'?'→':'·'}
              </span>
              {f.a}
            </button>)}
          </div>}
          <div className="flex items-center gap-2 text-[10px] mono dim-2 uppercase tracking-wider">
            <button className="hover:text-white transition-colors">mark followed</button>
            <span>·</span>
            <button className="hover:text-white transition-colors">dismiss</button>
            <span>·</span>
            <button className="hover:text-white transition-colors">snooze 7d</button>
            <span className="ml-auto">share <Kbd>⌘S</Kbd></span>
          </div>
        </div>
      </article>;
    }

    function TweaksPanel({tweaks,set,onClose}){
      return <div className="tweaks">
        <div className="flex items-center justify-between mb-3"><span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span><button onClick={onClose} className="dim-2 text-[14px] leading-none">×</button></div>
        <div className="space-y-3">
          <label className="flex flex-col gap-1"><span className="dim text-[10px] mono uppercase tracking-wider">period</span>
            <select value={tweaks.period} onChange={e=>set('period',e.target.value)} className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono" style={{color:'var(--ink-92)'}}>
              {PERIODS.map(p=><option key={p.k} value={p.k}>{p.label}</option>)}
            </select>
          </label>
          <label className="flex items-center justify-between gap-2"><span className="dim text-[11px]">weekly digest</span><input type="checkbox" checked={tweaks.showWeeklyDigest} onChange={e=>set('showWeeklyDigest',e.target.checked)}/></label>
        </div>
      </div>;
    }

    function App(){
      const [tweaks,setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen,setTweaksOpen] = useState(false);
      const set = (k,v) => { setTweaks({...tweaks,[k]:v}); try{window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*')}catch(e){} };
      useEffect(()=>{
        const onMsg = ev => { const d=ev.data||{}; if(d.type==='__activate_edit_mode')setTweaksOpen(true); if(d.type==='__deactivate_edit_mode')setTweaksOpen(false); };
        window.addEventListener('message',onMsg);
        try{window.parent.postMessage({type:'__edit_mode_available'},'*')}catch(e){}
        return ()=>window.removeEventListener('message',onMsg);
      },[]);

      return <div className="canvas-bg min-h-screen page-enter">
        <div className="max-w-[1280px] mx-auto px-8 pb-12">
          <Header/>
          <PeriodFilter active={tweaks.period} setActive={(p)=>set('period',p)}/>
          {tweaks.showWeeklyDigest && <WeeklyDigest/>}
          <main className="stagger space-y-3">{INSIGHTS.map(i=><InsightCard key={i.id} insight={i}/>)}</main>
          <footer className="flex items-center justify-between pt-8 mt-4 text-[10px] mono dim-2 uppercase tracking-wider no-select border-t" style={{borderColor:'var(--hair)'}}>
            <div className="flex items-center gap-4"><span>cycle period <Kbd>P</Kbd></span><span>mark followed <Kbd>F</Kbd></span><span>dismiss <Kbd>D</Kbd></span></div>
            <span>druz9 · insights · v0</span>
          </footer>
        </div>
        {tweaksOpen && <TweaksPanel tweaks={tweaks} set={set} onClose={()=>{setTweaksOpen(false);try{window.parent.postMessage({type:'__edit_mode_dismissed'},'*')}catch(e){}}}/>}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
