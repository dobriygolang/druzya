<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hone · Editor</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3);
      --accent:#FF3B30;
      --t-fast:150ms; --t-base:220ms;
      --ease:cubic-bezier(0.2,0.7,0.2,1);
      /* code colors — all grayscale */
      --code-keyword: rgba(255,255,255,0.96);
      --code-string:  rgba(255,255,255,0.62);
      --code-comment: rgba(255,255,255,0.30);
      --code-number:  rgba(255,255,255,0.85);
      --code-fn:      rgba(255,255,255,0.92);
      --code-punct:   rgba(255,255,255,0.5);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:var(--bg)}

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70)}
    .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}

    button:focus-visible{outline:1px solid var(--ink-70); outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--hair-2); border-radius:3px}

    .no-select{-webkit-user-select:none;user-select:none}

    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6)}

    /* code */
    .code-line{
      display:grid; grid-template-columns: 50px 1fr; gap: 16px;
      font-family:'JetBrains Mono', monospace; font-size: 13px; line-height: 1.65;
      padding: 0 14px;
      transition: background-color var(--t-fast) var(--ease);
      position: relative;
    }
    .code-line:hover{ background: rgba(255,255,255,0.02); }
    .code-line .ln{ color: var(--ink-30); text-align: right; user-select: none; }
    .code-line .src{ color: var(--ink-92); }
    .kw{ color: var(--code-keyword); font-weight: 500; }
    .str{ color: var(--code-string); }
    .cm{ color: var(--code-comment); font-style: italic; }
    .num{ color: var(--code-number); }
    .fn{ color: var(--code-fn); }
    .pn{ color: var(--code-punct); }

    /* selection band — highlight current line */
    .code-line.cur{
      background: rgba(255,255,255,0.04);
      border-left: 1.5px solid var(--ink-100);
      margin-left: -1.5px;
    }

    /* remote cursor — vertical caret */
    .rc{
      position: absolute;
      width: 2px; height: 1.65em; top: 0.05em;
      background: rgba(255,255,255,0.7);
      pointer-events: none;
    }
    .rc::after{
      content: attr(data-name);
      position: absolute; top: -16px; left: -4px;
      font-family:'JetBrains Mono', monospace; font-size:9px; letter-spacing:0.06em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.96); color: #000;
      padding: 2px 6px; border-radius: 3px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .rc.alice{background: rgba(255,255,255,0.55); }
    .rc.bob  {background: rgba(255,255,255,0.85); }

    /* file tree */
    .file-row{
      display:flex; align-items:center; gap:8px;
      padding:4px 12px;
      font-family:'JetBrains Mono', monospace; font-size:12px;
      color: var(--ink-70); cursor:pointer;
      transition: background-color var(--t-fast) var(--ease);
      border-left: 2px solid transparent;
    }
    .file-row:hover{ background: var(--surface-2); }
    .file-row.active{ background: var(--surface-2); border-left-color: var(--ink-100); color: var(--ink-100); }

    /* avatar */
    .avatar{
      width:24px; height:24px; border-radius: 999px;
      display:inline-flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
      border: 1px solid var(--hair-2);
      background: var(--surface-3);
    }
    .avatar.user{ background:#fff; color:#000; border-color:#fff; }

    /* output panel */
    .output-tab{
      padding: 6px 14px; font-family:'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing:0.06em; text-transform: uppercase;
      color: var(--ink-50); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
    }
    .output-tab:hover{ color: var(--ink-70); }
    .output-tab.active{ color: var(--ink-100); border-color: var(--ink-100); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "outputOpen": true,
      "outputTab": "stdout",
      "showCursorLabels": true,
      "fileActive": "main.go"
    }/*EDITMODE-END*/;

    /* ====== mock data ====== */
    const FILES = [
      { name:'main.go',         lang:'go',  modified:true  },
      { name:'two_pointers.go', lang:'go'                 },
      { name:'cdc_test.go',     lang:'go'                 },
      { name:'go.mod',          lang:'mod'                },
      { name:'README.md',       lang:'md'                 },
    ];

    const PARTICIPANTS = [
      { id:'me',    name:'Sergey', initials:'S',  line: 7,  active:true,  isMe:true  },
      { id:'alice', name:'Alice',  initials:'A',  line: 14, active:true               },
      { id:'bob',   name:'Bob',    initials:'B',  line: 22, active:false              },
    ];

    /* ====== code (typed lines) ====== */
    const CODE_LINES = [
      { ln:1,  parts:[{ t:'package', c:'kw'}, { t:' main' }] },
      { ln:2,  parts:[] },
      { ln:3,  parts:[{ t:'import', c:'kw'}, { t:' (' }] },
      { ln:4,  parts:[{ t:'  ' }, { t:'"fmt"', c:'str' }] },
      { ln:5,  parts:[{ t:'  ' }, { t:'"context"', c:'str' }] },
      { ln:6,  parts:[{ t:')' }] },
      { ln:7,  parts:[], cur: true }, // current line
      { ln:8,  parts:[{ t:'// twoPointersBfs walks the slice with i,j cursors', c:'cm' }] },
      { ln:9,  parts:[{ t:'func', c:'kw'}, { t:' '}, { t:'twoPointersBfs', c:'fn' },
                       { t:'('}, { t:'arr', c:'fn' }, { t:' []' }, { t:'int', c:'kw'},
                       { t:', '}, { t:'target', c:'fn'}, { t:' '}, { t:'int', c:'kw'},
                       { t:') ('}, { t:'int', c:'kw'}, { t:', '}, { t:'int', c:'kw'}, { t:') {'}] },
      { ln:10, parts:[{ t:'  ' }, { t:'i', c:'fn' }, { t:', '},
                       { t:'j', c:'fn' }, { t:' := '}, { t:'0', c:'num' },
                       { t:', '}, { t:'len', c:'fn'}, { t:'('}, { t:'arr', c:'fn'}, { t:')-'}, { t:'1', c:'num' }] },
      { ln:11, parts:[{ t:'  ' }, { t:'for', c:'kw' }, { t:' '}, { t:'i', c:'fn' },
                       { t:' < '}, { t:'j', c:'fn' }, { t:' {'}] },
      { ln:12, parts:[{ t:'    ' }, { t:'sum', c:'fn' }, { t:' := '},
                       { t:'arr', c:'fn'}, { t:'['}, { t:'i', c:'fn'}, { t:'] + '}, { t:'arr', c:'fn'}, { t:'['}, { t:'j', c:'fn'}, { t:']'}] },
      { ln:13, parts:[{ t:'    ' }, { t:'switch', c:'kw'}, { t:' {'}] },
      { ln:14, parts:[{ t:'      ' }, { t:'case', c:'kw' },
                       { t:' '}, { t:'sum', c:'fn'}, { t:' == '}, { t:'target', c:'fn' }, { t:':'}], rcAlice: true },
      { ln:15, parts:[{ t:'        ' }, { t:'return', c:'kw' },
                       { t:' '}, { t:'i', c:'fn'}, { t:', '}, { t:'j', c:'fn' }] },
      { ln:16, parts:[{ t:'      ' }, { t:'case', c:'kw' },
                       { t:' '}, { t:'sum', c:'fn'}, { t:' < '}, { t:'target', c:'fn' }, { t:':'}] },
      { ln:17, parts:[{ t:'        ' }, { t:'i', c:'fn' }, { t:'++'}] },
      { ln:18, parts:[{ t:'      ' }, { t:'default', c:'kw' }, { t:':'}] },
      { ln:19, parts:[{ t:'        ' }, { t:'j', c:'fn' }, { t:'--'}] },
      { ln:20, parts:[{ t:'    ' }, { t:'}'}] },
      { ln:21, parts:[{ t:'  ' }, { t:'}'}] },
      { ln:22, parts:[{ t:'  ' }, { t:'return', c:'kw' }, { t:' -'}, { t:'1', c:'num' },
                       { t:', -'}, { t:'1', c:'num' }], rcBob: true },
      { ln:23, parts:[{ t:'}'}] },
      { ln:24, parts:[] },
    ];

    const STDOUT = [
      { t:'$ go run main.go',     dim:false },
      { t:'  array: [1 2 3 5 8 13 21 34]', dim:true },
      { t:'  target: 21',         dim:true },
      { t:'  found at i=2 j=5',   dim:false },
      { t:'  duration: 12.4µs',   dim:true },
      { t:'  ',                   dim:true },
      { t:'$ exit 0',             dim:false },
    ];

    /* ====== atoms ====== */
    const Chip = ({ children, live=false }) => (
      <span className={`chip ${live?'live':''}`}>{children}</span>
    );
    const Kbd = ({ children }) => <span className="kbd">{children}</span>;
    const Avatar = ({ p }) => (
      <span className={`avatar ${p.isMe?'user':''}`}
            style={{ background: !p.active ? 'var(--surface-3)' : undefined }}>
        {p.initials}
      </span>
    );

    /* ====== header ====== */
    function Header() {
      return (
        <header className="flex items-center justify-between pt-5 pb-4 px-6 no-select border-b"
                style={{ borderColor:'var(--hair)', background:'#070707' }}>
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                 style={{background:'#000'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <clipPath id="gly-edt-c"><circle cx="12" cy="12" r="9"/></clipPath>
                </defs>
                <circle cx="12" cy="12" r="9" fill="#fff"/>
                <g clipPath={"url(#gly-edt-c)"}>
                  <rect x="3" y="3" width="9" height="18" fill="#000"/>
                </g>
                <g clipPath={"url(#gly-edt-c)"} stroke="#000" strokeWidth="1.4">
                  <line x1="10" y1="2" x2="22" y2="14"/>
                  <line x1="10" y1="6" x2="22" y2="18"/>
                  <line x1="10" y1="10" x2="22" y2="22"/>
                  <line x1="10" y1="14" x2="22" y2="26"/>
                  <line x1="10" y1="18" x2="22" y2="30"/>
                </g>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <span className="text-[15px] font-semibold tracking-tight">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] font-medium dim">Editor</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[14px] dim">algo · scratch</span>
            </div>
            <Chip live>3 online · synced</Chip>
          </div>

          <div className="flex items-center gap-3">
            <div className="flex items-center -space-x-2">
              {PARTICIPANTS.map(p => <Avatar key={p.id} p={p}/>)}
            </div>
            <div className="hairline mx-2 w-px h-6" style={{ background:'var(--hair-2)' }}/>
            <button className="btn-primary px-3 py-1.5 rounded-md text-[12px] font-medium">
              run · <span className="text-[10px] mono opacity-50 ml-1">⌘⏎</span>
            </button>
            <button className="hair-b px-3 py-1.5 rounded-md text-[12px] dim surface-2">share</button>
            <span className="text-[10px] mono dim-2 uppercase tracking-wider ml-2">⌘K</span>
          </div>
        </header>
      );
    }

    /* ====== file tree ====== */
    function FileTree({ active, setActive }) {
      return (
        <aside className="w-[200px] shrink-0 border-r flex flex-col"
          style={{ borderColor:'var(--hair)', background:'#070707' }}>
          <div className="px-3 py-2 border-b text-[10px] mono dim-2 uppercase tracking-wider"
               style={{ borderColor:'var(--hair)' }}>
            files · 5
          </div>
          <div className="flex-1 py-2">
            {FILES.map(f => (
              <button key={f.name} onClick={()=>setActive(f.name)}
                className={`file-row w-full ${active===f.name?'active':''}`}>
                <span className="dim-2">·</span>
                <span className="flex-1 text-left">{f.name}</span>
                {f.modified && <span className="dim-2">·</span>}
              </button>
            ))}
          </div>
          <div className="px-3 py-2 border-t" style={{ borderColor:'var(--hair)' }}>
            <button className="hair-b w-full py-1.5 rounded-md text-[10px] mono dim uppercase tracking-wider surface-2">
              + new file
            </button>
          </div>
        </aside>
      );
    }

    /* ====== editor ====== */
    function CodeEditor({ tweaks }) {
      return (
        <div className="flex-1 flex flex-col min-w-0">
          <div className="flex items-center px-4 py-2 border-b gap-2 surface-2 no-select"
               style={{ borderColor:'var(--hair)' }}>
            <span className="text-[12px] mono">{tweaks.fileActive}</span>
            <Chip>go · 1.21</Chip>
            <Chip live>autosaved · 1s</Chip>
            <span className="ml-auto text-[10px] mono dim-2 uppercase tracking-wider">
              ln {7} · col 1 · UTF-8
            </span>
          </div>

          <div className="flex-1 overflow-auto py-3">
            {CODE_LINES.map(line => (
              <div key={line.ln} className={`code-line ${line.cur?'cur':''}`}>
                <span className="ln">{line.ln}</span>
                <span className="src" style={{ position:'relative' }}>
                  {line.parts.length === 0 ? ' ' : line.parts.map((p,i)=>(
                    <span key={i} className={p.c||''}>{p.t}</span>
                  ))}
                  {tweaks.showCursorLabels && line.rcAlice && (
                    <span className="rc alice" data-name="alice · editing"
                          style={{ left:'10ch' }}/>
                  )}
                  {tweaks.showCursorLabels && line.rcBob && (
                    <span className="rc bob" data-name="bob · idle"
                          style={{ left:'24ch', opacity: 0.5 }}/>
                  )}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ====== participants ====== */
    function ParticipantsPanel() {
      return (
        <aside className="w-[260px] shrink-0 border-l flex flex-col"
          style={{ borderColor:'var(--hair)', background:'#070707' }}>
          <div className="px-3 py-2 border-b flex items-center justify-between"
               style={{ borderColor:'var(--hair)' }}>
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">participants · {PARTICIPANTS.length}</span>
            <Chip live>live</Chip>
          </div>

          <ul className="flex-1 py-2 space-y-1">
            {PARTICIPANTS.map(p => (
              <li key={p.id} className="px-3 py-2 grid grid-cols-[28px_1fr_50px] items-center gap-2">
                <Avatar p={p}/>
                <div className="min-w-0">
                  <div className="text-[12.5px]" style={{color: p.active?'var(--ink-92)':'var(--ink-50)'}}>
                    {p.name} {p.isMe && <span className="dim-2 text-[10px] mono ml-1">you</span>}
                  </div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider">
                    {p.active ? `editing line ${p.line}` : 'idle · 2m'}
                  </div>
                </div>
                <div className="text-right">
                  <span className="text-[9px] mono dim-2 uppercase tracking-wider">L{p.line}</span>
                </div>
              </li>
            ))}
          </ul>

          <div className="hairline"/>

          <div className="px-3 py-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider mb-2 block">recent edits · 30s</span>
            <ul className="space-y-1.5 text-[11px]">
              <li className="flex items-baseline gap-2">
                <span className="dim-2 mono text-[9px] uppercase tracking-wider w-12 shrink-0">2s</span>
                <span style={{color:'var(--ink-70)'}}>alice · added <span className="mono">case sum &lt; target</span></span>
              </li>
              <li className="flex items-baseline gap-2">
                <span className="dim-2 mono text-[9px] uppercase tracking-wider w-12 shrink-0">11s</span>
                <span style={{color:'var(--ink-70)'}}>bob · removed log line</span>
              </li>
              <li className="flex items-baseline gap-2">
                <span className="dim-2 mono text-[9px] uppercase tracking-wider w-12 shrink-0">28s</span>
                <span style={{color:'var(--ink-70)'}}>you · created `twoPointersBfs`</span>
              </li>
            </ul>
          </div>

          <div className="px-3 py-2 border-t text-[10px] mono dim-2 uppercase tracking-wider"
               style={{ borderColor:'var(--hair)' }}>
            room id · alg-7f3a
          </div>
        </aside>
      );
    }

    /* ====== output panel ====== */
    function OutputPanel({ tweaks, set }) {
      return (
        <div className="border-t flex flex-col" style={{ borderColor:'var(--hair)', background:'#070707', height: 220 }}>
          <div className="flex items-center px-4 border-b"
               style={{ borderColor:'var(--hair)' }}>
            <div className="flex">
              <button onClick={()=>set('outputTab','stdout')}
                className={`output-tab ${tweaks.outputTab==='stdout'?'active':''}`}>stdout</button>
              <button onClick={()=>set('outputTab','stderr')}
                className={`output-tab ${tweaks.outputTab==='stderr'?'active':''}`}>stderr · 0</button>
              <button onClick={()=>set('outputTab','tests')}
                className={`output-tab ${tweaks.outputTab==='tests'?'active':''}`}>tests · 4 pass</button>
            </div>
            <div className="ml-auto flex items-center gap-2 text-[10px] mono dim-2 uppercase tracking-wider">
              <span>last run · 12.4µs · exit 0</span>
              <button onClick={()=>set('outputOpen', false)}
                className="hair-b px-2 py-0.5 rounded-md surface-2">×</button>
            </div>
          </div>
          <div className="flex-1 overflow-auto px-4 py-3 mono text-[12px]">
            {tweaks.outputTab === 'stdout' && STDOUT.map((l,i)=>(
              <div key={i} style={{ color: l.dim ? 'var(--ink-50)' : 'var(--ink-92)' }}>{l.t}</div>
            ))}
            {tweaks.outputTab === 'stderr' && (
              <div className="dim text-[12px]">no errors · last run exit 0</div>
            )}
            {tweaks.outputTab === 'tests' && (
              <div className="space-y-1">
                <div style={{color:'var(--ink-92)'}}>=== RUN  TestTwoPointersBfs/found</div>
                <div className="dim">    PASS · 0.00s</div>
                <div style={{color:'var(--ink-92)'}}>=== RUN  TestTwoPointersBfs/not_found</div>
                <div className="dim">    PASS · 0.00s</div>
                <div style={{color:'var(--ink-92)'}}>=== RUN  TestTwoPointersBfs/empty</div>
                <div className="dim">    PASS · 0.00s</div>
                <div style={{color:'var(--ink-92)'}}>=== RUN  TestTwoPointersBfs/single</div>
                <div className="dim">    PASS · 0.00s</div>
                <div className="mt-2" style={{color:'var(--ink-92)'}}>PASS · ok 4/4 · 0.012s</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ====== tweaks ====== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">cursor labels</span>
              <input type="checkbox" checked={tweaks.showCursorLabels}
                     onChange={e=>set('showCursorLabels', e.target.checked)}/>
            </label>
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">output panel open</span>
              <input type="checkbox" checked={tweaks.outputOpen}
                     onChange={e=>set('outputOpen', e.target.checked)}/>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">output tab</span>
              <select value={tweaks.outputTab} onChange={e=>set('outputTab', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value="stdout">stdout</option>
                <option value="stderr">stderr</option>
                <option value="tests">tests</option>
              </select>
            </label>
          </div>
        </div>
      );
    }

    /* ====== app ====== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);

      const set = (k,v) => {
        const next = { ...tweaks, [k]:v };
        setTweaks(next);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(()=>{
        const onMsg = (ev)=>{
          const d = ev.data || {};
          if (d.type==='__activate_edit_mode') setTweaksOpen(true);
          if (d.type==='__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return ()=> window.removeEventListener('message', onMsg);
      },[]);

      return (
        <div className="canvas-bg min-h-screen page-enter flex flex-col">
          <Header/>
          <div className="flex-1 flex" style={{ minHeight: 'calc(100vh - 60px)' }}>
            <FileTree active={tweaks.fileActive} setActive={(f)=>set('fileActive', f)}/>
            <div className="flex-1 flex flex-col min-w-0">
              <CodeEditor tweaks={tweaks}/>
              {tweaks.outputOpen && <OutputPanel tweaks={tweaks} set={set}/>}
            </div>
            <ParticipantsPanel/>
          </div>

          {tweaksOpen && <TweaksPanel tweaks={tweaks} set={set}
            onClose={()=>{ setTweaksOpen(false);
              try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){} }}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
