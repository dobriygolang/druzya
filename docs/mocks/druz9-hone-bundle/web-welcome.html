<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>druz9 · Welcome</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000;
      --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3); --ink-15:rgba(255,255,255,0.15);
      --accent:#FF3B30;
      --t-fast:150ms; --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}

    .canvas-bg{
      background:radial-gradient(circle at 50% -10%, rgba(255,255,255,0.02), transparent 55%), var(--bg);
    }

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}
    .stagger>*:nth-child(5){animation-delay:340ms}
    .stagger>*:nth-child(6){animation-delay:410ms}
    .stagger>*:nth-child(7){animation-delay:480ms}
    .stagger>*:nth-child(8){animation-delay:550ms}

    .stagger-list>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger-list>*:nth-child(1){animation-delay:80ms}
    .stagger-list>*:nth-child(2){animation-delay:150ms}
    .stagger-list>*:nth-child(3){animation-delay:220ms}
    .stagger-list>*:nth-child(4){animation-delay:290ms}
    .stagger-list>*:nth-child(5){animation-delay:360ms}
    .stagger-list>*:nth-child(6){animation-delay:430ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}
    .btn-primary:disabled{background:var(--surface-3); color:var(--ink-30); cursor:not-allowed; transform:none}

    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}

    .track-card{
      transition: border-color var(--t-fast) var(--ease),
                  background-color var(--t-fast) var(--ease),
                  transform var(--t-fast) var(--ease);
      cursor:pointer;
    }
    .track-card:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .track-card.selected{
      border-color:var(--ink-70);
      background:var(--surface-2);
    }
    .track-card.selected .selector{
      background:#fff; border-color:#fff;
    }
    .track-card.selected .selector::after{
      content:''; width:6px; height:6px; border-radius:999px; background:#000;
    }
    .selector{
      width:14px; height:14px; border-radius:999px; border:1px solid var(--ink-30);
      display:inline-flex; align-items:center; justify-content:center;
      transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
    }

    button:focus-visible{outline:1px solid var(--ink-70);outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}
    .no-select{-webkit-user-select:none;user-select:none}

    .tweaks{
      position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "step": 1,
      "showWhy": true,
      "preselected": "explore"
    }/*EDITMODE-END*/;

    /* ===== tracks ===== */
    const TRACKS = [
      {
        key: 'explore',
        label: 'Explore',
        sub: 'try & decide',
        time: '6 weeks',
        commitment: '4–7 h / week',
        why: 'You know which two domains you like. You don\'t know which one fits your hands.',
        for: 'mid-career switchers · part-time learners',
        outline: [
          'Dual-track tasks across two paths you pick',
          'Weekly LLM fork-analysis · which felt like flow',
          'Auto-commit at week 6 · or fork sooner anytime',
        ],
        sample: 'pick MLE + DE · 5 tasks each · weekly review',
        intensity: 35,
      },
      {
        key: 'commit',
        label: 'Commit',
        sub: 'build depth',
        time: '12 weeks',
        commitment: '8–12 h / week',
        why: 'You know the domain. You want a structured curriculum that compounds.',
        for: 'engineers leveling up · sabbatical learners',
        outline: [
          'Senior-spec curriculum · 8 modules, 32 tasks',
          'Daily focus blocks · weekly mock checkpoint',
          '5-axis radar · strict pass/fail per module',
        ],
        sample: 'Senior backend pack · distributed-systems first',
        intensity: 70,
      },
      {
        key: 'deep',
        label: 'Deep',
        sub: 'interview prep',
        time: '3 weeks',
        commitment: '12–18 h / week',
        why: 'You have an interview in 21 days or fewer. You want pressure, not lessons.',
        for: 'job-seekers · mid-cycle prep',
        outline: [
          'Daily AI-mocks · expert-strict profile · graded',
          'Weakness queue · regenerated every 24h',
          'Round simulations · matching target company axis',
        ],
        sample: 'Yandex DE round 2 prep · 9 days remaining',
        intensity: 95,
      },
    ];

    const STEPS = [
      { n: '01', label: 'Track' },
      { n: '02', label: 'Profile' },
      { n: '03', label: 'Connect' },
    ];

    /* ===== atoms ===== */
    const Chip = ({ children }) => <span className="chip">{children}</span>;
    const Kbd = ({ children }) => <span className="kbd">{children}</span>;

    /* ===== header ===== */
    function Header() {
      return (
        <header className="flex items-center justify-between pt-7 pb-5 no-select">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                 style={{background:'#000'}}><svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                  <defs>
                    <clipPath id="gly-w-c"><circle cx="12" cy="12" r="9"/></clipPath>
                  </defs>
                  <circle cx="12" cy="12" r="9" fill="#fff"/>
                  <g clipPath={"url(#gly-w-c)"}>
                    <rect x="3" y="3" width="9" height="18" fill="#000"/>
                  </g>
                  <g clipPath={"url(#gly-w-c)"} stroke="#000" strokeWidth="1.4">
                    <line x1="10" y1="2" x2="22" y2="14"/>
                    <line x1="10" y1="6" x2="22" y2="18"/>
                    <line x1="10" y1="10" x2="22" y2="22"/>
                    <line x1="10" y1="14" x2="22" y2="26"/>
                    <line x1="10" y1="18" x2="22" y2="30"/>
                  </g>
                </svg></div>
            <div className="flex items-baseline gap-2">
              <span className="text-[15px] font-semibold tracking-tight">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] font-medium dim">Welcome</span>
            </div>
          </div>
          <div className="flex items-center gap-3 text-[10px] mono uppercase tracking-wider dim">
            <span>have an account</span>
            <button className="hair-b rounded px-2 py-1 dim" style={{background:'var(--surface-2)', color:'var(--ink-70)'}}>
              sign in
            </button>
          </div>
        </header>
      );
    }

    /* ===== step rail ===== */
    function StepRail({ current }) {
      return (
        <div className="flex items-center gap-3 no-select">
          {STEPS.map((s, i) => {
            const active = i + 1 === current;
            const done = i + 1 < current;
            return (
              <React.Fragment key={s.n}>
                <div className="flex items-center gap-2">
                  <span className={`mono text-[10px] uppercase tracking-wider`}
                        style={{color: active ? 'var(--ink-92)' : done ? 'var(--ink-70)' : 'var(--ink-30)'}}>
                    {s.n}
                  </span>
                  <span className="text-[12px]"
                        style={{color: active ? 'var(--ink-92)' : done ? 'var(--ink-70)' : 'var(--ink-30)'}}>
                    {s.label}
                  </span>
                </div>
                {i < STEPS.length - 1 && (
                  <div className="w-8 h-px" style={{background: 'var(--hair-2)'}}/>
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    /* ===== track card ===== */
    function TrackCard({ track, selected, onSelect, showWhy }) {
      return (
        <div
          className={`track-card surface-1 hair-b rounded-xl p-6 flex flex-col gap-5 ${selected?'selected':''}`}
          onClick={() => onSelect(track.key)}
          role="button"
          tabIndex={0}
        >
          <div className="flex items-start justify-between">
            <div>
              <div className="flex items-baseline gap-3">
                <span className="text-[20px] font-semibold tracking-tight">{track.label}</span>
                <span className="text-[12px] dim">{track.sub}</span>
              </div>
              <div className="flex items-center gap-2 mt-3">
                <Chip>{track.time}</Chip>
                <Chip>{track.commitment}</Chip>
              </div>
            </div>
            <span className="selector"></span>
          </div>

          <div className="hairline"/>

          {showWhy && (
            <div className="grid grid-cols-[36px_1fr] gap-3">
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-1">why</div>
              <p className="text-[12.5px] leading-relaxed" style={{color:'var(--ink-70)'}}>{track.why}</p>
            </div>
          )}

          <div className="grid grid-cols-[36px_1fr] gap-3">
            <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-1">for</div>
            <p className="text-[12.5px] dim">{track.for}</p>
          </div>

          <div className="grid grid-cols-[36px_1fr] gap-3">
            <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-1">how</div>
            <ul className="space-y-1.5 text-[12.5px]" style={{color:'var(--ink-70)'}}>
              {track.outline.map((o,i)=>(
                <li key={i} className="grid grid-cols-[14px_1fr] gap-2">
                  <span className="dim-2 mono pt-0.5">{String(i+1).padStart(2,'0')}</span>
                  <span>{o}</span>
                </li>
              ))}
            </ul>
          </div>

          <div className="hairline"/>

          <div className="flex items-center justify-between gap-3">
            <div className="flex-1">
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">intensity</span>
                <span className="mono text-[10px] dim">{track.intensity}</span>
              </div>
              <div className="h-1 surface-3 rounded-full overflow-hidden">
                <div className="fill-bar h-full"
                     style={{width:`${track.intensity}%`, background:selected?'#fff':'var(--ink-70)'}}/>
              </div>
            </div>
          </div>

          <div className="rounded-md p-3 text-[11.5px] leading-relaxed mono"
               style={{background:'var(--surface-3)', borderLeft:`2px solid ${selected?'var(--ink-70)':'var(--ink-15)'}`,
                       color:'var(--ink-70)'}}>
            <span className="dim-2 uppercase tracking-wider text-[9px]">sample · </span>
            {track.sample}
          </div>
        </div>
      );
    }

    /* ===== tweaks ===== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none" aria-label="close">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">show «why» row</span>
              <input type="checkbox" checked={tweaks.showWhy}
                     onChange={e=>set('showWhy', e.target.checked)}/>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">preselected track</span>
              <select value={tweaks.preselected} onChange={e=>set('preselected', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value="explore">explore</option>
                <option value="commit">commit</option>
                <option value="deep">deep</option>
                <option value="">(none)</option>
              </select>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">step</span>
              <select value={tweaks.step} onChange={e=>set('step', parseInt(e.target.value,10))}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value="1">1 · track</option>
                <option value="2">2 · profile</option>
                <option value="3">3 · connect</option>
              </select>
            </label>
          </div>
        </div>
      );
    }

    /* ===== app ===== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [selected, setSelected] = useState(TWEAK_DEFAULTS.preselected || '');

      const set = (k,v) => {
        const next = {...tweaks, [k]: v};
        setTweaks(next);
        if (k === 'preselected') setSelected(v);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(()=>{
        const onMsg = (ev) => {
          const d = ev.data || {};
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return ()=> window.removeEventListener('message', onMsg);
      }, []);

      // keyboard: 1/2/3 select, ⏎ continue
      useEffect(()=>{
        const onKey = (e) => {
          if (e.key === '1') setSelected('explore');
          if (e.key === '2') setSelected('commit');
          if (e.key === '3') setSelected('deep');
        };
        window.addEventListener('keydown', onKey);
        return ()=> window.removeEventListener('keydown', onKey);
      }, []);

      const sel = TRACKS.find(t => t.key === selected);

      return (
        <div className="canvas-bg min-h-screen page-enter">
          <div className="max-w-[1280px] mx-auto px-8">
            <Header/>

            <main className="stagger pb-10">
              {/* Lead */}
              <section className="grid grid-cols-12 gap-4 items-end pb-8 pt-6">
                <div className="col-span-12 lg:col-span-8">
                  <div className="flex items-center gap-3 mb-4">
                    <Chip>welcome · v0</Chip>
                    <span className="dim-2 mono text-[10px] uppercase tracking-wider">
                      onboarding · 3-step
                    </span>
                  </div>
                  <h1 className="text-[40px] font-semibold tracking-tight leading-[1.05]" style={{color:'var(--ink-100)'}}>
                    Pick a track.<br/>
                    <span className="dim">Each one shapes the next 6 weeks.</span>
                  </h1>
                  <p className="text-[13px] dim mt-4 max-w-[60ch] leading-relaxed">
                    Tracks are not «levels». They are different commitments to the next stretch
                    of your work — exploration, depth, or pressure. You can switch tracks once
                    per cycle without losing data.
                  </p>
                </div>
                <div className="col-span-12 lg:col-span-4 flex lg:justify-end">
                  <StepRail current={tweaks.step}/>
                </div>
              </section>

              {/* Track grid */}
              <section className="grid grid-cols-1 md:grid-cols-3 gap-4 stagger-list">
                {TRACKS.map(t => (
                  <TrackCard
                    key={t.key}
                    track={t}
                    selected={selected === t.key}
                    onSelect={setSelected}
                    showWhy={tweaks.showWhy}
                  />
                ))}
              </section>

              {/* Action bar */}
              <section className="surface hair-b rounded-xl mt-6 p-5 flex items-center justify-between flex-wrap gap-4">
                <div className="flex items-center gap-3 min-w-0">
                  <span className="text-[10px] mono dim-2 uppercase tracking-wider">selected</span>
                  {sel ? (
                    <div className="flex items-center gap-2 min-w-0">
                      <span className="mono text-[14px] font-semibold tracking-tight">{sel.label}</span>
                      <span className="text-[12px] dim truncate">· {sel.sub} · {sel.time}</span>
                    </div>
                  ) : (
                    <span className="text-[12px] dim">none yet — pick one above</span>
                  )}
                </div>

                <div className="flex items-center gap-3 flex-wrap">
                  <span className="text-[10px] mono dim-2 uppercase tracking-wider">
                    pick by key <Kbd>1</Kbd> <Kbd>2</Kbd> <Kbd>3</Kbd>
                  </span>
                  <button className="lift px-4 py-2 rounded-md text-[13px] hair-b"
                          style={{background:'var(--surface-2)', color:'var(--ink-70)'}}>
                    compare all
                  </button>
                  <button
                    className="btn-primary px-4 py-2 rounded-md text-[13px] font-medium inline-flex items-center gap-2"
                    disabled={!sel}
                  >
                    continue
                    <span className="mono text-[10px]" style={{color:'rgba(0,0,0,0.5)'}}>⏎</span>
                  </button>
                </div>
              </section>

              {/* Footer */}
              <footer className="flex items-center justify-between mt-6 pb-4 text-[10px] mono dim-2 uppercase tracking-wider no-select">
                <div className="flex items-center gap-4">
                  <span>back <Kbd>esc</Kbd></span>
                  <span>continue <Kbd>⏎</Kbd></span>
                  <span>compare <Kbd>C</Kbd></span>
                </div>
                <div>druz9 · welcome · step {tweaks.step}/3</div>
              </footer>
            </main>
          </div>

          {tweaksOpen && (
            <TweaksPanel tweaks={tweaks} set={set}
                         onClose={()=>{
                           setTweaksOpen(false);
                           try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){}
                         }}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
