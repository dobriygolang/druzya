<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hone · Settings</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3); --ink-15:rgba(255,255,255,0.15);
      --accent:#FF3B30;
      --t-fast:150ms; --t-base:220ms;
      --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.02),transparent 55%),var(--bg)}

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}
    .stagger>*:nth-child(5){animation-delay:340ms}
    .stagger>*:nth-child(6){animation-delay:410ms}

    .stagger-list>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger-list>*:nth-child(1){animation-delay:80ms}
    .stagger-list>*:nth-child(2){animation-delay:150ms}
    .stagger-list>*:nth-child(3){animation-delay:220ms}
    .stagger-list>*:nth-child(4){animation-delay:290ms}
    .stagger-list>*:nth-child(5){animation-delay:360ms}
    .stagger-list>*:nth-child(6){animation-delay:430ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}

    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70)}
    .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}

    button:focus-visible{outline:1px solid var(--ink-70); outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--hair-2); border-radius:3px}

    .no-select{-webkit-user-select:none;user-select:none}
    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}

    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6)}

    /* nav row active */
    .nav-row{ border-left: 2px solid transparent; transition: all var(--t-fast) var(--ease); }
    .nav-row:hover{ background: var(--surface-2); }
    .nav-row.active{ background: var(--surface-2); border-left-color: var(--ink-100); color: var(--ink-92); }

    /* toggle switch */
    .switch{position:relative; width:32px; height:18px; border-radius:999px; background: var(--surface-3); border: 1px solid var(--hair-2); cursor:pointer; transition: background var(--t-fast) var(--ease);}
    .switch::after{content:''; position:absolute; left:2px; top:1px; width:14px; height:14px; border-radius:999px; background:var(--ink-50); transition: all var(--t-fast) var(--ease);}
    .switch.on{ background:#fff; border-color:#fff; }
    .switch.on::after{ left: 16px; background: #000; }

    /* slider */
    .slider{position:relative; height:6px; background: var(--surface-3); border-radius:999px; border:1px solid var(--hair); }
    .slider-fill{position:absolute; left:0; top:-1px; bottom:-1px; background: #fff; border-radius:999px;}
    .slider-handle{position:absolute; top:50%; transform: translate(-50%,-50%); width:14px; height:14px; border-radius:999px; background:#fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4);}

    /* modal backdrop */
    .modal-overlay{
      position:fixed; inset:0; z-index:80;
      background:rgba(0,0,0,0.72); backdrop-filter: blur(8px);
      animation: fadeIn 220ms var(--ease) both;
    }
    @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
    .modal{
      background: var(--surface-1); border:1px solid var(--hair-2);
      border-radius:12px; padding:28px;
      max-width: 540px; width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      animation: modalIn 280ms var(--ease) both;
    }
    @keyframes modalIn{ from{opacity:0; transform: translateY(8px) scale(0.98);} to{opacity:1; transform: translateY(0) scale(1);} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "activeSection": "privacy",
      "vaultModalOpen": false,
      "themeName": "void"
    }/*EDITMODE-END*/;

    /* ====== mock data ====== */
    const SECTIONS = [
      { key:'appearance', label:'appearance', count:6, glyph:'◐' },
      { key:'focus',      label:'focus',      count:5, glyph:'◔' },
      { key:'learning',   label:'learning',   count:4, glyph:'∞' },
      { key:'account',    label:'account',    count:3, glyph:'◇' },
      { key:'privacy',    label:'privacy',    count:5, glyph:'⌘' },
      { key:'system',     label:'system',     count:4, glyph:'☷' },
      { key:'shortcuts',  label:'shortcuts',  count:14,glyph:'·' },
    ];

    const PRIVACY_DEVICES = [
      { id:'mb-air',  name:'macbook air · m2',     last:'now',     primary:true  },
      { id:'mb-pro',  name:'macbook pro · 16in',   last:'2d ago',                 },
      { id:'iphone',  name:'iphone 15',            last:'5h ago',                 },
    ];

    const Chip = ({ children, live=false }) => (
      <span className={`chip ${live?'live':''}`}>{children}</span>
    );
    const Kbd = ({ children }) => <span className="kbd">{children}</span>;

    /* ====== left nav ====== */
    function Nav({ active, setActive }) {
      return (
        <aside className="w-[220px] shrink-0 border-r flex flex-col"
          style={{ borderColor:'var(--hair)', background:'#070707' }}>
          <div className="p-3 border-b" style={{ borderColor:'var(--hair)' }}>
            <div className="surface-2 hair-b rounded-md flex items-center px-3 py-1.5 gap-2">
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">/ search settings</span>
              <span className="ml-auto kbd">⌘K</span>
            </div>
          </div>
          <nav className="flex-1 py-2 stagger-list">
            {SECTIONS.map(s => (
              <button key={s.key} onClick={()=>setActive(s.key)}
                className={`nav-row w-full flex items-center gap-3 px-3 py-2 text-[12.5px] no-select ${active===s.key?'active':''}`}
                style={{ color: active===s.key?'var(--ink-92)':'var(--ink-70)' }}>
                <span className="text-[12px]" style={{ color: active===s.key?'var(--ink-100)':'var(--ink-50)' }}>{s.glyph}</span>
                <span className="flex-1 text-left">{s.label}</span>
                <span className="text-[9px] mono dim-2">{s.count}</span>
              </button>
            ))}
          </nav>
          <div className="p-3 border-t text-[9px] mono dim-2 uppercase tracking-wider"
               style={{ borderColor:'var(--hair)' }}>
            druz9 · v0.42.1
          </div>
        </aside>
      );
    }

    /* ====== Section: Privacy + Vault ====== */
    function PrivacySection({ tweaks, set }) {
      return (
        <div className="stagger flex flex-col gap-4">
          <section>
            <div className="flex items-center justify-between mb-2 no-select">
              <h1 className="text-[24px] font-semibold tracking-tight">Privacy</h1>
              <Chip>5 settings</Chip>
            </div>
            <p className="text-[13px] dim leading-relaxed max-w-[640px]">
              Vault encryption, device sessions, and what telemetry is sent to druz9.
              All learning data stays local until you opt-in.
            </p>
          </section>

          {/* Vault card */}
          <section className="surface hair-b rounded-xl p-6 lift relative overflow-hidden">
            <div className="hero-stripe"/>
            <div className="flex items-start justify-between gap-4">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-2">
                  <Chip>vault</Chip>
                  <Chip live>encrypted · 14 notes</Chip>
                </div>
                <h2 className="text-[18px] font-semibold tracking-tight mb-1">End-to-end note encryption</h2>
                <p className="text-[12.5px] dim leading-relaxed max-w-[420px]" style={{color:'var(--ink-70)'}}>
                  Pass-phrase derives an Argon2id key. Notes encrypt before sync; druz9 server cannot read them.
                  Lost passphrase = lost notes — no recovery.
                </p>
              </div>
              <div className="flex flex-col gap-2 shrink-0">
                <button onClick={()=>set('vaultModalOpen', true)}
                        className="btn-primary px-4 py-2 rounded-md text-[12.5px] font-medium">
                  setup wizard
                </button>
                <button className="hair-b px-4 py-2 rounded-md text-[12px] dim surface-2">change passphrase</button>
                <button className="hair-b px-4 py-2 rounded-md text-[12px] dim surface-2">disable</button>
              </div>
            </div>
          </section>

          {/* Devices */}
          <section className="surface hair-b rounded-xl p-6">
            <div className="flex items-center justify-between mb-4">
              <div>
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">active sessions</span>
                <h3 className="text-[14px] font-semibold tracking-tight mt-1">3 devices signed in</h3>
              </div>
              <button className="hair-b px-3 py-1.5 rounded-md text-[10px] mono dim uppercase tracking-wider surface-2">
                refresh <Kbd>R</Kbd>
              </button>
            </div>
            <ul className="space-y-2 stagger-list">
              {PRIVACY_DEVICES.map(d => (
                <li key={d.id}
                  className="hair-b rounded-md p-3 surface-2 grid grid-cols-[1fr_120px_120px] gap-4 items-center">
                  <div className="min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-[12.5px]" style={{color:'var(--ink-92)'}}>{d.name}</span>
                      {d.primary && <Chip>this device</Chip>}
                    </div>
                    <div className="text-[10px] mono dim-2 uppercase tracking-wider">last active · {d.last}</div>
                  </div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider">id · {d.id}</div>
                  <div className="text-right">
                    {!d.primary && (
                      <button className="hair-b px-3 py-1 rounded-md text-[10px] mono dim uppercase tracking-wider surface-3">
                        revoke
                      </button>
                    )}
                  </div>
                </li>
              ))}
            </ul>
          </section>

          {/* Telemetry */}
          <section className="surface hair-b rounded-xl p-6">
            <h3 className="text-[14px] font-semibold tracking-tight mb-1">Telemetry</h3>
            <p className="text-[12px] dim mb-4">Anonymized usage events to improve product. No content of notes/mocks/podcasts.</p>
            <ToggleRow label="Anonymous usage" desc="page views, feature opens, error counts" on={true}/>
            <ToggleRow label="Crash reports"   desc="stack traces · auto-submit on crash"      on={true}/>
            <ToggleRow label="Performance"     desc="render times, network latencies"          on={false}/>
          </section>

          {/* Storage tier callout */}
          <section className="surface hair-b rounded-xl p-6 relative overflow-hidden">
            <div className="hero-stripe"/>
            <div className="flex items-center justify-between">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-2">
                  <Chip>storage</Chip>
                  <Chip>tier · seedling · free</Chip>
                </div>
                <div className="flex items-baseline gap-3 mb-2">
                  <span className="mono text-[20px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>
                    1.2<span className="text-[12px] dim-2 ml-1">GB / 5</span>
                  </span>
                  <span className="mono text-[10px] dim-2 uppercase tracking-wider">24% used</span>
                </div>
                <div className="h-1 surface-3 rounded-full overflow-hidden max-w-[400px]">
                  <div className="fill-bar h-full" style={{ width:'24%', background:'#fff' }}/>
                </div>
              </div>
              <div className="shrink-0 ml-6">
                <button className="btn-primary px-4 py-2 rounded-md text-[12.5px] font-medium">
                  upgrade · seeker
                </button>
              </div>
            </div>
          </section>
        </div>
      );
    }

    function ToggleRow({ label, desc, on }) {
      const [val, setVal] = useState(on);
      return (
        <div className="flex items-center justify-between py-2 border-t first:border-t-0"
             style={{ borderColor:'var(--hair)' }}>
          <div className="flex-1 min-w-0">
            <div className="text-[13px]" style={{color:'var(--ink-92)'}}>{label}</div>
            <div className="text-[11px] dim mt-0.5">{desc}</div>
          </div>
          <button className={`switch ${val?'on':''}`} onClick={()=>setVal(!val)}/>
        </div>
      );
    }

    /* ====== Section: Appearance (alt) ====== */
    function AppearanceSection({ tweaks, set }) {
      const themes = [
        { k:'void',     l:'void',     h:'pure black', primary:true  },
        { k:'graphite', l:'graphite', h:'soft dark'                   },
        { k:'paper',    l:'paper',    h:'light · WIP'                 },
        { k:'ink',      l:'ink',      h:'high-contrast · solar B&W'   },
      ];
      return (
        <div className="stagger flex flex-col gap-4">
          <section>
            <h1 className="text-[24px] font-semibold tracking-tight mb-2">Appearance</h1>
            <p className="text-[13px] dim max-w-[640px]">Theme, density, font preferences.</p>
          </section>

          <section className="surface hair-b rounded-xl p-6">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider mb-3 block">theme</span>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 stagger-list">
              {themes.map(t => (
                <button key={t.k} onClick={()=>set('themeName', t.k)}
                  className={`lift hair-b rounded-md p-4 text-left flex flex-col gap-2 ${tweaks.themeName===t.k?'hair2-b':''}`}
                  style={{ background: tweaks.themeName===t.k?'var(--surface-3)':'var(--surface-2)' }}>
                  <div className="h-12 rounded-sm border"
                    style={{ borderColor:'var(--hair)', background: t.k==='paper'?'#f4f4f4': t.k==='graphite'?'#1a1a1a':'#000' }}/>
                  <div className="flex items-center justify-between">
                    <span className="text-[12.5px] font-medium">{t.l}</span>
                    {tweaks.themeName === t.k && <Chip live>active</Chip>}
                  </div>
                  <span className="text-[10px] mono dim-2 uppercase tracking-wider">{t.h}</span>
                </button>
              ))}
            </div>
          </section>
        </div>
      );
    }

    /* ====== Section: Focus ====== */
    function FocusSection() {
      return (
        <div className="stagger flex flex-col gap-4">
          <section>
            <h1 className="text-[24px] font-semibold tracking-tight mb-2">Focus</h1>
            <p className="text-[13px] dim max-w-[640px]">Pomodoro, daily goal, ambient music.</p>
          </section>

          <section className="surface hair-b rounded-xl p-6">
            <SliderRow label="Pomodoro length" valueLabel="25 min" desc="how long a focus block lasts" pct={25/90*100}/>
            <SliderRow label="Break length"    valueLabel="5 min"  desc="auto-break after each block"  pct={5/30*100}/>
            <SliderRow label="Daily goal"      valueLabel="120 min" desc="streak target"               pct={120/300*100}/>
          </section>

          <section className="surface hair-b rounded-xl p-6">
            <h3 className="text-[14px] font-semibold tracking-tight mb-3">Ambient music</h3>
            <ToggleRow label="Lo-fi during pomodoro" desc="auto-play on session start" on={true}/>
            <ToggleRow label="Noise floor"           desc="brown noise at -42dB"        on={false}/>
          </section>
        </div>
      );
    }

    function SliderRow({ label, valueLabel, desc, pct }) {
      return (
        <div className="py-3 border-t first:border-t-0" style={{ borderColor:'var(--hair)' }}>
          <div className="flex items-baseline justify-between mb-2">
            <div>
              <div className="text-[13px]" style={{color:'var(--ink-92)'}}>{label}</div>
              <div className="text-[11px] dim mt-0.5">{desc}</div>
            </div>
            <span className="mono text-[14px] font-semibold tracking-tight">{valueLabel}</span>
          </div>
          <div className="slider mt-2">
            <div className="slider-fill" style={{ width: `${pct}%` }}/>
            <div className="slider-handle" style={{ left: `${pct}%` }}/>
          </div>
        </div>
      );
    }

    /* ====== vault wizard modal ====== */
    function VaultModal({ onClose }) {
      const [step, setStep] = useState(1);
      return (
        <div className="modal-overlay flex items-center justify-center px-6">
          <div className="modal">
            <div className="flex items-center justify-between mb-4">
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">vault setup · step {step} of 3</span>
              <button onClick={onClose} className="dim-2 text-[18px] leading-none" aria-label="close">×</button>
            </div>

            <div className="flex items-center gap-1 mb-5">
              {[1,2,3].map(i => (
                <div key={i} className="flex-1 h-[2px] rounded-full"
                  style={{ background: i <= step ? 'var(--ink-100)' : 'var(--hair)' }}/>
              ))}
            </div>

            {step === 1 && (
              <>
                <h2 className="text-[20px] font-semibold tracking-tight mb-2">Choose a passphrase</h2>
                <p className="text-[13px] dim mb-5" style={{color:'var(--ink-70)'}}>
                  At least 12 chars. We'll derive an Argon2id key — slow brute-force.
                  Lost passphrase means lost vault. There is no recovery.
                </p>
                <input type="password" placeholder="passphrase"
                  className="w-full surface-2 hair2-b rounded-md px-3 py-2 text-[13px] mono mb-2 outline-none"
                  style={{ color:'var(--ink-92)' }}/>
                <input type="password" placeholder="repeat"
                  className="w-full surface-2 hair2-b rounded-md px-3 py-2 text-[13px] mono mb-4 outline-none"
                  style={{ color:'var(--ink-92)' }}/>
                <div className="text-[10px] mono dim-2 uppercase tracking-wider mb-1">strength</div>
                <div className="flex items-center gap-2 mb-4">
                  <div className="flex-1 h-1 surface-3 rounded-full overflow-hidden">
                    <div className="fill-bar h-full" style={{ width:'68%', background:'var(--ink-70)' }}/>
                  </div>
                  <span className="mono text-[10px] dim">good</span>
                </div>
              </>
            )}

            {step === 2 && (
              <>
                <h2 className="text-[20px] font-semibold tracking-tight mb-2">Save recovery hint</h2>
                <p className="text-[13px] dim mb-5" style={{color:'var(--ink-70)'}}>
                  A non-secret hint we'll show you next time you open the vault. Avoid the actual passphrase.
                </p>
                <input type="text" placeholder="hint (optional)"
                  className="w-full surface-2 hair2-b rounded-md px-3 py-2 text-[13px] mb-4 outline-none"
                  style={{ color:'var(--ink-92)' }}/>
              </>
            )}

            {step === 3 && (
              <>
                <h2 className="text-[20px] font-semibold tracking-tight mb-2">Encrypt 14 existing notes?</h2>
                <p className="text-[13px] dim mb-5" style={{color:'var(--ink-70)'}}>
                  We'll re-encrypt all notes locally before next sync. Takes ~3 seconds. You can mix encrypted/plain notes after.
                </p>
                <ToggleRow label="Encrypt all" desc="recommended" on={true}/>
                <ToggleRow label="Auto-encrypt new notes" desc="default to vault" on={true}/>
              </>
            )}

            <div className="hairline mb-4 mt-4"/>
            <div className="flex items-center gap-2">
              {step > 1 && (
                <button onClick={()=>setStep(s=>s-1)}
                        className="hair-b px-4 py-2 rounded-md text-[12.5px] dim surface-2">back</button>
              )}
              <button onClick={onClose} className="hair-b px-4 py-2 rounded-md text-[12.5px] dim surface-2">cancel</button>
              <span className="ml-auto"/>
              {step < 3 ? (
                <button onClick={()=>setStep(s=>s+1)}
                        className="btn-primary px-4 py-2 rounded-md text-[12.5px] font-medium">
                  continue · <span className="text-[10px] mono opacity-50 ml-1">⏎</span>
                </button>
              ) : (
                <button onClick={onClose}
                        className="btn-primary px-4 py-2 rounded-md text-[12.5px] font-medium">
                  enable vault
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ====== header ====== */
    function Header() {
      return (
        <header className="flex items-center justify-between pt-7 pb-5 no-select">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                 style={{background:'#000'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <clipPath id="gly-set-c"><circle cx="12" cy="12" r="9"/></clipPath>
                </defs>
                <circle cx="12" cy="12" r="9" fill="#fff"/>
                <g clipPath={"url(#gly-set-c)"}>
                  <rect x="3" y="3" width="9" height="18" fill="#000"/>
                </g>
                <g clipPath={"url(#gly-set-c)"} stroke="#000" strokeWidth="1.4">
                  <line x1="10" y1="2" x2="22" y2="14"/>
                  <line x1="10" y1="6" x2="22" y2="18"/>
                  <line x1="10" y1="10" x2="22" y2="22"/>
                  <line x1="10" y1="14" x2="22" y2="26"/>
                  <line x1="10" y1="18" x2="22" y2="30"/>
                </g>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <span className="text-[15px] font-semibold tracking-tight">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] font-medium dim">Settings</span>
            </div>
          </div>
          <div className="flex items-center gap-3 text-[10px] mono uppercase tracking-wider dim">
            <span>search</span><Kbd>⌘K</Kbd>
            <span className="dim-2">·</span>
            <span>back to today</span><Kbd>esc</Kbd>
          </div>
        </header>
      );
    }

    /* ====== tweaks ====== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">active section</span>
              <select value={tweaks.activeSection} onChange={e=>set('activeSection', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                {SECTIONS.map(s=> <option key={s.key} value={s.key}>{s.label}</option>)}
              </select>
            </label>
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">vault modal open</span>
              <input type="checkbox" checked={tweaks.vaultModalOpen}
                     onChange={e=>set('vaultModalOpen', e.target.checked)}/>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">theme</span>
              <select value={tweaks.themeName} onChange={e=>set('themeName', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value="void">void</option>
                <option value="graphite">graphite</option>
                <option value="paper">paper</option>
                <option value="ink">ink</option>
              </select>
            </label>
          </div>
        </div>
      );
    }

    /* ====== app ====== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);

      const set = (k,v) => {
        const next = { ...tweaks, [k]:v };
        setTweaks(next);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(()=>{
        const onMsg = (ev)=>{
          const d = ev.data || {};
          if (d.type==='__activate_edit_mode') setTweaksOpen(true);
          if (d.type==='__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return ()=> window.removeEventListener('message', onMsg);
      },[]);

      return (
        <div className="canvas-bg min-h-screen page-enter">
          <div className="max-w-[1280px] mx-auto px-8">
            <Header/>
            <div className="flex gap-0 hair-b rounded-xl overflow-hidden surface min-h-[640px]">
              <Nav active={tweaks.activeSection} setActive={(s)=>set('activeSection', s)}/>
              <main className="flex-1 px-7 py-6 overflow-auto">
                {tweaks.activeSection === 'privacy' && <PrivacySection tweaks={tweaks} set={set}/>}
                {tweaks.activeSection === 'appearance' && <AppearanceSection tweaks={tweaks} set={set}/>}
                {tweaks.activeSection === 'focus' && <FocusSection/>}
                {!['privacy','appearance','focus'].includes(tweaks.activeSection) && (
                  <div className="text-[13px] dim">section «{tweaks.activeSection}» — placeholder · expand in claude design</div>
                )}
              </main>
            </div>

            <footer className="flex items-center justify-between py-4 text-[10px] mono dim-2 uppercase tracking-wider no-select">
              <div className="flex items-center gap-4">
                <span>palette <Kbd>⌘K</Kbd></span>
                <span>cycle section <Kbd>tab</Kbd></span>
                <span>back <Kbd>esc</Kbd></span>
              </div>
              <div>hone · settings · v0</div>
            </footer>
          </div>

          {tweaks.vaultModalOpen && <VaultModal onClose={()=>set('vaultModalOpen', false)}/>}

          {tweaksOpen && <TweaksPanel tweaks={tweaks} set={set}
            onClose={()=>{ setTweaksOpen(false);
              try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){} }}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
