<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hone · Podcasts</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000;
      --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12); --hair-3:rgba(255,255,255,0.18);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3); --ink-15:rgba(255,255,255,0.15);
      --accent:#FF3B30;
      --t-fast:150ms; --t-base:220ms; --t-slow:320ms;
      --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      font-feature-settings:'ss01','cv11';
      -webkit-font-smoothing:antialiased; letter-spacing:-0.005em;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:'zero','ss01','ss02'; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.02),transparent 55%),var(--bg)}

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}
    .stagger>*:nth-child(5){animation-delay:340ms}
    .stagger>*:nth-child(6){animation-delay:410ms}

    .stagger-list>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger-list>*:nth-child(1){animation-delay:80ms}
    .stagger-list>*:nth-child(2){animation-delay:150ms}
    .stagger-list>*:nth-child(3){animation-delay:220ms}
    .stagger-list>*:nth-child(4){animation-delay:290ms}
    .stagger-list>*:nth-child(5){animation-delay:360ms}
    .stagger-list>*:nth-child(6){animation-delay:430ms}
    .stagger-list>*:nth-child(7){animation-delay:500ms}
    .stagger-list>*:nth-child(8){animation-delay:570ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}

    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70); border-color:var(--hair-2)}
    .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .chip.solid{background:#fff;color:#000;border-color:#fff}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}

    button:focus-visible{outline:1px solid var(--ink-70); outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--hair-2); border-radius:3px}

    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}
    .no-select{-webkit-user-select:none;user-select:none}

    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6)}

    .filter-indicator{transition:transform var(--t-base) var(--ease),width var(--t-base) var(--ease)}

    /* cover art - white-on-black with hatching */
    .cover{
      background:#fff; color:#000; position:relative; overflow:hidden;
      border-radius:8px;
    }
    .cover-stripes{
      position:absolute; inset:0;
      background-image: repeating-linear-gradient(135deg,
        rgba(0,0,0,0) 0,
        rgba(0,0,0,0) 9px,
        rgba(0,0,0,1) 9px,
        rgba(0,0,0,1) 12px);
      mix-blend-mode:multiply;
      opacity:0.96;
    }
    .cover-mark{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono',monospace; font-weight:600;
      color:#fff; mix-blend-mode:difference;
      letter-spacing:-0.04em;
    }

    /* equalizer animation - white only */
    @keyframes eq1{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
    @keyframes eq2{0%,100%{transform:scaleY(0.7)}50%{transform:scaleY(0.3)}}
    @keyframes eq3{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(0.9)}}
    .eq-bar{display:inline-block;width:2px;background:#fff;margin-right:1.5px;transform-origin:bottom;border-radius:1px}
    .eq-bar:nth-child(1){animation:eq1 880ms ease-in-out infinite}
    .eq-bar:nth-child(2){animation:eq2 720ms ease-in-out infinite}
    .eq-bar:nth-child(3){animation:eq3 1040ms ease-in-out infinite}
    .eq-bar:nth-child(4){animation:eq1 920ms ease-in-out infinite}

    /* play knob */
    .play-knob{
      width:48px; height:48px; border-radius:999px;
      background:#fff; color:#000;
      display:grid; place-items:center;
      transition:transform var(--t-fast) var(--ease);
    }
    .play-knob:hover{transform:scale(1.04)}

    .seek{
      position:relative; height:3px; border-radius:999px;
      background:var(--surface-3); cursor:pointer;
    }
    .seek-fill{position:absolute; inset:0 auto 0 0; background:#fff; border-radius:999px}
    .seek-handle{
      position:absolute; top:50%; transform:translate(-50%,-50%);
      width:10px; height:10px; border-radius:999px; background:#fff;
      opacity:0; transition:opacity var(--t-fast) var(--ease);
    }
    .seek:hover .seek-handle{opacity:1}

    /* waveform - decorative, white at varying opacity */
    .waveform{display:flex;align-items:center;gap:1.5px;height:40px}
    .waveform > i{display:block;width:2px;background:var(--ink-30);border-radius:1px}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "category": "all",
      "isPlaying": true,
      "showTranscript": true
    }/*EDITMODE-END*/;

    /* ====== mock data ====== */
    const CATEGORIES = [
      { key:'all',     label:'all',          count:47 },
      { key:'sysd',    label:'system design', count:18 },
      { key:'career',  label:'career',       count:14 },
      { key:'algo',    label:'algorithms',    count:9  },
      { key:'ml',      label:'machine learning', count:6 },
    ];

    const NOW = {
      title:'How Instagram Stories scales to 500M DAU',
      kind:'system design',
      ep:'EP 12',
      guest:'Максим К. · Staff Engineer @ Meta',
      duration:'52:14',
      played:'16:44',
      remaining:'-35:30',
      pct:32,
      plays:'4.8k',
      stars:'4.9',
      cover:'IS',
      coverIdx:'12',
    };

    const CHAPTERS = [
      { t:'00:00', l:'Intro · кто такой Максим',                  active:false },
      { t:'16:44', l:'CDN edge caching и fanout-on-read',         active:true  },
      { t:'28:11', l:'TTL-тактика для быстрых 20% юзеров',        active:false },
      { t:'34:02', l:'Failures · что сломалось на NYE 2019',      active:false },
      { t:'45:38', l:'Q&A · tips на собес',                       active:false },
      { t:'50:02', l:'Outro',                                     active:false },
    ];

    const TRANSCRIPT = [
      { t:'16:44', who:'Максим', accent:true,
        text:'Сначала, когда мы проектировали fanout, первый вариант был fanout-on-write — популярный юзер с 10M подписчиков создаёт 10M записей в базу. Для Stories это было неприемлемо.' },
      { t:'17:12', who:'Ведущий', accent:false,
        text:'А ведь там ещё TTL 24 часа?' },
      { t:'17:18', who:'Максим', accent:true,
        text:'Именно. Поэтому мы перешли на lazy fanout-on-read, кэшируем на edge.' },
      { t:'17:46', who:'Ведущий', accent:false,
        text:'И как при этом не убить cold-read latency?' },
    ];

    const QUEUE = [
      { cover:'RD', idx:'13', title:'Redis под капотом · шардинг на 2B ключей', who:'Ольга Д.', dur:'38 min' },
      { cover:'GL', idx:'14', title:'Как я прошёл Google L5 на Python',         who:'Иван Л.',  dur:'1:02:40' },
      { cover:'TK', idx:'15', title:'Раздача токенов в микросервисах',          who:'Timur R.', dur:'42 min' },
      { cover:'BQ', idx:'16', title:'BigQuery · экономика серверлесс-сканов',    who:'Алёша',    dur:'29 min' },
    ];

    const PROGRESS = {
      listened: 12, total: 47,
      hours: '08:42',
      streak: 9,
      thisWeek: [3, 5, 4, 7, 6, 4, 8],
    };

    const REC = [
      { cover:'CT', idx:'05', title:'CockroachDB consensus tradeoffs', who:'Spencer K.', dur:'1:14:00', tag:'algorithms' },
      { cover:'OB', idx:'07', title:'On-call burnout · что я понял за 5 лет', who:'Анна Г.', dur:'58 min', tag:'career' },
    ];

    /* ====== atoms ====== */
    const Chip = ({ children, live=false, solid=false }) => (
      <span className={`chip ${live?'live':''} ${solid?'solid':''}`}>{children}</span>
    );
    const Kbd = ({ children }) => <span className="kbd">{children}</span>;
    const Cover = ({ mark, idx, size=44 }) => (
      <div className="cover shrink-0" style={{width:size,height:size}}>
        <div className="cover-stripes"/>
        <div className="cover-mark" style={{fontSize: size>72?'22px':'12px'}}>{mark}</div>
        {idx && <div className="absolute bottom-1 left-1.5 mono"
          style={{color:'#fff',fontSize:'9px',mixBlendMode:'difference',letterSpacing:'0.04em'}}>EP{idx}</div>}
      </div>
    );
    const Eq = () => (
      <span className="inline-flex items-end h-3 gap-[1.5px]" aria-hidden>
        <i className="eq-bar h-full"/><i className="eq-bar h-full"/><i className="eq-bar h-full"/><i className="eq-bar h-full"/>
      </span>
    );

    /* ====== header ====== */
    function Header() {
      return (
        <header className="flex items-center justify-between pt-7 pb-5 no-select">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                 style={{background:'#000'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <clipPath id="gly-pod-c"><circle cx="12" cy="12" r="9"/></clipPath>
                </defs>
                <circle cx="12" cy="12" r="9" fill="#fff"/>
                <g clipPath={"url(#gly-pod-c)"}>
                  <rect x="3" y="3" width="9" height="18" fill="#000"/>
                </g>
                <g clipPath={"url(#gly-pod-c)"} stroke="#000" strokeWidth="1.4">
                  <line x1="10" y1="2" x2="22" y2="14"/>
                  <line x1="10" y1="6" x2="22" y2="18"/>
                  <line x1="10" y1="10" x2="22" y2="22"/>
                  <line x1="10" y1="14" x2="22" y2="26"/>
                  <line x1="10" y1="18" x2="22" y2="30"/>
                </g>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <span className="text-[15px] font-semibold tracking-tight">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] font-medium dim">Podcasts</span>
            </div>
            <Chip live>now playing</Chip>
          </div>

          <div className="flex items-center gap-3 text-[10px] mono uppercase tracking-wider dim">
            <span>library</span>
            <Kbd>⌘L</Kbd>
            <span className="dim-2">·</span>
            <span>palette</span>
            <Kbd>⌘K</Kbd>
          </div>
        </header>
      );
    }

    /* ====== category row ====== */
    function CategoryRow({ active, setActive }) {
      const idx = CATEGORIES.findIndex(c => c.key === active);
      const colWidth = 100 / CATEGORIES.length;
      return (
        <div className="flex items-center justify-between mb-5">
          <div className="relative flex items-center p-1 rounded-lg hair-b surface-2 self-start">
            <div className="filter-indicator absolute top-1 bottom-1 rounded-md"
              style={{
                background:'var(--surface-3)', border:'1px solid var(--hair-2)',
                width:`calc(${colWidth}% - 2px)`,
                transform:`translateX(${idx*100}%)`,
              }}/>
            {CATEGORIES.map(c => (
              <button key={c.key} onClick={()=>setActive(c.key)}
                className="relative z-10 px-4 py-1.5 mono text-[11px] uppercase tracking-wider rounded-md min-w-[110px] flex items-center gap-2 justify-center"
                style={{
                  color: active === c.key ? 'var(--ink-92)' : 'var(--ink-50)',
                  transition:'color var(--t-fast) var(--ease)',
                }}>
                {c.label}
                <span className="dim-2 text-[10px]">{c.count}</span>
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2 text-[10px] mono dim-2 uppercase tracking-wider">
            <span>47 episodes · synced 4s ago</span>
          </div>
        </div>
      );
    }

    /* ====== player hero ====== */
    function PlayerHero({ isPlaying, setIsPlaying }) {
      // Decorative waveform bars
      const heights = [12,18,8,24,14,30,20,12,28,16,22,10,26,18,30,14,22,12,28,16,20,8,24,14,18,28,12,22,16,30,20,14,28,10,26,18,12,22,8,30,18,14,26,12,22];
      return (
        <section className="col-span-12 lg:col-span-8 surface hair-b rounded-xl p-7 lift relative overflow-hidden">
          <div className="hero-stripe"/>

          <div className="flex items-center gap-2 mb-5">
            <Chip>{NOW.kind}</Chip>
            <Chip>{NOW.ep}</Chip>
            <Chip live>now playing</Chip>
            <span className="ml-auto dim-2 text-[11px] mono">{NOW.duration}</span>
          </div>

          <div className="flex items-start gap-5 mb-6">
            <Cover mark={NOW.cover} idx={NOW.coverIdx} size={104}/>

            <div className="flex-1 min-w-0">
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mb-1.5">
                {NOW.guest}
              </div>
              <h1 className="text-[26px] font-semibold leading-[1.18] tracking-tight"
                  style={{color:'var(--ink-100)'}}>
                {NOW.title}
              </h1>
              <div className="mt-3 flex items-center gap-3 text-[10px] mono dim-2 uppercase tracking-wider">
                <span>{NOW.plays} plays</span>
                <span className="dim-2">·</span>
                <span>★ {NOW.stars}</span>
              </div>
            </div>
          </div>

          {/* waveform + seek */}
          <div className="mb-3">
            <div className="waveform mb-2">
              {heights.map((h,i)=>(
                <i key={i} style={{
                  height:`${h}px`,
                  background: i/heights.length < NOW.pct/100 ? 'var(--ink-92)' : 'var(--ink-15)'
                }}/>
              ))}
            </div>
            <div className="seek">
              <div className="seek-fill" style={{width:`${NOW.pct}%`}}/>
              <div className="seek-handle" style={{left:`${NOW.pct}%`}}/>
            </div>
            <div className="mt-2 flex items-center justify-between mono text-[11px]">
              <span style={{color:'var(--ink-92)'}}>{NOW.played}</span>
              <span className="dim-2">{NOW.remaining}</span>
            </div>
          </div>

          <div className="hairline my-5"/>

          {/* controls */}
          <div className="flex items-center gap-3 flex-wrap">
            <button className="lift hair-b w-10 h-10 rounded-md grid place-items-center mono text-[10px] dim uppercase tracking-wider"
              style={{background:'var(--surface-2)'}} title="back 15s">−15</button>

            <button onClick={()=>setIsPlaying(!isPlaying)}
              className="play-knob"
              title={isPlaying?'pause':'play'}>
              {isPlaying ? (
                <svg width="14" height="14" viewBox="0 0 14 14"><rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/></svg>
              ) : (
                <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 2v10l9-5z" fill="currentColor"/></svg>
              )}
            </button>

            <button className="lift hair-b w-10 h-10 rounded-md grid place-items-center mono text-[10px] dim uppercase tracking-wider"
              style={{background:'var(--surface-2)'}} title="forward 30s">+30</button>

            <div className="ml-2 flex items-center gap-1.5 hair-b rounded-md px-2 py-1.5"
                 style={{background:'var(--surface-2)'}}>
              <span className="mono text-[10px] dim-2 uppercase tracking-wider">speed</span>
              {['1.0','1.25','1.5','1.75'].map((s,i)=>(
                <button key={s}
                  className="mono text-[10px] px-1.5 py-0.5 rounded"
                  style={{
                    color: i===1?'var(--ink-92)':'var(--ink-30)',
                    background: i===1?'var(--surface-3)':'transparent',
                    border: i===1?'1px solid var(--hair-2)':'1px solid transparent',
                  }}>{s}×</button>
              ))}
            </div>

            <span className="mono text-[10px] dim-2 uppercase tracking-wider ml-auto">⏎ play  ·  J −15  ·  L +30  ·  T transcript</span>
          </div>
        </section>
      );
    }

    /* ====== chapters ====== */
    function Chapters() {
      return (
        <section className="col-span-12 lg:col-span-4 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-4">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">chapters</span>
              <h3 className="text-[14px] font-semibold tracking-tight mt-1">{CHAPTERS.length} marks</h3>
            </div>
            <Chip>{CHAPTERS.filter(c=>c.active).length} live</Chip>
          </div>
          <ul className="space-y-1 stagger-list">
            {CHAPTERS.map((c,i)=>(
              <li key={i}
                className={`grid grid-cols-[52px_1fr_18px] items-center gap-3 px-2.5 py-2 rounded-md cursor-pointer ${c.active?'':'lift'}`}
                style={c.active
                  ? {background:'var(--surface-3)',border:'1px solid var(--hair-2)'}
                  : {border:'1px solid transparent'}}>
                <span className="mono text-[11px]"
                      style={{color: c.active?'var(--ink-92)':'var(--ink-30)'}}>{c.t}</span>
                <span className="text-[12.5px]"
                      style={{color: c.active?'var(--ink-100)':'var(--ink-70)',
                              fontWeight: c.active?500:400}}>
                  {c.l}
                </span>
                <span className="text-right">
                  {c.active && <Eq/>}
                </span>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* ====== transcript ====== */
    function Transcript({ show }) {
      if (!show) return null;
      return (
        <section className="col-span-12 lg:col-span-7 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-4">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">transcript · auto</span>
              <h3 className="text-[14px] font-semibold tracking-tight mt-1">From the current chapter</h3>
            </div>
            <button className="lift hair-b py-1.5 px-3 rounded-md text-[10px] mono dim uppercase tracking-wider"
                    style={{background:'var(--surface-2)'}}>
              search · <Kbd>/</Kbd>
            </button>
          </div>
          <ul className="space-y-3 stagger-list">
            {TRANSCRIPT.map((line,i)=>(
              <li key={i} className="grid grid-cols-[52px_1fr] gap-3 text-[13px] leading-relaxed">
                <span className="mono text-[11px] dim-2 mt-1">{line.t}</span>
                <p style={{color: line.accent?'var(--ink-92)':'var(--ink-50)'}}>
                  <span className="mono text-[10px] uppercase tracking-wider mr-2"
                        style={{color: line.accent?'var(--ink-70)':'var(--ink-30)'}}>{line.who}</span>
                  {line.text}
                </p>
              </li>
            ))}
          </ul>
          <div className="hairline mt-5 mb-3"/>
          <button className="lift hair-b py-2 px-3 rounded-md text-[10px] mono dim uppercase tracking-wider w-full"
                  style={{background:'var(--surface-2)'}}>
            full transcript → <Kbd>T</Kbd>
          </button>
        </section>
      );
    }

    /* ====== queue ====== */
    function Queue() {
      return (
        <section className="col-span-12 lg:col-span-5 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-4">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">up next · queue</span>
              <h3 className="text-[14px] font-semibold tracking-tight mt-1">{QUEUE.length} queued</h3>
            </div>
            <Chip>auto-advance</Chip>
          </div>
          <ul className="space-y-2 stagger-list">
            {QUEUE.map((q,i)=>(
              <li key={i}
                className="lift hair-b rounded-md p-3 surface-2 grid grid-cols-[44px_1fr_28px] items-center gap-3 cursor-pointer">
                <Cover mark={q.cover} idx={q.idx} size={44}/>
                <div className="min-w-0">
                  <div className="font-medium text-[12.5px] truncate" style={{color:'var(--ink-92)'}}>{q.title}</div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">{q.who} · {q.dur}</div>
                </div>
                <button className="hair-b w-7 h-7 rounded-md grid place-items-center mono text-[11px] dim"
                        style={{background:'var(--surface-3)'}}>▸</button>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* ====== progress ====== */
    function ProgressCard() {
      const max = Math.max(...PROGRESS.thisWeek);
      const days = ['mon','tue','wed','thu','fri','sat','sun'];
      return (
        <section className="col-span-12 lg:col-span-5 surface hair-b rounded-xl p-6">
          <div className="flex items-center justify-between mb-4">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">your progress</span>
            <Chip>last 7d</Chip>
          </div>

          <div className="grid grid-cols-3 gap-4 mb-5">
            <div>
              <div className="mono text-[24px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>
                {PROGRESS.listened}<span className="text-[10px] dim-2 ml-0.5">/{PROGRESS.total}</span>
              </div>
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">finished</div>
            </div>
            <div>
              <div className="mono text-[24px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>
                {PROGRESS.hours}
              </div>
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">total time</div>
            </div>
            <div>
              <div className="mono text-[24px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>
                {PROGRESS.streak}<span className="text-[10px] dim-2 ml-0.5">d</span>
              </div>
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">streak</div>
            </div>
          </div>

          <div className="hairline mb-3"/>

          <div className="text-[10px] mono dim-2 uppercase tracking-wider mb-2">listening · this week</div>
          <div className="grid grid-cols-7 gap-2 items-end h-[80px]">
            {PROGRESS.thisWeek.map((v,i)=>(
              <div key={i} className="flex flex-col items-center gap-1.5 h-full justify-end">
                <div className="w-full rounded-sm"
                  style={{
                    height:`${(v/max)*100}%`,
                    background: i===6?'#fff':'var(--ink-50)',
                    transition:'height 800ms var(--ease)'
                  }}/>
                <span className="mono text-[9px] dim-2 uppercase tracking-wider">{days[i]}</span>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ====== recommended ====== */
    function Recommended() {
      return (
        <section className="col-span-12 lg:col-span-7 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-4">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">picked for you</span>
              <h3 className="text-[14px] font-semibold tracking-tight mt-1">Because you finished «Distributed locks»</h3>
            </div>
            <button className="hair-b py-1.5 px-3 rounded-md text-[10px] mono dim uppercase tracking-wider"
                    style={{background:'var(--surface-2)'}}>refresh</button>
          </div>
          <ul className="space-y-2 stagger-list">
            {REC.map((r,i)=>(
              <li key={i}
                className="lift hair-b rounded-md p-3 surface-2 grid grid-cols-[56px_1fr_auto] items-center gap-4 cursor-pointer">
                <Cover mark={r.cover} idx={r.idx} size={56}/>
                <div className="min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <Chip>{r.tag}</Chip>
                  </div>
                  <div className="font-medium text-[13px]" style={{color:'var(--ink-92)'}}>{r.title}</div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">{r.who} · {r.dur}</div>
                </div>
                <button className="btn-primary px-3 py-1.5 rounded-md text-[11px] mono uppercase tracking-wider">
                  queue ⏎
                </button>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* ====== tweaks ====== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none" aria-label="close">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">category</span>
              <select value={tweaks.category} onChange={e=>set('category', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                {CATEGORIES.map(c=> <option key={c.key} value={c.key}>{c.label}</option>)}
              </select>
            </label>
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">playing</span>
              <input type="checkbox" checked={tweaks.isPlaying}
                     onChange={e=>set('isPlaying', e.target.checked)}/>
            </label>
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">show transcript</span>
              <input type="checkbox" checked={tweaks.showTranscript}
                     onChange={e=>set('showTranscript', e.target.checked)}/>
            </label>
          </div>
        </div>
      );
    }

    /* ====== app ====== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);

      const set = (k,v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(() => {
        const onMsg = (ev) => {
          const d = ev.data || {};
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return () => window.removeEventListener('message', onMsg);
      }, []);

      return (
        <div className="canvas-bg min-h-screen page-enter">
          <div className="max-w-[1280px] mx-auto px-8">
            <Header/>
            <CategoryRow active={tweaks.category} setActive={(c)=>set('category', c)}/>

            <main className="stagger grid grid-cols-12 gap-4 pb-10">
              <PlayerHero
                isPlaying={tweaks.isPlaying}
                setIsPlaying={(v)=>set('isPlaying', v)}/>
              <Chapters/>
              <Transcript show={tweaks.showTranscript}/>
              <Queue/>
              <ProgressCard/>
              <Recommended/>
            </main>

            <footer className="flex items-center justify-between pb-4 text-[10px] mono dim-2 uppercase tracking-wider no-select">
              <div className="flex items-center gap-4">
                <span>palette <Kbd>⌘K</Kbd></span>
                <span>play / pause <Kbd>⏎</Kbd></span>
                <span>back 15 <Kbd>J</Kbd></span>
                <span>fwd 30 <Kbd>L</Kbd></span>
                <span>transcript <Kbd>T</Kbd></span>
              </div>
              <div>hone · podcasts · v0</div>
            </footer>
          </div>

          {tweaksOpen && (
            <TweaksPanel tweaks={tweaks} set={set}
                         onClose={()=>{
                           setTweaksOpen(false);
                           try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){}
                         }}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
