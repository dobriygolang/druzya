<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hone · English</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000;
      --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12); --hair-3:rgba(255,255,255,0.18);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-90:rgba(255,255,255,0.92);
      --ink-70:rgba(255,255,255,0.7); --ink-50:rgba(255,255,255,0.5);
      --ink-30:rgba(255,255,255,0.3); --ink-15:rgba(255,255,255,0.15);
      --accent:#FF3B30;
      --t-fast:150ms; --t-base:220ms; --t-slow:320ms;
      --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      font-feature-settings:'ss01','cv11';
      -webkit-font-smoothing:antialiased; letter-spacing:-0.005em;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:'zero','ss01','ss02'; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.02),transparent 55%),var(--bg)}

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}
    .stagger>*:nth-child(5){animation-delay:340ms}
    .stagger>*:nth-child(6){animation-delay:410ms}
    .stagger>*:nth-child(7){animation-delay:480ms}
    .stagger>*:nth-child(8){animation-delay:550ms}

    .stagger-list>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger-list>*:nth-child(1){animation-delay:80ms}
    .stagger-list>*:nth-child(2){animation-delay:150ms}
    .stagger-list>*:nth-child(3){animation-delay:220ms}
    .stagger-list>*:nth-child(4){animation-delay:290ms}
    .stagger-list>*:nth-child(5){animation-delay:360ms}
    .stagger-list>*:nth-child(6){animation-delay:430ms}
    .stagger-list>*:nth-child(7){animation-delay:500ms}
    .stagger-list>*:nth-child(8){animation-delay:570ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}

    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}
    @keyframes drawLine{from{stroke-dashoffset:600;opacity:0.3}to{stroke-dashoffset:0;opacity:1}}
    .draw-shape{stroke-dasharray:600;animation:drawLine 1.2s var(--ease) forwards;animation-delay:600ms}
    @keyframes dotPop{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1)}}
    .dot-pop{opacity:0;transform-origin:center;animation:dotPop 320ms var(--ease) forwards}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70); border-color:var(--hair-2)}
    .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}

    button:focus-visible{outline:1px solid var(--ink-70); outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--hair-2); border-radius:3px}

    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}
    .no-select{-webkit-user-select:none;user-select:none}

    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6)}

    /* tab indicator */
    .tab-indicator{transition:transform var(--t-base) var(--ease),width var(--t-base) var(--ease)}

    /* underlined vocab word */
    .vocab-word{
      border-bottom:1px dashed var(--hair-2);
      cursor:help;
      transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease);
    }
    .vocab-word:hover{color:var(--ink-100); border-color:var(--ink-70)}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "level": "B1+",
      "target": "B2+",
      "showVocabPanel": true,
      "activeTab": "reading"
    }/*EDITMODE-END*/;

    /* ====== mock data ====== */
    const TABS = [
      { key:'reading',   label:'reading',   k:'R' },
      { key:'writing',   label:'writing',   k:'W' },
      { key:'listening', label:'listening', k:'L' },
      { key:'vocab',     label:'vocab',     k:'V' },
    ];

    const RUBRIC = [
      { k:'vocab',         label:'vocabulary',     score:72 },
      { k:'grammar',       label:'grammar',        score:68 },
      { k:'speed',         label:'reading speed',  score:54 },
      { k:'comprehension', label:'comprehension',  score:78 },
      { k:'pronunciation', label:'pronunciation',  score:60 },
    ];

    const TODAY_READ = {
      source:'stratechery',
      title:'Generative AI startups face the moat problem',
      excerpt:[
        'Anthropic, OpenAI, and Mistral all face the same ',
        { word:'predicament', tip:'тяжёлое положение' },
        ': base-model training is becoming a commodity, while distribution is consolidated. The ',
        { word:'incumbents', tip:'игроки на рынке' },
        ' Microsoft, Google, Amazon control where models meet customers — and they extract margin accordingly.',
      ],
      words:1240, minutes:18, level:'B2-medium', new_vocab:6,
    };

    const VOCAB_QUEUE = [
      { word:'predicament',   ru:'тяжёлое положение',  cat:'noun',  due:'today' },
      { word:'incumbent',     ru:'занимающий позицию', cat:'noun',  due:'today' },
      { word:'consolidate',   ru:'консолидировать',    cat:'verb',  due:'today' },
      { word:'commodity',     ru:'товар широкого потр.', cat:'noun', due:'today' },
      { word:'leverage',      ru:'использовать',       cat:'verb',  due:'tomorrow' },
      { word:'arbitrage',     ru:'арбитраж',           cat:'noun',  due:'tomorrow' },
    ];

    const RECENT_READS = [
      { title:'The CDC paradox', source:'engineering.fb', minutes:14, words:1080, comp:82, when:'2d ago' },
      { title:'Why distributed locks are hard', source:'martin kleppmann', minutes:22, words:1640, comp:71, when:'4d ago' },
      { title:'Serverless cold-start economics', source:'cloud blog', minutes:11, words:820, comp:88, when:'1w ago' },
    ];

    const SUMMARY = {
      streak: 14,
      thisWeek: { reading: 96, writing: 22, listening: 41 },
      tutorMessage: 'Ready when you finish. I\'ll quiz you on 6 new words and check «consolidated» pronunciation.',
    };

    /* ====== atoms ====== */
    const Chip = ({ children, live=false }) => (
      <span className={`chip ${live?'live':''}`}>{children}</span>
    );
    const Kbd = ({ children }) => <span className="kbd">{children}</span>;

    /* ====== header ====== */
    function Header({ tweaks, set }) {
      return (
        <header className="flex items-center justify-between pt-7 pb-5 no-select">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                 style={{background:'#000'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <clipPath id="gly-eng-c"><circle cx="12" cy="12" r="9"/></clipPath>
                </defs>
                <circle cx="12" cy="12" r="9" fill="#fff"/>
                <g clipPath={"url(#gly-eng-c)"}>
                  <rect x="3" y="3" width="9" height="18" fill="#000"/>
                </g>
                <g clipPath={"url(#gly-eng-c)"} stroke="#000" strokeWidth="1.4">
                  <line x1="10" y1="2" x2="22" y2="14"/>
                  <line x1="10" y1="6" x2="22" y2="18"/>
                  <line x1="10" y1="10" x2="22" y2="22"/>
                  <line x1="10" y1="14" x2="22" y2="26"/>
                  <line x1="10" y1="18" x2="22" y2="30"/>
                </g>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <span className="text-[15px] font-semibold tracking-tight">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] font-medium dim">English</span>
            </div>
            <div className="ml-3 hidden md:flex items-center gap-2">
              <Chip>level <span className="ml-1" style={{color:'var(--ink-92)'}}>{tweaks.level}</span></Chip>
              <span className="text-[10px] mono dim-2">→</span>
              <Chip>target <span className="ml-1" style={{color:'var(--ink-92)'}}>{tweaks.target}</span></Chip>
            </div>
          </div>

          <div className="flex items-center gap-3 text-[10px] mono uppercase tracking-wider dim">
            <span>streak <span className="mono" style={{color:'var(--ink-92)'}}>{SUMMARY.streak}</span></span>
            <span className="dim-2">·</span>
            <span>palette</span>
            <Kbd>⌘K</Kbd>
          </div>
        </header>
      );
    }

    /* ====== tabs ====== */
    function Tabs({ active, setActive }) {
      const idx = TABS.findIndex(t => t.key === active);
      return (
        <div className="relative flex items-center p-1 rounded-lg hair-b surface-2 self-start">
          <div
            className="tab-indicator absolute top-1 bottom-1 rounded-md"
            style={{
              background:'var(--surface-3)', border:'1px solid var(--hair-2)',
              width:`calc(25% - 2px)`,
              transform:`translateX(${idx*100}%)`,
            }}/>
          {TABS.map(t => (
            <button key={t.key} onClick={()=>setActive(t.key)}
              className="relative z-10 px-4 py-1.5 mono text-[11px] uppercase tracking-wider rounded-md min-w-[88px] flex items-center justify-center gap-2"
              style={{
                color: active === t.key ? 'var(--ink-92)' : 'var(--ink-50)',
                transition:'color var(--t-fast) var(--ease)',
              }}>
              {t.label}
              <span className="kbd text-[9px]">{t.k}</span>
            </button>
          ))}
        </div>
      );
    }

    /* ====== reading hero ====== */
    function ReadingHero() {
      return (
        <section className="col-span-12 lg:col-span-8 surface hair-b rounded-xl p-7 lift cursor-pointer relative overflow-hidden">
          <div className="hero-stripe" />

          <div className="flex items-center gap-2 mb-5">
            <Chip>today's read</Chip>
            <Chip>{TODAY_READ.source}</Chip>
            <Chip>{TODAY_READ.level}</Chip>
            <span className="ml-auto dim-2 text-[11px] mono">est {TODAY_READ.minutes} min</span>
          </div>

          <h1 className="text-[28px] font-semibold leading-[1.18] tracking-tight mb-5"
              style={{color:'var(--ink-100)'}}>
            {TODAY_READ.title}
          </h1>

          <div className="hairline mb-5" />

          <div className="grid grid-cols-[28px_1fr] gap-3 mb-6">
            <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-1">prev</div>
            <p className="text-[14px] leading-relaxed" style={{color:'var(--ink-70)'}}>
              {TODAY_READ.excerpt.map((part, i) =>
                typeof part === 'string'
                  ? <React.Fragment key={i}>{part}</React.Fragment>
                  : <span key={i} className="vocab-word" title={part.tip}
                          style={{color:'var(--ink-92)'}}>{part.word}</span>
              )}
            </p>
          </div>

          <div className="flex items-center gap-2 flex-wrap">
            <button className="btn-primary inline-flex items-center gap-2 px-4 py-2 rounded-md text-[13px] font-medium">
              <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1.5v7l6-3.5z"/></svg>
              start reading · {TODAY_READ.minutes} min
              <span className="ml-2 mono text-[10px]" style={{color:'rgba(0,0,0,0.5)'}}>⏎</span>
            </button>
            <button className="lift px-4 py-2 rounded-md text-[13px] hair-b"
              style={{background:'var(--surface-2)',color:'var(--ink-70)'}}>skip</button>
            <button className="lift px-4 py-2 rounded-md text-[13px] hair-b"
              style={{background:'var(--surface-2)',color:'var(--ink-70)'}}>different topic</button>
            <span className="ml-auto dim-2 text-[11px] mono no-select uppercase tracking-wider">
              {TODAY_READ.words} words · {TODAY_READ.new_vocab} new
            </span>
          </div>
        </section>
      );
    }

    /* ====== rubric radar ====== */
    function Rubric() {
      const size=240, cx=size/2, cy=size/2, r=88, n=RUBRIC.length;
      const pts = RUBRIC.map((a,i)=>{
        const angle = (Math.PI*2*i)/n - Math.PI/2;
        const rr = (a.score/100)*r;
        return [cx+rr*Math.cos(angle), cy+rr*Math.sin(angle)];
      });
      const path = pts.map((p,i)=>`${i?'L':'M'}${p[0]},${p[1]}`).join(' ')+'Z';
      const weakest = RUBRIC.reduce((acc,a,i)=> a.score < RUBRIC[acc].score ? i : acc, 0);

      return (
        <section className="col-span-12 lg:col-span-4 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">5-axis · skill</span>
            <span className="mono text-[18px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>
              66<span className="text-[10px] dim-2 ml-0.5">/100</span>
            </span>
          </div>
          <h3 className="text-[14px] font-semibold tracking-tight mb-4">Where you stand</h3>

          <svg width="100%" viewBox={`0 0 ${size} ${size}`} className="block mb-3">
            {[0.25,0.5,0.75,1].map((f,i)=>{
              const ring = RUBRIC.map((_,j)=>{
                const angle = (Math.PI*2*j)/n - Math.PI/2;
                const rr = r*f;
                return `${j?'L':'M'}${cx+rr*Math.cos(angle)},${cy+rr*Math.sin(angle)}`;
              }).join(' ')+'Z';
              return <path key={i} d={ring} fill="none" stroke="var(--hair)" strokeWidth="1"/>;
            })}
            {RUBRIC.map((_,i)=>{
              const angle = (Math.PI*2*i)/n - Math.PI/2;
              return <line key={i} x1={cx} y1={cy}
                x2={cx+r*Math.cos(angle)} y2={cy+r*Math.sin(angle)}
                stroke="var(--hair)" strokeWidth="1"/>;
            })}
            <path d={path} fill="rgba(255,255,255,0.06)" stroke="var(--accent)" strokeWidth="1.25"
                  className="draw-shape" strokeLinejoin="round"/>
            {pts.map((p,i)=>(
              <circle key={i} cx={p[0]} cy={p[1]}
                      r={i===weakest?3:2.5}
                      fill={i===weakest?'var(--accent)':'#fff'}
                      className="dot-pop"
                      style={{animationDelay:`${1100+i*80}ms`}}/>
            ))}
          </svg>

          <ul className="space-y-1.5 stagger-list">
            {RUBRIC.map(a => (
              <li key={a.k} className="grid grid-cols-[1fr_70px_28px] items-center gap-2 text-[11px]">
                <span className="mono dim uppercase tracking-wider text-[10px]"
                      style={{color: a.score < 60 ? 'var(--ink-70)' : 'var(--ink-50)'}}>{a.label}</span>
                <div className="h-1 surface-3 rounded-full overflow-hidden">
                  <div className="fill-bar h-full"
                       style={{width:`${a.score}%`, background: a.score<60?'var(--ink-50)':'#fff'}}/>
                </div>
                <span className="mono text-[10px] dim text-right">{a.score}</span>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* ====== vocab queue ====== */
    function VocabQueue() {
      const today = VOCAB_QUEUE.filter(v => v.due === 'today');
      const later = VOCAB_QUEUE.filter(v => v.due !== 'today');
      return (
        <section className="col-span-12 lg:col-span-5 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-4">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">vocab queue</span>
              <h3 className="text-[14px] font-semibold tracking-tight mt-1">
                {today.length} due today
              </h3>
            </div>
            <Chip>{VOCAB_QUEUE.length} total</Chip>
          </div>

          <ul className="space-y-2 mb-3 stagger-list">
            {today.map(v => (
              <li key={v.word}
                className="lift hair-b rounded-md p-3 surface-2 grid grid-cols-[1fr_auto] items-baseline gap-3 cursor-pointer">
                <div className="min-w-0">
                  <div className="flex items-baseline gap-2 mb-0.5">
                    <span className="font-medium text-[13px]" style={{color:'var(--ink-100)'}}>{v.word}</span>
                    <span className="text-[10px] mono dim-2 uppercase tracking-wider">{v.cat}</span>
                  </div>
                  <span className="text-[12px] dim">{v.ru}</span>
                </div>
                <span className="text-[10px] mono dim-2 uppercase tracking-wider shrink-0">{v.due}</span>
              </li>
            ))}
          </ul>

          <div className="hairline mb-3" />
          <div className="flex items-center justify-between">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">+ {later.length} tomorrow</span>
            <button className="btn-primary px-3 py-1.5 rounded-md text-[12px] font-medium">
              drill all · 8 min
            </button>
          </div>
        </section>
      );
    }

    /* ====== recent reads ====== */
    function RecentReads() {
      return (
        <section className="col-span-12 lg:col-span-7 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-4">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">recent · last week</span>
              <h3 className="text-[14px] font-semibold tracking-tight mt-1">What you read</h3>
            </div>
            <Chip>3 of 12</Chip>
          </div>

          <ul className="space-y-3 stagger-list">
            {RECENT_READS.map((r,i) => (
              <li key={i}
                className="lift hair-b rounded-md p-4 surface-2 grid grid-cols-[1fr_auto] items-center gap-4 cursor-pointer">
                <div className="min-w-0">
                  <div className="flex items-baseline gap-2 mb-1">
                    <span className="font-medium text-[13px]" style={{color:'var(--ink-92)'}}>{r.title}</span>
                  </div>
                  <div className="flex items-center gap-3 text-[10px] mono dim-2 uppercase tracking-wider">
                    <span>{r.source}</span>
                    <span className="dim-2">·</span>
                    <span>{r.words}w</span>
                    <span className="dim-2">·</span>
                    <span>{r.minutes}m</span>
                    <span className="dim-2">·</span>
                    <span>{r.when}</span>
                  </div>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider">comp</div>
                  <div className="mono text-[15px] font-semibold tracking-tight"
                       style={{color: r.comp >= 80 ? 'var(--ink-100)' : 'var(--ink-70)'}}>
                    {r.comp}<span className="text-[10px] dim-2">%</span>
                  </div>
                </div>
              </li>
            ))}
          </ul>

          <div className="hairline mt-4 mb-3" />
          <button className="lift hair-b py-2 px-3 rounded-md text-[10px] mono dim uppercase tracking-wider w-full"
                  style={{background:'var(--surface-2)'}}>
            full history → <Kbd>H</Kbd>
          </button>
        </section>
      );
    }

    /* ====== this week ====== */
    function ThisWeek() {
      const items = [
        { l:'reading',   v:SUMMARY.thisWeek.reading,   u:'min', target:120 },
        { l:'writing',   v:SUMMARY.thisWeek.writing,   u:'min', target:60  },
        { l:'listening', v:SUMMARY.thisWeek.listening, u:'min', target:80  },
      ];
      return (
        <section className="col-span-12 grid grid-cols-1 md:grid-cols-3 gap-4 stagger-list">
          {items.map(it => (
            <div key={it.l} className="surface hair-b rounded-xl p-5 lift">
              <div className="flex items-center justify-between mb-3">
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">{it.l} · this week</span>
                <span className="mono text-[10px] dim-2">target {it.target}</span>
              </div>
              <div className="flex items-baseline gap-1.5 mb-3">
                <span className="mono text-[24px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>
                  {it.v}
                </span>
                <span className="text-[10px] mono dim-2">{it.u}</span>
              </div>
              <div className="h-1 surface-3 rounded-full overflow-hidden">
                <div className="fill-bar h-full"
                     style={{width:`${Math.min(100, (it.v/it.target)*100)}%`, background:'#fff'}}/>
              </div>
            </div>
          ))}
        </section>
      );
    }

    /* ====== tutor card ====== */
    function TutorCard() {
      return (
        <section className="col-span-12 surface hair-b rounded-xl p-5 flex items-center gap-5 lift cursor-pointer">
          <div className="w-10 h-10 rounded-full surface-3 hair-b flex items-center justify-center mono text-[14px] font-semibold shrink-0"
               style={{color:'var(--ink-92)'}}>M</div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-[12.5px] font-medium" style={{color:'var(--ink-92)'}}>Maria</span>
              <Chip>english-coach · ai · 24/7</Chip>
              <Chip live>online</Chip>
            </div>
            <p className="text-[12px] dim leading-relaxed" style={{color:'var(--ink-70)'}}>
              «{SUMMARY.tutorMessage}»
            </p>
          </div>
          <button className="hair-b px-3 py-1.5 rounded-md text-[10px] mono dim uppercase tracking-wider shrink-0"
                  style={{background:'var(--surface-2)'}}>
            open chat → <Kbd>T</Kbd>
          </button>
        </section>
      );
    }

    /* ====== tabs sub-views (placeholder for non-reading) ====== */
    function TabPlaceholder({ tab }) {
      const config = {
        writing:   { l:'writing',   sub:'today\'s prompt · «describe a system you owned that broke»', est:'12 min' },
        listening: { l:'listening', sub:'lex fridman × dario amodei · 47 min · transcript ready',     est:'47 min' },
        vocab:     { l:'vocab',     sub:'15 cards · spaced repetition queue ready',                    est:'8 min'  },
      };
      const c = config[tab];
      if (!c) return null;
      return (
        <section className="col-span-12 surface hair-b rounded-xl p-7 lift cursor-pointer relative overflow-hidden">
          <div className="hero-stripe"/>
          <div className="flex items-center gap-2 mb-4">
            <Chip>today's {c.l}</Chip>
            <span className="ml-auto dim-2 text-[11px] mono">est {c.est}</span>
          </div>
          <h2 className="text-[22px] font-semibold tracking-tight mb-2" style={{color:'var(--ink-100)'}}>
            {c.sub}
          </h2>
          <div className="hairline my-5"/>
          <button className="btn-primary inline-flex items-center gap-2 px-4 py-2 rounded-md text-[13px] font-medium">
            start {c.l} <span className="ml-2 mono text-[10px]" style={{color:'rgba(0,0,0,0.5)'}}>⏎</span>
          </button>
        </section>
      );
    }

    /* ====== tweaks ====== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none" aria-label="close">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">level</span>
              <select value={tweaks.level} onChange={e=>set('level', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                {['A2','B1','B1+','B2','B2+','C1'].map(l=> <option key={l} value={l}>{l}</option>)}
              </select>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">target</span>
              <select value={tweaks.target} onChange={e=>set('target', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                {['B1','B1+','B2','B2+','C1','C2'].map(l=> <option key={l} value={l}>{l}</option>)}
              </select>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">active tab</span>
              <select value={tweaks.activeTab} onChange={e=>set('activeTab', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                {TABS.map(t=> <option key={t.key} value={t.key}>{t.label}</option>)}
              </select>
            </label>
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">vocab panel</span>
              <input type="checkbox" checked={tweaks.showVocabPanel}
                     onChange={e=>set('showVocabPanel', e.target.checked)}/>
            </label>
          </div>
        </div>
      );
    }

    /* ====== app ====== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [active, setActive] = useState(tweaks.activeTab);

      const set = (k,v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        if (k === 'activeTab') setActive(v);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(() => {
        const onMsg = (ev) => {
          const d = ev.data || {};
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return () => window.removeEventListener('message', onMsg);
      }, []);

      return (
        <div className="canvas-bg min-h-screen page-enter">
          <div className="max-w-[1280px] mx-auto px-8">
            <Header tweaks={tweaks} set={set}/>

            <div className="flex items-center justify-between mb-5">
              <Tabs active={active} setActive={(t)=>{ setActive(t); set('activeTab', t); }}/>
              <div className="flex items-center gap-2 text-[10px] mono dim-2 uppercase tracking-wider">
                <span>swap tab</span>
                <Kbd>1</Kbd><Kbd>2</Kbd><Kbd>3</Kbd><Kbd>4</Kbd>
              </div>
            </div>

            <main className="stagger grid grid-cols-12 gap-4 pb-10" key={active}>
              {active === 'reading' ? (
                <>
                  <ReadingHero/>
                  <Rubric/>
                  {tweaks.showVocabPanel && <VocabQueue/>}
                  <RecentReads/>
                  <ThisWeek/>
                  <TutorCard/>
                </>
              ) : (
                <>
                  <TabPlaceholder tab={active}/>
                  <Rubric/>
                  {tweaks.showVocabPanel && <VocabQueue/>}
                  <ThisWeek/>
                  <TutorCard/>
                </>
              )}
            </main>

            <footer className="flex items-center justify-between pb-4 text-[10px] mono dim-2 uppercase tracking-wider no-select">
              <div className="flex items-center gap-4">
                <span>palette <Kbd>⌘K</Kbd></span>
                <span>start <Kbd>⏎</Kbd></span>
                <span>cycle tab <Kbd>Tab</Kbd></span>
                <span>open tutor <Kbd>T</Kbd></span>
              </div>
              <div>hone · english · v0</div>
            </footer>
          </div>

          {tweaksOpen && (
            <TweaksPanel tweaks={tweaks} set={set}
                         onClose={()=>{
                           setTweaksOpen(false);
                           try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){}
                         }}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
