<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hone · Events</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000;
      --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12); --hair-3:rgba(255,255,255,0.18);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3); --ink-15:rgba(255,255,255,0.15);
      --accent:#FF3B30;
      --t-fast:150ms; --t-base:220ms; --t-slow:320ms;
      --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      font-feature-settings:'ss01','cv11';
      -webkit-font-smoothing:antialiased; letter-spacing:-0.005em;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:'zero','ss01','ss02'; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.02),transparent 55%),var(--bg)}

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}
    .stagger>*:nth-child(5){animation-delay:340ms}
    .stagger>*:nth-child(6){animation-delay:410ms}
    .stagger>*:nth-child(7){animation-delay:480ms}
    .stagger>*:nth-child(8){animation-delay:550ms}

    .stagger-list>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger-list>*:nth-child(1){animation-delay:80ms}
    .stagger-list>*:nth-child(2){animation-delay:150ms}
    .stagger-list>*:nth-child(3){animation-delay:220ms}
    .stagger-list>*:nth-child(4){animation-delay:290ms}
    .stagger-list>*:nth-child(5){animation-delay:360ms}
    .stagger-list>*:nth-child(6){animation-delay:430ms}
    .stagger-list>*:nth-child(7){animation-delay:500ms}
    .stagger-list>*:nth-child(8){animation-delay:570ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}

    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70); border-color:var(--hair-2)}
    .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .chip.solid{background:#fff;color:#000;border-color:#fff}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}

    button:focus-visible{outline:1px solid var(--ink-70); outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--hair-2); border-radius:3px}

    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}
    .no-select{-webkit-user-select:none;user-select:none}

    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6)}

    .filter-indicator{transition:transform var(--t-base) var(--ease),width var(--t-base) var(--ease)}

    /* date stripe element */
    .date-stripe{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      width:56px; padding:8px 0; border-radius:6px;
      background:var(--surface-3); border:1px solid var(--hair-2);
    }
    .date-stripe .day{font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:600; color:var(--ink-92); line-height:1}
    .date-stripe .mo{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--ink-30); text-transform:uppercase; letter-spacing:0.08em; margin-top:3px}

    /* timeline rail */
    .rail{position:relative}
    .rail::before{content:'';position:absolute;left:27px;top:30px;bottom:-10px;width:1px;background:var(--hair)}
    .rail:last-child::before{display:none}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "filter": "upcoming",
      "showHostedSection": true,
      "heroCountdown": "in 2d 6h"
    }/*EDITMODE-END*/;

    /* ====== mock data ====== */
    const FILTERS = [
      { key:'upcoming', label:'upcoming', count:4 },
      { key:'past',     label:'past',     count:18 },
      { key:'hosted',   label:'hosted',   count:2 },
      { key:'invited',  label:'invited',  count:1 },
    ];

    const NEXT_EVENT = {
      title:'Yandex Backend Round 2 · system design',
      kind:'mock interview',
      kindGlyph:'⌘',
      profile:'expert-strict',
      day:'thu', dayN:'09', mo:'may',
      time:'14:00 → 15:30',
      duration:'90 min',
      countdown:'in 2d 6h',
      role:'attendee',
      host:'Yandex DE panel',
      prep:[
        { l:'review session 1 transcript',                  d:true  },
        { l:'read CDC + dedup chapter (DDIA 11.5)',         d:true  },
        { l:'sketch sharded counters · 3 designs',          d:false },
        { l:'rehearse 2 STAR ownership stories · 90s each', d:false },
        { l:'sleep ≥ 7h night before',                      d:false },
      ],
    };

    const UPCOMING = [
      {
        title:'Go-deep concurrency · live workshop',
        kind:'club_session', kindGlyph:'☷', kindLabel:'club session',
        day:'sat', dayN:'11', mo:'may',
        time:'19:00 · 75 min',
        host:'Алёша · curator',
        attendees: 14, capacity: 20,
        rsvp:'yes',
        role:'attendee',
      },
      {
        title:'Avito DE round 1 — algorithms section',
        kind:'mock', kindGlyph:'⌘', kindLabel:'mock',
        day:'mon', dayN:'13', mo:'may',
        time:'11:00 · 45 min',
        host:'Avito panel',
        attendees: 1, capacity: 1,
        rsvp:'confirmed',
        role:'attendee',
      },
      {
        title:'Reading club · «designing data-intensive applications»',
        kind:'group', kindGlyph:'▤', kindLabel:'group',
        day:'wed', dayN:'15', mo:'may',
        time:'20:30 · 60 min',
        host:'Лена · sql-mentor',
        attendees: 8, capacity: 12,
        rsvp:'yes',
        role:'attendee',
      },
    ];

    const PAST = [
      { title:'Yandex BE round 1 · algorithms', day:'apr 28', kind:'mock',         outcome:'PASSED', score:'72/100' },
      { title:'Reading club · DDIA ch.7',       day:'apr 26', kind:'group',        outcome:'attended', score:'2 notes saved' },
      { title:'Avito BE intro screen',          day:'apr 22', kind:'mock',         outcome:'FAILED', score:'48/100' },
      { title:'Go-deep workshop · channels',    day:'apr 20', kind:'club_session', outcome:'attended', score:'1 question' },
    ];

    const HOSTED = [
      {
        title:'Saturday go-deep · sync.Pool internals',
        kind:'club_session', kindGlyph:'☷',
        day:'sat', dayN:'18', mo:'may',
        time:'18:00 · 60 min',
        attendees: 6, capacity: 15,
        status:'open · 9 seats left',
      },
    ];

    /* ====== atoms ====== */
    const Chip = ({ children, live=false, solid=false }) => (
      <span className={`chip ${live?'live':''} ${solid?'solid':''}`}>{children}</span>
    );
    const Kbd = ({ children }) => <span className="kbd">{children}</span>;
    const DateStripe = ({ day, mo }) => (
      <div className="date-stripe shrink-0">
        <span className="day">{day}</span>
        <span className="mo">{mo}</span>
      </div>
    );

    /* ====== header ====== */
    function Header() {
      return (
        <header className="flex items-center justify-between pt-7 pb-5 no-select">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                 style={{background:'#000'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <clipPath id="gly-events-c"><circle cx="12" cy="12" r="9"/></clipPath>
                </defs>
                <circle cx="12" cy="12" r="9" fill="#fff"/>
                <g clipPath={"url(#gly-events-c)"}>
                  <rect x="3" y="3" width="9" height="18" fill="#000"/>
                </g>
                <g clipPath={"url(#gly-events-c)"} stroke="#000" strokeWidth="1.4">
                  <line x1="10" y1="2" x2="22" y2="14"/>
                  <line x1="10" y1="6" x2="22" y2="18"/>
                  <line x1="10" y1="10" x2="22" y2="22"/>
                  <line x1="10" y1="14" x2="22" y2="26"/>
                  <line x1="10" y1="18" x2="22" y2="30"/>
                </g>
              </svg>
            </div>
            <div className="flex items-baseline gap-2">
              <span className="text-[15px] font-semibold tracking-tight">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] font-medium dim">Events</span>
            </div>
            <Chip>{NEXT_EVENT.countdown}</Chip>
          </div>

          <div className="flex items-center gap-3 text-[10px] mono uppercase tracking-wider dim">
            <span>create</span>
            <Kbd>⌘N</Kbd>
            <span className="dim-2">·</span>
            <span>palette</span>
            <Kbd>⌘K</Kbd>
          </div>
        </header>
      );
    }

    /* ====== filter switcher ====== */
    function FilterRow({ active, setActive, total }) {
      const idx = FILTERS.findIndex(f => f.key === active);
      return (
        <div className="flex items-center justify-between mb-5">
          <div className="relative flex items-center p-1 rounded-lg hair-b surface-2 self-start">
            <div className="filter-indicator absolute top-1 bottom-1 rounded-md"
              style={{
                background:'var(--surface-3)', border:'1px solid var(--hair-2)',
                width:`calc(25% - 2px)`,
                transform:`translateX(${idx*100}%)`,
              }}/>
            {FILTERS.map(f => (
              <button key={f.key} onClick={()=>setActive(f.key)}
                className="relative z-10 px-4 py-1.5 mono text-[11px] uppercase tracking-wider rounded-md min-w-[112px] flex items-center gap-2 justify-center"
                style={{
                  color: active === f.key ? 'var(--ink-92)' : 'var(--ink-50)',
                  transition:'color var(--t-fast) var(--ease)',
                }}>
                {f.label}
                <span className="dim-2 text-[10px]">{f.count}</span>
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2 text-[10px] mono dim-2 uppercase tracking-wider">
            <span>{total} events · sync 4s ago</span>
            <Chip live>live</Chip>
          </div>
        </div>
      );
    }

    /* ====== hero ====== */
    function HeroEvent() {
      const total = NEXT_EVENT.prep.length;
      const done = NEXT_EVENT.prep.filter(p => p.d).length;
      const pct = (done / total) * 100;
      return (
        <section className="col-span-12 lg:col-span-8 surface hair-b rounded-xl p-7 lift cursor-pointer relative overflow-hidden">
          <div className="hero-stripe"/>

          <div className="flex items-center gap-2 mb-5">
            <Chip>{NEXT_EVENT.kind}</Chip>
            <Chip>{NEXT_EVENT.profile}</Chip>
            <Chip live>{NEXT_EVENT.countdown}</Chip>
            <span className="ml-auto dim-2 text-[11px] mono">{NEXT_EVENT.duration}</span>
          </div>

          <div className="flex items-start gap-5 mb-5">
            <DateStripe day={NEXT_EVENT.dayN} mo={NEXT_EVENT.mo}/>
            <div className="flex-1 min-w-0">
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mb-1">
                {NEXT_EVENT.day} · {NEXT_EVENT.time}
              </div>
              <h1 className="text-[26px] font-semibold leading-[1.18] tracking-tight"
                  style={{color:'var(--ink-100)'}}>
                {NEXT_EVENT.title}
              </h1>
              <div className="mt-1.5 text-[12px] dim">{NEXT_EVENT.host}</div>
            </div>
          </div>

          <div className="hairline mb-5"/>

          <div className="grid grid-cols-[60px_1fr] gap-3 mb-5">
            <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">prep</div>
            <div>
              <div className="flex items-center gap-2 mb-3">
                <span className="mono text-[12px]"><span style={{color:'var(--ink-92)'}}>{done}</span><span className="dim-2">/{total}</span></span>
                <div className="flex-1 h-1 surface-3 rounded-full overflow-hidden">
                  <div className="fill-bar h-full"
                       style={{width:`${pct}%`, background:'#fff'}}/>
                </div>
                <span className="mono text-[11px] dim-2">{Math.round(pct)}%</span>
              </div>
              <ul className="space-y-1.5 stagger-list">
                {NEXT_EVENT.prep.map((p,i) => (
                  <li key={i} className="flex items-start gap-2.5 text-[12.5px]">
                    <span className="mt-0.5 shrink-0">
                      {p.d ? (
                        <svg width="11" height="11" viewBox="0 0 10 10">
                          <circle cx="5" cy="5" r="4" fill="#fff"/>
                          <path d="M3 5 l1.5 1.5 L7 3.5" stroke="#000" strokeWidth="1.2" fill="none"/>
                        </svg>
                      ) : (
                        <span className="block w-[10px] h-[10px] rounded-full"
                              style={{border:'1px solid var(--ink-30)'}}/>
                      )}
                    </span>
                    <span style={{color: p.d ? 'var(--ink-50)' : 'var(--ink-92)',
                                  textDecoration: p.d ? 'line-through' : 'none'}}>
                      {p.l}
                    </span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <div className="hairline mb-5"/>

          <div className="flex items-center gap-2 flex-wrap">
            <button className="btn-primary inline-flex items-center gap-2 px-4 py-2 rounded-md text-[13px] font-medium">
              open prep doc
              <span className="ml-2 mono text-[10px]" style={{color:'rgba(0,0,0,0.5)'}}>⏎</span>
            </button>
            <button className="lift px-4 py-2 rounded-md text-[13px] hair-b"
              style={{background:'var(--surface-2)',color:'var(--ink-70)'}}>add to calendar</button>
            <button className="lift px-4 py-2 rounded-md text-[13px] hair-b"
              style={{background:'var(--surface-2)',color:'var(--ink-70)'}}>cancel rsvp</button>
            <span className="ml-auto dim-2 text-[11px] mono no-select uppercase tracking-wider">
              {NEXT_EVENT.role} · rsvp confirmed
            </span>
          </div>
        </section>
      );
    }

    /* ====== sidebar stats ====== */
    function MyStats() {
      const items = [
        { l:'this month',    v:6,  u:'attended' },
        { l:'mocks · 30d',   v:14, u:'· 4 pass' },
        { l:'next 7 days',   v:3,  u:'events' },
        { l:'no-show rate',  v:'4', u:'%'      },
      ];
      return (
        <aside className="col-span-12 lg:col-span-4 surface hair-b rounded-xl p-6 flex flex-col gap-5">
          <div className="flex items-center justify-between">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">my snapshot</span>
            <Chip>last 30d</Chip>
          </div>
          <div className="space-y-4 stagger-list">
            {items.map(it => (
              <div key={it.l} className="flex items-baseline justify-between">
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">{it.l}</span>
                <span className="flex items-baseline gap-1.5">
                  <span className="mono text-[20px] font-semibold tracking-tight" style={{color:'var(--ink-100)'}}>{it.v}</span>
                  <span className="text-[11px] mono dim-2">{it.u}</span>
                </span>
              </div>
            ))}
          </div>

          <div className="hairline"/>

          <div>
            <span className="text-[10px] mono dim-2 uppercase tracking-wider mb-3 block">attendance heatmap · 28d</span>
            <div className="grid gap-[3px]" style={{gridTemplateColumns:'repeat(14,1fr)'}}>
              {Array.from({length:28}).map((_,i)=>{
                const arr = [0,0.3,0.7,0,0.5,0.85,0.1,0.6,0,0.75,0.2,0.45,0.65,0,
                             0.5,0.8,0.35,0,0.55,0.7,0,0.6,0.25,0.85,0.5,0.7,0.45,1];
                const intensity = arr[i] || 0;
                const isToday = i === 27;
                const bg = intensity < 0.05 ? 'rgba(255,255,255,0.04)'
                         : intensity < 0.34 ? 'rgba(255,255,255,0.14)'
                         : intensity < 0.67 ? 'rgba(255,255,255,0.34)'
                         : 'rgba(255,255,255,0.62)';
                return <div key={i} className="aspect-square rounded-[2px]"
                  style={{background:bg, border: isToday?'1px solid var(--ink-92)':'none'}}/>;
              })}
            </div>
          </div>
        </aside>
      );
    }

    /* ====== upcoming list ====== */
    function UpcomingList() {
      return (
        <section className="col-span-12 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-5">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">timeline · next 7 days</span>
              <h2 className="text-[16px] font-semibold tracking-tight mt-1">3 events queued</h2>
            </div>
            <Chip>1 mock · 2 group</Chip>
          </div>

          <ul className="stagger-list">
            {UPCOMING.map((e, i) => (
              <li key={i}
                className="rail relative grid grid-cols-[60px_1fr_140px_140px] items-center gap-4 py-3 text-[12.5px] border-t first:border-t-0"
                style={{borderColor:'var(--hair)'}}>
                <DateStripe day={e.dayN} mo={e.mo}/>
                <div className="min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-[14px]" style={{color:'var(--ink-50)'}}>{e.kindGlyph}</span>
                    <Chip>{e.kindLabel}</Chip>
                  </div>
                  <div className="font-medium" style={{color:'var(--ink-92)'}}>{e.title}</div>
                  <div className="text-[11px] dim mt-0.5">{e.day} · {e.time} · {e.host}</div>
                </div>
                <div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider mb-1">attendees</div>
                  <div className="flex items-center gap-2 text-[11px] mono">
                    <span style={{color:'var(--ink-92)'}}>{e.attendees}</span>
                    <span className="dim-2">/{e.capacity}</span>
                    <div className="flex-1 h-1 surface-3 rounded-full overflow-hidden">
                      <div className="fill-bar h-full" style={{width:`${(e.attendees/e.capacity)*100}%`, background:'var(--ink-70)'}}/>
                    </div>
                  </div>
                </div>
                <div className="flex items-center justify-end gap-2">
                  <button className="lift hair-b px-3 py-1.5 rounded-md text-[11px] mono uppercase tracking-wider dim"
                          style={{background:'var(--surface-2)'}}>open</button>
                  <Chip solid={e.rsvp === 'confirmed'}>{e.rsvp}</Chip>
                </div>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* ====== past recap ====== */
    function PastRecap() {
      return (
        <section className="col-span-12 lg:col-span-7 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-5">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">recap · last 14 days</span>
              <h2 className="text-[16px] font-semibold tracking-tight mt-1">What happened</h2>
            </div>
            <Chip>4 of 18</Chip>
          </div>

          <ul className="space-y-2 stagger-list">
            {PAST.map((p,i)=>(
              <li key={i}
                className="lift hair-b rounded-md p-3 surface-2 grid grid-cols-[60px_1fr_140px] items-center gap-4 cursor-pointer">
                <span className="mono text-[10px] dim-2 uppercase tracking-wider">{p.day}</span>
                <div className="min-w-0">
                  <div className="font-medium text-[13px]" style={{color:'var(--ink-92)'}}>{p.title}</div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">{p.kind} · {p.score}</div>
                </div>
                <div className="text-right">
                  <span className="mono text-[11px] uppercase tracking-wider"
                    style={{color: p.outcome==='FAILED'?'var(--ink-70)':'var(--ink-92)'}}>{p.outcome}</span>
                </div>
              </li>
            ))}
          </ul>

          <div className="hairline mt-5 mb-3"/>
          <button className="lift hair-b py-2 px-3 rounded-md text-[10px] mono dim uppercase tracking-wider w-full"
                  style={{background:'var(--surface-2)'}}>
            full archive → <Kbd>A</Kbd>
          </button>
        </section>
      );
    }

    /* ====== hosted by you ====== */
    function HostedByYou() {
      return (
        <section className="col-span-12 lg:col-span-5 surface hair-b rounded-xl p-7">
          <div className="flex items-start justify-between mb-5">
            <div>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">hosted by you</span>
              <h2 className="text-[16px] font-semibold tracking-tight mt-1">Sessions you run</h2>
            </div>
            <button className="btn-primary px-3 py-1.5 rounded-md text-[11px] mono uppercase tracking-wider">
              + new session
            </button>
          </div>

          <ul className="space-y-3 stagger-list">
            {HOSTED.map((e,i)=>(
              <li key={i}
                className="lift hair-b rounded-md p-4 surface-2 grid grid-cols-[56px_1fr] items-center gap-4 cursor-pointer">
                <DateStripe day={e.dayN} mo={e.mo}/>
                <div className="min-w-0">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-[14px]" style={{color:'var(--ink-50)'}}>{e.kindGlyph}</span>
                    <Chip>club session</Chip>
                  </div>
                  <div className="font-medium text-[13px]" style={{color:'var(--ink-92)'}}>{e.title}</div>
                  <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-1">
                    {e.time} · {e.attendees}/{e.capacity} · {e.status}
                  </div>
                </div>
              </li>
            ))}
          </ul>
        </section>
      );
    }

    /* ====== tweaks ====== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none" aria-label="close">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">filter</span>
              <select value={tweaks.filter} onChange={e=>set('filter', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                {FILTERS.map(f=> <option key={f.key} value={f.key}>{f.label}</option>)}
              </select>
            </label>
            <label className="flex items-center justify-between gap-2">
              <span className="dim text-[11px]">hosted section</span>
              <input type="checkbox" checked={tweaks.showHostedSection}
                     onChange={e=>set('showHostedSection', e.target.checked)}/>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">hero countdown</span>
              <input type="text" value={tweaks.heroCountdown} onChange={e=>set('heroCountdown', e.target.value)}
                     className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                     style={{color:'var(--ink-92)'}}/>
            </label>
          </div>
        </div>
      );
    }

    /* ====== app ====== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);

      const set = (k,v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(() => {
        const onMsg = (ev) => {
          const d = ev.data || {};
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return () => window.removeEventListener('message', onMsg);
      }, []);

      return (
        <div className="canvas-bg min-h-screen page-enter">
          <div className="max-w-[1280px] mx-auto px-8">
            <Header/>
            <FilterRow active={tweaks.filter} setActive={(f)=>set('filter', f)} total={25}/>

            <main className="stagger grid grid-cols-12 gap-4 pb-10">
              <HeroEvent/>
              <MyStats/>
              <UpcomingList/>
              <PastRecap/>
              {tweaks.showHostedSection && <HostedByYou/>}
            </main>

            <footer className="flex items-center justify-between pb-4 text-[10px] mono dim-2 uppercase tracking-wider no-select">
              <div className="flex items-center gap-4">
                <span>palette <Kbd>⌘K</Kbd></span>
                <span>create <Kbd>⌘N</Kbd></span>
                <span>cycle filter <Kbd>F</Kbd></span>
                <span>archive <Kbd>A</Kbd></span>
              </div>
              <div>hone · events · v0</div>
            </footer>
          </div>

          {tweaksOpen && (
            <TweaksPanel tweaks={tweaks} set={set}
                         onClose={()=>{
                           setTweaksOpen(false);
                           try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){}
                         }}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
