<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hone · Onboarding</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3);
      --accent:#FF3B30;
      --t-fast:150ms; --t-base:220ms;
      --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{
      background:var(--bg); color:var(--ink-92);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
    }
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace; letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)}
    .hairline{height:1px;background:var(--hair);width:100%}

    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}

    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}
    .stagger>*:nth-child(2){animation-delay:130ms}
    .stagger>*:nth-child(3){animation-delay:200ms}
    .stagger>*:nth-child(4){animation-delay:270ms}
    .stagger>*:nth-child(5){animation-delay:340ms}

    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px); border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px); background:rgba(255,255,255,0.92)}

    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
      border:1px solid var(--hair); background:var(--surface-2);
      font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
      color:var(--ink-50); font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70)}
    .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .chip.solid{background:#fff;color:#000;border-color:#fff}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;
      border:1px solid var(--hair-2); background:var(--surface-3);
      font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-70); line-height:1.4}
    .kbd-large{padding:6px 11px; font-size:13px; min-width:32px; justify-content:center}

    button:focus-visible{outline:1px solid var(--ink-70); outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18); color:#fff}

    .no-select{-webkit-user-select:none;user-select:none}
    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}

    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;
      background:var(--surface-2); border:1px solid var(--hair-2);
      border-radius:10px; padding:14px; z-index:50; font-size:12px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6)}

    /* Hone behind blurred */
    .behind{
      position:absolute; inset:0; z-index:0;
      filter: blur(12px); opacity: 0.5;
      pointer-events: none;
    }
    .behind::after{
      content:''; position:absolute; inset:0;
      background: rgba(0,0,0,0.35);
    }

    /* modal overlay */
    .modal-overlay{
      position:fixed; inset:0; z-index:10;
      background:rgba(0,0,0,0.6); backdrop-filter: blur(20px);
    }
    .modal{
      background: var(--surface-1); border:1px solid var(--hair-2);
      border-radius:14px;
      width: 720px; max-width: 92vw;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      animation: modalIn 320ms var(--ease) both;
      position: relative;
      overflow: hidden;
    }
    @keyframes modalIn{
      from{opacity:0; transform: translateY(12px) scale(0.97);}
      to{opacity:1; transform: translateY(0) scale(1);}
    }

    /* selection card */
    .pick{
      transition: all var(--t-fast) var(--ease);
      cursor: pointer;
    }
    .pick.selected{
      background: var(--surface-3);
      border-color: var(--ink-100) !important;
    }
    .pick.selected::after{
      content: '';
      position: absolute; top: 10px; right: 10px;
      width: 14px; height: 14px; border-radius: 999px;
      background: #fff;
    }

    /* shortcut highlight overlay */
    .shortcut-hint{
      animation: highlightPulse 2.4s var(--ease) infinite;
    }
    @keyframes highlightPulse{
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.0); }
      50%      { box-shadow: 0 0 0 6px rgba(255,255,255,0.10); }
    }

    /* progress dot */
    .dot{
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--hair-2);
      transition: all var(--t-fast) var(--ease);
    }
    .dot.cur{ background: #fff; transform: scale(1.4); }
    .dot.done{ background: var(--ink-70); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "currentStep": 2,
      "selectedStack": "go",
      "selectedMode": "explore"
    }/*EDITMODE-END*/;

    /* ====== mock data ====== */
    const STACKS = [
      { k:'go',      l:'Go senior',         d:'concurrency · runtime · profiling',     g:'go' },
      { k:'ml',      l:'ML engineering',    d:'classical → DL → LLM eval',             g:'∞' },
      { k:'de',      l:'Data engineering',  d:'pipelines · CDC · streaming',           g:'☷' },
      { k:'english', l:'English',           d:'B1 → B2+ for tech professionals',       g:'en' },
      { k:'other',   l:'Other / explore',   d:'figure out which fits — 6w fork track', d:'figure out which fits',  g:'?' },
    ];

    const MODES = [
      { k:'explore', l:'Explore',  d:'try multiple tracks, pick one in 4-6 weeks',  trail:'fork analysis weekly' },
      { k:'commit',  l:'Commit',   d:'one track, build depth · 3-6 months',         trail:'milestone tracking' },
      { k:'deep',    l:'Deep',     d:'interview prep · 2-4 weeks intensive',        trail:'daily mock dispatch' },
    ];

    const SHORTCUTS = [
      { k:'⌘K', l:'palette',         d:'jump anywhere · search · run command' },
      { k:'T',  l:'today',            d:'main daily surface · plan + focus blocks' },
      { k:'C',  l:'coach',            d:'ai companion · single next action · fork view' },
      { k:'F',  l:'focus',            d:'start 25-min pomodoro on pinned task' },
      { k:'N',  l:'new note',         d:'capture anywhere · auto-link to atlas' },
    ];

    /* ====== atoms ====== */
    const Chip = ({ children, live=false, solid=false }) => (
      <span className={`chip ${live?'live':''} ${solid?'solid':''}`}>{children}</span>
    );
    const Kbd = ({ children, large=false }) => (
      <span className={`kbd ${large?'kbd-large':''}`}>{children}</span>
    );

    /* ====== fake Today behind ====== */
    function FakeToday() {
      return (
        <div className="behind">
          <div className="max-w-[1280px] mx-auto px-8 pt-8">
            <div className="flex items-center gap-3 mb-6">
              <div className="w-7 h-7 rounded-md flex items-center justify-center hair2-b"
                   style={{background:'#000'}}>
                <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                  <defs>
                    <clipPath id="gly-onb-c"><circle cx="12" cy="12" r="9"/></clipPath>
                  </defs>
                  <circle cx="12" cy="12" r="9" fill="#fff"/>
                  <g clipPath={"url(#gly-onb-c)"}>
                    <rect x="3" y="3" width="9" height="18" fill="#000"/>
                  </g>
                  <g clipPath={"url(#gly-onb-c)"} stroke="#000" strokeWidth="1.4">
                    <line x1="10" y1="2" x2="22" y2="14"/>
                    <line x1="10" y1="6" x2="22" y2="18"/>
                    <line x1="10" y1="10" x2="22" y2="22"/>
                    <line x1="10" y1="14" x2="22" y2="26"/>
                    <line x1="10" y1="18" x2="22" y2="30"/>
                  </g>
                </svg>
              </div>
              <span className="text-[15px] font-semibold">Hone</span>
              <span className="dim-2 text-[13px]">/</span>
              <span className="text-[15px] dim">Today</span>
            </div>
            <div className="surface hair-b rounded-xl p-7 mb-4">
              <h2 className="text-[24px] font-semibold mb-3">Today's plan placeholder…</h2>
              <p className="text-[13px] dim">…</p>
            </div>
            <div className="grid grid-cols-3 gap-4">
              <div className="surface hair-b rounded-xl p-5 h-32"/>
              <div className="surface hair-b rounded-xl p-5 h-32"/>
              <div className="surface hair-b rounded-xl p-5 h-32"/>
            </div>
          </div>
        </div>
      );
    }

    /* ====== step header ====== */
    function StepHeader({ step }) {
      return (
        <div className="px-8 pt-7 pb-2 no-select">
          <div className="flex items-center justify-between mb-4">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">step {step} of 3</span>
            <Chip>~30 sec</Chip>
          </div>
          <div className="flex items-center gap-1.5">
            {[1,2,3].map(i => (
              <div key={i} className={`dot ${i===step?'cur': i<step?'done':''}`}/>
            ))}
            <div className="ml-3 text-[10px] mono dim-2 uppercase tracking-wider">
              {step === 1 && 'pick stack'}
              {step === 2 && 'pick mode'}
              {step === 3 && 'shortcuts tour'}
            </div>
          </div>
        </div>
      );
    }

    /* ====== Step 1: Stack ====== */
    function StepStack({ selected, setSelected }) {
      return (
        <div className="px-8 py-6 stagger">
          <div className="relative overflow-hidden rounded-lg p-4 mb-5 surface-2 hair-b">
            <div className="hero-stripe"/>
            <h2 className="text-[22px] font-semibold tracking-tight mb-1.5">What are you preparing for?</h2>
            <p className="text-[13px] dim">Pick one — you can always change later in Settings.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-2.5 mb-5">
            {STACKS.map(s => (
              <button key={s.k} onClick={()=>setSelected(s.k)}
                className={`pick relative hair2-b rounded-md p-4 text-left flex items-start gap-3 ${selected===s.k?'selected':''}`}
                style={{ background: selected===s.k?undefined:'var(--surface-2)',
                         borderColor: selected===s.k?undefined:'var(--hair)' }}>
                <div className="shrink-0 mono text-[11px] font-semibold w-7 h-7 rounded-md flex items-center justify-center hair-b uppercase tracking-wider"
                     style={{background:'var(--surface-3)', color:'var(--ink-92)'}}>{s.g}</div>
                <div className="min-w-0 flex-1">
                  <div className="text-[14px] font-medium leading-tight" style={{color: selected===s.k?'var(--ink-100)':'var(--ink-92)'}}>
                    {s.l}
                  </div>
                  <div className="text-[11.5px] dim mt-0.5">{s.d}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ====== Step 2: Mode ====== */
    function StepMode({ selected, setSelected }) {
      return (
        <div className="px-8 py-6 stagger">
          <div className="relative overflow-hidden rounded-lg p-4 mb-5 surface-2 hair-b">
            <div className="hero-stripe"/>
            <h2 className="text-[22px] font-semibold tracking-tight mb-1.5">How do you want to work?</h2>
            <p className="text-[13px] dim">Mode shapes coach behavior · daily UI · what gets pinned to today.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-2.5 mb-5">
            {MODES.map(m => (
              <button key={m.k} onClick={()=>setSelected(m.k)}
                className={`pick relative hair2-b rounded-md p-4 text-left ${selected===m.k?'selected':''}`}
                style={{ background: selected===m.k?undefined:'var(--surface-2)',
                         borderColor: selected===m.k?undefined:'var(--hair)' }}>
                <div className="text-[15px] font-semibold tracking-tight mb-1"
                     style={{color: selected===m.k?'var(--ink-100)':'var(--ink-92)'}}>
                  {m.l}
                </div>
                <div className="text-[12px] dim leading-relaxed mb-3" style={{color:'var(--ink-70)'}}>{m.d}</div>
                <div className="text-[10px] mono dim-2 uppercase tracking-wider pt-2 border-t"
                     style={{ borderColor:'var(--hair)' }}>
                  {m.trail}
                </div>
              </button>
            ))}
          </div>

          {selected && (
            <div className="text-[12px] dim leading-relaxed p-3 surface-2 hair-b rounded-md flex items-start gap-3">
              <Chip live>note</Chip>
              <span style={{color:'var(--ink-70)'}}>
                {selected === 'explore' && 'You\'ll get a fork-view in Coach (MLE/DE branches). Auto-suggest commit at week 6.'}
                {selected === 'commit'  && 'Coach will track milestone progress · daily one-action card · weekly recap.'}
                {selected === 'deep'    && 'Daily mock dispatch · 21-day countdown · interviewer-strict profile by default.'}
              </span>
            </div>
          )}
        </div>
      );
    }

    /* ====== Step 3: Shortcuts tour ====== */
    function StepShortcuts() {
      return (
        <div className="px-8 py-6 stagger">
          <div className="relative overflow-hidden rounded-lg p-4 mb-5 surface-2 hair-b">
            <div className="hero-stripe"/>
            <h2 className="text-[22px] font-semibold tracking-tight mb-1.5">Five shortcuts to remember</h2>
            <p className="text-[13px] dim">Hone is keyboard-first. These cover ~80% of daily use.</p>
          </div>

          <ul className="space-y-2 mb-5">
            {SHORTCUTS.map((s,i) => (
              <li key={s.k}
                className="hair-b rounded-md p-3 surface-2 grid grid-cols-[48px_1fr] items-center gap-4">
                <div className="flex items-center justify-center">
                  <Kbd large>
                    <span className={i === 0 ? 'shortcut-hint inline-flex px-1' : ''}>{s.k}</span>
                  </Kbd>
                </div>
                <div className="min-w-0">
                  <div className="text-[13px] font-medium" style={{color:'var(--ink-92)'}}>{s.l}</div>
                  <div className="text-[11.5px] dim mt-0.5 leading-relaxed">{s.d}</div>
                </div>
              </li>
            ))}
          </ul>

          <div className="text-[11px] mono dim-2 uppercase tracking-wider flex items-center gap-2">
            <span>find this later in</span>
            <span className="hairline flex-1"/>
            <Chip>settings · shortcuts</Chip>
          </div>
        </div>
      );
    }

    /* ====== Footer ====== */
    function Footer({ step, setStep, onSkip, onFinish }) {
      return (
        <div className="px-8 py-5 border-t flex items-center gap-2 surface-2"
             style={{ borderColor:'var(--hair)' }}>
          <button onClick={onSkip}
                  className="hair-b px-4 py-2 rounded-md text-[12px] dim surface-2">
            skip onboarding
          </button>
          <span className="ml-auto"/>
          {step > 1 && (
            <button onClick={()=>setStep(s=>s-1)}
                    className="hair-b px-4 py-2 rounded-md text-[12.5px] dim surface-2">
              ← back
            </button>
          )}
          {step < 3 ? (
            <button onClick={()=>setStep(s=>s+1)}
                    className="btn-primary px-5 py-2 rounded-md text-[12.5px] font-medium">
              continue · <span className="text-[10px] mono opacity-50 ml-1">⏎</span>
            </button>
          ) : (
            <button onClick={onFinish}
                    className="btn-primary px-5 py-2 rounded-md text-[12.5px] font-medium">
              start using Hone · <span className="text-[10px] mono opacity-50 ml-1">⏎</span>
            </button>
          )}
        </div>
      );
    }

    /* ====== tweaks ====== */
    function TweaksPanel({ tweaks, set, onClose }) {
      return (
        <div className="tweaks">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
            <button onClick={onClose} className="dim-2 text-[14px] leading-none">×</button>
          </div>
          <div className="space-y-3">
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">step</span>
              <select value={tweaks.currentStep} onChange={e=>set('currentStep', parseInt(e.target.value))}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value={1}>1 · stack</option>
                <option value={2}>2 · mode</option>
                <option value={3}>3 · shortcuts</option>
              </select>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">stack pre-pick</span>
              <select value={tweaks.selectedStack} onChange={e=>set('selectedStack', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value="">none</option>
                {STACKS.map(s=> <option key={s.k} value={s.k}>{s.l}</option>)}
              </select>
            </label>
            <label className="flex flex-col gap-1">
              <span className="dim text-[10px] mono uppercase tracking-wider">mode pre-pick</span>
              <select value={tweaks.selectedMode} onChange={e=>set('selectedMode', e.target.value)}
                      className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono"
                      style={{color:'var(--ink-92)'}}>
                <option value="">none</option>
                {MODES.map(m=> <option key={m.k} value={m.k}>{m.l}</option>)}
              </select>
            </label>
          </div>
        </div>
      );
    }

    /* ====== app ====== */
    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [step, setStep] = useState(tweaks.currentStep);
      const [stack, setStack] = useState(tweaks.selectedStack);
      const [mode, setMode] = useState(tweaks.selectedMode);

      const set = (k,v) => {
        const next = { ...tweaks, [k]:v };
        setTweaks(next);
        if (k === 'currentStep') setStep(v);
        if (k === 'selectedStack') setStack(v);
        if (k === 'selectedMode') setMode(v);
        try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      };

      useEffect(()=>{
        const onMsg = (ev)=>{
          const d = ev.data || {};
          if (d.type==='__activate_edit_mode') setTweaksOpen(true);
          if (d.type==='__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
        return ()=> window.removeEventListener('message', onMsg);
      },[]);

      return (
        <div className="page-enter min-h-screen relative overflow-hidden" style={{ background:'#000' }}>
          <FakeToday/>

          <div className="modal-overlay flex items-center justify-center px-6 py-6">
            <div className="modal">
              <StepHeader step={step}/>
              <div className="hairline mx-8"/>
              <div key={step}>
                {step === 1 && <StepStack selected={stack} setSelected={(s)=>{ setStack(s); set('selectedStack', s); }}/>}
                {step === 2 && <StepMode selected={mode}  setSelected={(m)=>{ setMode(m);  set('selectedMode', m);  }}/>}
                {step === 3 && <StepShortcuts/>}
              </div>
              <Footer step={step}
                      setStep={(updater)=>{
                        const newStep = typeof updater === 'function' ? updater(step) : updater;
                        setStep(newStep);
                        set('currentStep', newStep);
                      }}
                      onSkip={()=>{}}
                      onFinish={()=>{}}/>
            </div>
          </div>

          {tweaksOpen && <TweaksPanel tweaks={tweaks} set={set}
            onClose={()=>{ setTweaksOpen(false);
              try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e){} }}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
