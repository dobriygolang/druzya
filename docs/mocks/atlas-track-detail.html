<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>druz9 · Atlas track detail</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --surface-1:#0a0a0a; --surface-2:#111; --surface-3:#161616;
      --hair:rgba(255,255,255,0.07); --hair-2:rgba(255,255,255,0.12);
      --ink-100:#fff; --ink-92:rgba(255,255,255,0.92); --ink-70:rgba(255,255,255,0.7);
      --ink-50:rgba(255,255,255,0.5); --ink-30:rgba(255,255,255,0.3);
      --accent:#FF3B30; --t-fast:150ms; --t-base:220ms; --ease:cubic-bezier(0.2,0.7,0.2,1);
    }
    *{box-sizing:border-box}
    html,body{background:var(--bg);color:var(--ink-92);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased}
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:-0.01em}
    .surface{background:var(--surface-1)} .surface-2{background:var(--surface-2)} .surface-3{background:var(--surface-3)}
    .hair-b{border:1px solid var(--hair)} .hair2-b{border:1px solid var(--hair-2)}
    .dim{color:var(--ink-50)} .dim-2{color:var(--ink-30)} .hairline{height:1px;background:var(--hair);width:100%}
    .canvas-bg{background:radial-gradient(circle at 30% 0%,rgba(255,255,255,0.02),transparent 55%),var(--bg)}
    @keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page-enter{animation:pageFade 220ms var(--ease) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
    .stagger>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger>*:nth-child(1){animation-delay:60ms}.stagger>*:nth-child(2){animation-delay:130ms}.stagger>*:nth-child(3){animation-delay:200ms}.stagger>*:nth-child(4){animation-delay:270ms}.stagger>*:nth-child(5){animation-delay:340ms}.stagger>*:nth-child(6){animation-delay:410ms}.stagger>*:nth-child(7){animation-delay:480ms}.stagger>*:nth-child(8){animation-delay:550ms}.stagger>*:nth-child(9){animation-delay:620ms}.stagger>*:nth-child(10){animation-delay:690ms}
    .stagger-list>*{opacity:0;animation:fadeUp 480ms var(--ease) forwards}
    .stagger-list>*:nth-child(1){animation-delay:80ms}.stagger-list>*:nth-child(2){animation-delay:150ms}.stagger-list>*:nth-child(3){animation-delay:220ms}.stagger-list>*:nth-child(4){animation-delay:290ms}.stagger-list>*:nth-child(5){animation-delay:360ms}.stagger-list>*:nth-child(6){animation-delay:430ms}
    .lift{transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .lift:hover{transform:translateY(-1px);border-color:var(--hair-2)}
    .btn-primary{background:#fff;color:#000;transition:transform var(--t-fast) var(--ease),background-color var(--t-fast) var(--ease)}
    .btn-primary:hover{transform:translateY(-1px);background:rgba(255,255,255,0.92)}
    @keyframes fillBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fill-bar{transform-origin:left;animation:fillBar 1100ms ease-out forwards;animation-delay:240ms}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;border:1px solid var(--hair);background:var(--surface-2);font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-50);font-family:'JetBrains Mono',ui-monospace,monospace}
    .chip.live{color:var(--ink-70)} .chip.live::before{content:'';width:6px;height:6px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 2px rgba(255,59,48,0.18)}
    .chip.solid{background:#fff;color:#000;border-color:#fff}
    .kbd{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;border:1px solid var(--hair-2);background:var(--surface-3);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-70);line-height:1.4}
    button:focus-visible{outline:1px solid var(--ink-70);outline-offset:2px}
    ::selection{background:rgba(255,255,255,0.18);color:#fff}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:var(--hair-2);border-radius:3px}
    .hero-stripe{position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--accent);opacity:0.85}
    .no-select{-webkit-user-select:none;user-select:none}
    .tweaks{position:fixed;right:20px;bottom:20px;width:260px;background:var(--surface-2);border:1px solid var(--hair-2);border-radius:10px;padding:14px;z-index:50;font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
    .step-rail{position:relative}
    .step-rail::before{content:'';position:absolute;left:19px;top:40px;bottom:-16px;width:1px;background:var(--hair)}
    .step-rail:last-child::before{display:none}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "currentStep": 5,
      "showResources": true,
      "showCheckpoint": true
    }/*EDITMODE-END*/;

    const TRACK = {
      slug:'ml-engineering-foundations', name:'ML Engineering Foundations',
      tagline:'Classical → DL → LLM eval · 14 weeks · medium',
      kind:'ML', weeks:14, difficulty:'medium', currentStep:5, totalSteps:10,
      progress: 0.42, pace:'on schedule',
    };

    const STEPS = [
      { idx:1, title:'Linear algebra basics', skills:['linear_algebra','vectors'], minutes:240, status:'done', score:88 },
      { idx:2, title:'Probability & statistics core', skills:['probability','statistics'], minutes:300, status:'done', score:76 },
      { idx:3, title:'Classical ML · supervised', skills:['supervised','classification'], minutes:360, status:'done', score:82 },
      { idx:4, title:'Evaluation & validation', skills:['eval','cross_validation'], minutes:240, status:'done', score:71 },
      { idx:5, title:'Logistic regression · deep', skills:['logistic','regularization'], minutes:270, status:'doing',
        resources: [
          { title:'Andrew Ng · W3 video', author:'Coursera deeplearning.ai', kind:'video', minutes:72, priority:'core', level:'B', why:'best intuition without code', topics:['logistic','sigmoid'], state:'finished', reflection:'cost function = log-likelihood, gradient = (y-h)·x' },
          { title:'mlcourse.ai · topic 4 classification', author:'ods.ai', kind:'course', minutes:45, priority:'core', level:'B', why:'practical implementation alongside Andrew Ng', topics:['logistic','classification'], state:'in-progress', progress:0.3 },
          { title:'Strang ch.6 — eigenvalues', author:'MIT OCW', kind:'book', minutes:60, priority:'supplement', level:'C', why:'underlies regularization math', topics:['eigenvalues','linear_algebra'], state:'todo' },
        ],
        checkpoint:{ skill_keys:['logistic','regularization','classification'], unlocked:false, attempts:0 },
        graduation:{ section:'ml_eng', round:'classical', minutes:30 },
      },
      { idx:6, title:'Decision trees & ensembles', skills:['trees','random_forest'], minutes:300, status:'todo' },
      { idx:7, title:'Neural networks · fundamentals', skills:['nn','backprop'], minutes:420, status:'todo' },
      { idx:8, title:'Deep learning · CNN/RNN/Transformers', skills:['cnn','transformers'], minutes:540, status:'todo' },
      { idx:9, title:'LLM evaluation', skills:['llm_eval','rag'], minutes:360, status:'todo' },
      { idx:10, title:'ML systems · production', skills:['mlops','serving'], minutes:300, status:'todo' },
    ];

    const Chip = ({children,live=false,solid=false}) => <span className={`chip ${live?'live':''} ${solid?'solid':''}`}>{children}</span>;
    const Kbd = ({children}) => <span className="kbd">{children}</span>;

    function Header(){
      return <header className="flex items-center justify-between pt-7 pb-5 no-select">
        <div className="flex items-center gap-3">
          <div className="w-7 h-7 rounded-md flex items-center justify-center mono text-[12px] font-semibold hair2-b" style={{background:'var(--surface-3)',color:'var(--ink-92)'}}>d9</div>
          <span className="text-[15px] font-semibold tracking-tight">druz9</span>
          <span className="dim-2 text-[13px]">/</span>
          <a className="text-[15px] dim hover:text-white transition-colors cursor-pointer">atlas</a>
          <span className="dim-2 text-[13px]">/</span>
          <span className="text-[15px]">{TRACK.name}</span>
        </div>
        <div className="flex items-center gap-2 text-[10px] mono uppercase tracking-wider dim">
          <button className="hair-b px-3 py-1.5 rounded-md surface-2">pause track</button>
          <span>palette</span><Kbd>⌘K</Kbd>
        </div>
      </header>;
    }

    function Hero(){
      const pct = Math.round(TRACK.progress*100);
      const stepsDone = Math.round(TRACK.progress*TRACK.totalSteps);
      return <section className="surface hair-b rounded-xl overflow-hidden mb-5 relative">
        <div className="hero-stripe"/>
        <div className="p-7 flex items-start gap-6">
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-3">
              <Chip>{TRACK.kind}</Chip>
              <Chip>{TRACK.difficulty}</Chip>
              <Chip live>active · step {TRACK.currentStep}/{TRACK.totalSteps}</Chip>
              <Chip>{TRACK.pace}</Chip>
            </div>
            <h1 className="text-[28px] font-semibold tracking-tight mb-2 leading-[1.1]">{TRACK.name}</h1>
            <p className="text-[13px] dim leading-relaxed max-w-[640px]">{TRACK.tagline}</p>
            <div className="flex items-center gap-6 mt-5 text-[10px] mono dim-2 uppercase tracking-wider">
              <span><span className="text-[20px] font-semibold mono mr-1" style={{color:'var(--ink-100)'}}>{TRACK.weeks}</span>weeks</span>
              <span>·</span>
              <span><span className="text-[20px] font-semibold mono mr-1" style={{color:'var(--ink-100)'}}>{TRACK.totalSteps}</span>steps</span>
              <span>·</span>
              <span><span className="text-[20px] font-semibold mono mr-1" style={{color:'var(--ink-100)'}}>{stepsDone}</span>done</span>
              <span>·</span>
              <span><span className="text-[20px] font-semibold mono mr-1" style={{color:'var(--ink-100)'}}>1240</span>min logged</span>
            </div>
          </div>
          <div className="shrink-0 relative w-[120px] h-[120px]">
            <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--hair)" strokeWidth="3"/>
              <circle cx="50" cy="50" r="42" fill="none" stroke="#fff" strokeWidth="3" strokeDasharray={`${pct*2.64} 264`} strokeLinecap="round" style={{transition:'stroke-dasharray 1.4s var(--ease)'}}/>
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="mono text-[26px] font-semibold tracking-tight">{pct}<span className="text-[12px] dim-2">%</span></span>
              <span className="text-[10px] mono dim-2 uppercase tracking-wider">complete</span>
            </div>
          </div>
        </div>
      </section>;
    }

    function ResourceCard({r}){
      return <li className="lift hair-b rounded-md p-4 surface-2 grid grid-cols-[24px_1fr_60px_60px] items-center gap-3">
        <span className="mt-0.5 shrink-0">
          {r.state==='finished' && <svg width="14" height="14" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#fff"/><path d="M3 5 l1.5 1.5 L7 3.5" stroke="#000" strokeWidth="1.2" fill="none"/></svg>}
          {r.state==='in-progress' && <span className="block w-3 h-3 rounded-full" style={{border:'1px solid var(--accent)',background:'rgba(255,59,48,0.3)'}}/>}
          {r.state==='todo' && <span className="block w-3 h-3 rounded-full" style={{border:'1px solid var(--ink-30)'}}/>}
        </span>
        <div className="min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <Chip>{r.kind}</Chip>
            <Chip>{r.priority}</Chip>
            <Chip>level {r.level}</Chip>
            {r.state==='in-progress' && <Chip live>in progress · {Math.round(r.progress*100)}%</Chip>}
          </div>
          <div className="font-medium text-[13px]" style={{color:r.state==='todo'?'var(--ink-50)':'var(--ink-92)'}}>{r.title}</div>
          <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">{r.author} · why · {r.why}</div>
          {r.reflection && <div className="text-[11px] mt-2 p-2 surface-3 rounded-sm" style={{borderLeft:'2px solid var(--ink-70)',color:'var(--ink-70)'}}>
            <span className="mono dim-2 uppercase text-[9px] tracking-wider">your reflection · </span>{r.reflection}
          </div>}
        </div>
        <span className="mono text-[11px] dim text-right">{r.minutes}m</span>
        <button className="hair-b px-3 py-1.5 rounded-md text-[10px] mono dim uppercase tracking-wider surface-3 text-center">{r.state==='finished'?'review':'open'}</button>
      </li>;
    }

    function StepCard({step,expanded}){
      const isCurrent = step.status==='doing';
      const isDone = step.status==='done';
      return <article className="step-rail relative flex gap-5">
        <div className="relative shrink-0 z-10">
          <div className="w-[40px] h-[40px] rounded-full flex items-center justify-center hair-b mono text-[12px] font-semibold" style={{
            background:isDone?'#fff':'var(--surface-2)',
            color:isDone?'#000':(isCurrent?'var(--ink-100)':'var(--ink-50)'),
            borderColor:isCurrent?'var(--ink-100)':'var(--hair)',
            boxShadow:isCurrent?'0 0 0 4px rgba(255,255,255,0.06)':'none'
          }}>
            {isDone?<svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8 l3 3 L13 4" stroke="#000" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>:step.idx}
          </div>
        </div>
        <div className={`flex-1 surface ${isCurrent?'hair2-b':'hair-b'} rounded-xl p-5 mb-4`} style={{background:isCurrent?'linear-gradient(135deg,rgba(255,255,255,0.02),transparent 60%),var(--surface-1)':'var(--surface-1)',borderColor:isCurrent?'var(--hair-2)':undefined}}>
          <div className="flex items-start gap-3 mb-2">
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-1.5">
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">step {step.idx}</span>
                {isCurrent && <Chip live>current</Chip>}
                {step.score && <Chip><span className="mono">{step.score}/100</span></Chip>}
              </div>
              <h3 className={`text-[15px] font-semibold tracking-tight ${step.status==='todo'?'dim':''}`}>{step.title}</h3>
              <div className="flex flex-wrap gap-1.5 mt-2">
                {step.skills.map(s=><span key={s} className="text-[10px] mono dim-2">·{s}</span>)}
              </div>
            </div>
            <span className="text-[11px] mono dim-2 mt-1 shrink-0">{step.minutes} min</span>
          </div>

          {expanded && step.resources && <div className="mt-4 pt-4 border-t" style={{borderColor:'var(--hair)'}}>
            <span className="text-[10px] mono dim-2 uppercase tracking-wider mb-3 block">curated resources · 1 finished · 1 in progress · 1 todo</span>
            <ul className="space-y-2 stagger-list">{step.resources.map((r,i)=><ResourceCard key={i} r={r}/>)}</ul>

            <div className="mt-4 flex items-center gap-2 flex-wrap">
              <button className="lift hair-b px-3 py-1.5 rounded-md text-[11px] mono dim uppercase tracking-wider surface-2">+ add resource</button>
              <button className="lift hair-b px-3 py-1.5 rounded-md text-[11px] mono dim uppercase tracking-wider surface-2">hide one</button>
              <span className="ml-auto text-[10px] mono dim-2 uppercase tracking-wider">2 of 3 core finished</span>
            </div>
          </div>}

          {expanded && step.checkpoint && <div className="mt-4 pt-4 border-t" style={{borderColor:'var(--hair)'}}>
            <div className="surface-2 hair-b rounded-lg p-4 flex items-center gap-4">
              <div className="flex-1">
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">checkpoint quiz</span>
                <h4 className="text-[13px] font-medium mt-1">5 questions · 5 min · AI-graded</h4>
                <div className="text-[11px] dim mt-1">≥70% unlocks step 6 · &lt;70% suggests review</div>
              </div>
              <button className="btn-primary px-4 py-2 rounded-md text-[12px] font-medium">take checkpoint</button>
            </div>
          </div>}

          {expanded && step.graduation && <div className="mt-3">
            <div className="hair-b rounded-lg p-4 flex items-center gap-4 surface-2">
              <div className="flex-1">
                <span className="text-[10px] mono dim-2 uppercase tracking-wider">optional · graduation mock</span>
                <h4 className="text-[13px] font-medium mt-1">AI-mock · classical ML round</h4>
                <div className="text-[11px] dim mt-1">{step.graduation.minutes} min · MLE rubric · score feeds fork-analysis</div>
              </div>
              <button className="lift hair-b px-4 py-2 rounded-md text-[12px] dim surface-3">start mock</button>
            </div>
          </div>}
        </div>
      </article>;
    }

    function Sidebar(){
      const current = STEPS.find(s=>s.status==='doing');
      return <aside className="sticky top-5 space-y-4">
        <div className="surface hair-b rounded-xl p-5">
          <span className="text-[10px] mono dim-2 uppercase tracking-wider mb-2 block">your move</span>
          <h3 className="text-[14px] font-semibold tracking-tight mb-1 leading-snug">{current.title}</h3>
          <p className="text-[12px] dim leading-relaxed mb-4">2 of 3 core finished · checkpoint when ready</p>
          <button className="btn-primary w-full px-3.5 py-2 rounded-md text-[12.5px] font-medium">continue · in-progress resource</button>
        </div>

        <div className="surface hair-b rounded-xl p-5">
          <div className="flex items-center gap-3 mb-3">
            <div className="w-9 h-9 rounded-full surface-3 hair-b flex items-center justify-center text-[10px] mono font-semibold">ml</div>
            <div className="flex-1 min-w-0">
              <div className="text-[12.5px] font-medium leading-tight">ml coach</div>
              <div className="text-[10px] mono dim-2 uppercase tracking-wider mt-0.5">ai · 24/7 · 8 facts</div>
            </div>
            <Chip live>online</Chip>
          </div>
          <p className="text-[11.5px] dim leading-relaxed">«помню что Andrew Ng W3 finished. Ready to discuss cost-function intuition»</p>
          <button className="mt-3 w-full hair-b py-1.5 rounded-md text-[10px] mono dim uppercase tracking-wider surface-2">open chat ↗</button>
        </div>

        <div className="surface hair-b rounded-xl p-5">
          <span className="text-[10px] mono dim-2 uppercase tracking-wider mb-2 block">practice</span>
          <button className="w-full hair-b py-2 rounded-md text-[12px] surface-2 flex items-center justify-between px-3 mb-2 lift dim">
            <span>kaggle · titanic baseline</span><span className="dim-2 text-[10px] mono">↗</span>
          </button>
          <button className="w-full hair-b py-2 rounded-md text-[12px] surface-2 flex items-center justify-between px-3 lift dim">
            <span>leetcode · sql pack</span><span className="dim-2 text-[10px] mono">↗</span>
          </button>
        </div>
      </aside>;
    }

    function TweaksPanel({tweaks,set,onClose}){
      return <div className="tweaks">
        <div className="flex items-center justify-between mb-3">
          <span className="text-[10px] mono dim-2 uppercase tracking-wider">tweaks</span>
          <button onClick={onClose} className="dim-2 text-[14px] leading-none">×</button>
        </div>
        <div className="space-y-3">
          <label className="flex flex-col gap-1">
            <span className="dim text-[10px] mono uppercase tracking-wider">current step</span>
            <input type="number" min="1" max={STEPS.length} value={tweaks.currentStep} onChange={e=>set('currentStep',parseInt(e.target.value))} className="bg-black hair2-b rounded px-2 py-1 text-[11px] mono" style={{color:'var(--ink-92)'}}/>
          </label>
          <label className="flex items-center justify-between gap-2"><span className="dim text-[11px]">show resources</span><input type="checkbox" checked={tweaks.showResources} onChange={e=>set('showResources',e.target.checked)}/></label>
          <label className="flex items-center justify-between gap-2"><span className="dim text-[11px]">show checkpoint</span><input type="checkbox" checked={tweaks.showCheckpoint} onChange={e=>set('showCheckpoint',e.target.checked)}/></label>
        </div>
      </div>;
    }

    function App(){
      const [tweaks,setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen,setTweaksOpen] = useState(false);
      const set = (k,v) => { setTweaks({...tweaks,[k]:v}); try{window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*')}catch(e){} };
      useEffect(()=>{
        const onMsg = ev => { const d=ev.data||{}; if(d.type==='__activate_edit_mode')setTweaksOpen(true); if(d.type==='__deactivate_edit_mode')setTweaksOpen(false); };
        window.addEventListener('message',onMsg);
        try{window.parent.postMessage({type:'__edit_mode_available'},'*')}catch(e){}
        return ()=>window.removeEventListener('message',onMsg);
      },[]);

      return <div className="canvas-bg min-h-screen page-enter">
        <div className="max-w-[1280px] mx-auto px-8 pb-12">
          <Header/>
          <Hero/>
          <div className="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-8">
            <main className="stagger">{STEPS.map(s=><StepCard key={s.idx} step={s} expanded={s.idx===tweaks.currentStep}/>)}</main>
            <Sidebar/>
          </div>
          <footer className="flex items-center justify-between pt-8 mt-4 text-[10px] mono dim-2 uppercase tracking-wider no-select border-t" style={{borderColor:'var(--hair)'}}>
            <div className="flex items-center gap-4"><span>practice <Kbd>P</Kbd></span><span>checkpoint <Kbd>C</Kbd></span><span>tutor <Kbd>T</Kbd></span></div>
            <span>druz9 · track detail · v0</span>
          </footer>
        </div>
        {tweaksOpen && <TweaksPanel tweaks={tweaks} set={set} onClose={()=>{setTweaksOpen(false);try{window.parent.postMessage({type:'__edit_mode_dismissed'},'*')}catch(e){}}}/>}
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
