<!--
  Phase 0.14 — favicon в чёрных тонах. Совпадает с Hone-эстетикой:
  pure black canvas, белый "9", тонкая 1px рамка тёмно-серого.
  Чистый монохром, без градиентов.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#000000"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#1F1F1F" stroke-width="1"/>
  <text x="16" y="22" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="18" fill="#FFFFFF" text-anchor="middle">9</text>
</svg>
