version: "2"

# druz9 — per-domain sqlc generation. Each domain keeps its own queries under
# services/<domain>/infra/queries/*.sql and emits a typed Go package to
# services/<domain>/infra/db. All three domains share the same migrations tree
# so cross-domain FK references resolve during generation.
#
# Run with: `sqlc generate` (or `make gen-sqlc`).

sql:
  - engine: postgresql
    name: "auth"
    queries: "services/auth/infra/queries"
    schema: "migrations"
    gen:
      go:
        package: "authdb"
        out: "services/auth/infra/db"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true

  - engine: postgresql
    name: "profile"
    queries: "services/profile/infra/queries"
