# Hexagonal layering rules — generated by tools/gen_arch_configs.sh
# Allowed dependency direction:
#   domain ← (leaf, no internal deps)
#   app    → domain
#   infra  → domain  (infra includes sub-packages: db, parsers, cache, etc.)
#   ports  → app, domain
version: 3
workdir: .

allow:
  depOnAnyVendor: true

excludeFiles:
  - ".*_test\\.go$"

components:
  domain:
    in:
      - domain
  app:
    in:
      - app
      - app/**
  ports:
    in:
      - ports
      - ports/**

deps:
  domain:
    anyProjectDeps: true
    mayDependOn: []
  app:
    mayDependOn: [domain]
  ports:
    mayDependOn: [app, domain]
